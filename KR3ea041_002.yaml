body:
  text: 卷二脈色上第四診法常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂乃可診有過之脈平旦者陰陽之交也陽主晝陰主夜陽主表陰主裡凡人身營衛之氣一晝一夜五十周於身晝則行於陽分夜則行於陰分逮至平旦復皆會於寸口寸口者脈之大會五臟六腑之所終始也夫脈氣血之先也盛則脈盛衰則脈衰熱則脈數寒則脈遲微則脈弱平則脈和長人脈長短人脈短性急人脈急性緩人脈緩此皆其常也反者為有過之脈切脈動靜而視精明察五色觀五臟有餘不足六腑強弱形之盛衰以此參伍決死生之分切者以指按索之謂切脈之動靜診陰陽也視目之精明診神氣也察五色之變見診生克邪正也觀臟腑虛實以診其內別形容盛衰以診其外故凡診病者必合脈色內外參伍以求則陰陽表裡虛實寒熱之情無所遁而先後緩急真假逆從之治必無差故可以決死生之分而況於疾病乎參伍之義以三相較謂之參以伍相類謂之伍搜其隱微通其變極其數也尺內兩旁則季脅也尺內者關前曰寸關後曰尺故曰尺內季脅小肋也在脅下兩旁為腎所近故自季脅之下皆尺內主之夫尺對寸而言人身動脈雖多惟此氣口三部一寸九分總曰寸口分言之則外為寸部內為尺部外為陽故寸內得九分陽之數也內為陰故尺內得一寸陰之數也關前曰寸關後曰尺寸前曰魚際尺後曰尺澤所謂關者乃間於尺寸之間為陰陽之界限正當掌後高骨處是也故於寸內取九分為寸尺內取一寸為尺以契陽九陰十之數耳尺外以候腎尺裡以候腹尺外尺脈前半部也尺裡尺脈後半部也前以候陽後以候陰人身以背為陽腎附於背故外以候腎腹為陰故里以候腹所謂腹者凡大小腸膀胱命門皆在其中矣諸部皆言左右而此獨不分者以兩尺皆主乎腎也中附上左外以候肝內以候膈中附上言附尺之上而居乎中者即關脈也左外言左關之前半部內言左關之後半部肝為陰中之陽臟而亦附近於背故外以候肝內以候膈舉膈而言則中焦之膈膜膽腑皆在其中矣右外以候胃內以候脾右關之前所以候胃右關之後所以候脾脾胃皆中州之官而以表裡言之則胃為陽脾為陰故外以候胃內以候脾寸口者手太陰也太陰行氣於三陰在手而主五臟胃亦腑也此獨言之是臟腑之氣味皆出於胃變見於氣口亦無不見乎此矣上附上右外以候肺內以候胸中上附上言上而又上則寸脈也五臟之位惟肺最高故右寸之前以候肺右寸之後以候胸中胸中者膈膜之上皆是也左外以候心內以候膻中心肺皆居膈上故左寸之前以候心左寸之後以候膻中膻中者兩乳之間謂之氣海當心包所居之分也前以候前後以候後此重申上下內外之義而詳明之也統而言之寸為前尺為後分而言之上半部為前下半部為後蓋言上以候上下以候下也上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也竟盡也言上而盡於上在脈則盡於魚際在體則應於胸喉下而盡於下在脈則盡於尺部在體則應於少腹足中此脈候上下之事也首言尺內次言中附上而為關又言上附上而為寸皆自內以及外者蓋以太陰之脈從胸走手以尺為根本寸為枝葉也故凡人之脈寧可有根而無葉不可有葉而無根審其尺之緩急浮大滑澀肉之堅脆而病形定矣是蓋所重在本耳又上竟上者言胸喉中事下竟下者言少腹足膝中事分明上以候上下以候下此不易之理後世脈經紛紛鑿說其謬甚矣人一呼脈再動一吸脈亦再動呼吸定息脈五動閏以太息命曰平人平人者不病也出氣曰呼入氣曰吸一呼一吸總名曰息動至也再動兩至也常人之脈一呼兩至一吸亦兩至呼吸定息謂一息既盡而換息未起之際也脈又一至故曰五動閏余也猶閏月之謂言平人常息之外間有一息甚長者是為閏以太息而又不止五至也此即平人不病之常度總計定息太息之數大約一息脈當六至呼吸定息脈行六寸乃合一至一寸也常以不病調病人醫不病故為病人平息以調之為法不病者其息勻病者其息亂醫者不病故能為病人平息以調之以其息勻也是為調診之法人一呼脈一動一吸脈一動曰少氣脈為血氣之道路而脈之運行在乎氣若一呼一吸脈各一動則一息二至減於常人之半矣以正氣衰竭也故曰少氣謂之離經人一呼脈三動一吸脈三動而躁尺熱曰病溫尺不熱脈滑曰病風脈澀曰痹若不因定息太息而呼吸各三動是一息六至矣亦謂之離經躁者急疾之謂尺熱言尺中近臂之處有熱者必其通身皆熱也脈數躁而身有熱故知為病溫數滑而尺不熱者陽邪盛也故當病風然風之傷人其變不一不獨在於肌表故尺不熱也澀為血不調故當病痹滑不澀也往來流利澀不滑也如雨沾沙滑為血實氣壅澀為氣滯血少人一呼脈四動以上曰死脈絶不至曰死乍疏乍數曰死一呼四動則一息八至矣況以上乎謂之奪精四至曰脫精五至曰死六至曰命盡是皆一呼四至以上也故死脈絶不至則元氣已竭乍疏乍數則陰陽敗亂無主均為死脈一日一夜五十營以營五臟之精不應數者名曰狂生營運也人之經脈運行於身者一日一夜凡五十周以營五臟之精氣其數則周身上下左右前後凡二十八脈共長十六丈二尺人之宗氣積於胸中主呼吸而行經隧一呼氣行三寸一吸氣行三寸呼吸定息脈行六寸以一息六寸推之則一晝一夜一萬三千五百息通計五十周於身則脈行八百一十丈其有太過不及而不應此數者名曰狂生狂猶妄也言雖生未可必也所謂五十營者五臟皆受氣持其脈口數其至也凡此五十營者即五臟所受之氣也但診持脈口而數其至則臟氣之衰王可知矣五十動而不一代者五臟皆受氣代更代之義謂於平脈之中而忽見耎弱或乍數乍疏或斷而復起蓋其臟有所損則氣有所虧故變易若此均名為代若五十動而不一代者五臟受氣皆足乃為和平之脈四十動一代者一臟無氣四十動一代者是五臟中一臟虧損也一臟無氣者腎氣先盡也然則五臟和者氣脈長五臟病者氣脈短觀此一臟無氣必先乎腎二臟三臟四臟五臟當自遠而近以次而短則由腎及肝由肝及脾由脾及心由心及肺故凡病將危者必氣促似喘僅呼吸於胸中數寸之間蓋其真陰絶於下孤陽浮於上此氣短之極也醫於此際而尚欲平之散之未有不隨撲而滅者也三十動一代者二臟無氣二十動一代者三臟無氣十動一代者四臟無氣不滿十動一代者五臟無氣豫之短期要在終始豫與同短期死期也言五臟無氣可與之定死期矣終始十二經終之義所謂五十動而不一代者以為常也以知五臟之期豫之短期者乍數乍疏也以為常者言人之常脈當如是也故可因此以察五臟之氣若欲知其短期只在乎乍疏乍數此其時相變代乃與常代者不同蓋以臟氣衰敗無所主持而失常如此故云乍疏乍數者死動而中止不能自還因而復動經名曰代又脈五來一止不復增減者死脈七來是人一息半時不復增減亦名曰代正死不疑後世以結促代並言均目之為止脈豈足以盡其義哉夫緩而一止為結數而一止為促其止則或三或五或七八至不等然皆至數分明起止有力所主之病有因氣逆痰壅而為間阻者有因血氣虛脫而為斷續者有因生平稟賦多滯而脈道不流利者此自結促之謂也至於代脈之辨則有不同非謂代而止也五十動而不一代者乃至數之代若脈本平勻而忽強忽弱者乃形體之代若脾主四季而隨時更代者乃氣候之代脈無定候更變不常均謂之代當因其變而察其情庶得其妙若本無病而脈得四十投而一止者一臟無氣卻後四歲春草生而死脈來三十投而一止者二臟無氣卻後三歲麥熟而死脈來二十投而一止者三臟無氣卻後二歲桑椹赤而死脈來十投而一止者四臟無氣歲中死脈來五動而一止者五臟無氣卻後五日而死是從無事中而預測其危固有足理惟達者能之勿謂是說出自後人而謾詆其非也天地之至數始於一終於九數始於一而終於九天地自然之數也以天而言歲則一歲統四季一季統九十日是天數之九也以地而言位則戴九履一左三右七二四為肩六八為足五位中宮是洛書之九也以人而言事則黃鐘之數起於九九而九之則九九八十一分以為萬事之本是人事之九也九數之外是為十十則復變為一矣故曰天地之至數始於一終於九也者天二者地三者人因而三之三三者九以應九野一者奇也故應天二者偶也故應地三者參也故應人天開於子地闢於醜人生於寅所謂三才也三而三之以應九野九野者即洛書九宮禹貢九州之義故人有三部部有三候以決死生以處百病以調虛實而除邪疾以天地人言上中下謂之三才以人身而言上中下謂之三部於三部中而各分其三謂之三候三而三之是謂三部九候其通身經隧由此出入故可以決死生處百病調虛實而除邪疾也三部九候非獨以寸口為言也如仲景脈法上取寸口下取趺陽可以三隅反矣上部天兩額之動脈額旁動脈當頷厭之分足少陽脈氣所行也上部地兩頰之動脈兩頰動脈即地倉大迎之分足陽明脈氣所行也上部人耳前之動脈耳前動脈即和髎之分手少陽脈氣所行也中部天手太陰也掌後寸口動脈經渠之次肺經脈氣所行也中部地手陽明也手大指次指岐骨間動脈合谷之次大腸經脈氣所行也中部人手少陰也掌後鋭骨下動脈神門之次心經脈氣所行也下部天足厥陰也氣衝下三寸動脈五里之分肝經脈氣所行也臥而取之女子取太衝在足大指本節後二寸陷中下部地足少陰也內踝後跟骨旁動脈太溪之分腎經脈氣所行也下部人足太陰也魚腹上越經間動脈直五里下箕門之分沉取乃得之脾經脈氣所行也若候胃氣者當取足跗上之衝陽故下部之天以候肝足厥陰脈也故以候肝地以候腎足少陰脈也故以候腎人以候脾胃之氣足太陰脈也脾胃以膜相連故可以候脾胃之氣中部之天以候肺手太陰脈也故以候肺地以候胸中之氣手陽明大腸脈也大腸小腸皆屬於胃胃脘通於胸中故以候胸中人以候心手少陰脈也故以候心上部之天以候頭角之氣兩額動脈故以候頭角地以候口齒之氣兩頰動脈故以候口齒人以候耳目之氣耳前動脈故以候耳目三部者各有天地人三天三地三人是為三部九候三而三之合則為九九分為九野九野為九臟故神藏五形藏四合為九藏九藏即九候之謂神藏五以肝藏魂心藏神肺藏魄脾藏意腎藏志也形藏四即頭角耳目口齒胸中共為九藏此言人之九藏正應地之九野乃合於天地之至數五臟已敗其色必夭夭必死矣色者神之幟臟者神之舍其色夭者其神去其神去者其臟敗故必死矣夭者枯暗不澤而色異常也必先度其形之肥瘦以謂其氣之虛實虛則補之實則瀉之候謂診候其病情度謂度量其虛實形之肥瘦者針有淺深之異病之虛實者治有補瀉之殊雖以針法為言而用藥者亦如是也必先去其血脈而後調之凡有瘀血在脈而為壅塞者必先刺去壅滯而後可調虛實也無問其病以平為期凡病甚者奏功非易故不必問其效之遲速但當以血氣平和為期則耳欲知病之所在必明七診察其九候獨大者病獨小者病獨疾者病獨遲者病獨寒者病獨熱者病獨陷下者病此言九候之中而復有七診之法謂脈失其常而獨大者獨小者獨疾者獨遲者獨寒者獨熱者獨陷下者皆病之所在也獨寒獨熱謂其或在上或在下或在表或在裡也陷下沉伏不起也此難以三部九候為言而於氣口部位類推為用診有十度度人脈度臟度肉度筋度俞度十度謂脈臟肉筋俞五度左右各一二五為十也度人之度音鐸陰陽氣盡人病自具凡此十度者人身陰陽之理盡之矣故人之疾病亦無不具見於此脈動無常散陰頗陽脈脫不具診無常行脈動無常言脈無常體也散陰頗陽言陰氣散失者脈頗類陽也浮大者氣實血虛也脈浮無根者死有表無里者死真陰散而孤陽在脈頗似陽而無根者非真陽之脈也此其脈有所脈而陰陽不全具矣診此者有不可以陰陽之常法行也診必上下度民君卿貴賤尊卑勞逸有異膏粱藜藿氣質不同故當度民君卿分別上下以為診受師卒術不察逆從棄陰附陽診故不明卒盡也陰陽離決精神乃絶故凡善診者見其陰必察其陽見其陽必察其陰使不知陰陽逆從之理診焉得明至陰虛天氣絶至陽盛地氣不足至陰至陽即天地之道也至陰虛者地氣衰而不升不升則無以降故天氣絶至陽盛者天氣亢而不降不降則無以升故地氣不足蓋陰陽二氣互藏其根更相為用不可偏廢此借天地自然之道以喻人之陰陽貴和也陰陽並交至人之所行並交者陰陽不相失而得其和平也此其調攝之妙惟至人者乃能行之陰陽並交者陽氣先至陰氣後至是以持診之道先後陰陽而持之凡陰陽之道陽動陰靜陽剛陰柔陽倡陰隨陽施陰受陽升陰降陽前陰後陽上陰下陽左陰右數者為陽遲者為陰表者為陽里者為陰至者為陽去者為陰進者為陽退者為陰發生者為陽收藏者為陰陽之行速陰之行遲故陰陽並交者必陽先至而陰後至是以持診者在察陰陽先後以測其精要也奇恆之勢乃六十首診合微之事追陰陽之變章五中之情取虛實之要定五度之事知此乃足以診奇異也恆常也六十首即所謂九針六十篇之義今失其傳矣診合微之事者參諸診之法而合其精微也追陰陽之變者求陰陽盛衰之變也章明也五中五臟也五度即前十度也會此數者參伍其妙斯足以言診矣是以切陰不得陽診消亡得陽不得陰守學不湛知左不知右知右不知左知上不知下知先不知後故治不久切陰不得陽診消亡者言但知有陰陽而不知陰陽互根互用之義及陰平陽祕之道者也湛明也偏守其學終屬不明左右上下先後皆陰陽之道也使不知左右則不明升降之理不知上下則不明清濁之宜不知先後則不知緩急之用安望能治治而能久哉知醜知善知病知不病知高知下知坐知起知行知止用之有紀診道乃具萬世不殆凡此數者皆有對待之理若差之毫釐則謬以千里故凡病之善惡形之動靜皆所當辨能明此義而用之有紀診道斯備故可萬世無殆矣紀條理也殆危也起所有餘知所不足起興起也言將治其有餘當察其不足蓋邪氣多有餘正氣多不足若只知有餘而忘其不足則取敗之道也此示人以根本當慎之意度事上下脈事因格能度形情之高下則脈事因之可格致而知也是以形弱氣虛死中外俱敗也形氣有餘脈氣不足死外貌無恙臟氣已壞也脈氣有餘形氣不足生臟氣未傷者形衰無害蓋以根本為主也形肉已脫九候雖調猶死蓋脫與不足本自不同而形肉既脫脾元絶矣故脈氣雖調亦所不治與此互求其義更明是以診有大方坐起有常大方者大法也坐起有常則舉動不苟而先正其身身正於外心必隨之故診之大方必先乎此出入有行以轉神明行德行也醫以活人為心其於出入之時念念皆真無一不敬則德能動天誠能格心故可以轉運周旋而無往弗神矣行去聲必清必淨上觀下觀必清必淨則心專志一而神明見然後上觀之以察其神色聲音下觀之以察其形體逆順司八正邪別五中部司候也別審也候八節八風之正邪以察其表審五臟五形之部位以察其里按脈動靜循尺滑澀寒溫之意按脈動靜可別陰陽滑澀寒溫可知虛實凡脈滑則尺之皮膚亦滑脈澀則尺之皮膚亦澀脈寒則尺之皮膚亦寒脈溫則尺之皮膚亦溫故循尺即可以知之循揣摩也視其大小合之病能大小二便也二便為約束之門戶門戶不要則倉廩不藏得守者生失守者死故視其大小以合病能能情狀之謂逆從以得復知病名反者為逆順者為從必得逆從必知病名庶有定見而無差謬診可十全不失人情診如上法庶可十全其於人情尤不可失也視息視意不失調理視息者察呼吸以觀其氣視意者察形色以觀其情故能不失調理不知此道失經絶理亡言妄期此謂失道不知此道則亡言妄期未有不殆者矣萬物之外六合之內天地之變陰陽之應彼春之暖為夏之暑彼秋之忿為冬之怒四變之動脈與之上下物在天中天包物外天地萬物本同一氣凡天地之變即陰陽之應故春之暖為夏暑之漸也秋之忿為冬怒之漸也春生夏長秋收冬藏是即陰陽四變之動而脈亦隨之以上下也以春應中規規者所以為圓之器春氣發生圓活而動故應中規而人脈應之所以圓活也夏應中矩矩者所以為方之器夏氣茂盛盛極而止故應中矩而人脈應之所以洪大方正也秋應中衡衡平也秋氣萬寶俱成平於地面故應中衡而人脈應之所以浮毛而見於外也冬應中權權稱錘也冬氣閉藏故應中權而人脈應之所以沉石而伏於內也凡茲規矩權衡者皆發明陰陽升降之理以合乎四時脈氣之變象也是故冬至四十五日陽氣微上陰氣微下夏至四十五日陰氣微上陽氣微下陰陽有時與脈為期期而相失如脈所分分之有期故知死時冬至一陽生故冬至後四十五日以至立春陽氣以漸而微上陽微上則陰微下矣夏至一陰生故夏至後四十五日以至立秋陰氣以漸而微上陰微上則陽微下矣此所謂陰陽有時也與脈為期者脈隨時而變遷也期而相失者謂春規夏矩秋衡冬權不合於度也如脈所分者謂五臟之脈各有所屬也分之有期者謂衰王各有其時也知此者則必知死生之時矣微妙在脈不可不察察之有紀從陰陽始始之有經從五行生生之有度四時為宜脈之微妙亦惟陰陽五行為之經紀而陰陽五行之生各有其度如陽生於冬至陰生於夏至木生於亥火生於寅金生於巳水土生於申此四時生王各有其宜也紀綱紀也經經常也即大綱小紀之義補瀉勿失與天地如一天地之道損有餘而補不足補瀉不失其宜則與天地之道如一矣得一之精以知死生一之精者天人一理之精微也天地之道陽主乎動陰主乎靜陽來則生陽去則死知天道之所以不息者則知人之所以死生矣所以聲合五音色合五行脈合陰陽聲合宮商角徵羽色合金木水火土脈合四時陰陽雖三者若乎有分而理則一也持脈有道虛靜為保凡持脈之道一念精誠最嫌擾亂虛心靜志纖微無間診道全矣保不失也春日浮如魚之遊在波脈得春氣雖浮動而未全出故如魚之遊在波也夏日在膚泛泛乎萬物有餘脈得夏氣則洪盛於外故泛泛乎如萬物之有餘也秋日下膚蟄蟲將去脈得秋氣則洪盛漸斂故如欲蟄之蟲將去也冬日在骨蟄蟲周密君子居室脈得冬氣沉伏在骨故如蟄蟲之周密君子之於斯時亦當體天地閉藏之道而居於室也故知內者按而紀之知外者終而始之此六者持脈之大法內言臟氣臟象有位故可按而紀之外言經氣經脈有序故可終而始之此四時內外六者之法春脈如弦春脈者肝也東方木也萬物之所以始生也故其氣來耎弱輕虛而滑端直以長故曰弦反此者病弦者端直以長狀如弓弦有力也然耎弱輕虛而滑則弦中自有和意肝臟主之何如而反其氣來實而強此謂太過病在外其氣來不實而微此謂不及病在中其氣來實而強弦之過也其氣來不實而微弦之不及也皆謂弦脈之反太過者病在外不及者病在中蓋外病多有餘內病多不足也太過則令人善忘忽忽眩冒而巔疾其不及則令人胸痛引背下則兩脅胠滿忘當作怒肝氣虛則恐實則怒忽忽恍忽不爽也冒悶昧也巔疾疾在巔頂也足厥陰之脈會於巔上貫膈布脅肋故其為病如此胠音區腋下脅也夏脈鉤夏脈者心也南方火也萬物之所以盛長也故其氣來盛去衰故曰鉤反此者病鉤者舉指來盛去勢似衰蓋脈盛於外而去則無力陽之盛也心臟主之何如而反其氣來盛去亦盛此謂太過病在外其氣來不盛去反盛此謂不及病在中其氣來盛去亦盛鉤之過也其來不盛去反盛鉤之不及也皆為鉤脈之反去反盛者非強盛之謂凡脈自骨肉之分出於皮膚之際謂之來自皮膚之際還於骨肉之分謂之去來不盛去反盛者言來則不足去則有餘即消多長少之意故扁鵲於春肝夏心秋肺冬腎皆以實強為太過病在外虛微為不及病在內辭雖異而意則同也太過則令人身熱而膚痛為浸淫其不及則令人煩心上見咳唾下為氣泄夏脈太過則陽有餘而病在外故令人身熱膚痛而浸淫流布於形體不及則君火衰而病在內故上為心氣不足而煩心虛陽侵肺而咳唾下為不固而氣泄以本經脈起心中出屬心系下膈絡小腸又從心系卻上肺故也秋脈如浮秋脈者肺也西方金也萬物之所以收成也故其氣來輕虛以浮來急去散故曰浮反此者病浮者輕虛之謂來急去散者以秋時陽氣尚在皮毛也肺臟主之何如而反其氣來毛而中央堅兩旁虛此謂太過病在外其氣來毛而微此謂不及病在中中央堅浮而中堅也凡浮而太過浮而不及皆浮之反而病之在外在內義與前同太過則令人逆氣而背痛慍慍然其不及則令人喘呼吸少氣而咳上氣見血下聞病音肺脈起中焦下絡大腸還循胃口上膈屬肺其臟附背故太過則逆氣為壅而背痛見於外慍慍悲鬱貌其不及則喘咳短氣氣不歸原所以上氣陰虛內損所以見血下聞病音謂喘息則喉下有聲也冬脈如營冬脈者腎也北方水也萬物之所以合藏也故其氣來沉以搏故曰營反此者病營者營壘之謂如士卒之團聚不散亦沉石之義也腎臟主之何如而反其氣來如彈石者此謂太過病在外其去如數者此謂不及病在中來如彈石者其志至強營之太過也其去如數者動止疾促營之不及也蓋數本屬熱而此真陰虧損之脈亦必緊數然愈虛則愈數原非陽強實熱之數故云如數則辨析之意深矣此而一差禍如反掌也太過病在外不及病在中太過則令人解㑊脊脈痛而少氣不欲言其不及則令人心懸如病飢䏚中清脊中痛少腹滿小便變冬脈太過陰邪勝也陰邪勝則腎氣傷真陽虛故令人四體懈怠舉動不精是謂解㑊脊痛者腎脈之所至也腎藏精精傷則無氣故少氣不欲言皆病之在外也其不及則真陰虛虛則心腎不交故令人心懸而怯如病飢也季脅下空軟之處曰䏚中腎之旁也腎脈貫脊屬腎絡膀胱故為脊痛腹滿小便變等病變者謂或黃或赤或為遺淋或為癃閉之類由腎水不足而然是皆病之在中也㑊音跡脾脈者土也孤臟以灌四旁者也脾屬土土為萬物之本故運行水穀化津液以灌溉於肝心肺腎之四臟者也土無定位分王四季故稱為孤臟善者不可得見惡者可見脾無病則灌溉周而四臟安不知脾力之何有故善者不可得見脾病則四臟亦隨而病故惡候見矣其來如水之流者此謂太過病在外如鳥之喙者此謂不及病在中如水之流者滑而動也如鳥之喙者鋭而短也太過病在外不及病在中喙音誨咮也太過則令人四肢不舉其不及則令人九竅不通名曰重強脾土太過病在外故令人四肢不舉以脾主四肢而濕勝之也不及病在中故令人九竅不通以脾氣弱則四臟皆弱而氣不行也重強不柔和貌沉重拘強也其來如水之流滔滔洪盛者其太過也濺濺不返者其將竭也均謂之流一盛一危迥然有異如太過則令人四肢不舉以在外之標言之若脾虛不能勝濕者則不可言太過矣濺音箋淺而疾也平人之常氣稟於胃胃者平人之常氣也人無胃氣曰逆逆者死土得天地中和之氣長養萬物分王四時而人胃應之凡平人之常受氣於谷谷入於胃五臟六腑皆以受氣故胃為臟腑之本此胃氣者實平人之常氣有不可以一刻無者無則為逆逆則死矣胃氣之見於脈者徐而和無太過不及自有一種雍容和緩之狀者也春胃微弦曰平春令木王其脈當弦但宜微弦而不至太過是得春胃之充和也故曰平春弦夏鉤秋毛冬石分四季所屬者明時令之脈不得不然也然脈之迭見有隨時者有不隨時者故或春而見鉤便是夏脈春而見毛便是秋脈春而見石便是冬脈因變知病圓活在人故有二十五變之妙若謂春必弦夏必鉤則殊失胃氣之精義矣弦多胃少曰肝病弦多者過於弦也胃少者少和緩也是肝邪之勝胃氣之衰故為肝病但弦無胃曰死但有弦急而無充和之氣者是春時胃氣已絶而肝之真臟見也故曰死胃而有毛曰秋病毛為秋脈屬金春時得之是為賊邪以胃氣尚存故至秋而後病毛甚曰今病春脈毛甚則木被金傷故不必至秋今即病矣臟真散於肝肝藏筋膜之氣也春木用事其氣升散故臟真之氣散於肝而肝之所藏則筋膜之氣也藏上去聲下平聲夏胃微鉤曰平夏令火王其脈當鉤但宜微鉤而不至太過是得夏胃之和也故曰平鉤多胃少曰心病鉤多者過於鉤也胃少者少充和也是心火偏勝胃氣偏衰故為心病但鉤無胃曰死但有鉤盛而無平和之氣者是夏時胃氣已絶而心之真臟見也故死胃而有石曰冬病石為冬脈屬水夏時得之是為賊邪以胃氣尚存故至冬而後病石甚曰今病夏脈石盛則無胃氣火被水傷已深故不必至冬今即病矣臟真通於心心藏血脈之氣也夏火用事其氣炎上故臟真之氣通於心而心之所藏則血脈之氣也長夏胃微耎弱曰平長夏屬土雖主建未之六月然實兼辰戌醜未四季之月為言也四季土王之時脈當耎弱但宜微有耎弱而不至太過是得長夏胃氣之和緩也故曰平弱多胃少曰脾病弱多胃少則過於弱而胃氣不足以土王之時而得之故為脾病但代無胃曰死代更代也脾主四季脈當隨時而更然必欲皆兼和耎方得脾脈之平若四季相代而但弦但鉤但毛但石是但代無胃見真臟也故曰死耎弱有石曰冬病石為冬脈屬水長夏陽氣正盛而見沉石之脈以火土氣衰而水反乘也故至冬而病石甚曰今病長夏石甚者火土大衰故不必至冬今即病矣臟真濡於脾脾藏肌肉之氣也長夏濕土用事其氣濡潤故臟真之氣濡於脾而脾之所藏則肌肉之氣也秋胃微毛曰平秋令金王其脈當毛但宜微毛而不至太過是得秋胃之和也故曰平毛者脈來浮澀得羽毛之輕虛也毛多胃少曰肺病毛多胃少是金氣偏勝而少和緩之氣也故為肺病但毛無胃曰死但毛無胃是秋時胃氣已絶而肺之真臟見也故死毛而有弦曰春病弦為春脈屬木秋時得之以金氣衰而木反乘也故至春木王時而病弦甚曰今病秋脈弦甚是金氣大衰而木寡於畏故不必至春今即病矣臟真高於肺以行榮衛陰陽也秋金用事其氣清肅肺處上焦故臟真之氣高於肺肺主乎氣而營行脈中衛行脈外者皆自肺宣布故以行營衛陰陽也冬胃微石曰平冬令水王脈當沉石但宜微石而不至太過是得冬胃之和也故曰平石者脈來沉實如石沉水之謂石多胃少曰腎病石多胃少是水氣偏勝反乘土也故為腎病但石無胃曰死但石無胃是冬時胃氣已絶而腎之真臟見也故死石而有鉤曰夏病鉤為夏脈屬火冬時得之以水氣衰而火反侮也故至夏火王時而病鉤甚曰今病冬脈鉤甚其水氣大衰而火寡於畏故不必至夏今即病矣臟真下於腎腎藏骨髓之氣也冬水用事其氣閉藏故臟真之氣下於腎而腎之所藏則骨髓之氣也胃之大絡名曰虛里貫膈絡肺出於左乳下其動應衣脈宗氣也土為萬物之母故四時之脈皆以胃氣為主此言胃氣所出之大絡名曰虛里其脈從胃貫膈上絡於肺而出左乳之下其動應於衣是為十二經脈之宗故曰脈宗氣也宗主也本也蓋宗氣積於膻中化於水谷而出於胃也盛喘數絶者則病在中若虛里動甚而如喘或數急而兼斷絶者由中氣不守而然故曰病在中結而橫有積矣胃氣之出必出左乳之下若有停阻則結橫為積故凡患症者多在左肋之下因胃氣積滯而然如肝之積名曰肥氣在左脅下者以左右上下分配五行而言耳此實胃氣所主也絶不至曰死虛里脈絶者宗氣絶也故必死乳之下其動應衣宗氣泄也前言應衣者言其微動似乎應衣可驗虛里之胃氣此言應衣者言其大動真有若與衣俱振者是宗氣不固而大泄於外中虛之候也按虛里跳動最為虛損病本故凡患陰虛勞怯則心下多有跳動及為驚悸慌張者是即此證人止知其心跳而不知為虛里之動也但動之微者病尚微動之甚者病則甚亦可因此以察病之輕重凡患此者當以純甘壯水之劑填補真陰夫谷入於胃以傳於肺五臟六腑皆以受氣是由胃氣而上為宗氣也氣為水母氣聚則水生是由肺氣而下生腎水也今胃氣傳之肺而腎虛不能納故宗氣泄於上則腎水竭於下腎愈虛則氣愈無所歸氣不歸則陰愈虛矣氣水同類當求相濟故凡欲納氣歸原者惟有補陰以配陽一法脈從陰陽病易已脈逆陰陽病難已陰病得陰脈陽病得陽脈謂之從從者易已脈病相反者為逆逆者難已脈得四時之順曰病無他脈反四時及不間臟曰難已春得弦夏得鉤秋得毛冬得石謂之順四時雖曰有病無他虞也脈反四時及不間臟皆為難已不間臟者如木必乘土則肝病傳脾土必乘水則脾病傳腎之類是皆傳其所勝不相假借脈證得此均名鬼賊其氣相殘其病必甚若間其所勝之臟而傳其所生是謂間臟如肝不傳脾而傳心心不傳肺而傳脾其氣相生雖病亦微間者並行指間臟而言也甚者獨行指不間臟而言也七傳者死間臟者生七傳者傳其所勝也間臟者傳其所生也如心勝肺脾間之脾勝腎肺間之肺勝肝腎間之腎勝心肝間之肝勝脾心間之之謂也五臟有病則各傳其所勝不治法三月若六月若三日若六日傳五臟而當死是順傳所勝之次即此不間臟之謂也間去聲脈有逆從四時未有臟形春夏而脈瘦秋冬而脈浮大命曰逆四時也逆從四時者雖未有真臟之形見若春夏以木火之令脈當浮大而反見瘦小秋冬以金水之令脈當沉細而反見浮大是皆逆四時也風熱而脈靜泄而脫血脈實病在中脈虛病在外脈澀堅者皆難治命曰反四時也風熱者陽邪也脈宜大而反靜泄而脫血傷其陰也脈宜虛而反實病在臟中脈當有力而反虛病在肌表脈當浮滑而反澀堅者皆為相反難治之證亦由脈之反四時也人以水穀為本故人絶水穀則死脈無胃氣亦死所謂無胃氣者但得真臟脈不得胃氣也所謂脈不得胃氣者肝不弦腎不石也人生所賴者水穀故胃氣以水穀為本而五臟又以胃氣為本若脈無胃氣而真臟之脈獨見者死然但弦但石雖為真臟若肝無氣則不弦腎無氣則不石亦由五臟不得胃氣而然與真臟無胃者等耳凡治病察其形氣色澤脈之盛衰病之新故乃治之無後其時察其形氣色澤脈之盛衰病之新故者所謂望聞問切之法也既得病情便當速治若後其時病必自深形氣相得謂之可治形盛氣盛形虛氣虛是相得也色澤以浮謂之易已澤潤也浮明也顏色明潤者病必易已也脈從四時謂之可治脈順四時者其氣盛故可治脈弱以滑是有胃氣命曰易治取之以時穀氣來也徐而和故脈弱以滑者是得胃氣命曰易治也形氣相失謂之難治形盛氣虛氣盛形虛皆為相失此下四節皆言難治也色夭不澤謂之難已夭晦惡也不澤枯焦也脈實以堅謂之益甚邪氣來也緊而疾故實以堅者病必益甚脈逆四時為不可治脈逆四時賊克也必察四難而明告之形氣色脈如上四節之難治者謂之四難必察其詳而明告之庶無後怨所謂逆四時者春得肺脈夏得腎脈秋得心脈冬得脾脈其至皆懸絶沉澀者命曰逆四時春得肺脈金剋木也夏得腎脈水剋火也秋得心脈火剋金也冬得脾脈土剋水也加之懸絶沉澀則陰陽偏絶無復充和之胃氣矣未有臟形於春夏而脈沉澀秋冬而脈浮大名曰逆四時也病熱脈靜泄而脈大脫血而脈實病在中脈實堅病在外脈不實堅者皆難治病在中脈實堅病在外脈不實堅者皆難治病在中脈虛言內積之實者脈不宜虛也病在中脈實堅言內傷之虛者脈不宜實堅也病在外脈澀堅言外邪之盛者不宜澀堅以澀堅為沉陰也病在外脈不實堅言外邪方熾者不宜無力以不實堅為無陽也四者之分總皆正不勝邪之脈故曰難治反復推詳以申明之與前節詞若相反而理則同也夫平心脈來纍纍如連珠如循琅玕曰心平琅玕玉而有光者脈來中手如連珠如琅玕者言其盛滿滑利即微鉤之義也是為心之平脈前分四時已悉五臟平病死脈此則詳言其形也琅玕音良干夏以胃氣為本鉤而和也病心脈來喘喘連屬其中微曲曰心病喘喘連屬急促相仍也其中微曲即鉤多胃少之義故曰心病死心脈來前曲後居如操帶鉤曰心死操持也前曲者謂輕取則堅強而不柔後居者謂重取則牢實而不動如持革帶之鉤而全失充和之氣是但鉤無胃也故曰心死平肺脈來厭厭聶聶如落榆莢曰肺平厭厭聶聶衆苗秀齊貌如落榆莢輕浮和緩貌即微毛之義也是為肺之平脈聶鳥結切秋以胃氣為本毛而和也病肺脈來不上不下如循雞羽曰肺病不上不下往來澀滯也如循雞羽輕浮而虛也亦毛多胃少之義故曰肺病死肺脈來如物之浮如風吹毛曰肺死如物之浮空虛無根也如風吹毛散亂無緒也亦但毛無胃之義故曰肺死平肝脈來耎弱招招如揭長竿末梢曰肝平招招猶迢迢也揭高舉也高揭長竿梢必柔耎即和緩弦長之義是為肝之平脈春以胃氣為本弦而和也病肝脈來盈實而滑如循長竿曰肝病盈實而滑弦之甚過也如循長竿無末梢之和耎也亦弦多胃少之義故曰肝病死肝脈來急益徑如新張弓弦曰肝死徑強急也如新張弓弦弦之甚也亦但弦無胃之義故曰肝死平脾脈來和柔相離如雞踐地曰脾平和柔雍容不迫也相離勻淨分明也如雞踐地從容輕緩也此即充和之氣亦微耎弱之義是謂脾之平脈長夏以胃氣為本耎而和也病脾脈來實而盈數如雞舉足曰脾病實和盈數強急不和也如雞舉足輕疾不緩也前言弱多胃少此言實而盈數皆失中和之氣故曰脾病死脾脈來鋭堅如鳥之喙如鳥之距如屋之漏如水之流曰脾死鳥喙鳥距言堅鋭不柔也屋漏點滴無倫也水流去而不返也是皆脾氣絶而怪脈見亦但代無胃之義故曰脾死距權輿切雞足鉤距也平腎脈來喘喘纍纍如鉤按之而堅曰腎平冬脈沉石故按之而堅若過於石則沉伏不振矣故必喘喘纍纍如心之鉤陰中藏陽而得微石之義是為腎之平脈冬以胃氣為本石而和也病腎脈來如引葛按之益堅曰腎病脈如引葛堅搏牽連也按之益堅石甚不和也亦石多胃少之義故曰腎病死腎脈來發如奪索辟辟如彈石曰腎死索如相奪其徑必甚辟辟如彈石其堅必甚即但石無胃之義故曰腎死太陽脈至洪大以長此言人之脈氣必隨天地陰陽之化而為之卷舒也太陽之氣王於穀雨後六十日是時陽氣太盛故其脈洪大而長也少陽脈至乍數乍疏乍短乍長少陽之氣王於冬至後六十日是時陽氣尚微陰氣未退故長數為陽疏短為陰而進退未定也陽明脈至浮大而短陽明之氣王於雨水後六十日是時陽氣未盛陰氣尚存故脈浮大而仍兼短也此但言三陽而不及三陰因難經有太陰之至緊大而長少陰之至緊細而微厥陰之至沉短而敦則固已補其缺略矣太陽臟獨至厥喘虛氣逆是陰不足陽有餘也表裡當俱瀉取之下俞此言臟氣不和而有一臟太過者氣必獨至諸證不同針治亦異也太陽者膀胱經也太陽獨至則為厥逆為喘氣為虛氣衝逆於上蓋膀胱與腎為表裡皆水臟也以水臟而陽氣獨至則陽有餘陰不足矣當於二經取其下俞膀胱下俞名束骨腎經之俞名太溪腎陰不足而亦瀉之以陽邪俱盛也故必表裡兼瀉而後可遏其勢陽明臟獨至是陽氣重並也當瀉陽補陰取之下俞陽明者足陽明胃經也陽明為十二經脈之海而行氣於三陽若其獨至則陽氣因邪而重並於本臟故當瀉胃之陽補脾之陰而取之下俞也陽明之俞名陷谷太陰之俞名太白少陽臟獨至是厥氣也蹺前卒大取之下俞少陽者足少陽膽經也膽經之病連於肝其氣善逆故少陽獨至者是厥氣也然厥氣必始於足下故於蹺前察之蹺陽蹺也屬足太陽經之申脈陽蹺之前乃少陽之經少陽氣盛則蹺前卒大故當取少陽之下俞穴名臨泣卒猝同蹺有五音蹺皎喬腳又極虐切少陽獨至者一陽之過也此釋獨至之義為一臟之太過舉少陽而言則太陽陽明之獨至者其為三陽二陽之太過可知矣一陽少陽也太陰臟搏者用心省真五脈氣少胃氣不平三陰也宜治其下俞補陽瀉陰太陰者足太陰脾經也搏堅強之謂即所謂伏鼓也太陰脾脈本貴和緩今見鼓搏類乎真臟若真臟果見不可治也故當用心省察其真今太陰臟搏即太陰之獨至太陰獨至則五臟之脈氣俱少而胃氣亦不平矣是為三陰之太過也故宜治其下俞補足陽明之陷谷瀉足太陰之太白二陰獨嘯少陰厥也陽並於上四脈爭張氣歸於腎宜治其經絡瀉陽補陰二陰者足少陰腎經也獨嘯獨熾之謂蓋嘯為陽氣所發陽出陰中相火上炎則為少陰熱厥而陽並於上故心肝脾肺四脈為之爭張而其氣則歸於腎故曰獨嘯宜治其表裡之經絡而瀉足太陽補足少陰也太陽經穴名崑崙絡穴名飛揚少陰經穴名復溜絡穴名大鐘一陰至厥陰之治也真虛㾓心厥氣留薄發為白汗調食和藥治在下俞一陰者足厥陰肝經也至即獨至之義治主也肝邪獨至真氣必虛木火相干故心為㾓痛厥氣逆氣也逆氣不散則留薄於經氣虛不固則表為白汗調和藥食欲其得宜用針治之乃在下俞厥陰之俞名曰太衝按調食和藥不獨一經為然古經多略當會其意㾓音淵痠疼也太陽臟象三陽而浮也少陽臟象一陽也一陽臟者滑而不實也陽明臟象大浮也太陽之象三陽者陽行於表陽之極也故脈浮於外少陽之象一陽者少陽為陽之裡陰之表所謂半表半裡陽之微也故雖滑不實陽明雖太陽之裡而實少陽之表比之滑而不實者則大而浮矣仲景曰尺寸俱浮者太陽受病也尺寸俱長者陽明受病也尺寸俱弦者少陽受病也太陰臟搏言伏鼓也伏鼓者沉伏而鼓擊即堅搏之謂仲景曰尺寸俱沉細者太陰受病也二陰搏至腎沉不浮也二陰少陰腎經也二陰搏而獨至者言腎但沉而不浮也仲景曰尺寸俱沉者少陰受病也尺寸俱微緩者厥陰受病也欲知寸口太過與不及寸口之脈中手短者曰頭痛寸口氣口也短為陽不及陽不及則陰湊之故頭痛短者短於下也脈短於下則邪並於上故頭痛中去聲寸口脈中手長者曰足脛痛長為陰不足陰不足則陽湊之故足脛痛寸口脈中手促上擊者曰肩背痛脈來急促而上部擊手者陽邪盛於上也故為肩背痛寸口脈沉而堅者曰病在中沉為在裡堅為陰實故病在中寸口脈浮而盛者曰病在外浮為在表盛為陽強故病在外寸口脈沉而弱曰寒熱及疝瘕少腹痛沉為陽虛弱為陰虛陽虛則外寒陰虛則內熱故為寒熱也然沉弱之脈多陰少陽陰寒在下故為疝為瘕為少腹痛瘕積聚也寸口脈沉而橫曰脅下有積腹中有橫積痛橫急數也沉主在內橫主有積故脅腹有積而痛仲景曰積者臟病也終不移聚者腑病也發作有時展轉痛移為可治諸積大法脈來細而附骨者乃積也寸口積在胸中微出寸口積在喉中關上積在臍旁上關上積在心下微下關積在少腹尺中積在氣衝脈出左積在左脈出右積在右脈兩出積在中央各以其部處之寸口脈沉而喘曰寒熱喘急促也脈沉而喘熱在內也熱在內而為寒熱即諸禁鼓栗皆屬於火之謂脈盛滑堅者曰病在外陽脈而堅故病在外脈小實而堅者病在內陰脈而堅故病在內脈小弱以澀謂之久病小弱者氣虛澀者血少氣虛血少久病而然脈滑浮而疾者謂之新病滑而浮者脈之陽也陽脈而疾邪之盛也邪盛勢張是為新病脈急者曰疝瘕少腹痛弦急者陰邪盛故為疝瘕少腹病脈滑曰風滑脈流利陽也風性動亦陽也故脈滑曰風脈澀曰痹澀為陰脈血不足也故當病痹緩而滑曰熱中緩因胃熱滑以強陽故病熱中夫緩為縱緩之狀非動之遲緩也盛而緊曰脹盛則中氣滯緊則邪有餘故為脹也臂多青脈曰脫血血脫則氣去氣去則寒疑疑泣則青黑故臂見青色言臂則他可知矣尺脈緩澀謂之解㑊尺主陰分緩為氣衰澀為血少故當病解㑊解㑊者困倦難狀之名也安臥脈盛謂之脫血凡脈盛者邪必盛邪盛者臥必不安今脈盛而臥安知非氣分陽邪而為陰虛脫血也此亦承尺脈而言凡尺脈盛者多陰虛故當脫血尺澀脈滑謂之多汗謂尺膚澀而尺脈滑也尺膚澀者營血少也尺脈滑者陰火盛也陽盛陰虛故為多汗尺寒脈細謂之後泄尺膚寒者脾之陽衰以脾主肌肉四肢也尺脈細者腎之陽衰以腎主二陰下部也脾腎虛寒故為後泄脈尺粗常熱者謂之熱中尺粗為真陰不足常熱為陰火有餘故謂之熱中也見其色知其病命曰明按其脈知其病命曰神問其病知其處命曰工見色者望其容貌之五色也按脈者切其寸口之陰陽也問病者問其所病之緣由也知是三者則曰明曰神曰工而診法盡矣夫色脈與尺之相應也如桴鼓影響之相應也不得相失也此亦本末根葉之出候也故根死則葉枯矣色脈形肉不得相失也故知一則為工知二則為神知三則神且明矣此言色脈形肉皆當詳察在色可望在脈可按其於形肉則當驗於尺之皮膚蓋以尺之皮膚診時必見驗於此而形肉之盛衰概可知矣夫有諸中必形諸外故色之與脈脈之與形肉亦猶桴鼓影響之相應本末根葉之候不相失也三者皆當參合故知三則神且明矣桴擊鼓槌也桴孚浮二音色青者其脈弦也赤者其脈鉤也黃者其脈代也白者其脈毛黑者其脈石見其色而不得其脈反得其相勝之脈則死矣得其相生之脈則病已矣不得其脈言不得其合色之正脈也相勝之脈如青色得毛脈以金剋木之類是也相生之脈如青色得石脈以水生木之類是也五臟之所生變化之病形先定其五色五脈之應其病乃可別也色脈已定調其脈之緩急大小滑澀而病變定矣緩急以至數言小大滑澀以形體言滑不澀也往來流利如盤走珠澀不滑也虛細而遲往來覺難如雨沾沙如刀刮竹六者相為對待調此六者則病變可以定矣此以緩急大小滑澀而定病變總諸脈之綱領也後世諸醫論疾微有不同者又當參互然必宗越人仲景為主夫浮為陽為表診為風為虛沉為陰為里診為濕為實遲為在臟為寒為冷數為在腑為熱為燥滑為血有餘澀為氣獨滯似亦得矣殊不知其浮為在表則散大而芤可類也沉而在裡則細小而伏可類也遲者為寒則徐緩澀結之屬可類也數者為熱則洪滑疾促之屬可類也虛者為不足則短濡微弱之屬可類也實者為有餘則弦緊動革之屬可類也此其大概人所易知者即此六者之中復有大相懸絶之要則人多不能識也夫浮為表矣而凡陰虛者脈必浮而無力是浮不可以概言表可升散乎沉為里矣而凡表邪初感之甚者陰寒束於皮毛陽氣不能外達則脈必先見沉緊是沉不可以概言里可攻內乎遲為寒矣而傷寒初退餘熱未清脈多遲滑是遲不可以概言寒可溫中乎數為熱矣而凡虛損之候陰陽俱虧氣血敗亂者脈必急數愈數者愈虛愈虛者愈數是數不可以概言熱可寒涼乎微細類虛矣而痛極壅閉者脈多伏匿是伏不可以概言虛可驟補乎洪弦類實矣而真陰大虧者必關格倍常是強不可以概言實可消伐乎夫如是者於綱領之中復有大綱領者存焉設不能以四診相參而欲孟浪任意則未有不覆人於反掌間者此脈道之所以難言毫釐不可不辨也脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩脈小者尺之皮膚亦減而少氣脈大者尺之皮膚亦賁而起脈滑者尺之皮膚亦滑脈澀者尺之皮膚亦澀凡此變者有微有甚故善調尺者不待於寸善調脈者不待於色能參合而行之者可以為上工上工十全九行二者為中工中工十全七行一者為下工下工十全六此正本末根葉之義也以尺寸言則尺為根本寸為枝葉以脈色言脈為根本色為枝葉故善調尺者不待乎寸善調脈者不待於色也然必能兼合三者而參行之更為本末皆得而萬無一失斯足稱為上工而十可全其九若知二知一者不過中下之材故所全者亦惟六七而已調其尺言其病從外知內審其尺之緩急大小滑澀肉之堅脆而病形定矣寸口之脈由尺達寸故但診尺部之脈其內可知通身形體難以盡見然肉之盛衰必形於腕後故但察尺部之肉其外可知是以獨調其尺而病形定矣視人之目窠上微癰如新臥起伏其頸脈動時咳按其手足上窅而不起者風水膚脹也目窠目下臥蠶處也癰壅也即新起微腫狀頸脈人迎脈也窅而不起按之有窩也是即風水膚脹之外候窠間科癰去聲窅音夭尺膚滑其淖澤者風也陽受風氣故病風者尺膚滑而淖澤也尺肉弱者解㑊安臥脫肉者寒熱不治尺肉弱者肌必消瘦肉瘦陰虛當為解㑊解㑊者身體困倦故欲安臥無邪而脫肉寒熱者真陰敗也故不治尺膚滑而澤脂者風也澤脂即前淖澤之謂風者陽氣陽在肌膚故滑而澤脂尺膚澀者風痹也尺膚澀者血少血不能營故為風痹尺膚粗如枯魚之鱗者水泆飲也如枯魚之鱗乾澀甚也以脾土衰而肌肉消水得乘之是為泆飲泆溢同尺膚熱甚脈盛躁者病溫也其脈盛而滑者病且出也尺膚熱者其身必熱脈盛躁者陽邪有餘故當為溫病若脈雖盛而兼滑者是脈已不躁而正氣將復故不久當愈出漸愈之謂尺膚寒其脈小者泄少氣膚寒脈小陽氣衰也故為泄為少氣尺膚炬然先熱後寒者寒熱也尺膚先寒久大之而熱者亦寒熱也炬然火熱貌或先熱而後寒或先寒而後熱皆寒熱往來之候肘所獨熱者腰以上熱手所獨熱者腰以下熱肘臂膊之節也一曰曲池以上為肘肘在上手在下故肘應腰上手應腰下也肘前獨熱者膺前熱肘後獨熱者肩背熱肘前內廉也手三陰之所行故應於膺前肘後外廉也手太陽之所行故應於肩背臂中獨熱者腰腹熱肘下為臂臂在下故應腰腹肘後粗以下三四寸熱者腸中有蟲肘後粗以下三四寸謂三里以下內關以上之所此陰分也陰分有熱故應腸中有蟲掌中熱者腹中熱掌中寒者腹中寒掌中者三陰之所聚故或熱或寒皆應於腹中魚上白肉有青血脈者胃中有寒魚上脈青胃之寒也尺炬然熱人迎大者當奪血尺堅大脈小甚少氣悗有加立死尺炬然熱火在陰也人迎大者陽之勝也故當失血若尺膚堅大而脈則小甚形有餘而氣衰少也陰虛既極而煩悗再加故當立死悗美本切脈之緩急大小滑澀之病形五臟之病變也六者為脈之提綱五臟之病變系焉心脈急甚者為瘛瘲微急為心痛引背食不下急者弦之類急主風寒心主血脈故心脈急甚則為瘛瘲筋脈引急曰瘛弛張曰瘲弦急之脈多主痛故微急為心痛引背心胸有邪食當不下也大抵弦急之脈當為此等病故急甚亦可為心痛微急亦可為瘛瘲學者當因理活變可也緩甚為狂笑微緩為伏梁在心下上下行時唾血心氣熱則脈縱緩故神散而為狂笑心在聲為笑也若微緩則為伏梁在心下而能升能降及時而唾血此皆心臟之不清也大甚為喉吤微大為心痹引背善淚出心脈大甚心火上炎也故喉中吤然有聲若其微大而為心痹引背善淚出者以手少陰之脈挾咽喉連目系也吤音介痹音祕小甚為善噦微小為消疸心脈小甚則陽氣虛而胃上寒故善噦若其微小亦為血脈枯少故病消疸消疸者肌膚消瘦也噦於決切疸音丹滑甚為善渴微滑為心疝引臍小腹鳴心脈滑甚則血熱血熱則燥故當為渴若其微滑則熱在於下當病心疝而引臍腹心為牡臟小腸為之使故小腹當有形也澀甚為喑微澀為血溢維厥耳鳴顛疾心脈澀甚則血氣滯於上聲由陽發滯則為喑也微澀為血溢澀當傷血也維厥者四維厥逆也以四肢為諸陽之本而血衰氣滯也為耳鳴為顛疾者心亦開竅於耳心虛則神亂也喑音音聲啞也肺脈急甚為顛疾微急為肺寒熱怠惰咳唾血引腰背胸若鼻息肉不通肺脈急甚風邪勝也木反乘金故主顛疾若其微急亦以風寒有餘因而致熱故為寒熱怠惰等病緩甚為多汗微緩為痿瘻偏風頭以下汗出不可止肺脈緩甚者皮毛不固故表虛而多汗若其微緩而為痿瘻偏風頭下汗出亦以陽邪在陰也大甚為脛腫微大為肺痹引胸背起惡日光肺脈大甚者心火爍肺真陰必涸故為脛腫若其微大亦由肺熱故為肺痹引胸背肺痹者煩滿喘而嘔也起畏日光以氣分火甚而陰精衰也小甚為泄微小為消疸肺脈小甚則陽氣虛而腑不固病當為泄若其微小亦以金衰金衰則水弱故為消疸滑甚為息賁上氣微滑為上下出血肺脈滑甚者氣血皆實熱故為息賁上氣息賁喘急也若其微滑亦為上下出血上言口鼻下言二陰也賁音奔澀甚為嘔血微澀為鼠瘻在頸支腋之間下不勝其上其應善酸矣澀脈因於傷血肺在上焦故澀甚當為嘔血若其微澀氣當有滯故為鼠瘻在頸腋間氣滯則陽病血傷則陰虛故下不勝其上而足膝當痠軟也肝脈急甚者為惡言微急為肥氣在脅下若覆杯肝脈急甚肝氣強也肝強者多怒少喜故言多嗔惡也若其微急亦以木邪傷土故為肥氣在脅下脅下者肝之經也肥氣者肝之積也當在左緩甚為善嘔微緩為水瘕痹也緩為脾脈以肝脈而緩甚木土相剋也故善嘔若微緩而為水瘕為痹者皆土為木製不能運行而然水瘕水積也大甚為內癰善嘔氣微大為肝痹陰縮咳引小腹肝脈大甚肝火甚也木火交熾故為內癰血熱不藏故為嘔衄若其微大而為肝痹為陰縮為咳引小腹皆以火在陰分也衄泥六切鼻血也小甚為多飲微小為消疸肝藏血肝脈小甚則血少而渴故多飲若其微小亦以陰虛血燥而為消疸也滑甚為㿉疝微滑為遺溺肝脈滑甚者熱壅於經故為㿉疝若其微滑而為遺溺以肝火在下而疏泄不禁也澀甚為溢飲微澀為瘛攣筋痹脾脈澀甚血氣衰滯也肝木不足土反乘之故濕溢肢體是為溢飲若其微澀而為瘛攣為筋痹皆血不足以養筋也瘛翅系二音攣音欒筋急縮也脾脈急甚為瘛瘲微急為膈中食飲入而還出後沃沫脾脈急甚木乘土也脾主肢體而風氣客之故為瘛瘲若其微急亦為肝邪侮脾則脾不能運而膈食還出土不制水而復多涎沫也緩甚為痿厥微緩為風痿四肢不用心慧然若無病脾脈宜緩而緩甚則熱脾主肌肉四肢故脾熱則為肉痿及為厥逆若微緩而為風痿四肢不用者以土弱則木生風也亦曰脾風痿弱在經而臟無恙故心慧然若無病大甚為擊僕微大為疝氣腹裡大膿血在腸胃之外脾主中氣脾脈大甚為陽極陽極則陰脫故如擊而仆地若其微大為疝氣以濕熱在經而前陰為太陰陽明之所合也腹裡大者以膿血在腸胃之外亦脾氣壅滯所致小甚為寒熱微小為消疸脾脈小者以中焦之陽氣不足故甚則為寒熱而微則為消疸滑甚為㿉癃微滑為蟲毒蛔蠍腹熱脾脈滑甚太陰實熱也太陰合宗筋故為㿉癃疝若其微滑濕熱在脾濕熱熏蒸故生諸蟲及為腹熱蛔蛔同澀甚為腸㿉微澀為內㿉多下膿血脾脈澀甚而為腸㿉微澀而為內㿉及多下膿血者以澀為氣滯血傷而足太陰之別入絡腸胃也腸㿉內㿉遠近之分耳一曰下腫病蓋即疝漏之屬腎脈急甚為骨癲疾微急為沉厥奔豚足不收不得前後腎脈急甚者風寒在腎腎主骨故為骨癲疾若微急而為沉厥足不收者寒邪在經也為奔豚者寒邪在臟也為不得前後者寒邪在陰也按腎之積曰奔豚當發於少腹上至心下若豚突然緩甚為折脊微緩為洞洞者食不化下嗌還出腎脈緩甚者陰不足故為折脊以足少陰脈貫脊循脊內也若其微緩腎氣亦虧腎虧則命門氣衰下焦不化下不化則復而上出故病為洞而食入還出也大甚為陰痿微大為石水起臍以下至小腹腄腄然上至胃脘死不治腎脈大甚水虧火王也故為陰痿若其微大腎陰亦虛陰虛則不化不化則氣停水積而為石水若至胃脘則水邪甚極反乘土臟泛濫無制故死不治腄重墜也音垂小甚為洞泄微小為消疸腎脈小甚則元陽下衰故為洞泄若其微小真氣亦虧故為消疸按五臟俱有消疸心肺肝三臟專指陰血而言脾與腎則兼陽氣言之可見陰陽互倚未有此傷而彼能獨全者也滑甚為癃㿉微滑為骨痿坐不能起起則目無所見腎脈滑甚陰火盛也故為癃㿉癃膀胱不利也㿉疝也若其微滑亦由火王火王則陰虛故骨痿不能起起則目暗無所見澀甚為大癰微澀為不月沉痔腎脈澀者為精傷為血少為氣滯故甚則為大癰微則為不月為沉痔病有六變諸急者多寒急者弦緊之謂脈浮而緊者名曰弦也緊則為寒緊則陰氣勝故凡緊急之脈多風寒而氣化從乎肝也緩者多熱緩者縱緩之狀非遲緩之謂緩則陽氣長胃氣有餘故凡縱緩之脈多中熱而氣化從乎脾胃也大者多氣少血大為陽有餘陽盛則陰衰故多氣少血若脈浮大者氣實血虛也故脈之大者多浮陽而氣化從乎心也小者血氣皆少小者近於微細在陽為陽虛在陰為陰弱脈體屬陰而氣化從乎腎也滑者陽氣盛微有熱滑脈為陽氣血實也故為陽氣盛而微有熱滑者胃氣實脈弱以滑是有胃氣故滑脈從乎胃也澀者多血少氣微有寒澀為氣滯為血少血既虛則陽氣不足故微有寒也曰多血者言虛於血分為多故令氣亦虛少雖有寒而不甚也澀脈近毛故氣化從乎肺也是故刺急者深內而久留之急者多寒寒從陰而難去也內與納同刺緩者淺內而疾髮針以去其熱緩者多熱熱從陽而易散也刺大者微瀉其氣無出其血大者多陰虛故無出其血刺滑者疾髮針而淺內之以瀉其陽氣而去其熱與刺緩者略同刺澀者必中其脈隨其逆順而久留之必先按而循之已髮針疾按其痏無令其血出以和其脈脈澀者氣血俱少難於得氣故宜必中其脈而察其逆順久留疾按而無出其血較之諸刺更宜詳慎者以脈澀本虛而恐傷其真氣耳循摩按也痏委偉二音刺瘢也諸小者陰陽形氣俱不足勿取以針而調以甘藥也脈小者為不足勿取以針可見氣血俱虛者必不宜刺而當調以甘藥也按甘之一字用意深矣蓋藥食之入必先脾胃而後五臟得稟其氣胃氣強則五臟俱盛胃氣弱則五臟俱衰胃屬土而喜甘故中氣不足者非甘溫不可土強則金王金王則水充此所以土為萬物之母而陰陽俱虛者必調以甘藥也五味各有補瀉以五行生剋之理言之此則當微兼五味而以甘為主庶足補中如四季無土氣不可五臟無胃氣不可而春但微弦夏但微鉤之義皆是也況形不足者溫之以氣精不足者補之以味故氣味之相宜於人者謂之為補則可若用苦劣難堪之味而求其能補無是理也氣味攻補之學不可不詳也脈色下第四心脈搏堅而長當病舌卷不能言搏謂弦強搏擊於手也心脈搏堅而長者肝邪乘心臟氣虧甚而失和平之氣也手少陰脈從心系上挾咽故令舌卷不能言搏擊之脈皆肝邪甚也肝本屬木而何五臟皆畏之蓋五臟皆以胃氣為本脈無胃氣則死凡木強者土必衰脈搏者胃多敗故堅搏為諸臟所忌茲心脈搏堅而長者以心臟之胃氣不足而邪有餘也搏之微則邪亦微搏之甚則幾於真臟矣故當以搏之微甚而察病之淺深夫五臟皆以胃氣為本搏堅皆為賊克之徵其本臟搏堅亦自戕而自病也其耎而散者當消環自已若證如前而脈則耎散者心氣將和也消盡也環周也謂期盡一周而病自已矣肺脈搏堅而長當病唾血其耎而散者當病灌汗至令不復散發也肺脈搏堅而長邪乘肺也肺系連喉故為唾血若耎而散則肺虛不斂汗出如水故云灌汗汗多亡陽故不可更為發散也肝脈搏堅而長色不青當病墜若搏因血在脅下令人喘逆其耎而散色澤者當病溢飲溢飲者渴暴多飲而易入肌皮腸胃之外也肝脈搏堅而長肝自病也臟病於中色必外見其色當青而不青者以病不在臟而在經也必有墜傷若由搏擊則血停脅下而氣不利故令人喘逆若其耎散則肝木不足脾濕勝之濕在肌膚故顏色光澤病為溢飲胃脈搏堅而長其色赤當病折髀其耎而散者當病食痹胃脈搏堅木乘土也加之色赤則陽明火盛木火交熾胃經必傷陽明下行者從氣衝下髀抵伏兔故病髀如折也若耎而散者胃氣本虛陽明支別上行者由大迎人迎循喉嚨入缺盆下膈屬胃絡脾故食即氣逆滯悶不行而為食痹脾脈搏堅而長其色黃當病少氣其耎而散色不澤者當病足脛腫若水狀也邪脈乘脾脾氣必衰脾虛無以生血故本臟之色見於外脾弱不能生肺故為少氣若其耎散而色不澤者尤屬脾虛脾經之脈從拇指上內踝前廉循胻骨後交出厥陰之前故病足胻腫若水狀者以脾虛不能制水也腎脈搏堅而長其色黃而赤者當病折腰其耎而散者當病少血至令不復也邪脈干腎腎氣必衰其色黃赤為火土有餘而腎水不足故病腰如折也若其耎散腎氣本虛腎主水以生化津液今腎氣不化故病少血本原氣衰故令不能遽復搏堅而長者邪勝乎正是謂邪之所湊其氣必虛也耎而散者本原不足是謂正氣奪則虛也一以有邪而致虛一以無邪而本虛虛雖若一而病本不同心脈急病心疝少腹當有形心為牡臟小腸為使氣本屬陽今脈緊急陰寒勝也以陽臟而為陰勝故病心疝心疝者形在少腹而實以寒乘少陰所致而胃脈實則脹虛則泄實為邪有餘故脹滿虛為正不足故泄利心為君主胃為水穀之海故重揭其義以明之夫脈者血之府也府聚也府庫之謂也血必聚於經脈之中故脈實血實脈虛血虛也然此血字實兼氣為言非獨指在血也脈之盛衰所以統候血氣之虛實有餘不足也長則氣治氣充和也短則氣病氣不足也數則煩心火熱甚也大則病進邪方張也上盛則氣高寸為上上盛者邪壅於上也氣高者喘滿之謂下盛則氣脹關尺為下下盛者邪滯於下故腹為脹滿代則氣衰脈多變更不常者曰代氣虛無主也細則氣少脈來微細正氣不足也澀則心痛澀為血少氣滯故為心痛渾渾革至如湧泉病進而色弊綿綿其去如弦絶死渾渾濁亂不明也革至如皮革之堅硬也湧泉其來汩汩無序但出不返也若得此脈而病加日進色加憔弊甚至綿綿如瀉漆及如弓弦之斷絶者皆真氣已竭故死粗大者陰不足陽有餘為熱中也粗大者浮洪之類陽實陰虛故為內熱來疾去徐上實下虛為厥巔疾來疾者其來急也去徐者其去緩也上實者寸盛也下虛者尺弱也皆陽強之脈故為陽厥頂巔之疾夫察脈須識上下來去至止六字不明此六字則陰陽虛實不別也上者為陽來者為陽至者為陽下者為陰去者為陰止者為陰上者自尺部上於寸口陽生於陰也下者自寸口下於尺部陰生於陽也來者自骨肉之分而出於皮膚之際氣之升也去者自皮膚之際而還於骨肉之分氣之降也應曰至息曰止也來徐去疾上虛下實為惡風也故中惡風者陽氣受也來之徐上之虛者皆陽不足也陽受風氣故陽虛者必惡風而惡風之中人亦必陽氣受之也惡上去聲下入聲有脈俱沉細數者少陰厥也沉細者腎之脈體也兼數則熱陰中有火也故為少陰之陽厥沉細數散者寒熱也沉細為陰數散為陽陰脈數散陰不固也故或入之陰或出之陽而為往來寒熱浮而散者為眴僕浮者陰不足散者神不守浮而散者陰氣脫故為眴僕也眴雄絹切眩暈也諸浮不躁者皆在陽則為熱其有躁者在手脈浮為陽而躁則陽中之陽故但浮不躁者皆屬陽脈未免為熱若浮而兼躁乃為陽極故當在手在手者陽中之陽謂手三陽經也此與人迎一盛病在足少陽一盛而躁病在手少陽之義同諸細而沉者皆在陰則為骨痛其有靜者在足沉細為陰而靜則陰中之陰故脈但沉細者病在陰分當為骨痛若沉細而靜乃為陰極故當在足在足者陰中之陰謂足三陰經也數動一代者病在陽之脈也泄及便膿血數動者陽脈也數動一代者陽邪傷其血氣也故為泄及便膿血諸過者切之澀者陽氣有餘也滑者陰氣有餘也脈失其常曰過可因切而知也陽有餘則血少故脈澀陰有餘則血多故脈滑陽氣有餘為身熱無汗陰氣有餘為多汗身寒陽有餘者陰不足也故身熱無汗陰有餘者陽不足也故多汗身寒以汗本屬陰也陰陽有餘則無汗而寒陽余無汗以表實也陰余身寒以陰盛也陰陽有餘陰邪實表之謂也推而外之內而不外有心腹積也此下言察病之法當推求於脈以決其疑似也凡病若在表而欲求之於外矣然脈則沉遲不浮是在內而非外故知其心腹之有積也推而內之外而不內身有熱也凡病若在裡而欲推求於內矣然脈則浮數不沉是在外而非內故知其身之有熱也推而上之上而不下腰足清也凡推求於上部然脈止見於上而下部則弱此以有升無降上實下虛故腰足為之清冷也推而下之下而不上頭項痛也凡推求於下部然脈止見於下而上部則虧此以有降無升清陽不能上達故為頭項痛也或以陽虛而陰湊之亦為頭項痛也當外而不外病在內當內而不內病在外上下亦如之按之至骨脈氣少者腰脊痛而身有痹也按之至骨沉陰勝也脈氣少者血氣衰也正氣衰而陰氣盛故為是病痹關格之脈人迎一盛病在少陽二盛病在太陽三盛病在陽明四盛以上為格陽人迎足陽明胃脈也在頸下挾結喉旁一寸五分一盛二盛猶言一倍二倍謂以人迎寸口相較或此大於彼或彼大於此有三倍四倍之殊也寸口主中人迎主外兩者相應俱往俱來若引繩大小齊等春夏人迎微大秋冬寸口微大如是者命曰平人故人迎寸口而至於盛衰相倍者乃不免於病矣然人迎候陽故一盛為少陽膽與三焦也二盛在太陽膀胱小腸也三盛在陽明胃與大腸也四盛以上者以陽脈盛極而陰無以通故曰格陽寸口一盛病在厥陰二盛病在少陰三盛病在太陰四盛以上為關陰寸口手太陰肺脈也寸口候陰故一盛在厥陰肝與心主也二盛在少陰心與腎也三盛在太陰脾與肺也四盛以上者以陰脈盛極而陽無以交故曰關陰人迎與寸口俱盛四倍以上為關格關格之脈羸不能極於天地之精氣則死矣俱盛四倍以上謂盛於平常之脈四倍也物不可以過盛盛極則敗凡脈盛而至於關格者以陰陽離絶不能相營故致羸敗極盡也精氣天稟也言不能盡其天年而夭折也邪在腑則陽脈不和陽脈不和則氣留之氣留之則陽氣盛矣陽氣太盛則陰不利陰脈不利則血留之血留之則陰氣盛矣陰氣太盛則陽氣不能榮也故曰關陽氣太盛則陰氣不能榮也故曰格陰陽俱盛不得相榮故曰關格關格者不得盡期而死也世人病此不少歷代醫師相傳謬甚夫所謂關格者陰陽痞絶不相營運乖羸離敗之候也故人迎獨盛者病在三陽之腑也寸口獨盛者病在三陰之臟也或見於人迎或見於氣口皆孤陽之逆候實真陰之敗竭也無陰則無根而孤陽浮露於外耳凡犯此者必死無疑是皆酒色傷精所致又以人迎在頭系陽明表脈故人迎倍大者曰格陽寸口在手系太陰里脈故寸口倍大者曰關陰陰陽互極抗拒不通故名關格不可易也若在尺為關在寸為格關則不得小便格則吐逆特言膈食與癃閉耳非此之謂也反四時者有餘為精不足為消此言四時陰陽脈之相反者亦為關格也夫春夏人迎微大秋冬寸口微大如是者命曰平人以人迎為陽脈而主春夏寸口為陰脈而主秋冬也若其反者春夏氣口當不足而反有餘秋冬人迎當不足而反有餘此邪氣之有餘有餘者反為精也春夏人迎當有餘而反不足秋冬寸口當有餘而反不足此血氣之不足不足者日為消也應太過不足為精應不足有餘為消陰陽不相應病名曰關格如春夏人迎應太過而寸口之應不足者反有餘而為精秋冬寸口應太過而人迎之應不足者反有餘而為精是不足者為精也春夏寸口應不足而人迎應有餘者反不足而為消秋冬人迎應不足而寸口應有餘者反不足而為消是有餘者為消也應不足而有餘者邪之日盛應有餘而不足者正必日消是為陰陽相反氣不相營亦名關格妊娠之脈婦人手少陰脈動甚者妊子也手少陰心脈也上附上左外以候心故心脈當診於左寸動甚者流利滑動也心生血血王乃能胎婦人心脈動甚者血王而然故當妊子陰搏陽別謂之有子陰如前手少陰也或兼足少陰而言亦可蓋心主血腎主子宮皆胎孕之所主也搏搏擊於手也陽別者言陰脈搏手似乎陽邪然其鼓動滑利本非邪脈蓋以陰中見陽而別有和調之象是謂陰搏陽別也尺中之脈按之不絶無他病而不月者妊也古人男女皆稱子非男曰子而女則否也男女之別須審陰陽右寸盛陰狀多主女左尺盛陽狀多主男以左右分陰陽則左為陽右為陰以尺寸分陰陽則寸為陽尺為陰以脈體分陰陽則鼓搏沉實為陽虛弱浮澀為陰猶當察孕婦之強弱老少及平日之偏左偏右尺寸之素強素弱庶足以盡其診也肝滿腎滿肺滿皆實即為腫滿邪氣壅滯而為脹滿也此言肝腎肺經皆能為滿若其脈實當為浮腫肺之壅喘而兩胠滿肺居膈上其系橫出腋下故肺壅則喘而兩胠滿胠腋下脅也肝壅兩胠滿臥則驚不得小便肝經之脈環陰器布脅肋故肝壅則兩胠滿而不得小便肝主驚駭臥則氣愈壅故多驚也腎壅胠下至少腹滿脛有大小髀胻大跛易偏枯腎脈循內踝之後上腨出膕內廉上股內屬腎絡膀胱而上行故腎經壅則胠下至少腹脹滿也足脛或腫或消是謂大小自髀至胻或為大或為跛或掉易無力或偏枯不用是皆腎經壅滯不能運行所致髀音皮胻音杭心脈滿大癇瘛筋攣心脈滿大火有餘也心主血脈火盛則血涸故癇瘛而筋攣癇癲癇也瘛抽搐也攣拘攣也肝脈小急癇瘛筋攣肝藏血小為血不足急為邪有餘故為是病夫癇瘛筋攣病一也而心肝二經皆有之一以內熱一以風寒寒熱不同血衰一也故同有是病肝脈騖暴有所驚駭脈不至若喑不治自已騖馳驟也暴急疾也驚駭者肝之病故肝脈急亂者因驚駭而然甚有脈不至而聲喑者以猝驚則氣逆逆則脈不通而肝經之脈循喉嚨故聲喑而不出也然此特一時之氣逆耳氣通則愈矣故不治自已騖音務腎脈小急肝脈小急心脈小急不鼓皆為瘕三脈細小而急絶無鼓大之意陰邪聚於陰分也故當隨三經之位而為瘕腎肝並沉為石水並浮為風水此言水病之有陰陽也腎肝在下肝主風腎主水肝腎俱沉者陰中陰病也當病石水石水者凝結少腹沉堅在下也肝腎俱浮者陰中陽病也當病風水風水者遊行四體浮泛於上也並虛為死腎為五臟之根肝為發生之主根本空虛有表無里也故當死並小弦欲驚肝腎並小真陰虛也小而兼弦木邪勝也氣虛膽怯故為欲驚腎脈大急沉肝脈大急沉皆為疝疝者寒邪結聚所為脈急者挾肝邪脈沉者在陰分沉急而大陰邪盛也肝腎之脈絡小腹結於陰器寒邪居之故當病疝按疝病乃寒挾肝邪之證或結於少腹或結於睪丸或結於睪丸之左右上下而筋急絞痛脈必急搏者多以寒邪結聚陰分而挾風木之氣也如肺風疝脾風疝之類皆兼一風字其必挾肝邪可知睪音高陰丸也心脈搏滑急為心疝肺脈沉搏為肺疝病疝而心脈搏滑急者寒挾肝邪乘心也肺脈沉搏者寒挾肝邪乘肺也三陽急為瘕三陰急為疝三陽手足太陽經也三陰手足太陰經也邪聚三陽為瘕聚邪聚三陰為疝氣凡脈急者皆邪盛也前言肝腎心肺而此言脾經所以五臟皆有疝二陰急為癇厥二陽急為驚二陰少陰也二陽陽明也脈急者為風寒邪乘心腎故為癇為厥木邪乘胃故發為驚土惡木也脾脈外鼓沉為腸澼久自已沉為在裡而兼外鼓者邪不甚深雖為腸澼久當自已腸澼下痢也凡心肝脾腎皆主陰分或寒濕或熱各有所傷乃自大腸下血均謂之腸澼澼音劈肝脈小緩為腸澼易治肝脈急大則邪盛難愈今脈小緩為邪輕易治也腎脈小搏沉為腸澼下血血溫身熱者死腎居下部其脈本沉若小而搏為陰氣不足而陽邪乘之故為腸澼下血若其血溫身熱者邪火有餘真陰喪敗也故當死心肝澼亦下血二臟同病者可治心生血肝藏血故二臟之澼亦下血而不獨腎也然心肝二臟木火同氣故同病者為順而可治若肝脾同病是為土敗木賊其難治也明矣其脈小沉澀為腸澼其身熱者死熱見七日死心肝之脈小沉而澀以陰不足而血傷也故為腸澼然脈沉細者不當熱今脈小身熱是為逆故當死而死於熱見七日者六陰敗盡也胃脈沉鼓澀胃外鼓大心脈小堅急皆膈偏枯沉鼓澀陽不足也外鼓大陰受傷也小堅而急陰邪勝也胃為水穀之海心為血脈之主胃氣既傷血脈又病故致上下痞膈半身偏枯也男子發左女子發右不喑舌轉可治三十日起男子左為逆右為從女子右為逆左為從今以偏枯而男子發左女子發右是逆證也若聲不喑舌可轉則雖逆於經未甚於臟乃為可治而一月當起若偏枯而喑者腎氣內竭而然其病必甚如內奪而厥則為喑俳此腎虛也正以腎脈循喉嚨挾舌本故耳其從者喑三歲起若男發於右而不發於左女發於左而不發於右皆謂之從從順也然證雖從而聲則喑是外輕而內重也故必三歲而後起年不滿二十者三歲死以氣血方剛之年輒見偏枯廢疾此稟賦不足早凋之兆也不出三年死矣脈至而搏血衄身熱者死脈來懸鉤浮為常脈搏脈弦強陰虛最忌凡諸失血鼻衄之疾其脈搏而身熱真陰脫敗也故當死然失血之證多陰虛陰虛之脈多浮大故懸鉤而浮乃其常脈無足慮也懸者不高不下不浮不沉如物懸空之義謂脈雖浮鉤而未失中和之氣也脈至如喘名曰暴厥暴厥者不知與人言喘者如氣之喘言急促也暴厥謂卒然厥逆而不知人也脈至如數使人暴驚三四日自已數脈主熱而如數者實非真數之脈蓋以猝動肝心之火故令人暴驚然脈非真數故俟三四日而氣衰自愈矣脈至浮合浮合如數一息十至以上是經氣豫不足也微見九十日死此下皆言死期也浮合如浮波之合後以催前泛泛無常也一息十至以上其狀如數而實非數熱之脈是經氣之衰竭也微見始見也言初見此脈便可期九十日而死若見之已久則不必九十日矣所以在九十日者以時更季易天道變而人氣從之也豫與同黨與之義脈至如火薪然是心精之豫奪也草乾而死如火薪然者來如焰之鋭去如滅之速此火臟無根之脈而心經之精氣與奪也夏令火王猶為可支草乾而死陽盡時也脈至如散葉是肝氣豫虛也木葉落而死如散葉者浮泛無根也此以肝氣大虛全無收斂木葉落者金勝木敗肝死時也脈至如省客省客者脈塞而鼓是腎氣不豫足也懸去棗華而死省客如省問之客或去或來也塞者或無而止鼓者或有而搏是腎原不固而無所主持也棗華之後初夏時也懸者華之開去者華之落言於棗華開落之時火王而水敗腎虛者死也脈至如丸泥是胃精豫不足也榆莢落而死丸泥者泥彈之狀堅強短澀之謂此胃精中氣之不足也榆莢榆錢也春深而落木王之時土敗者死脈至如橫格是膽氣豫不足也禾熟而死橫格如橫木之格於指下長而且堅是為木之真臟而膽氣之不足也禾熟於秋金令王也故木敗而死脈至如弦縷是胞精豫不足也病善言下霜而死不言可治弦縷者如弦之急如縷之細真元虧損之脈也胞子宮也命門元陽之所聚也胞之脈繫於腎腎之脈系舌本胞氣不足當靜而無言今反善言是陰氣不藏而虛陽外見時及下霜虛陽消敗而死矣不言者腎氣猶靜尚可治也脈至如交漆交漆者左右旁至也微見三十日死交漆者如瀉漆之交左右旁至纏綿不清也微見初見也三十日為月建之易而陰陽偏敗者不過一月之期也脈至如湧泉浮鼓肌中太陽氣豫不足也少氣味韭英而死湧泉者如湧之泉有升無降而浮鼓於肌肉之中是足太陽膀胱之氣不足也膀胱為三陽而主外今其外實內虛陰精不足故為少氣當至味韭英之時而死者以冬盡春初水漸衰也脈至如頽土之狀按之不得是肌肉豫不足也五色先見黑白壘發死頽土之狀虛大無力按之即不可得肌氣即脾氣脾主肌肉也黑為水之色土敗極而水反乘之故當死壘藟同即逢藟之屬藟有五種而白者發於春木王之時土當敗也脈至如懸雍懸雍者浮揣切之益大是十二俞之豫不足也水凝而死懸雍喉間下垂肉乳也如懸雍浮揣切之益大者浮短孤懸有上無下也俞皆在背為十二經臟氣之所繫水凝而死陰氣盛而孤陽絶也揣杵水切俞音輸脈至如偃刀偃刀者浮之小急按之堅大急五臟菀熱寒熱獨並於腎也如此其人不得坐立春而死偃刀臥刀也浮之小急如刀口也按之堅大急如刀背也此以五臟菀熱而發為寒熱陽王則陰消故獨並於腎也腰者腎之府腎陰既虧則不能起坐立春陽盛陰日以衰所以當死脈至如丸滑不直手不直手者按之不可得也是大腸氣豫不足也棗葉生而死如丸短而小也直當也言滑小無根而不勝按也大腸應庚金棗葉生初夏火王則金衰故死脈至如華者令人善恐不欲坐臥行立常聽是小腸氣豫不足也季秋而死如華如草木之華而輕浮柔弱也小腸屬丙火與心為表裡小腸不足則氣通於心善恐不欲坐臥者心氣怯而不寧也行立常聽者恐懼多而生疑也丙火墓於戌故當季秋死形盛脈細少氣不足以息者危形盛脈細而少氣不足以息者外有餘而中不足枝葉盛而根本虛也故危亡近矣形瘦脈大胸中多氣者死形體消瘦而脈反大胸中反多氣者陰不足而陽有餘也陰形既敗孤陽無獨留之理故死形氣相得者生體貌為形陰也運行屬氣陽也陰主靜陽無陰不成陽主動陰無陽不生故傷以寓氣氣以運形陰陽當和不得相失如形盛脈大形瘦脈細皆為相得相得者生反此者危也參伍不調者病三以相參伍以相類謂之不調凡或大或小或遲或疾往來出入而無常度者皆病脈也三部九候皆相失者死三部九候失其常故死上下左右之脈相應如參舂者病甚上下左右相失不可數者死上下左右即三部九候而各有左右也參舂謂大數而鼓如杵之舂陽極之脈也故曰病甚甚至息數相失而不可以數計者死夫人一呼脈再至一吸脈再至曰平三至曰離經四至曰脫精五至曰死六至曰命盡今相失而不可數蓋不止於五六至矣必死可知舂書容切中部之候雖獨調與衆臟相失者死中部之候相減者死三部之脈上部頭中部手下部足此言中部之脈雖獨調而頭足衆臟之脈已失其常者當死若中部之脈減於上下二部者中氣大衰也亦死目內陷者死五臟六腑之精氣皆上注於目而為之精目內陷者陽精脫矣故必死以左手足上上去踝五寸按之庶右手足當踝而彈之手足之絡皆可取而驗之手踝之上手太陰肺絡也足踝之上足太陰脾絡也肺藏氣而主治節脾屬土而主灌溉故可取之以察吉凶其應過五寸以上蠕蠕然者不病其應疾中手渾渾然者病中手徐徐然者病其應上不能至五寸彈之不應者死應動也應過五寸以上氣脈充也蠕蠕蟲行貌謂其耎滑而勻和也是謂不病之脈疾急疾也渾渾濁亂也徐徐遲緩也不能至五寸者氣脈衰彈之不應者氣脈絶故微則為病而甚則為死也蠕音如是以脫肉身不去者死脾胃竭則肌肉消肝腎敗則筋骨憊肉脫身重死期至矣不去者不能動搖來去也中部乍疏乍數者死中部兩手脈也乍疏乍數者氣脈敗亂之兆也故死其脈代而鉤者病在絡脈代而鉤者俱應夏氣而夏氣在絡也九候之相應也上下若一不得相失上下若一言其大小遲疾皆貴乎和平也一候後則病二候後則病甚三候後則病危所謂後者應不俱也應不俱者脈失常度逆順無倫也察其腑臟以知死生之期死生之期察其克賊生王而可知也必先知經脈然後知病脈經者常脈病者變脈不知其常不足以知變也真臟脈見者勝死勝死謂遇其勝己之時而死如肝見庚辛脾見甲乙之類是也足太陽氣絶者其足不可屈伸死必戴眼足太陽之脈下者合膕中貫腨內出外踝之後上者起目內眥其脈有通項入於腦者正屬目本名曰眼系故太陽氣絶者血枯筋急足不可屈伸而死必戴眼戴眼者睛上視而瞪也腨音篆瞪曹庚切九候之脈皆沉細懸絶者為陰主冬故以夜半死盛躁喘數者為陽主夏故以日中死夜半者一日之冬也陰盡陽生故陰極者死日中者一日之夏也陽盡陰生故陽極者死是故寒熱病者以平旦死平旦者一日之春陰陽之半也故寒熱病者亦於陰陽出入之時而死熱中及熱病者以日中死以陽助陽真陰竭也病風者以日夕死日夕者一日之秋也風木同氣遇金而死病水者以夜半死亥子生王邪盛極也其脈乍疏乍數乍遲乍疾者日乘四季死脈變不常者中虛無主也日之四季辰戌醜未也四季為五行之墓地故敗竭之臟遇之而死形肉已脫九候雖調猶死脾主肌肉為五臟之本未有脾氣脫而能生者故九候雖調亦死七診雖見九候皆從者不死從順也謂脈順四時之令及得諸經之體者雖有獨大獨小等脈不至死也所言不死者風氣之病及經月之病似七診之病而非也故言不死風者陽病也故偶感於風則陽分之脈或大或疾經月者常期也故適值去血則陰分之脈或小或遲或為陷下此皆似七診之脈而實非也皆不可以言死然則非外感及經月之病而得七診之脈者非吉兆也若有七診之病其脈候亦敗者死矣必發噦噫風氣經月之病本非七診之類若其果系脈息證候之敗者又非不死之比然其死也必發噦噫蓋噦出於胃土氣敗也噫出於心陰邪勝也噦於決切厄逆也噫伊隘二音噯氣也必審問其所始病與今之所方病而後各切循其脈視其經絡浮沉以上下逆從循之凡診病之道必問其始病者察致病之由也求今之方病者察見在之診也本末既明而後切按其脈以參合其在經在絡或浮或沉上下逆從各因其次以治之也其脈疾者不病其脈遲者病脈不往來者死皮膚著者死疾言力強有神遲言氣衰不足若脈不往來者陰陽俱脫皮膚著者血液已盡謂皮膚枯槁著骨也經病者治其經經脈為里支而橫者為絡治其經謂即其經而刺之也孫絡病者治其孫絡血絡之小者為孫即絡脈之別而浮於肌膚者也諸刺絡脈者急取之以瀉其邪而出其血留之發為痹也故曰治其血血病身有痛者治其經絡血病而身痛者不止於孫絡而經亦有滯也當隨其經絡而刺之其病者在奇邪奇邪之脈則繆刺之奇邪者不入於經而病於絡也邪客大絡則左注右右注左其氣無常處故當繆刺之留瘦不移節而刺之留病留滯也瘦形消瘦也不移不遷動也凡病邪久留不移者必於四肢八溪之間有所結聚故當於節之會處索而刺之期可平也上實下虛切而從之索其結絡脈刺出其血以見通之上實下虛有所隔也故當切其脈以求之從其經以取之索其絡脈之有結滯者刺出其血結滯去而通達見矣瞳子高者太陽不足戴眼者太陽已絶此決死生之要不可不察也瞳子高者目上視也戴眼者上視之甚而定直不動也此重明上文足太陽之證而分其輕重以決死生也脈有陰陽知陽者知陰知陰者知陽知陽脈之體而後能察陰脈知陰脈之體而後能察陽脈陽中有陰似陽非陽也陰中有陽似陰非陰也所當詳辨誤者殺人凡陽有五五五二十五陽陽者所謂胃脘之陽即胃氣也五者即五臟之脈如肝弦心鉤脾耎肺毛腎石也以一臟而兼五脈即五臟互見是為五五二十五脈也然五臟之脈皆不可以無胃氣故曰凡陽有五而二十五脈即二十五陽也所謂陰者真臟也見則為敗敗必死也陰者無陽之謂無陽者即無陽明之胃氣而本臟之陰脈獨見如但弦但鉤之類是謂真臟胃氣敗也故必死所謂陽者胃脘之陽也胃屬陽明胃脘之陽言胃中陽和之氣即胃氣也五臟賴之以為根本者也故人無胃氣曰逆逆者死脈無胃氣亦死別於陽者知病處也別於陰者知死生之期能別陽和之胃氣則一有不和便可知疾病之所能別純陰之真臟則凡遇生克便可知死生之期也三陽在頭三陰在手所謂一也三陽在頭指人迎也三陰在手指氣口也上文以真臟胃氣言陰陽此節以人迎氣口言陰陽蓋彼言脈體此言脈位二者相依所謂一也別於陽者知病忌時別於陰者知死生之期此與前節稍同而復言之者蓋前以真臟胃氣言而此以陰陽表裡言二義相關皆不可缺忌時言氣有衰王病有時忌也謹熟陰陽無與衆謀陰陽之理不可不熟故曰謹獨聞獨見非衆所知故無與謀所謂陰陽者去者為陰至者為陽靜者為陰動者為陽遲者為陰數者為陽脈之陰陽其概如此得陽者生得陰者死此其要也大骨枯槁大肉陷下胸中氣滿喘息不便其氣動形期六月死真臟脈見乃豫之期日大骨大肉皆以通身而言如肩脊腰膝皆大骨也尺膚臀肉皆大肉也肩垂項傾腰重膝敗者大骨之枯槁也尺膚既削臀肉必枯大肉之陷下也腎主骨骨枯則腎敗矣脾主肉肉陷則脾敗矣肺主氣氣滿喘息則肺敗矣氣不歸原形體振動孤陽外浮而真陰虧矣三陰虧損死期不出六月六月者一歲陰陽之更變也若其真臟脈已見則不在六月之例可因克賊之日而定其期矣大骨枯槁大肉陷下胸中氣滿喘息不便內痛引肩項期一月死真臟見乃豫之期日內痛引肩項病及心經矣較前已甚期一月死一月者鬥建移而氣易也大骨枯槁大肉陷下胸中氣滿喘息不便內痛引肩項身熱脫肉破䐃真臟見十日之內死身熱者陰氣去也脫肉者肌肉消盡也破䐃者臥久骨露而筋肉敗也是為五臟俱傷而真臟又見當十日內死十日者天干盡而旬氣易也䐃筋肉結聚之處肘膝後肉如塊者大骨枯槁大肉陷下骨髓內消動作益衰真臟未見期一歲死見其真臟乃豫之期日骨枯肉陷脾腎已虧兼之骨髓內消動作益衰雖諸證未全真臟未見然敗竭已兆僅支一年歲易氣新不能再振矣若一見真臟乃可必其死期也大骨枯槁大肉陷下胸中氣滿腹內痛心中不便肩項身熱破䐃脫肉目眶陷真臟見目不見人立死其見人者至其所不勝之時則死五臟敗證俱見而目眶陷真臟見目不見人者神氣已脫故當立死若其見人者神氣猶在故必待克賊之時而死也急虛身中卒至五臟絶閉脈道不通氣不往來譬於墮溺不可為期其脈絶不來若人一呼五六至其形肉不脫真臟雖不見猶死也急虛者言元氣暴傷而忽甚也故其邪中於身必猝然而至譬之墜者溺者旦時莫測有不可以常期論也若脈絶不至或一呼五六至者皆臟氣竭而命當盡也故不必其形肉脫而真臟見也真肝脈至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死此下皆言真臟脈也肝之真臟如刀刃如琴瑟弦者言細急堅搏而非微弦之本體也青本木色而兼白不澤者金剋木也五臟率以毛折死者皮毛得血氣而充毛折則精氣敗矣故皆死真心脈至堅而搏如循薏苡子纍纍然色赤黑不澤毛折乃死堅而搏如循薏苡子者短實堅強而非微鉤之本體心脈之真臟也赤本火色而兼黑不澤者水剋火也故死真肺脈至大而虛如以毛羽中人膚色白赤不澤毛折乃死大而虛如以毛羽中人膚浮虛無力之甚而非微毛之本體肺脈之真臟也白本金色而兼赤不澤者火剋金也故死真腎脈至搏而絶如指彈石辟辟然色黑黃不澤毛折乃死搏而絶搏之甚也如指彈石辟辟然沉而堅也皆非微石之本體而為腎脈之真臟也黑本水色兼黃不澤者土剋水也故死真脾脈至弱而乍數乍疏色黃青不澤毛折乃死弱而乍數乍疏則和緩全無而非微耎弱之本體脾脈之真臟也黃本土色而兼青不澤者木剋土也故死諸真臟脈見者皆死不治也無胃氣者即名真臟皆為不治之脈五臟者皆稟氣於胃胃者五臟之本也臟氣者不能自致於手太陰必因於胃氣乃至於手太陰也谷入於胃以傳於肺五臟六腑皆以受氣故臟氣必因於胃氣乃得至於手太陰而脈則見於氣口此所以五臟之脈必賴胃氣以為之主也故五臟各以其時自為而至於手太陰也以時自為如春而但弦夏而但鉤之類皆五臟不因於胃氣即真臟之見也故邪氣勝者精氣衰也病甚者胃氣不能與之俱至於手太陰故真臟之氣獨見獨見者病勝臟也故曰死凡邪氣甚而正氣竭者是病勝臟也故真臟之邪獨見真臟獨見者胃氣必敗故不能與之俱至於手太陰則胃氣不見於脈此所以為危兆也凡持真脈之臟脈者肝至懸絶急十八日死真脈之臟脈即真臟也懸絶急者全失和平而弦搏異常也十八日者為木金成數之餘金勝木而死也此下死期悉按河圖或言生數或言成數心至懸絶九日死九日者為火水生成數之餘水勝火也肺至懸絶十二日死十二日者為金火生成數之餘火勝金也腎至懸絶七日死七日者為水土生數之餘土勝水也脾至懸絶四日死四日者為木生數之餘木勝土也此者皆不勝克賊之氣故真臟獨見者氣敗而危矣肝見庚辛死庚辛為金伐肝木也心見壬癸死壬癸屬水滅心火也脾見甲乙死甲乙屬木克脾土也肺見丙丁死丙丁屬火鑠肺金也腎見戊己死戊己屬土傷腎水也是謂真臟見皆死陰陽虛腸闢死陰陽虛者尺寸俱虛也腸闢利膿血也胃氣不留魄門不禁而陰陽虛者臟氣竭也故死滑大者曰生懸澀者曰死陽加於陰謂之汗陽言脈體陰言脈位汗液屬陰而陽加於陰陰氣泄矣故陰脈多陽者多汗陰虛陽搏謂之崩陰虛者沉取不足陽搏者浮取有餘陽實陰虛故為內崩失血之證三陰俱搏二十日夜半死三陰手太陰肺足太陰脾也搏即真臟之搏擊也二十日者脾肺成數之餘也夜半陰極氣盡故死二陰俱搏十三日夕時死二陰手少陰心足少陰腎也十三日者心腎之成數也夕時者陰陽相半水火分爭之會也一陰俱搏十日平旦死一陰手厥陰心主足厥陰肝也十日者肝心生成之數也平旦者木火王極而邪更甚故死三陽俱搏且鼓三日死三陽手太陽小腸足太陽膀胱也水一火二故死在三日其死之速者以既搏且鼓陽邪之盛極也三陰三陽俱搏心腹滿發盡不得隱曲五日死三陰三陽脾肺小腸膀胱也四臟俱搏則上下俱病故在上則心腹脹滿至於發盡發盡者脹之極也在下則不得隱曲陰道不利也四臟俱病惟以胃氣為主土數五五數盡而死矣二陽俱搏其病溫死不治不過十日死二陽手陽明大腸足陽明胃也十日者腸胃生數之餘也不舉一陽非與一陰同推必脫簡也精明五色者氣之華也精明見於目五色顯於面皆五氣之精華也切脈動靜而視精明察五色以此參伍決死生之分赤欲如白裹朱不欲如赭白裹朱隱然紅潤而不露也赭代赭也色方而紫此火色之善惡也白欲如鵝羽不欲如鹽鵝羽白而明鹽色白而暗此金色之善惡也青欲如蒼璧之澤不欲如藍蒼璧之澤青而明潤藍色青而深晦此木色之善惡也黃欲如羅裹雄黃不欲如黃土羅裹雄黃光澤而隱黃土之色沉滯無神此土色之善惡也黑欲如重漆色不欲如地蒼重漆之色光彩而潤地之蒼黑枯暗如塵此水色之善惡也此皆五色精微之象也凶兆見壽不遠矣夫精明者所以視萬物別白黑審短長以長為短以白為黑則精衰矣五臟六腑之精氣皆上注於目而為之精故精聚則神全若其顛倒錯亂是精衰而神衰矣豈久安之兆哉刺有五官五閲以觀五氣五氣者五臟之使也五時之副也刺法當知臟氣欲知臟氣當於五官五閲而察之閲外候也使所使也副配合也五官者五臟之閲也五臟藏於中五官見於外內外相應故為五臟之閲脈出於氣口色見於明堂五色更出以應五時各如其常經氣入臟必當治里可為常者常行之法五臟之脈察於氣口五臟之色察於明堂明堂者鼻也色應其時乃其常也然色見於外而病在內是為精氣入臟故當治里五官以辨闕庭必張乃立明堂明堂廣大蕃蔽見外方壁高基引垂居外此言五官諸部皆當詳辨不惟察色於明堂也闕眉間也庭顏也張布列也蕃頰側也蔽耳門也壁牆壁也基骨骼也引垂居外謂明顯開豁也此於五色之外而言其部位之隆厚也五色乃治平博廣大壽中百歲形色皆佳乃為壽具故中百歲治不亂也中宜也堪也見此者刺之必已如是之人者血氣有餘肌肉堅緻故可苦以針若此之人是為血氣充實形色堅固故刺之則病已而可苦以針也然則血氣內虛形色外弱者其不宜用針可知藥餌亦然緻音致密也鼻者肺之官也目者肝之官也口唇者脾之官也舌者心之官也耳者腎之官也鼻為肺竅目為肝竅口唇為脾竅舌為心竅耳為腎竅官者職守之謂所以司呼吸辨顏色納水穀別滋味聽聲音者也五臟五竅各司其職人身乃治故曰五官以候五臟故肺病者喘息鼻張肝病者眥青脾病者唇黃心病者舌卷短以赤腎病者顴與顏黑此雖以五臟之色見於五臟之官為言然各部有互見者又當因其理而變通之五官不辨闕庭不張小其明堂蕃蔽不見又埤其牆牆下無基垂角去外如是者雖平常殆況加疾哉若此者部位骨骼既無所善則脈色雖平不免於殆尚何疾之能堪哉是以人之壽夭尤當以骨骼為主埤卑同腑臟之在中也各以次舍左右上下各如其度也腑臟雖居於腹中各有左右上下之次舍而面部所應之色亦如其度昔黃帝告於雷公曰明堂者鼻也闕者眉間也庭者顏也蕃者頰側也蔽者耳門也其間欲方大去之十步皆見於外如是者壽必中百歲顏為額角即天庭也蕃蔽也屏蔽四旁即藩籬之義十步之外而骨骼明顯其方大豐隆可知故為壽堪百歲蓋五色之決不獨於明堂也明堂骨高以起平以直五臟次於中央六腑挾其兩側首面上於闕庭王宮在於下極五臟安於胸中真色以致病色不見明堂潤澤以清五官惡得無辨乎肺心肝脾之候皆在鼻中六腑之候皆在四旁故一曰次於中央一曰挾其兩側下極居兩目之中心之部也心為君主故曰王宮惟五臟和平而安於胸中則正色自致病色不見明堂必然清潤此五官之所以有辨也惡音烏五色之見也各出其色部部骨陷者必不免於病矣其色部乘襲者雖病甚不死矣五色之見各有其部惟其部骨弱陷之處然後易於受邪而不免於病矣若其色部雖有變見但得彼此生王互相乘襲而無克賊之見者雖病甚不死青黑為痛黃赤為熱白為寒是為五官官五色言五色之所主也病之益甚與其方衰外內皆在焉切其脈口滑小緊以沉者病益甚在中人迎氣大緊以浮者其病益甚在外益甚言進方衰言退也外內皆在表裡俱當察也脈口者太陰臟脈也故曰在中而主五臟人迎者陽明腑脈也故曰在外而主六腑脈口滑小緊沉者陰分之邪甚也人迎大緊以浮者陽分之邪盛也故病皆益甚其脈口浮滑者病日進人迎沉而滑者病日損脈口為陰浮滑者以陽加陰故病日進人迎為陽沉滑者陽邪漸退故病日損其脈口滑以沉者病日進在內其人迎脈滑盛以浮者其病日進在外脈口人迎經分表裡故其沉滑浮滑而病日進者有在內在外之辨也脈之浮沉及人迎與寸口氣大小等者病難已人迎寸口之脈其浮沉大小相等者非偏於陰則偏於陽故病難已春夏人迎當微大秋冬寸口當微大如是者平人等則病象也病之在臟沉而大者易已小為逆病在腑浮而大者其病易已病在臟者在六陰也陰本當沉而大為有神有神者陰氣充也故易已若沉而細小則真陰衰而為逆矣病在腑者在六陽也陽病得陽脈者為順故浮而大者病易已若或浮小亦逆候也人迎盛堅者傷於寒氣口盛堅者傷於食人迎主表脈盛而堅者寒傷三陽也是為外感氣口主裡脈甚而堅者食傷三陰也是為內傷此古有之法也今則止用寸口診法雖失表裡之義然亦可以行之不必一唱百和群吠叔和以色言病之間甚其色粗以明沉夭者為盛其色上行者病益其其色下行如雲徹散者病方已間甚輕重也粗顯也言色有顯而明若沉夭者其病必甚也上行者濁氣方升而色日增日增者病日重下行者滯氣將散而色漸退漸退者病將已五色各有臟部有外部有內部色從外部走內部者其病從外走內其色從內走外者其病從內走外病生於內者先治其陰後治其陽反者益甚病生於陽者先治其外後治其內反者益甚各有臟部統言色臟所屬各有分部也外部言六腑之表六腑挾其兩側也內部言五臟之裡五臟次於中央也故凡病色先起外部而後及內部者其病自表入里是外為本而內為標故當先治其外後治其內若先起內部而後及外部者其病自里出表是陰為本而陽為標故當先治其陰後治其陽若反之者皆為誤治病必益甚矣其脈滑大以代而長者病從外來目有所見志有所惡此陽氣之並也可變而已滑大以代而長者陽邪之脈也陽邪自外傳裡故令人目有妄見志有所惡此陽並於陰而然治之之法或陰或陽或先或後擇其要者先之可變易而已也風者百病之始厥逆者寒濕之起常候闕中薄澤為風沖濁為痹在地為厥此其常也各以其色言其病闕中眉間也風病在陽皮毛受之故色薄而澤痹病在陰肉骨受之故色沖而濁沖深也至如厥逆病起四肢則病在下而色亦見於地地者面之下部也此其常候故可因其色以言病大氣入於臟腑者不病而卒死矣大氣大邪之氣也大邪之入者未有不由元氣大虛而後邪得襲之故致卒死赤色出兩顴大如拇指者病雖小愈必卒死黑色出於庭大如拇指必不病而卒死如拇指者成塊成條聚而不散也此為最凶之色赤者固不佳而黑色為尤甚皆卒死之色也察色以言其時察色以言時謂五色有衰王部位有克賊色藏部位辨察明而時可知也庭者首面也庭者顏也相家謂之天庭天庭最高色見於此者上應首面之疾闕上者咽喉也闕在眉心闕上者眉心之上也其位亦高故應咽喉之疾闕中者肺也闕中眉心也中部之最高者故應肺下極者心也下極者兩目之間相家謂之山根心居肺之下故下極應心直下者肝也下極之下為鼻柱相家謂之年壽肝在心之下故直下應肝肝左者膽也膽附於肝之短葉故肝左應膽其在年壽之左右也下者脾也年壽之下相家謂之準頭是為面王亦曰明堂準頭屬土居面之中央故以應脾也方上者胃也準頭兩旁為方上即迎香之上鼻隧是也相家謂之蘭臺廷尉脾與胃為表裡脾居中而胃居外故方上應胃中央者大腸也中央者面之中央謂迎香之外顴骨之下大腸之應也挾大腸者腎也挾大腸者頰之上也四臟皆一惟腎有兩四臟居腹惟腎附脊故四臟次於中央而腎獨應於兩頰當腎者臍也腎與臍對故當腎之下應臍面王以上者小腸也面王鼻準也小腸為腑應挾兩側故面王之上兩顴之內小腸之應也面王以下者膀胱子處也面王以下者人中也是為膀胱子處之應子處子宮也凡人人中平淺而無髭者多無子是正子處之應以上皆五臟六腑之應也顴者肩也此下復者肢節之應也顴為骨之本而居中部之上故以應肩顴後者臂也臂接乎肩故顴後以應臂臂下者手也手接乎臂也目內眥上者膺乳也目內眥上者闕下兩旁也胸兩旁高處為膺膺乳者應胸前也挾繩而上者背也頰之外曰繩身之後為背故背應於挾繩之上循牙車以下者股也牙車牙床也牙車以下主下部故以應股中央者膝也中央兩牙車之中央也膝以下者脛也當脛以下者足也脛接於膝足接於脛以次而下也巨分者股里也巨分者口旁大文處也股里者股之內側也巨屈者膝臏也巨屈頰下曲骨也膝臏膝蓋骨也此蓋統指膝部而言臏音牝此五臟六腑肢節之部也各有部分有部分用陰和陽用陽和陰當明部分萬舉萬當部分既定陰陽乃明陽勝者陰必衰當助其陰以和之陰勝者陽必衰當助其陽以和之陰陽之用無往不在知其甚衰萬舉萬當矣能別左右是謂大道男女異位故曰陰陽審察澤夭謂之良工陽從左陰從右左右者陰陽之道路也故能別左右是謂大道男女異位者男子左為逆右為從女子右為逆左為從故曰陰陽陰陽既辨又必能察其潤澤枯夭以決善惡之機庶足謂之良工也沉濁為內浮澤為外內主在裡在臟外主在表在腑皆言色也黃赤為風青黑為痛白為寒黃而膏潤為膿赤甚者為血痛甚為攣寒甚為皮不仁凡五色之見於面部者皆可因此而知其病矣不仁麻痹無知也五色各見其部察其浮沉以知淺深察其澤夭以觀成敗察其散摶以知遠近察其上下以知病處浮者病淺沉者病深澤者無傷夭者必敗散者病近摶者病遠摶聚也上者病在上下者病在下摶音團積神於心以知往今故相氣不微不知是非屬意勿去乃知新故神積於心則明故能知已往今來之事相氣不微氣不能隱也不知是非無是非之惑也屬意勿去專而無二也新故即往今之義相去聲色明不粗沉夭為甚不明不澤其病不甚色明不粗者色之明澤不顯而但見沉夭者其病必甚若其雖不明澤而亦無沉夭之色者病必不甚也其色散駒駒然未有聚其病散而氣痛聚未成也稚馬曰駒駒駒然者如駒無定散而不聚之謂故其為病尚散若有痛處因於氣耳非積聚成病也腎乘心心先病腎為應色皆如是水邪剋火腎乘心也腎邪乘心心先病於中而腎色則應於外如以下極而見黑色者是也不惟心腎諸臟皆然凡肝部見肺色肺部見心色腎部見脾色脾部見肝色及六腑之相剋者其色皆如是也男子色在於面王為小腹痛下為卵痛其圜直為莖痛高為本下為首狐疝㿉陰之屬也面王上下為小腸膀胱子處之部故主小腹痛下及卵痛圜直者色垂繞於面王之下也莖陰莖也高為本下為首因色之上下而分莖之本末也凡此者總皆狐疝㿉陰之屬女子色在於面王為膀胱子處之病散為痛摶為聚方圓左右各如其色形其隨而下至骶為淫有潤如膏狀為暴食不潔面王之部與男子同而病與男子異者以其有血海也色散為痛氣滯無形也色摶為聚血凝有積也然其積聚之或方或圓或左或右各如其外色之形見若其色從下行當應至尾骶而為浸淫帶濁有潤如膏之物或暴因飲食即下見不潔蓋兼前後而言也骶音底尻臀之間也左為左右為右其色有邪聚散而不端面色所指者也色見左者病在左色見右者病在右凡色有邪而聚散不端者病之所在也故但察面色所指之處而病可知矣色者青黑赤白黃皆端滿有別鄉別鄉赤者其色亦赤如榆莢在面王為不日色者言正色也正色凡五皆宜端滿端謂無邪滿謂充足有別鄉者言方位時日各有所主之正向也別鄉赤者又言正向之外而有邪色之見也赤如榆莢見於面王非其位也不當見而見者非其時也是為不日不日者失其常度之謂此單舉赤色為喻而五色之謬見者皆可類推矣鄉向同其色上鋭首空上向下鋭下向在左右如法凡邪隨色見各有所向而尖鋭之處即其乘虛所進之方故上鋭者以首面正氣之空虛而邪則乘之上向也下鋭亦然其在左在右皆同此法以五色命臟青為肝赤為心白為肺黃為脾黑為腎肝合筋心合脈肺合皮脾合肉腎合骨也此總結上文而言五色五臟之配合也凡病察脈觀色以此合之五臟之病無遁情矣目赤色者病在心白在肺青在肝黃在脾黑在腎黃色不可名者病在胸中五臟六腑目為之候故目之五色各以其氣而見本臟之病脾應中州胸中者脾肺之部也診目痛赤脈從上下者太陽病從下上者陽明病從外走內者少陽病足太陽經為目上綱故赤脈從上下者為太陽病足陽明經為目下綱故赤脈從下上者為陽明病足少陽經外行於鋭眥之後故從外走內者為少陽病也診寒熱赤脈上下至瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死此邪入陰分而病為寒熱者當反其目以視之中有赤脈形如紅線下貫瞳子因其多少以其知死之遠近也診齲齒痛按其陽之來有過者獨熱在左左熱在右右熱在上上熱在下下熱齲齒齒痛也足陽明入上齒中手陽明入下齒中故按其陽脈之來其脈太過者其經必獨熱而其左右上下亦因其部而可察也齲其雨切診血脈者多赤多熱多青多痛多黑為久痹多赤多黑多青皆見者寒熱血脈者言各部之絡脈也赤黑青皆見者陰陽互勝之色故或寒或熱身痛而色微黃齒垢黃爪甲上黃黃疸也安臥小便黃赤脈小而澀者不嗜食黃疸黃病也疸有陰陽脈小而澀者為陰疸陰疸者脾土弱也故不嗜食嬰兒病其頭毛皆逆上者必死嬰兒漸成水為之本發者腎水之榮頭毛逆上者水不足則發乾焦如草之枯者必徑直而豎也不特既病即無病而頭毛逆上者亦非佳兆耳間青脈起者掣痛耳者少陽膽之經青者厥陰肝之色肝膽本為表裡青主痛肝主筋故為掣痛掣音徹大便赤瓣飧泄脈小者手足寒難已飧泄脈小手足溫泄易已赤瓣者血穢成條成片也赤瓣飧泄火居血分若脈小而手足寒是為相反所以難已若止於飧泄而無赤瓣非火證也脈雖小而手足溫以脾主四肢而脾氣尚和所以易已瓣瓜瓤之類也四時之變寒暑之勝重陰必陽重陽必陰故陰主寒陽主熱寒甚則熱熱甚則寒寒生熱熱生寒皆陰陽之變也故曰冬傷於寒春生疸熱春傷於風夏生後泄腸澼夏傷於暑秋生痎瘧秋傷於濕冬生咳嗽是謂四時之序也陰陽之氣極則必變故寒極則生熱熱極則生寒此天地四時消長更勝之道也疸溫熱之病夫脈之小大滑澀浮沉可以指別得之於手應之於心也五臟之象可以類推象氣象也五臟相音可以意識相形相也音五音也相音皆可意會而識也五色微診可以目察五色者其常色也至於互為生克診有精微目明智圓者可以視察而知也能合脈色可以萬全因脈以知其內因色以察其外脈色明則參合無遺內外明則表裡俱見斯可萬全無失矣赤脈之至也喘而堅診曰有積氣在中時害於食名曰心痹得之外疾思慮而心虛故邪從之此即所以合脈色也赤者心之色脈喘而堅者謂急甚如喘而堅強也心臟居高病則脈為喘狀故於心肺二臟獨有之喘為心氣不足堅為病氣有餘心脈起於心胸之中故積氣在中時害於食積為病氣積聚痹為臟氣不行外疾外邪也思慮心虛故外邪從而居之白脈之至也喘而浮上虛下實驚有積氣在胸中喘而虛名曰肺痹寒熱得之醉而使內也白者肺色見也脈喘而浮者火乘金而病在肺也喘為氣不足浮為肺陰虛肺虛於上則氣不行而積於下故上虛則為驚下實則為積氣在胸中喘而且虛病為肺痹者肺氣不行而失其治節也寒熱者金火相爭金勝則寒火勝則熱也其因醉以入房則火必更熾水必更虧腎虛盜及母氣故肺病若是矣青脈之至也長而左右彈有積氣在心下支胠名曰肝痹得之寒濕與疝同法腰痛足清頭痛青者肝色見也長而左右彈言兩手俱長而弦強也彈搏擊之義此以肝邪有餘故氣積心下及於支胠因成肝痹然得之寒濕而積於心下支胠者則為肝痹積於小腹前陰者則為疝氣總屬厥陰之寒邪故云與疝同法肝脈起於足大指與督脈會於巔故病必腰痛足冷頭痛也黃脈之至也大而虛有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風黃者脾色見也脈大為邪氣甚虛為中氣虛中虛則脾不能運故有積氣在腹中脾虛則木乘其弱水無所畏而肝腎之氣上逆是為厥氣且脾肝腎三經皆結於陰器故名曰厥疝而男女無異也四肢皆稟氣於脾疾使之則勞傷脾氣而汗易泄汗泄則表虛而風邪客之故為是病黑脈之至也上堅而大有積氣在小腹與陰名曰腎痹得之沐浴清水而臥黑者腎色見也上言尺之上即尺外以候腎也腎主下焦脈堅而且大者腎邪有餘故主積氣在小腹與陰處因成腎痹其得於沐浴清水而臥者以寒濕內侵而氣歸同類故病在下焦而邪居於腎凡相五色之奇脈面黃目青面黃目赤面黃目白面黃目黑者皆不死也凡此色脈之不死者皆兼面黃蓋五行以土為本而胃氣之猶在也面青目赤面赤目白面青目黑面黑目白面赤目青皆死也此脈色之皆死者以無黃色無黃色則胃氣已絶故死上言合脈色以圖萬全此言五色亦可以決死生也經有常色絡無常變心赤肺白肝青脾黃腎黑皆亦應其經脈之色也五臟合於五行故五色各有所主而經脈之色亦與本臟相應是謂經之常色但言五臟而不及六腑者以五臟為主言臟則腑在其中矣凡三陰三陽十二經之常色皆當以此類推陰絡之色應其經陽絡之色變無常隨四時而行也此言絡有陰陽而色與經應亦有同異也經脈為里支而橫者為絡絡之別者為孫故合經絡而言則經在裡為陰絡在外為陽若單以絡脈為言則又有大絡孫絡在內在外之別深而在內者是為陰絡陰絡近經色則應之故分五行以配五臟而色有常也淺而在外者是為陽絡陽絡浮顯色不應經故隨四時之氣以為進退而變無常也陽絡傷則血外溢陰絡傷則血內溢其義可知矣寒多則凝泣凝泣則青黑熱多則淖澤淖澤則黃赤此即陽絡之變色也泣澀同淖濡潤也此皆常色謂之無病五色具見者謂之寒熱常色者無病之色也若五色具見則陰陽變亂失其常矣故為往來寒熱之病病有久暴徵其脈小色不奪者新病也徵驗也脈小者邪氣不盛色不奪者形盛未傷故為新病徵其脈不奪其色奪者此久病也病久而經氣不奪者有之未有病久而形色不變者故脈不奪而色奪者為久病徵其脈與五色俱奪者此久病也表裡俱傷也徵其脈與五色俱不奪者新病也表裡俱無恙也肝與腎脈並至其色蒼赤當病毀傷不見血已見血濕若中水也肝脈弦肝主筋腎脈沉腎主骨蒼者肝腎之色青而黑也赤者心火之色心主血也脈見弦沉而色蒼赤者筋骨血脈俱病故必當為毀傷也凡毀傷筋骨者無論不見血已見血其血必凝其經必滯氣血凝滯形必腫滿故如濕氣在經而同於中水之狀此舉不內外因之色脈與分久暴之色脈言之欲以開群蒙也故色見青如草滋者死如草滋者純於青而色深也此以土敗木賊全失紅黃之氣故死黃如枳實者死黃黑不澤也黑如炲者死炲煙煤也炲音臺赤如衃血者死衃血死血也赤紫而黑衃鋪杯切白如枯骨者死枯槁無神也此五色之見死也臟氣敗於中則神色夭於外夭必死也青如翠羽者生赤如雞冠者生黃如蟹腹者生白如豕膏者生黑如烏羽者生此五色之見生也此皆五色之明潤光彩者故見之者生生於心如以縞裹朱生於肺如以縞裹紅生於肝如以縞裹紺生於脾如以縞裹栝蔞實生於腎如以縞裹紫此五臟所生之外榮也生生氣也言五臟所生之正色也縞素帛也以縞裹五物者謂外皆白淨而五色隱然內見也朱與紅皆赤朱言其深紅言其淺也紺青而含赤也凡此皆五臟所生之正色蓋以氣足於中而後色榮於外者若此前言精明五色者氣之華也乃望其華以辨其色此言色見以下以別生死乃見其色以求其華耳似同而不同也當並參之紺高暗切經絡上第五人始生先成精精成而腦髓生骨為幹脈為營筋為剛肉為牆皮膚堅而毛髮長谷入於胃脈道以通血氣乃行所以經脈能決死生虛實百病不可不明肺手太陰之脈起於中焦十二經脈所屬肺為手太陰經也中焦當胃中脘在臍上四寸之分手之三陰從臟走手故手太陰脈發於此凡後手三陰經皆自內而出也按十二經者即營氣也營行脈中而序必始於肺經者以脈氣流經經氣歸於肺肺朝百脈以行陰陽而五臟六腑皆以受氣故十二經以肺經為首循序相傳盡於足厥陰肝經而又傳於肺終而復始是為一周下絡大腸絡聯絡也當任脈水分穴之分肺脈絡於大腸以肺與大腸為表裡也按十二經相通各有表裡凡在本經者皆曰屬以此通彼者皆曰絡故在手太陰則曰屬肺絡大腸在手陽明則曰屬大腸絡肺彼此互更皆以本經為主也下文仿此還循胃口還復也循巡繞也自大腸而上復循胃口上膈屬肺膈膈膜也人有膈膜居心肺之下前齊鳩尾後齊十一椎周圍相著所以遮膈濁氣不使上熏心肺也屬者所部之謂從肺系橫出腋下肺系喉嚨也喉以通氣下連於肺膊之下脅之上曰腋腋下即中府之旁下循臑內膊之內側上至腋下至肘嫩耎白肉曰臑天府俠白之次也臑音儒又奴刀切行少陰心主之前少陰心經也心主手厥陰經也手之三陰太陰在前厥陰在中少陰在後也下肘中循臂內臂膊之交曰肘中穴名尺澤肘下曰臂內內側也行孔最列缺經渠之次上骨下廉入寸口骨掌後高骨也下廉骨下側也寸口關前動脈也即太淵穴處上魚循魚際手腕之前大指本節之間其肥肉隆起形如魚者統謂之魚寸口之前魚之後曰魚際穴出大指之端端指尖也即少商穴手太陰肺經止於此其支者從腕後直出次指內廉出其端支者如木之有枝此以正經之外而復有旁通之絡也臂掌之交曰腕此本經別絡從腕後上側列缺穴直出次指之端交商陽穴而接乎手陽明經也大腸手陽明之脈起於大指次指之端大腸為手陽明經也大指次指即食指之端也穴名商陽手之三陽從手走頭故手陽明脈發於此凡後手三陽經皆然循指上廉出合谷兩骨之間上廉上側也凡經脈陽行於外陰行於內後諸經皆同循指上廉二間三間也合谷穴名兩骨即大指次指後歧骨間也俗名虎口上入兩筋之中腕中上側兩筋陷中陽溪穴也循臂上廉入肘外廉循陽溪等穴以上曲池也上臑外前廉上肩出髃骨之前廉上臑外前廉行肘髎五里臂臑上肩端骨罅為髃骨以上肩髃巨骨也髃隅同上出於柱骨之會上肩背之上頸項之根為天柱骨六陽皆會於督脈之大椎是為會上下入缺盆絡肺下膈屬大腸自大椎而前入足陽明之缺盆絡於肺中復下膈當臍旁天樞之分屬於大腸與肺相為表裡也其支者從缺盆上頸貫頰入下齒中耳下曲處曰頰頸中之穴天鼎扶突也還出挾口交人中左之右右之左上挾鼻孔人中即督脈之水溝穴由人中而左右互交上挾鼻孔者自禾髎以交於迎香穴也手陽明經止於此乃自山根交承泣穴而接乎足陽陰經也胃足陽明之脈起於鼻之交頞中胃為足陽明經也頞鼻莖也亦曰山根交頞其脈左右互交也足之三陽從頭走足故足陽明脈發於此凡後足三陽經皆然頞音遏旁納太陽之脈納入也足太陽起於目內眥睛明穴與頞相近陽明由此下行故入之也下循鼻外入上齒中鼻外即承泣四白巨髎之分還出挾口環唇下交承漿環繞也承漿任脈穴卻循頤後下廉出大迎腮下為頜頜中為頤由地倉以下大迎也循頰車上耳前過客主人循髮際至額顱頰車本經穴在耳下上耳前下關也客主人足少陽經穴在耳前循髮際以上頭維至額顱會於督脈之神庭額顱髮際前也其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾人迎缺盆俱本經穴屬胃謂本經之所屬也絡脾胃與脾為表裡也此支自缺盆入內下膈當上脘中脘之分屬胃絡脾其直者從缺盆下乳內廉直者直下而外行也從缺盆下行氣戶等穴以至乳中乳根也下挾臍天樞等穴也入氣街中自外陵等穴下入氣街即氣衝也在毛際兩旁鼠鼷上一寸其支者起於胃口下循腹裡下至氣街中而合胃口胃之下口當下脘之分難經謂之幽門者是也循腹裡過足少陰肓俞之外此即上文支者之脈由胃下行而與直者復合於氣街之中也以下髀關抵伏兔下膝臏中下循脛外廉下足跗入中指內間髀股也抵至也髀關伏兔皆膝上穴名自此由陰市諸穴以下膝蓋曰臏胻骨曰脛足面曰跗此三者即犢鼻巨虛衝陽等穴之次乃循內庭入中指內間而出厲兌足陽明經止於此脛形敬切跗附孚二音其支者下廉三寸而別下入中指外間其支者別跗上入大指間出其端廉上廉也下廉三寸即豐隆穴是為陽明別絡故下入中指外間又其支者自跗上衝陽穴次別行入大指間斜出足厥陰行間之次循大指出其端而接乎足太陰經也脾足太陰之脈起於大指之端脾為足太陰經也起於足大指端隱白穴足之三陰從足走腹故足太陰脈發於此凡後足三陰經皆然循指內側白肉際過核骨後上內踝前廉循指內側白肉際行大都太白等穴核骨即大指本節後內側圓骨也踝北人所謂孤拐也核骨惟一踝骨則有內外之分上踹內循脛骨後交出厥陰之前踹足肚也亦名腓腸自漏谷上行交出厥陰之前即地機陰陵泉也踹腨通上膝股內前廉股大腿也一曰髀內為股前廉上側也當血海箕門之次入腹屬脾絡胃自衝門穴入腹內行脾與胃為表裡故於中脘下脘之分屬脾絡胃也上膈挾咽連舌本散舌下咽以咽物居喉之後自胃脘上行至此連舌本散舌下而終本根也其支者復從胃別上膈注心中足太陰外行者由腹之四行上府舍腹結等穴散於胸中而止於大包其內行而支者自胃脘別上膈注心中而接乎手少陰經也心手少陰之脈起於心中心為手少陰經故脈發於心中出屬心系心當五椎之下其繫有五上系連肺肺下繫心心下三系連脾肝腎故心通五臟之氣所以為之主也下膈絡小腸心與小腸為表裡故下膈當臍上二寸下脘之分絡小腸也其支者從心系上挾咽系目系支者從心系出任脈之外上行挾咽系目系以合於內眥其直者復從心系卻上肺下出腋下直者經之正脈也此自前心系復上肺由足少陽淵腋之次出腋下上行極泉穴手少陰經行於外者始此下循臑內後廉行太陰心主之後臑內後廉青靈穴也手之三陰少陰居太陰厥陰之後下肘內循臂內後廉少海靈道等穴也抵掌後鋭骨之端手腕下踝為鋭骨神門穴也入掌內後廉循小指之內出其端少府少衝也手少陰經止於此乃交小指外側而接乎手太陽經也心為君尊於他臟故其交經授受不假支別小腸手太陽之脈起於小指之端小腸為手太陽經也起於小指外側端少澤穴循手外側上腕出踝中前谷後溪腕骨等穴也直上循臂骨下廉出肘內側兩筋之間循臂骨下廉陽谷等穴出肘內側兩骨尖陷中小海穴也此處捺之應於小指之上上循臑外後廉行手陽明少陽之外出肩解繞肩胛交肩上肩後骨縫曰肩解即肩貞穴也肩胛臑腧天宗等處也肩上秉風曲垣等穴也左右交於兩肩之上會於督脈之大椎按脊兩旁為膂膂上兩角為肩解肩解下成片骨為肩胛即肩膊也胛音甲入缺盆絡心自缺盆由胸下行入膻中絡心心與小腸為表裡也循咽下膈抵胃屬小腸自缺盆之下咽下膈抵胃下行當臍上二寸之分屬小腸此本經之行於內者其支者從缺盆循頸上頰至目鋭眥卻入耳中其支行於外者出缺盆循頸中之天窗上頰後之天容由顴髎以入耳中聽宮穴也手太陰經止於此其支者別頰上䪼抵鼻至目內眥斜絡於顴目下為䪼目內角為內眥顴即顴骨下顴髎穴手太陽自此交目內眥而接乎足太陽經也䪼音拙膀胱足太陽之脈起於目內眥膀胱為足太陽經也起於目內眥睛明穴上額交巔由攢竹上額歷曲差五處等穴自絡卻穴左右斜行而交於頂巔之百會其支者從巔至耳上角其支者由百會旁行至耳上角過足少陽之曲鬢率谷天衝浮白竅陰完骨此六穴者皆為足太陽少陽之會其直者從巔入絡腦自百會行通天絡卻玉枕入絡於腦中也還出別下項循肩髆內挾脊抵腰中自腦復出別下項由天柱而下會於督脈之大椎陶道卻循肩髆內分作四行而下言內兩行者挾脊兩旁各相去一寸半自大杼行風門及臟腑諸腧而抵腰中等穴也中行椎骨曰脊臀骨上曰腰入循膂絡腎屬膀胱自腰中入膂絡腎前屬膀胱腎與膀胱為表裡也挾脊兩旁之肉曰膂其支者從腰中下挾脊貫臀入膕中從腰中循髖骨下夾脊歷四髎穴貫臀之會陽下行承扶殷門浮郤委陽入膕之委中也尻旁大肉曰臀膝後曲處曰膕髎音遼其支者從髆內左右別下貫胛挾脊內此支言肩膊內大杼下外兩行也左右貫胛去脊各三寸別行歷附分魄戶膏肓等穴挾脊下行由秩邊而過髀樞也過髀樞循髀外從後廉下合膕中過髀樞會於足少陽之環跳循髀外後廉去承扶一寸五分之間下行復與前之入膕中者相合以下貫踹內出外踝之後循京骨至小指外側貫踹內者由合陽以下承筋承山等穴也出外踝之後崑崙僕參等穴也小指本節後大骨曰京骨小指外側端曰至陰足太陽經穴止此乃交於小指之下而接乎足少陰經也腎足少陰之脈起於小指之下斜走足心腎為足少陰經也起於小指下斜走足心之湧泉穴出於然谷之下循內踝之後別入跟中然谷在內踝前大骨下內踝之後別入跟中即太溪大鐘等穴以上踹內出膕內廉自復溜交信過足太陰之三陰交以上踹內之築賓出膕內廉之陰谷上股內後廉貫脊屬腎絡膀胱上股內後廉結於督脈之長強以貫脊中而後屬於腎前當關元中極之分而絡於膀胱以其相為表裡也或謂由陰谷上股內後廉貫脊會於脊之長強穴還出於前循橫骨大赫氣穴四滿中注肓俞當肓俞之所臍之左右屬腎下臍過關元中極而絡膀胱也其直者從腎上貫肝膈入肺中循喉嚨挾舌本其直行者從肓俞屬腎處上行循商曲石關陰都通谷諸穴貫肝上循幽門上膈歷步廊入肺中循神封靈虛神藏彧中俞府而上循喉嚨並人迎挾舌本而終也因其由脊裡上注心肺而散於胸中故曰衝脈起於氣街並少陰之經挾臍上行至胸中而散又云衝脈足少陰之會也其支者從肺出絡心注胸中其支者自神藏之際從肺絡心注胸中以上俞府諸穴足少陰經止於此而接乎手厥陰經也胸中當兩乳之間亦曰膻中心主手厥陰心包絡之脈起於胸中心主者心之所主也心本手少陰而復有手厥陰者心包絡之經也心者五臟六腑之大主也諸邪之在心者皆在心之包絡包絡者心主之脈也其脈之出入屈折行之疾徐皆如手少陰心主之脈行也君火以明相火以位手厥陰代君火行事以用而言曰手心主以經而言曰心包絡實相火也出屬心包絡下膈歷絡三焦心包絡包心之膜絡也包絡為心主之外衛三焦為臟腑之外衛故為表裡而相絡諸經皆無歷字獨此有之蓋指上中下而言上即膻中中即中脘下即臍下故任脈之陰交穴為三焦募也其支者循胸出脅下腋三寸脅上際為腋腋下三寸天池也手厥陰經穴始此上抵腋下循臑內行太陰少陰之間上抵腋下之天泉循臑內行太陰少陰之間以手之三陰厥陰在中也入肘中下臂行兩筋之間入肘中曲澤也下臂行兩筋之間郤門間使內關大陵也入掌中循中指出其端入掌中勞宮也中指端中衝也手厥陰經止於此其支者別掌中循小指次指出其端小指次指謂小指之次指即無名指也其支者自勞宮別行名指端而接乎手少陽經也三焦手少陽之脈起於小指次指之端三焦手少陽經也起於無名指端關衝穴上出兩指之間即小指次指之間液門中渚穴也循手表腕出臂外兩骨之間手表之腕陽池也臂外兩骨間外關支溝等穴也上貫肘循臑外上肩而交出足少陽之後上貫肘之天井循臑外行手太陽之前手陽明之後歷清冷淵消濼臑會上肩髎過足少陽之肩井自天髎而交出足少陽之後也入缺盆布膻中散絡心包下膈循屬三焦其內行者入缺盆復由足陽明之外下布膻中散絡心包相為表裡乃自上焦下膈循中焦下行並足太陽之正入絡膀胱以約下焦故足太陽經委陽穴為三焦下輔俞也其支者從膻中上出缺盆上項系耳後直上出耳上角以屈下頰至䪼其支行於外者自膻中上行出缺盆循天髎上項會於督脈之大椎循天牖系耳後之翳風瘈脈顱息出耳上角之角孫過足少陽之懸釐頷厭下行耳頰至䪼會於手太陽顴髎之分其支者從耳後入耳中出走耳前過客主人前交頰至目鋭眥此支從耳後翳風入耳中過手太陽之聽宮出走耳前之耳門過足太陽之客主人交頰循和髎上絲竹空至目鋭眥會於瞳子髎穴手少陽經止於此而接乎足少陽經也膽足少陽之脈起於目鋭眥膽為足少陽經也起於目鋭眥瞳子髎穴目之外角曰鋭眥上抵頭角下耳後自目鋭眥由聽會客主人上抵頭角循頷厭下懸顱懸釐從耳上髮際入曲鬢率谷歷手少陽之角孫外折下耳後行天衝浮白竅陰完骨又自完骨外折上行循本神前至陽白復內折上行循臨泣目窗正營承靈腦空由風池而下行也循頸行手少陽之前至肩上卻交出手少陽之後入缺盆自風池循頸過手少陽之天牖行少陽之前下至肩上循肩井復交出手少陽之後過督脈之大椎會於手太陽之秉風而前入於足陽明缺盆之外其支者從耳後入耳中出走耳前至目鋭眥後其支者從耳後顳顬間過手少陽之翳風入耳中過手太陽之聽宮出走耳前復自聽會至目鋭眥後瞳子髎之分其支者別鋭眥下大迎合於手少陽抵於䪼其支者別自目外眥瞳子髎下足陽明大迎之次由手少陽之絲竹和髎而下抵於䪼也下加頰車下頸合缺盆其下於足陽明者合於下關乃自頰車下頸循本經之前與前之入缺盆者相合以下胸中以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其內行者由缺盆下胸當手厥陽天池之分貫膈足厥陰期門之分絡肝本經日月之分屬膽而相為表裡乃循脅裡由足厥陰之章門下行出足陽明之氣街繞毛際合於足厥陰以橫入髀厭中之環跳穴也其直者從缺盆下腋循胸過季脅下合髀厭中其直下而行於外者從缺盆下腋循胸歷淵腋輒筋日月過季脅循京門帶脈等穴下行由居髎入足太陽之上髎中髎下髎下行復與前之入髀厭者相合以下循髀陽出膝外廉下外輔骨之前髀陽髀之外側也輔骨膝下兩旁高骨也由髀陽行太陽陽明之中歷中瀆陽關出膝外廉下外輔骨之前自陽陵泉以下陽交等穴也直下抵絶骨之端下出外踝之前循足跗上入小指次指之間外踝上骨際曰絶骨絶骨之端陽輔穴也下行懸鐘循足面上之丘墟臨泣等穴乃入小指次指之間至竅陰穴足少陽經止於此其支者別跗上入大指之間循大指歧骨內出其端還貫爪甲出三毛足大指次指本節後骨縫為歧骨大指爪甲後二節間為二毛其支者自足跗上別行入大指循歧骨內出大指端還貫入爪甲出三毛而接乎足厥陰經也肝足厥陰之脈起於大指叢毛之際肝為足厥陰經也起於足大指去爪甲橫紋後叢毛際大敦穴叢毛即三毛也上循足跗上廉去內踝一寸足跗上廉行間太衝也內踝前一寸中封也上踝八寸交出太陰之後上膕內廉上踝過足太陰之三陰交歷蠡溝中都復上一寸交出太陰之後上膕內廉至膝關曲泉也循股陰入毛中過陰器股陰內側也循股內之陰包五里陰廉上會於足太陰之衝門府舍入陰毛中之急脈遂左右相交環繞陰器而會於任脈之曲骨抵小腹挾胃屬肝絡膽自陰上入少腹會於任脈之中極關元循章門至期門之所挾胃屬肝下足少陽日月之所絡膽而肝膽相為表裡也上貫膈布脅肋自期門上貫膈行足太陰食竇之外大包之裡散布脅肋上足少陽淵液手太陰雲門之下足厥陰經穴止於此循喉嚨之後上入頏顙連目系上出額與督脈會於巔頏顙咽顙也目內深處為目系其內行而上者自脅肋間由足陽明人迎之外循喉嚨之後入頏顙行足陽明大迎地倉四白之外內連目系上出足少陽陽白之外臨泣之裡與督脈相會於頂巔之百會其支者從目系下頰裡環唇內此支者從前目系之分下行任脈之外本經之裡下頰裡交環於口唇之內其支者復從肝別貫膈上注肺又其支者從前期門屬肝所行足太陰食竇之外本經之裡別貫膈上注於肺下行至中焦挾中院之分復接於手太陰肺經以盡十二經之一周終而復始也十二經脈者人之所以生病之所以成人之所以治病之所以起學之所始工之所止也粗之所易上之所難也經脈者臟腑之枝葉臟腑者經脈之根本凡人之生病之成人之所以治病之所以起莫不由之故初學者必始於此工之良者亦止於此而已第粗工忽之謂其尋常易知耳上工難之謂其應變無窮也故將十二經脈上下離合內外出入之道復詳明之足太陽之正別入於膕中其一道下尻五寸別入於肛屬於膀胱散之腎循膂當心入散直者從膂上出於項復屬於太陽此為一經也足少陰之正至膕中別走太陽而合上至腎當十四椎出屬帶脈直者系舌本復出於項合於太陽此為一合成以諸陰之別皆為正也此膀胱與腎為表裡故其經脈相為一合也足太陽之正入膕中與少陰合而上行其別一道下尻五寸當承扶之次上入肛門內行腹中屬於膀胱散於腎循膂當心入散上出於項而復屬於本經太陽此內外同為一經也足少陰之正自膕中合於太陽內行上至腎當十四椎旁腎俞之次出屬帶脈其直者上系舌本復出於項合於太陽是為六合之一也然有表必有里有陽必有陰故諸陽之正必成於諸陰之別此皆正脈相為離合非旁通交會之謂也余仿此足少陽之正繞髀入毛際合於厥陰別者入季脅之間循胸裡屬膽散之上肝貫心以上挾咽出頤頷中散於面系目系合少陽於外眥也足厥陽之正別跗上上至毛際合於少陽與別俱行此為二合也此膽肝二經為表裡經脈相為一合也足少陽繞髀陽入毛際與足厥陰合其內行而別者乃自季脅入胸屬膽散之上肝由肝之上系貫心上挾咽自頤頷中出散於面上系目系復合少陽本經於目外眥瞳子髎也足厥陰之正別足跗內行上至陰毛之際合於足少陽與別者俱行上布脅肋是為六合之二也足陽明之正上至髀入於腹裡屬胃散之脾上通於心上循咽出於口上頞䪼還系目合於陽明也足太陰之正上至髀合於陽明與別俱行上結於咽貫舌中此為三合也此胃脾二經表裡相為一合也足陽明上至髀關其內行者由氣街入腹裡屬於胃散於脾上通於心循咽出於口上頞䪼入承泣之次系目系為目下綱以合於陽明本經也足太陰之正上股內合於足陽明與別者俱行上咽貫舌是為六合之三也手太陽之正指地別於肩解入腋走心系小腸也手少陰之正別入於淵腋兩筋之間屬於心上走喉嚨出於面合目內眥此為四合也此小腸與心表裡經脈相為一合也指地者地屬陰居天之內手太陽內行之脈別於肩解入腋走心繫於小腸皆自上而下自外而內故曰指地手少陰之正自腋下三寸足少陽淵腋之次行兩筋之間內屬於心與手太陽入腋走心者合乃上行挾於咽出於面合於目內眥是當與足太陽睛明相會矣此六合之四也手少陽之正指天別於巔入缺盆下走三焦散於胸中也手心主之正別下淵腋三寸入胸中別屬三焦出循喉嚨出耳後合少陽完骨之下此為五合也此三焦心主表裡經脈相為一合也指天者天屬陽運於地之外手少陽之正上別於巔入缺盆下走三焦散於胸中包羅臟腑之外故曰指天手厥陰之正其別而內行者與少陰之脈同自腋下三寸足少陽淵腋之次入胸中屬於三焦乃出循喉嚨行耳後合手足少陽於完骨之下此六合之五也手陽明之正從手循膺乳別於肩髃入柱骨下走大腸屬於肺上循喉嚨出缺盆合於陽明也手太陰之正別入淵腋少陰之前入走肺散之大腸上出缺盆循喉嚨復合陽明此六合也此大腸與肺為表裡經脈相為一合也手陽明之正循胸前膺乳之間其內行者別於肩髃入柱骨由缺盆下走大腸屬於肺其上者循喉嚨復出缺盆而合於陽明本經也手太陰之正其內行者自天府別入淵腋由手少陰心經之前入內走肺散之大腸其上行者出缺盆循喉嚨復合於手陽明經以上共十二經是為六合也十二經筋者足太陽之筋起於足小指上結於踝邪上結於膝足太陽之筋起於足小指爪甲之側即足太陽經脈所止之處至陰穴次也循足跗外側上結於外踝崑崙之分乃邪上跗陽而結於膝膕之分結聚也按十二經脈之外而復有所謂經筋者何也蓋經脈營行表裡故出入臟腑以次相傳經筋連綴百骸維絡周身各有定位雖經筋所行之部多與經脈相同然其所結所盛之處則惟四肢溪谷之間為最以筋會於節也筋屬木其華在爪故十二經筋皆起於四肢指爪之間而後盛於輔骨結於肘腕繫於膝關聯於肌肉上於頸項終於頭面此人身經筋之大略也筋有剛柔剛者所以束骨柔者所以相維亦猶經之有絡綱之有紀故手足項背直行附骨之筋皆堅大而胸腹頭面支別橫絡之筋皆柔細也但手足十二經之筋又各有不同者如手足三陽行於外其筋多剛手足三陰行於內其筋多柔皆肝之所生而經脈經筋之所以異也其下循足外踝結於踵上循跟結於膕其下足跗之下也踵即足跟之突出者跟即踵上之硬筋處也乃僕參申脈之分結於膕委中也其別者結於踹外上膕中內廉與膕中並此即大筋之旁出者別為柔耎短筋亦猶木之有枝也後言別者支者仿此此支自外踝別行由足踹肚之下尖處行少陽之後結於踹之外側絡穴飛陽之分乃上膕內廉合大筋於委中而一之也上結於臀尾骶骨旁會陽之分也上挾脊上項挾脊背分左右上項會於督脈之陶道大椎此皆附脊之剛筋也其支者別入結於舌本其支者自項別入內行與手少陽之筋結於舌本散於舌下自此以上皆柔耎之筋而散於頭面其直者結於枕骨上頭下顏給於鼻其直者自項而上與足少陰之筋合於腦後枕骨間由是而上過於頭前下於顏以結於鼻下之兩旁也額上曰顏其支者為目上網下給於頄網綱維也所以約束目睫司開闔者也目下曰頄即顴也此支自通頂入腦者下屬目本散於目上為目上網下行者結於頄與足少陽之筋合頄音求其支者從腋後外廉結於肩髃又其支者從挾脊循腋後外廉行足少陽之後上至肩會手陽明之筋結於肩髃其支者入腋下上出缺盆上結於完骨此支後行者從腋後走腋下向前邪出陽明之缺盆乃從耳後直上會手太陽足少陽之筋結於完骨完骨耳後高骨也其支者出缺盆斜上出於頄此支前行者同前缺盆之筋岐出別上頤頷斜行出於頄與前之下結於頄者相合也足少陽之筋起於小指次指上結外踝上循脛外廉結於膝外廉小指次指即第四指竅陰之次也外踝丘墟之次脛外廉外丘陽交之次膝外廉陽陵泉陽關之次此皆剛筋也其支者別起外輔骨上走髀前者結於伏兔之上後者結於尻膝下兩旁突出之骨曰輔骨膝上六寸起肉曰伏兔尾骶骨曰尻此支自外輔骨上走於髀分為二歧前結於陽明之伏兔後結於督脈之尻至此剛柔相制所以聯臀膝而運樞機也其直者上乘䏚季脅上走腋前廉繫於膺乳結於缺盆季脅下兩旁耎處曰䏚胸上兩旁高處曰膺此直者自外輔骨走髀由髀樞上行乘䏚循季脅上走腋當手太陰之下出腋前廉橫繫於胸乳之分上結於缺盆與手太陰之筋相合皆剛筋也䏚少也蓋其處少骨之義直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於頄此直者自上走腋處直上出腋貫於缺盆與上之結於缺盆者相同乃行足太陽經筋之前循耳上額角交太陽之筋於巔上復從足陽明頭維之分走耳前下腮頷復上結於頄支者結於目眥為外維此支者從顴上斜趨結於目外眥而為目之外維凡人能左右盼視者正以此筋為之伸縮也足陽明之筋起於中三指結於跗上斜外上加於輔骨上結於膝外廉直上結於髀樞上循脅屬脊中三指即足之中指厲兌之旁也結於跗上衝陽之次乃從足面斜行出太陰少陽兩筋之間上輔骨結於膝之外廉直上髀樞行少陽之前循脅向後內屬於脊其直者上循骭結於膝其支者結於外輔骨合少陽骭足脛骨也其直者自跗循骭結於膝下外廉三里之次以上膝臏中其支者自前跗上斜外上行結於外輔骨陽陵泉之分與少陽相合骭音干其直者上循伏兔上結於髀聚於陰器上腹而布此直者由膝臏直上循伏兔髀關之分結於髀中乃上行聚於陰器陰陽總宗筋之會會於氣街而陽明為之長也乃自橫骨之分左右夾行循天樞關門等穴而上布於腹此上至頸皆剛筋也至缺盆而結上頸上挾口合於頄下結於鼻上合於太陽太陽為目上網陽明為目下網自缺盆上頸中人迎穴乃循頤頰上挾口吻與陽蹺會於地倉上合於顴髎下結於鼻旁復上睛明穴合於足太陽太陽細筋散於目上故為目上網陽明細筋散於目下故為目下網其支者從頰結於耳前其支者自頤頰間上結耳前會於足少陽之上關頷厭上至頭維而終也足太陰之筋起於大指之端內側上結於內踝大指之端內側隱白也循核骨而上結於內踝下商丘之次其直者結於膝內輔骨上循陰股結於髀聚於陰器此自內踝直上結於膝內輔骨陰陵泉之次股之內側曰陰股結於髀箕門之次也乃上橫骨兩端與足厥陰會於衝門橫繞曲骨並足少陰陽明之筋而聚於陰器者皆剛筋也上腹結於臍循腹裡結於肋散於胸中其內者著於脊其前行者自陰器上腹會手少陰之筋結於臍循腹裡由大橫腹哀之次結於肋乃散為柔細之筋上行布於胸中胸鄉大包之次其內行者由陰器宗筋之間並陽明少陰之筋而上著於脊足少陰之筋起於小指之下並足太陰之筋斜走內踝之下結於踵與太陽之筋合而上結於內輔之下足少陰之筋起小指下斜趨足心又斜趨內側上然谷並足太陰商丘之次走內踝之下結於跟踵之間與太陽之筋合由踵內側上行結於內輔骨下陰谷之次並太陰之筋而上循陰股結於陰器自內輔並太陰之筋上循陰股上橫骨與太陰厥陰陽明之筋合而結於陰器皆剛筋也循脊內挾膂上至項結於枕骨與足太陽之筋合自陰器內行由子宮上系腎間並衝脈循脊兩旁挾膂上至項與足太陽之筋合結於枕骨內屬髓海足厥陰之筋起於大指之上上結於內踝之前大指上三毛際大敦次也行跗上與足太陰之筋並行結於內踝前中封之次上循脛上結內輔之下上循陰股結於陰器絡諸筋由內踝上足脛循三陰交之分上行並足少陰之筋上結於內輔骨下曲泉之次復並太陰之筋上循陰股中五里陰廉之分上急脈而結於陰器陰器者合太陰厥陰陽明少陰之筋以及沖任督之脈皆聚於此故曰宗筋厥陰屬肝肝主筋故絡諸筋而一之以成健運之用手太陽之筋起於小指之上結於腕上循臂內廉結於肘內鋭骨之後彈之應小指之上入結於腋下手小指之上外側少澤穴也上行結於手腕外側腕骨陽谷之次上循臂內側結於肘下鋭骨之後小海之次但於肘尖下兩骨罅中彈之其痠麻則上應於小指也又由肘上臑外廉入結於後腋之下此皆剛筋也其支者後走腋後廉上繞肩胛循頸出走太陽之前結於耳後完骨其支者自腋下與足太陽之筋合走腋後廉上繞肩胛行肩外俞肩中俞循頸中天窗之分出走太陽經筋自缺盆出者之前同上結於耳後完骨之次也其支者入耳中直者出耳上下結於頷上屬目外眥此支者自頸上曲牙入耳中聽宮之分其直者上行出耳上會於手少陽角孫之次其前而下者循頤結於頷與手陽明之筋合其前而上者屬目外眥瞳子髎之次與手足少陽之筋合也手少陽之筋起於小指次指之端結於腕中循臂結於肘上繞臑外廉上肩走頸合手太陽小指次指上端無名指關衝之次也上結於手腕之陽池循臂外關支溝之次出臂上兩骨間結於肘自肘上臑外廉由臑會行太陽之裡陽明之外上肩髎走頸中天牖之分與手太陽之筋合此皆剛筋也其支者當曲頰入系舌本其支者自頸中當曲頰下入系舌本與足太陽之筋合其支者上曲牙循耳前屬目外眥上乘頷結於角又支者自頰行曲牙會足陽明之筋循耳前上行與手太陽足少陽之筋屈曲交綰而會於耳上之角孫乃屬目外眥而復會於瞳子髎之次頷當作額蓋此筋自耳前行外眥與三陽交會上出兩額之左右以結於額之上角也手陽明之筋起於大指次指之端結於腕上循臂上結於肘外上臑結於髃大指次指之端食指尖商陽之次也歷合谷結於腕上陽溪之次循臂上廉又結於肘外肘髎之次乃上臑會與足太陽之筋合結於肩髃此皆剛筋也其支者繞肩胛挾脊此支自肩髃屈曲後行繞肩胛與手足太陽之筋合而挾於脊直者從肩髃上頸此直者自肩髃行巨骨上頸中天鼎扶突之次其支者上頰結於頄此支者自頸上頰入下齒中上結於手太陽顴髎之分直者上出手太陽之前上左角絡頭下右頷此直者自頸出手太陽天窗天容之前行耳前上額左角絡頭以下右頷此舉左而言則右在其中亦如經脈之左之右右之左也故右行者亦上額右角交絡於頭下左頷以合於太陽少陽之筋手太陰之筋起於大指之上循指上行結於魚後行寸口外側手大指上少商之次也魚後魚際也寸口外側即列缺之次上循臂結肘中上臑內廉入腋下上循臂結於肘中尺澤之次上臑內廉天府之次乃橫入腋下與手少陰之筋合此上皆剛筋也出缺盆結肩前髃此自腋下上出缺盆行肩上三陽之前而結於肩之前髃也上結缺盆下結胸裡散貫賁合賁下抵季脅此上行者自腋而上並足少陽之筋上結於缺盆下行者自腋入胸結於胸裡散貫於胃上口賁門之分與手厥陰之筋合下行抵季脅與足少陽厥陰之筋合也賁者膈也胃氣之所出故胃為賁門經絡行於三焦臟腑列於五內其絡脈相貫之處在上焦則聯於咽喉中焦則聯於賁膈下焦則聯於二陰舍此三處無所連屬矣手心主之筋起於中指與太陰之筋並行結於肘內廉中指端中衝之次也循指入掌中至掌後大陵之次並手太陰之經上結於肘內廉曲澤之次上臂陰結腋下下散前後挾脅上臂陰天泉之次由曲腋間並太陰之筋結於腋下當天池之次下行前後布散挾脅聯於手太陰足少陽之筋此經自掌至腋皆剛筋也其支者入腋散胸中結於臂此支者自天池之分入腋內散於胸中臂當作賁蓋此支並太陰之筋入散胸中故同結於賁也手少陰之筋起於小指之內側結於鋭骨上結肘內廉上入腋交太陰挾乳里小指內側少衝次也結於鋭骨神門次也肘內廉少海次也上入腋極泉之次交手太陰之筋斜絡挾乳內行此經自指至腋皆剛筋也結於胸中循臂下繫於臍自乳里內行結於胸中與三陰之筋合臂亦當作賁蓋心主少陰之筋皆與太陰合於賁而下行也此十二經筋之起止剛柔也不特行於針焫者宜知而挕生行藥者不可不悉也
