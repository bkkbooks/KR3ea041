body:
  text: 卷五疾病第十一五氣五味所入酸入肝辛入肺苦入心鹹入腎甘入脾是謂五入五味各從其類同氣相求也五氣所病心為噫噫噯氣也心痹者嗌乾善噫是皆言噫出於心也又太陰終者善噫善嘔太陰所謂上走心為噫者陰盛而上走於陽明陽明絡屬心故曰上走心為噫也寒氣客於胃厥逆從下上散復出於胃故為噫由此觀之是心脾胃三臟皆有是證蓋由火土之鬱而氣有不得舒伸故為此證噫飽食息也又曰不寤之聲肺為咳肺主氣其屬金邪挾金聲故病為咳肝為語問答之聲曰語語出於肝象木有枝條多委曲也脾為吞脾受五味故為吞象土包容為物所歸也腎為缺為嚏缺呵缺也嚏噴嚏也陽未靜而陰引之故為缺陽欲達而陰發之故為嚏陰盛於下氣化於水所以皆屬乎腎故凡陽盛者不缺下虛者無嚏其由於腎也可知胃為氣逆為噦為恐胃為水穀之海胃有不和則為氣逆噦厄逆也胃中有寒則為噦恐腎之志也胃屬土腎屬水土邪傷腎則為恐故皆涉於胃也大腸小腸為泄大腸為傳道之府小腸為受盛之府小腸之清濁不分則大腸之傳道不固故為泄利下焦溢為水下焦為分注之所氣不化則津液不行故溢於肌肉而為水膀胱不利為癃不約為遺溺膀胱為津液之府其利與不利皆由氣化有邪實膀胱氣不通利而為癃者有腎氣下虛津液不化而為癃者此癃閉之有虛實也若下焦不能約束而為遺溺者以膀胱不固其虛可知蓋三焦為中瀆之府水道之所由出故三焦亦屬膀胱也膽為怒怒為肝志而膽亦然者肝膽相為表裡其氣皆剛而肝取決於膽也是謂五病臟腑各五也五精所並精氣並於心則喜並聚也精氣五臟各有所藏也並於心者火之氣也氣並於心則神有餘故其志為喜喜樂無極則傷魄正以心火實而乘肺金也並於肺則悲氣並於肺則乘肝而為悲肝之虛也悲哀動中則傷魂並於肝則憂氣並於肝則乘脾而為憂脾之虛也憂愁而不解則傷意並於脾則畏氣並於脾則脾實乘腎故為畏恐懼而不解則傷精並於腎則恐氣並於腎而乘心之虛則為恐怵惕思慮則傷神神傷則恐懼自失是謂五並虛而相併者也臟氣有不足則勝氣得相併也五臟所惡心惡熱心本屬火過熱則病故惡熱肺惡寒肺屬金而主皮毛金寒則病故惡寒肝惡風肝屬木其應風感風則傷筋故惡風脾惡濕脾屬土其應濕濕勝則傷肌肉故惡濕腎惡燥腎屬水而藏精燥勝則傷精故惡燥是謂五惡五臟化液心為汗心主血汗則血之餘也肺為涕涕出於鼻肺之竅也肝為淚淚出於目肝之竅也脾為涎涎出於口脾之竅也腎為唾唾生於舌下足少陰腎脈循喉嚨挾舌本也是謂五液五味所禁辛走氣氣病無多食辛辛能散氣也咸走血血病無多食鹹血得咸則凝結不流也苦走骨骨病無多食苦苦性沉降陰也骨屬腎亦陰也骨得苦則沉陰益甚骨重難舉矣故骨病者禁苦苦走骨多食之令人變嘔又苦走血病在血無食苦咸走骨病在骨無食鹹蓋火化苦故走血水化咸故走骨義亦當然也甘走肉肉病無多食甘甘能緩中善生脹滿故肉病者無多食甘甘走肉多食之令人悗心酸走筋筋病無多食酸酸能收縮故病在筋者無多食酸酸走筋多食之令人癃是謂五禁無令多食日嗜而欲食之不可多也必自裁也命曰五裁五病所發陰病發於骨骨屬腎腎者陰中之陰也陽病發於血血屬心心者陽中之陽也陰病發於肉肉屬脾脾者陰中之至陰也陽病發於冬陰勝則陽病也陰病發於夏陽勝則陰病也是謂五發五邪所亂邪入於陽則狂邪入陽分則為陽邪邪熱熾盛故病為狂陰不勝其陽則脈流薄疾並乃狂邪入於陰則痹邪入陰分則為陰邪陰盛則血脈凝澀不通故為病痹搏陽則為癲疾搏擊也邪搏於陽則陽氣受傷故為癲疾上文言邪入於陽則狂者邪助其陽陽之實也此言搏陽則為癲疾者邪伐其陽陽之虛也故有為狂為癲之異又邪入於陽轉則為癲疾言轉入陰分故為癲也搏陰則為喑邪搏於陰則陰氣受傷故聲為喑啞陰者五臟之陰也蓋心主舌而手少陰心脈上走喉嚨系舌本手太陰肺脈循喉嚨足太陰脾脈上行結於咽連舌本散舌下足厥陰肝脈循喉嚨之後上入頏顙而筋脈絡於舌本足少陰腎脈循喉嚨系舌本故皆主病喑也又邪入於陰轉則為喑言轉入陽分則氣病故為喑也陽入之陰則靜陽斂則藏故靜陰出之陽則怒陰發則躁故怒是謂五亂五邪所見春得秋脈夏得冬脈長夏得春脈秋得夏脈冬得長夏脈名曰陰出之陽病善怒不治所謂陰者真臟也所謂陽者胃脘之陽也凡此五邪皆以真臟脈見而胃氣絶故曰陰出之陽陰盛陽衰土敗木賊故病當善怒不可治也是謂五邪皆同命死不治此明五脈皆然也五臟所藏心藏神精氣之靈明也兩精相搏謂之神肺藏魄精氣之質地也並精而出入者謂之魄肝藏魂神氣之佐輔也隨神往來者謂之魂脾藏意神有所注者也心有所憶謂之意腎藏志意有專一者也意之所存謂之志是謂五臟所藏五臟所主心主脈心主血脈應火之動而運行周身也肺主皮肺主皮毛應金之堅而保障全體捍禦諸邪也肝主筋肝主筋膜應木之柔而聯絡關節也脾主肉脾主肌肉應土之厚而蓄養萬物也腎主骨腎主骨髓應水石之沉堅為立身之干為萬化之原也是謂五主五勞所傷久視傷血久視則勞神故傷血血者神氣也久臥傷氣久臥則陽氣不伸故傷氣久坐傷肉久坐則血脈滯於四體故傷肉久立傷骨立者之勞在骨也久行傷筋行者之勞在筋也是謂五勞所傷五脈應象肝脈弦耎弱而滑端直以長其應春心脈鉤來盛去衰外實內虛故應夏脾脈代代更代也脾脈和耎分王四季如春當和耎而兼弦夏當和耎而兼鉤秋當和耎而兼毛冬當和耎而兼石隨時相代故曰代非中止之謂肺脈毛脈來浮虛輕如毛羽其應秋腎脈石沉堅如石其應冬是謂五臟之脈情志百病之生於氣也氣之在人和則為正不和則為邪故百病皆生於氣也怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結九氣不同怒則氣逆甚則嘔血及飧泄故氣上矣怒肝志也怒動於肝則氣逆而上氣逼血升故甚則嘔血肝木乘脾故為飧泄肝為陰中之陽氣發於下故氣上矣下乘則飧泄上犯則食而氣逆也喜則氣和志達營衛通利故氣緩矣氣脈和調故志暢達營衛通利故氣徐緩然喜盛則氣於緩而漸至渙散過故喜則氣下又喜樂者神憚散而不藏也悲則心系急肺布葉舉而上焦不通營衛不散熱氣在中故氣消矣悲生於心則心系急並於肺則肺葉舉故精氣並於肺則悲也心肺俱居膈上故為上焦不通肺主氣而行表裡故為營衛不散悲哀傷氣故氣消矣恐則精卻卻則上焦閉閉則氣還還則下焦脹故氣不行矣恐懼傷腎則傷精故致精卻卻者退也精卻則升降不交故上焦閉上焦閉則氣歸於下病為脹滿而氣不行故曰恐則氣下也又曰憂愁者氣閉塞而不行恐懼者神蕩憚而不收寒則腠理閉氣不行故氣收矣腠膚腠也理肉理也寒束於外則玄府閉密陽氣不能宣達故收斂於中而不得散也炅則腠理開營衛通汗大泄故氣泄矣熱則流通故腠理開陽從汗散故氣亦泄驚則心無所倚神無所歸慮無所定故氣亂矣大驚卒恐則神志散失血氣分離陰陽破散故氣亂矣勞則喘息汗出外內皆越故氣耗矣疲勞過度則陽分動於陰分故上奔於肺而為喘外達於表而為汗陽動則散故內外皆越而氣耗矣思則必有所存神有所歸正氣留而不行故氣結矣思之無已則繫戀不釋神留不散故氣結也所謂七情者即五志也五志之外尚餘者三總之曰喜怒思憂恐驚悲畏其目有八不止七也然情雖有八無非出於五臟如心在志為喜肝在志為怒脾在志為思肺在志為憂腎在志為恐此五臟五志之分屬也至若五志有互通為病者如喜本屬心而有曰肺喜樂無極則傷魄是心肺皆主於喜也蓋喜生於陽而心肺皆為陽臟故喜出於心而移於肺所謂多陽者多喜也又若怒本屬肝而有曰膽為怒者以肝膽相為表裡肝氣雖強而取決於膽也有曰血並於上氣並於下心煩惋善怒者以陽為陰勝故病及於心也有曰腎臟怒而不止則傷志有曰邪客於足少陰之絡令人無故善怒者以怒發於陰而侵乎腎也是肝膽心腎四臟皆能病怒所謂多陰者多怒亦曰陰出之陽則怒也又若思本屬脾而此曰思則心有所存神有所歸正氣留而不行故氣結矣蓋心為脾之母母氣不行則病及其子所以心脾皆病于思也又若憂本屬肺而有曰心之變動為憂者有曰心小則易傷以憂者蓋憂則神傷故傷心也有曰精氣並於肝則憂者肝勝而侮脾也有曰脾憂愁而不解則傷意者脾主中氣中氣受抑則生意不伸故鬱而為憂是心肺脾肝四臟皆能病於憂也又若恐本屬腎而有曰恐懼則傷心者神傷則恐也有曰血不足則恐有曰肝虛則恐者以肝為將軍之官肝氣不足則怯而恐也有曰恐則脾氣乘矣以腎虛而脾勝之也有曰胃為氣逆為噦為恐者以陽明土勝亦傷腎也是心腎肝脾胃五臟皆主於恐而恐則氣下也五志互病之辨既詳如此尚有病悲者曰肝悲哀動中則傷魂悲傷於肝也又曰精氣並於肺則悲又曰悲則肺氣乘矣亦金氣傷肝也有曰心虛則悲有曰神不足則悲有曰悲哀太甚則胞絡絶胞絡絶則陽氣內動發則心下崩數溲血者皆悲傷於心也此肝肺心三臟皆病於悲而氣為之消也有病為驚者曰東方色青入通於肝其病發驚駭以肝應東方風木風主震動而連乎膽也有曰陽明所謂甚則厥聞木音則惕然而驚者肝邪乘胃也有曰驚則心無所倚神無所歸者心神失散也此肝膽胃心四臟皆病於驚而氣為之亂也又有病為畏者曰精氣並於脾則畏蓋並於脾則傷於腎畏由恐而生也由此言之是惰志之傷雖五臟各有所屬然求其所由則無不從心而發故曰心怵惕思慮則傷神神傷則恐懼自失憂愁恐懼則傷心悲哀憂愁則心動心動則五臟六腑皆搖可見心為五臟六腑之大主而總統魂魄兼該主意故憂動於心則肺應思動於心則脾應怒動於心則肝應恐動於心則腎應此所以五志惟心所使也設能善養此心而居處安靜無為懼懼無為欣欣宛然從物而不爭與時變化而無我則志意和精神定悔怒不起魂魄不散五臟俱安邪亦安從而奈我哉風天有八風經有五風經經脈也八風八方之風也五風五臟之風也八風發邪以為經風觸五臟邪氣發病八風不得其正則發為邪氣其中於人則入為五經之風特以所傷之異故名亦異耳風自外入則循經而觸於五臟故發病也所謂得四時之勝者春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春所謂四時之勝也五時五氣互有克勝所勝為邪則不勝者受之天之運氣人之臟氣無不皆然東風生於春病在肝俞在頸項上文言四時之勝者能為病此下言邪氣隨時之為病也春氣發榮於上故俞應於頸項南風生於夏病在心俞在胸脅心脈循胸出脅而南方之氣主於前故俞在胸脅西風生於秋病在肺俞在肩背肺居上焦附近肩背故俞應焉北風生於冬病在腎俞在腰股腰為腎之府與股接近故俞應焉中央為土病在脾俞在脊脊居體中故應土也故春氣者病在頭陽氣上升也夏氣者病在臟在臟言心心通夏氣為諸臟之主也秋氣者病在肩背肺之應也冬氣者病在四肢上文北方言其腰股此言在四肢者蓋腰股屬陰四肢氣薄皆易於受寒者也故春善病鼽衄風邪在頭也仲夏善病胸脅胸脅近心也長夏善病洞泄寒中風寒犯脾也秋善病風瘧暑汗不出風寒襲於膚腠也冬善病痹厥寒邪在四肢也故冬不按蹺春不鼽衄按蹺謂按摩肢節以行導引也三冬元氣伏藏在陰當伏藏之時而擾動筋骨則精氣泄越以致春夏秋冬各生其病故冬宜養臟則春時陽氣雖升陰精自固何有鼽衄及如下文之患按蹺且不可則冒寒妄勞益可知矣春不病頸項仲夏不病胸脅長夏不病洞泄寒中秋不病風瘧冬不病痹厥飧泄而汗出也此節五句亦皆由冬不按蹺所得也夫精者身之本也故藏於精者春不病溫人身之精真陰也為元氣之本精耗則陰虛陰虛則陽邪易犯故善病溫此正謂冬不按蹺則精氣伏藏陽不妄升則春無溫病又何慮乎鼽衄頸項等病哉夏暑汗不出者秋風成瘧此平人脈法也夏月伏暑而汗不出則暑邪內蓄以致秋涼悽切之時寒熱相爭乃病風症故曰暑當與汗皆出勿止也以上二節一言冬宜閉藏一言夏宜疏泄冬不藏精則病溫夏不汗泄則病瘧陰陽啓閉時氣宜然此舉冬夏言則春秋在其中矣凡四時之氣順之則安逆之則病是即平人之脈法脈法者言經脈受邪之由然也風之傷人也或為寒熱或為熱中或為寒中或為癘風或為偏枯或為風也其病各異或內至五臟六腑其名不同風之傷人若惟一證及其為變無所不至蓋風雖陽邪氣則寒肅是風之與寒本為同類但有陰陽之辨耳欲辨之者當詳察此下諸篇之義風氣藏於皮膚之間內不得通外不得泄風寒襲於膚腠則玄府閉封故內不得通外不得泄此外感之始也風者善行而數變腠理開則灑然寒閉則熱而悶風性動故善行數變風本陽邪陽主疏泄故令腠理開開則衛氣不固故灑然而寒若寒勝則腠理閉閉則陽氣內壅故煩熱而悶其寒也則衰食飲其熱也則消肌肉故使人怢栗而不能食名曰寒熱寒邪傷陽則胃氣不化故衰少飲食熱邪傷陰則津液枯涸故消瘦肌肉寒熱交作則振寒故為怢栗不食此上三節皆以明風為寒熱也怢音帙風傷與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄則為熱中而目黃人瘦則外泄而寒則為寒中而泣出風氣客於陽明則內入於胃胃居中焦其脈上行繫於目系人肥則腠理致密邪不得泄留為熱中故目黃人瘦則肌膚疏淺風寒犯之陽氣易泄泄則寒中而泣出此明風氣之變或為熱中或為寒中也風氣與太陽俱入行諸脈俞散於分肉之間與衛氣相干其道不利故使肌肉憤䐜而有瘍衛氣有所凝而不行故其肉有不仁也風由太陽經入者自背而下凡五臟六腑之俞皆附焉故邪必行諸脈俞而散於分肉也分肉者衛氣之所行也衛氣晝行於陽自足太陽始風與衛氣相搏俱行於分肉之間故氣道澀而不利不利則風邪搏聚故肌肉腫如憤䐜而為瘡瘍或衛氣不行則體有不仁故凡於痛癢寒熱皆有所弗知也癘者有營氣熱胕其氣不清故使鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰癘風或名曰寒熱風寒客於血脈久留不去則營氣化熱皮膚胕潰氣血不清敗壞為癘故曰脈風成為癘也以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風以季夏戊己傷於邪者為脾風以秋庚辛中於邪者為肺風以冬壬癸中於邪者為腎風此明風邪內至於臟也以四時十干之風分屬五臟非謂春必甲乙而傷肝夏必丙丁而傷心也凡一日之中亦有四時之氣十二時之中亦有十干之分故得春之氣則入肝得甲乙之氣亦入肝當以類求不可拘泥諸氣皆然也曰傷曰中本為互言初無輕重之別後世以中風為重傷風為輕非也風中五臟六腑之俞亦為臟腑之風各入其門戶所中則為偏風風中五臟六腑之俞即十二經臟腑之風也隨俞左右而偏中之則為偏風故有偏病之證風氣循風府而上則為腦風風府督脈穴自風府而上則入腦戶故為腦風風入系頭則為目風眼寒風自腦戶入繫於頭則合於足之太陽太陽之脈起於目內眥風邪入之故為目風則或痛或癢或眼寒而畏風羞澀也飲酒中風則為漏風酒性溫散善開玄府酒後中風則汗漏不止故曰漏風亦謂之酒風入房汗出中風則為內風內耗其精外開腠理風邪乘虛入之故曰內風新沐中風則為首風沐頭面中風也一曰沐浴久風入中則為腸風飧泄久風不散傳變而入於腸胃之中熱則為腸風下血寒則為水穀不化而為飧泄瀉痢外在腠理則為泄風風在腠理則汗泄不止故曰泄風自上文風氣循風府而上至此共七種所以明或為風也故有其病各異其名不同之義故風者百病之長也至其變化乃為他病也無常方然致有風氣也無常方然言變化之多而其致之者則皆因於風氣耳五臟之風形狀不同肺風之狀多汗惡風色皏然白時咳短氣晝日則瘥暮則甚診在眉上其色白多汗者陽受風氣開泄腠理也惡風者傷風惡風也下文諸臟皆同皏然淺白貌金色白也肺主氣在變動為咳風邪迫之故時咳短氣也晝則衛氣在表風亦隨之故覺其瘥暮則衛氣入陰邪應於內故為甚也眉上乃闕庭之間肺之候也故肺病則白色見於此皏普梗切心風之狀多汗惡風焦絶善怒嚇赤色病甚則言不可快診在口其色赤多汗惡鳳義如前焦絶者唇舌焦燥津液干絶也風化木心屬火風薄於心則木火合邪神志潰亂故或為善怒或為驚嚇心主舌病甚則舌本強故言不可快心和則舌能知味故診當在口口者兼唇而言色當赤也肝風之狀多汗惡風善悲色微蒼嗌乾善怒時憎女子診在目下其色青氣並於肺則悲肝病而肺氣乘之故善悲色微蒼肝之色也足厥陰脈循喉嚨之後上入頏顙故嗌乾也善怒肝之志也肝為陰中之陽其脈環陰器強則好色病則妒陰故時憎女子也肝氣通於目故診在目下色當青也脾風之狀多汗惡風身體怠惰四肢不欲動色薄微黃不嗜食診在鼻上其色黃身體怠惰四肢不用者脾主肌肉四肢也色薄微黃土之色也不嗜食脾病不能化也鼻為面王主應脾胃故色診當見於鼻上腎風之狀多汗惡風而痝然浮腫脊痛不能正立其色炲隱曲不利診在肌上其色黑痝然浮慘貌風邪入腎則挾水氣上升故面為浮腫腎脈貫脊屬腎故令脊痛不能正立炲煙炲也隱曲陰道也腎主水故色黑如炲腎開竅於二陰故為隱曲不利肌肉本主於脾今其風水合邪反侮乎土故診在肌上色當黑也胃風之狀頸多汗惡風食飲不下膈塞不通腹善滿失衣則䐜脹食寒則泄診形瘦而腹大胃脈從大迎前下人迎循喉嚨入缺盆故冒風之狀頸必多汗惡風胃主受納水穀而風邪居之故食飲不下隔塞不通胃脈循腹裡故善滿失衣則陽明受寒於外故為䐜脹食寒則胃氣受傷於內故為泄瀉胃者肉其應胃病故形瘦腹者胃所居邪實故腹大此下當詳明六腑之病而止言胃風者以胃為六腑之長即如所謂大腸小腸皆屬於胃之意胃病則腑在其中矣首風之狀頭面多汗惡風當先風一日則病甚頭痛不可以出內至其風日則病少愈首為諸陽之會因沐中風則頭面之皮腠疏故多汗惡風凡患首風者止作無時故凡於風氣將發必先風一日而病甚頭痛以陽邪居於陽分陽性先而速也先至必先衰是以至其風日則疾少愈內為房室之內不可出者畏風寒也漏風之狀或多汗常不可單衣食則汗出甚則身汗喘息惡風衣常濡口乾善渴不能勞事漏風之病因於飲酒中風也風邪挾酒則陽氣散越故多汗陽勝則身熱惡寒故不可以單衣食入於陰長氣於陽故食則汗出甚則陽浮於上故喘息汗出不止故衣濡陽甚陰虛津亡於內所以口乾善渴身不能勞也能耐同泄風之狀多汗汗出泄衣上口中乾上潰其風不能勞事身體盡痛則寒泄風者表不固也上潰者身半以上汗多如潰也口中乾津液涸也液涸則血虛故不能勞而身盡痛汗多則亡陽故令人寒也是故風寒客於人也使人毫毛畢直皮膚閉而為熱當是之時可汗而發也風寒客於皮膚則腠理閉密故毫毛盡直寒束於外則陽氣無所疏泄故鬱而為熱斯時也寒邪初中在表故可取汗而愈或痹不仁腫痛當是之時可湯尉及火灸刺而去之邪在皮毛不亟去之則入於經絡故或為諸痹或為不仁或為腫痛故當用湯尉灸刺之法以去經絡之病弗治病入舍於肺名曰肺痹發咳上氣風寒自表入臟必先於肺蓋肺合皮毛為臟之長也邪入於陰則痹故肺受風寒則病為肺痹而其變動為咳咳為喘息故為上氣弗治肺即傳而行之肝病名曰肝痹一名曰厥脅痛出食當是之時可按若刺耳在肺弗治則肺金乘木故及於肝是為肝痹肝氣善逆故一名曰厥厥在肝經故脅痛厥而犯胃故出食可按若刺則厥逆散而肝邪平矣弗治肝傳之脾病名曰脾風發疸腹中熱煩心出黃當此之時可按可藥可浴在肝弗治則肝木乘土風熱入脾病名脾疸其在內則腹中熱而煩心在外則肌體出黃可按可藥可浴在解其表裡之風熱耳弗治脾傳之腎病名疝瘕少腹冤熱而痛出白一名曰蠱當此之時可按可藥在脾弗治則土邪乘腎病名疝瘕邪聚下焦故小腹冤熱而痛溲出白濁也熱結不散虧蝕真陰如蟲之吸血故亦名曰蠱弗治腎傳之心病筋脈相引而急病名曰瘛當此之時可灸可藥弗治滿十日法當死腎邪剋火則傳於心心主血脈心病則血燥血燥則筋脈相引而急手足攣掣病名曰瘛邪氣至心其病已極此而弗治故不出十日當死腎因傳之心心即復反傳而行之肺發寒熱病當三歲死若腎傳於心未至即死而邪未盡者當復傳於肺而金火交爭金勝則寒火勝則熱故發寒熱三歲死者凡風邪傳遍五臟本當即死其不死者以元氣未敗勢猶在緩故肺復受邪再一歲則肺病及肝二歲則肝病及脾三歲則脾病及腎三陰俱敗故當死也此病之次也此即順傳所勝之次第也然其卒發者不必治於傳病有發於倉卒者隨氣為患不以次而入亦不必依次以治其傳此又於逆傳順傳之外而復有不次相乘者矣或其傳化有不以次不以次入者憂恐悲喜怒令不得以其次故令人有大病矣五志之發無常隨觸而動故生病亦不以為次因而喜大虛則腎氣乘矣喜則氣下故傷心心傷而大虛則腎氣乘之水勝火也怒則肝氣乘矣怒則氣逆於肝而乘於脾木勝土也悲則肺氣乘矣悲則氣並於肺而乘於肝金勝木也恐則脾氣乘也恐傷腎則腎氣虛而脾氣乘之土勝水也憂則心氣乘也憂傷肺則心氣乘之火勝金也此其道也或以有餘而乘彼或以不足而被乘皆乘所不勝此不次之道也故病有五五五二十五變及其傳化傳乘之名也臟惟五而五臟之傳又能各兼五臟則有二十五變傳者以此傳彼乘者以強凌弱故有曰傳曰乘之異名耳有病身熱汗出煩滿煩滿不為汗解不為汗解謂汗後煩熱不散也夫汗出而身熱者風也汗出而煩滿不解者厥也病名風厥巨陽主氣故先受邪少陰與其為表裡也得熱則上從之從之則厥也風為陽邪故汗雖出而身仍熱也巨陽主氣氣言表也表病則里應故少陰得熱則陰分之氣亦從陽而上逆逆則厥矣故名風厥風厥之義不一此言太陽少陰病也又有二陽一陰發病名曰風厥言胃與肝也人之善病風厥漉汗者肉不堅腠理疏也勞風為病法在肺下勞風者因勞傷風也肺下者在內則胸膈之間在外則四椎五椎之間也風受於外則病應於內凡人之因於勞者必氣喘此勞能動肺可知其為病也使人強上冥視邪在肺下則為喘逆故令人強上不能俯首風熱上壅則畏風羞明故令人冥目而視唾出若涕惡風而振寒此為勞風風熱傷陰則津液稠濁故唾出若涕肺主皮毛衛氣受傷故惡風振寒治之以救俯仰風之微甚證在俯仰之間也故當先救之然救此者必先溫肺溫肺則風散風散則俯仰安矣若溫散不愈郁久成熱然後可以清解溫清失宜病必延甚巨陽引精者三日中年者五日不精者七日風邪之病肺者必由足太陽膀胱經風門肺俞等穴內入於臟大腸者水之腑三陽之表也故當引精上行則風從咳散若巨陽氣盛引精速者應在三日中年精衰者應在五日衰年不精者應在七日當咳出青黃痰涕而愈如下文者是即引精之謂咳出青黃涕其狀如膿大如彈丸從口中若鼻中出不出則傷肺傷肺則死也咳涕不出者即今人所謂乾咳嗽也甚至金水虧竭虛勞之候故死腎氣勞竭肺氣內虛陽氣迫之故不出則傷肺而死也有病腎風者面胕痝然壅害於言胕浮腫也痝然失色貌壅重濁不清也腎脈循喉嚨挾舌本病風則腎脈不利故壅害於言語少氣時熱時熱從胸背上至頭汗出手熱口乾苦渴小便黃目下腫腹中鳴身重難以行月事不來煩而不能食不能正偃正偃則咳病名風水腎主水風在腎經即名風水蓋因邪之所湊其氣必虛邪必因虛而入故邪之所湊其氣必虛陰虛者陽必湊之故少氣時熱而汗出也陰虛則無氣故為少氣時熱陽主散而湊於陰分故汗出小便黃者少腹中有熱也少腹有熱邪在陰也故小便黃不能正偃者胃中不和也正偃則咳甚上迫肺也正偃仰臥也腎脈貫肝膈入肺中其支者注胸中腎邪自下而上則胃氣逆而不和故正偃則咳甚而上迫於肺諸有水氣者微腫先見於目下也水者陰也目下亦陰也腹者至陰之所居故水在腹者必使目下腫也目下腫如臥蠶者其腹必有水氣也真氣上逆故口苦舌乾臥不得正偃正偃則咳出清水也諸水病者故不得臥臥則驚驚則咳甚也水邪留滯於臟故為氣逆氣逆則不得正臥故驚而咳甚腹中鳴者病本於胃也薄脾則煩不能食食不能下者胃脘隔也身重難以行者胃脈在足也脾胃屬土所以制水土弱則寒水反侮之故腹中鳴而食不下胃主肌肉其脈行於足水氣居於肉中故身重不能行月事不來者胞脈閉也胞脈者屬心而絡於胞中今氣上迫肺心氣不得下通故月事不來也胞即子宮相火之所在也心主血脈君火之所居也陽氣上下交通故胞胳屬心而絡於胞中以通月事今氣上迫肺則陰邪遏絶陽道心氣不得下行故胞脈閉月事斷矣痝然如有水狀切其脈大緊身無痛者形不瘦不能食食少病生在腎名為腎風如有水狀謂其痝然浮腫似水而實非水也脈大者陰虛也脈緊者寒氣也身無痛形不瘦者邪氣在臟不在表也風挾腎邪反傷脾胃故不能食所以風有內外之分不可不辨八風自外而入必先有發熱惡寒頭疼身痛等證此因於外者顯然有可察也五風由內而病則絶無外證而忽病如風其由內傷可知也如諸暴強直皆屬於風諸風掉眩皆屬於肝之類蓋言有所中者謂之中外感也無所中者謂之屬內傷也外感者邪襲肌表故多陽實內傷者由於酒色勞倦七情口腹致傷臟氣故由陰虛凡臟氣受傷脾敗者病在肢體或多痰飲腎病者或在骨髓或在二陰心病者或在血脈或在神志肺病者或在營衛或在聲音肝病者或在筋爪或在脅肋此五臟之類風未有不由陰虛而然者惟東垣獨得其義曰有中風者卒然昏憒不省人事此非外來風邪乃本氣自病也人年逾四旬氣衰者多有此疾蓋人年四十而陰氣自半故多犯之豈非陰虛之病乎夫人生於陽而根於陰根本衰則人必病根本敗則人必危矣所謂根本者即真陰也人知陰虛惟一而不知陰虛有二如陰中之水虛則病在精血陰中之火虛則病在神氣蓋陽衰則氣去故神志為之昏亂非火虛乎陰虧則形壞故肢體為之廢弛非水虛乎今以神離形壞之症乃不求水火之源而猶以風治鮮不危矣故凡治類風者專宜培補真陰以救根本使陰氣復則風燥自除矣然外感者非曰絶無虛證氣虛則虛也內傷者非曰必無實症有滯則實也治虛者當察其在陰在陽而直補之治實者但察其因痰因氣而暫開之此於內傷外感及虛實攻補之間最當察其有無微甚而酌其治也甚至有元氣素虧猝然仆倒上無痰下失禁瞑目昏沉此厥竭症尤與風邪無涉使非大劑參熟或七年之艾破格挽回又安望其復真氣於將絶之頃哉倘不能察其表裡又不能辨其虛實但以風之為名多用風藥不知風藥皆燥燥復傷陰風藥皆散散復傷氣以內傷作外感以不足為有餘是促人之死也腎風而不能食善驚驚已心氣痿者死風生於腎則反克脾土故不能食腎邪犯心則神氣失守故善驚驚後而心氣痿弱不能復者心腎俱敗水火俱困也故死有病身熱解惰汗出如浴惡風少氣病名酒風此即前所謂漏風也酒性本熱過飲而病故令身熱濕熱傷於筋故懈惰濕熱蒸於膚腠故汗出如浴汗多則衛虛故惡風衛虛則氣泄故少氣因酒得風而病故曰酒風治以澤瀉術各十分麋銜五分合以三指撮為後飯澤瀉味甘淡性微寒能滲利濕熱白朮味甘苦氣溫能補中燥濕止汗麋銜即薇銜一名無心草南人呼為吳風草味苦平微寒主治風濕十分者倍之也五分者減半也合以三指用三指撮合以約其數而為煎劑也飯後藥先故曰後飯賊風邪氣之傷人也令人病焉有不離屏蔽不出室穴之中卒然病者非不離賊風邪氣此皆嘗有所傷於濕氣藏於血脈之中分肉之間久留而不去若有所墮墜惡血在內而不去卒然喜怒不節飲食不適寒溫不時腠理閉而不通凡此者皆所謂故邪也其開而遇風寒則血氣凝結與故邪相襲則為寒痹其開者謂冒露於風寒也故邪在前風寒繼之二者相值則血氣凝結故為寒痹寒氣勝者為痛痹也其有熱則汗出汗出則受風雖不遇賊風邪氣必有因加而發焉其或有因熱汗出而受風者雖非賊風邪氣亦為外感必有因加而發者謂因於故而加以新也新故合邪故病發矣皆病人所自知也其毋所遇邪氣又毋怵惕之所志卒然而病者唯有因鬼神之事乎鬼神之事蓋自古惑之矣非也此亦有故邪留而未發因而志有所惡及有所慕血氣內亂兩氣相搏其所從來者微視之不見聽而不聞故似鬼神故邪者如上文留而未發之謂也惡者惡其所憎也慕者慕其所好也故邪未發而新邪復觸之則五志為邪所憑血氣因而內亂邪正先後兩氣相搏而邪妄之病生矣但病所從來者其機甚微有非聞見可及故人以鬼神為疑不知跡似鬼神而實非鬼神之所為也其祝而已者巫知百病之勝先知其病之所從生者可祝而已也祝者巫咒之屬即祝由也勝者凡百病五行之道必有所以勝之者然必先知其病所從生之由而後以勝法勝之則可移精變氣祛其邪矣病有藥石所不及非此不可者惟先巫知之故可祝而已也然則先巫用祝之妙正不在祝其機在勝之而已祝咒同厥厥之寒熱者何也厥者逆也氣逆則亂故忽為眩僕脫絶是名為厥厥證之起於足者厥發之始也甚至猝倒暴厥忽不知人輕則漸蘇重則即死最為急候後世以手足寒熱為厥又有以腳氣為厥者謬之甚也雖仲景有寒厥熱厥之分亦以手足為言蓋以辨傷寒之寒熱耳非謂厥也暴厥者不知與人言血之與氣並走於上則為大厥厥則暴死氣復反則生不反則死手足少陰太陰足陽明五絡俱竭令人身脈皆重而形無知也其狀若尸曰尸厥若此者豈止於手足寒熱及腳氣之謂耶今人多不知厥症而皆指為中風也夫中風者病多經絡之受傷厥逆者直因精氣之內奪表裡虛實病情當辨名義不正以風治厥醫中之害莫此為甚今將風厥並列便觀學者識之陽氣衰於下則為寒厥陰氣衰於下則為熱厥凡物之生氣必自下而升故陰陽之氣衰於下則寒厥熱厥由此而生也熱厥之為熱也必起於足下者陽氣起於足五趾之表陰脈者集於足下聚於而足心故陽氣勝則足下熱也足趾之端曰表三陽之所起也足下足心三陰之所聚也若陽氣勝則陰氣虛陽乘陰位故熱厥必從足下始凡人病陰虛者所以足心多熱也寒厥之為寒也必從五趾而上於膝者陰氣起於五趾之裡集於膝下而聚於膝上故陰氣勝則從五趾至膝上寒其寒也不從外皆從內也里言內也亦足下也若陰氣勝則陽氣虛陽不勝陰故寒厥必起於五趾而上寒至膝然其寒也非從外入皆由內而生也故凡病陽虛者必手足多寒皆從趾端始寒厥何失而然也厥上將發手足先寒者是為寒厥前陰者宗筋之所聚太陰陽明之所合也前陰者陰器也宗筋者衆筋之所聚也如足之三陰陽明少陽及沖任督蹺筋脈皆聚於此故曰宗筋此獨言太陰陽明之合者重水穀之臟也蓋胃為水穀氣血之海主潤宗筋又陰陽總宗筋之會會於氣街而陽明為之長故特言之以發明下文之義春夏則陽氣多而陰氣少秋冬則陰氣盛而陽氣衰天人之道皆然也此人者質壯以秋冬奪於所用下氣上爭不能復精氣溢下邪氣因從之而上也質壯者有所恃當秋冬陰勝之時必多情欲之用以奪腎中之精氣精虛於下則取足於上故下氣上爭也去者太過生者不及故不能復也精溢則氣去氣去則陽虛陽虛則陰勝為邪故寒氣因而上逆矣氣因於中氣即上文之精氣邪氣也精氣之原本於水谷水穀之化出於脾胃故凡病為寒厥為下氣上爭為精氣溢下皆氣因於中也然水穀在胃命門在腎以精氣言則腎精之化因於胃以火土言則土中陽氣根於命門陰陽顛倒互有所關故上文云厥起於下此云氣因於中正以明上下相因之義陽氣衰不能滲營其經絡陽氣日損陰氣獨在故手足為之寒也陽氣者即陽明胃氣也四肢皆稟氣於胃故陽虛於中則不能滲營經絡而手足寒也熱厥何如而然也厥之將發手足皆熱者是為熱厥酒入於胃則絡脈滿而經脈虛酒為熟谷之液其氣悍而疾故先充絡脈絡滿而經虛者酒能傷陰陽盛則陰衰也脾主為胃行其津液者也陰氣虛則陽氣入陽氣入則胃不和胃不和則精氣竭精氣竭則不營其四肢也脾主為胃行其津液故酒入於胃必歸於脾濕熱在脾則脾陰虛陽獨亢而胃不和矣脾胃俱病則精氣竭故不能營其經絡四肢也此人心數醉若飽以入房氣聚於脾中不得散酒氣與穀氣相搏熱盛於中故熱遍於身內熱而溺赤也夫酒氣盛而慓悍腎氣日衰陽氣獨勝故手足為之熱也數醉若飽入房者既傷其脾復傷其腎皆陰虛也故手足為熱寒熱二厥一由恃壯以秋冬奪於所用故陽氣衰而為寒厥一由數醉若飽入房故精氣竭而為熱厥二者皆因於酒色致傷真元乃為是病首言其所由然則厥之輕重於茲可見矣厥或令人腹滿或令人暴不知人或至半日遠至一日乃知人者陰氣盛於上則下虛下虛則腹脹滿陰氣盛於上則不守於下故下虛陰虛於下則脾腎之氣不化故腹為脹滿陽氣盛於上則下氣重上而邪氣逆逆則陽氣亂陽氣亂則不知人也重並也邪氣氣失常也陽氣盛於上則下氣並而上行並則逆逆則亂陽氣亂則神明失守故暴不知人也其六經脈之厥狀病能能猶形也前言病厥之本此明各經之狀巨陽之厥則腫首頭重足不能行發為眩僕眩目眩亂也僕猝倒也足太陽之脈起於目內眥上額交巔入絡腦故為腫首頭重眩僕其下行之支者合膕中貫腨內故為足不能行陽明之厥則癲疾欲走呼腹滿不得臥面赤而熱妄見而妄言陽明胃脈也為多氣多血之經氣逆於胃則陽明邪實故為癲狂之疾而欲走且呼也其脈循腹裡故為腹滿胃不和則臥不安故為不得臥陽明之脈行於面故為面赤而熱陽邪盛則神明亂故為妄見妄言少陽之厥則暴聾頰腫而熱脅痛胻不可以運厥在足少陽者其脈入耳中故暴聾下加頰車故頰腫而熱下腋循胸過季脅故脅痛下出膝外廉下外輔骨之前故胻不可以運胻音杭太陰之厥則腹滿䐜脹後不利不欲食食則嘔不得臥足太陰之脈入腹屬脾絡胃故厥則腹滿䐜脹逆氣在脾故後便不利且令不欲食而食則嘔脾與胃為表裡胃不和者臥不安脾亦然也少陰之厥則口乾溺赤腹滿心痛厥逆在足少陰者其脈循喉嚨挾舌本故口乾腎脈絡膀胱故溺赤其直者從腎上貫肝膈其支者從肺出絡心注胸中故腹滿心痛厥陰之厥則少腹腫痛腹脹涇溲不利好臥屈膝陰縮腫胻內熱足厥陰之脈抵少腹挾胃故厥則少腹腫痛而腹脹其脈環陰器故涇溲不利陰縮而腫肝主筋為罷極之本故足軟好臥而屈膝其下者行足脛內側故胻內為熱盛則瀉之虛則補之不盛不虛取經調之不盛不虛者惟逆氣在經而無闕於虛盛也故但取其經而調之太陰厥逆胻急攣心痛引腹此重申前義以明足六經之厥逆也少陰厥逆虛滿嘔變下瀉清厥陰厥逆攣腰痛虛滿前閉譫言三陰俱逆不得前後使人手足寒三日死不得前後者或閉結不通或遺失不禁不得其常之謂也三陰俱逆則臟氣絶所謂厥逆連經則生連臟則死也太陽厥逆僵仆嘔血善衄少陽厥逆機關不利機關不利者腰不可以行項不可以顧發腸癰不可治驚者死腸癰發於少陽厥逆者相火之結毒也故不可治若有驚者其毒連臟故當死陽明厥逆喘咳身熱善驚衄嘔血手太陰厥逆虛滿而咳善嘔沫此下言手六經之厥逆也手太陰之脈起於中焦循胃口上膈屬肺故其為病如此手心主少陰厥逆心痛引喉身熱死不可治手心主厥陰之脈起於胸中出屬心胞絡手少陰心脈從心系上挾嗌皆令人心痛引喉二經屬火其主血脈故為身熱心為五臟六腑之大主故逆之則死不可治手太陽厥逆耳聾泣出項不可以顧腰不可以俯仰手太陽小腸之脈至目之內外眥入耳中故厥則耳聾泣出其支者從缺盆循頸故項不可以顧邪在小腸者連睪系屬於脊故腰不可以俯仰也手陽明少陽厥逆發喉痹嗌腫痙手陽明小腸之脈從缺盆上頸貫頰手少陽三焦之脈上出缺盆上項故皆發喉痹嗌腫痙謂手臂肩項強直也以上不言死者可視其虛實治其主病者也人有病頭痛數歲不已當有所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛病亦名曰厥逆髓以腦為主諸髓皆屬於腦也故大寒至髓則上入頭腦而為痛其邪深故數歲不已髓為骨之充故頭痛齒亦痛是因邪逆於上故亦名曰厥逆有癃者一日數十溲此不足也身熱如炭頸膺如格人迎躁盛喘息氣逆此有餘也太陰脈細微如發者此不足也癃小水不利也一日數十溲數欲便而所出不多也如炭者熱之甚也頸言咽喉膺言胸臆如格者上下不通若有所格也人迎躁盛者足陽明動脈在結喉兩旁所以候陽也喘息者呼吸急促也氣逆者治節不行也大陰脈微細者即兩手寸口之脈所以候陰也病在太陰脾肺二臟皆屬太陰下文頗在肺此則專言脾陰也太陰之脈細微者正以氣口亦太陰也臟氣不足則脈見於此又中氣不足溲便為之變今其癃而數十溲者亦由中氣之不足耳故病在脾陰其盛在胃上云身熱如炭者胃主肌肉也頸膺如格者胃脈循喉嚨入缺盆下膈也人迎躁盛者一盛二盛三盛四盛且大且數名曰溢陽也凡上三者皆屬陽明故曰其盛在胃頗在肺即喘息氣逆也病亦名曰厥死不治陰不入陽故其盛在胃陽不入陰故太陰細微病亦名曰厥者陰陽皆逆也故死不可治此所謂得五有餘二不足也所謂五有餘者五病之氣有餘也二不足者亦病氣之不足也今外得五有餘內得二不足此其身不表不里亦正死明矣外得五有餘者一身熱如炭二頸膺如格三人迎躁盛四喘息五氣逆也內得二不足者一癃而一日數十溲二太陰脈細微如發也若此五病者邪氣有餘也二病者正氣不足也欲瀉其邪則陰虛於裡欲補其虛則陽實於外救里不可治表亦不可此不表不里之病即陽證陰脈之類有死而已不能為也有病厥者診右脈沉而緊左脈浮而遲不知病主安在此言厥逆而為腰痛者其病在腎也右脈左脈皆以兩尺為言然冬診之右脈固當沉緊此應四時左脈浮而遲此逆四時冬氣伏藏故沉緊者為應時浮遲者為逆逆則為厥矣在左當主病在腎頗關在肺當腰痛也在左者當主病在腎此正以尺為言也然浮者為肺脈故云頗關在肺何以言之少陰脈貫腎絡肺今得肺脈腎為之病故腎為腰痛之病也腎脈本絡於肺今以冬月而肺脈見於腎位乃腎氣不足故脈不能沉而見浮遲此非肺病病在腎也腰為腎之府故腎氣逆者當病為腰痛有病膺腫頸痛胸滿腹脹亦名厥逆膺腫頸痛胸滿腹脹皆在上中二焦此以陰並於陽下逆於上故病亦名厥逆灸之則喑石之則狂須其氣並乃可治也喑失音也石總針石而言何以然陽氣重上有餘於上灸之則陽氣入陰入則喑陽氣有餘於上而復灸之是以火濟火也陽極乘陰則陰不能支故失聲為喑石之則陽氣虛虛則狂陽並於上其下必虛以石泄之則陽氣隨刺而去氣去則上下俱虛而神失其守故為狂也須其氣並而治之可使全也氣並者謂陰陽既逆之後必漸通也蓋上下不交因而厥逆當其乖離而強治之恐致偏絶故必須其氣並則或陰或陽隨其盛衰察而調之可使保全也傷寒今夫熱病者皆傷寒之類也或愈或死其死皆以六七日之間其餘皆以十日以上者何也傷寒者中陰寒殺厲之氣也寒盛於冬中而疾病者是為傷寒其不即病者至春則名為溫病至夏則名為暑病然有四時不正之氣隨感隨發者亦名傷寒寒邪束於肌表則玄府閉陽氣不得散越乃鬱而為熱故凡系外感發熱者皆傷寒之類然巨陽者諸陽之屬也巨大也太陽為六經之長統攝陽分故諸陽皆其所屬其脈連於風府故為諸陽主氣也風府督脈穴太陽經脈覆於巔背之表故主諸陽之氣分人之傷於寒也則為病熱熱雖甚不死人傷於寒而傳為熱者寒甚則生熱也寒散則熱退故雖甚不致死其兩感於寒而病者必不免於死矣表裡俱受是謂兩感傷寒一日巨陽受之故頭項痛腰脊強巨陽足太陽也為三陽之表而脈連風府故凡病傷寒者多從太陽始太陽之經從頭項下肩膊挾背抵腰中故其為病如此仲景曰太陽之為病脈浮頭項強痛而惡寒人身經絡三陽為表三陰為里三陽之序則太陽為三陽陽中之陽也陽明為二陽居太陽之次少陽為一陽居陽明之次此三陽為表也三陰之序則太陰為三陰居少陽之次少陰為二陰居太陰之次厥陰為一陰居少陰之次此三陰為里也其次序之數則以內而外故有一二三之先後者如此邪之中人必自外而內邪客於皮則腠理開開則邪入客於絡脈絡脈滿則注於經脈經脈滿則入舍於府藏此所以邪必先於皮毛經必始於太陽而後三陰三陽五臟六腑皆受病也二日陽明受之陽明主肉其脈挾鼻絡於目故身熱目疼而鼻乾不得臥也傷寒多發熱而獨此云身熱者蓋陽明主肌肉身熱尤甚也邪熱在胃則煩故不得臥餘症皆本經之所及仲景曰陽明之為病胃家實也三日少陽受之少陽主膽其脈循脅絡於耳故胃脅痛而耳聾邪在少陽者三陽已盡將入太陰故為半表半裡之經其經脈出耳前後下循胸脅故為脅痛耳聾等證仲景曰傷寒脈弦細頭痛發熱者屬少陽少陽之病口苦咽乾目眩也又曰太陽病不解轉入少陽者脅下鞭滿乾嘔不能食往來寒熱蓋邪在陰則寒邪在陽則熱邪在表則無嘔滿等症邪在裡則胸滿乾嘔不能食故成無己曰少陽之邪在半表半裡之間三陽經絡皆受其病而未入於臟者故可汗而已三陽為表屬腑邪在表而未入於三陰之臟者皆可汗而散之四日太陰受之太陰脈布胃中絡於嗌故腹滿而嗌乾邪在三陽失於汗解則入三陰自太陰始也仲景曰傷寒脈浮而緩手足自溫者系在太陰太陰之為病腹滿而吐食不下自利益甚時腹自痛也五日少陰受之少陰脈貫腎絡於脈系舌本故口燥舌乾而渴腎經屬水而邪熱涸之故口舌為之乾渴仲景曰少陰之為病脈微細但欲寐之六日厥陰受之厥陰脈循陰器而絡於肝故煩滿而囊縮六經傳遍乃至厥陰邪熱甚於陰分故為煩滿仲景曰厥陰之為病氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止按傷寒一病傳變無窮此不過言傳經之常而未及於變自仲景而後諸大傢俱有名言可法學者所當盡讀而精思之然義多出於仲景於仲景書又當閉戶深求者也三陰三陽五臟六腑皆受病營衛不行五臟不通則死矣傷寒邪在經絡本為表症經盡氣復自當漸解若六經傳遍而邪不退則深入於腑腑不退則深至於臟故五臟六腑皆受病矣邪盛於外則營衛不行氣竭於內則五臟不通故六七日間致死也善治此者必不使其邪入內亦必不使其臟氣竭知斯二者近於神矣止言足經不言手者以傷寒為表邪欲求外症但當察於周身而周身上下脈絡惟足六經則盡之矣手經無能遍也且手經所至足經無不至者故但言足經則其左右前後陰陽諸證無不可按而得而手經亦在其中不必言矣劉草窗不讀此經謬創邵說萬世唾罵學者可不慎諸其不兩感於寒者七日巨陽病衰頭痛少愈邪氣漸退則正氣漸復如下文也八日陽明病衰身熱少愈九日少陽病衰耳聾微聞十日太陰病哀腹減如故則思飲食十一日少陰病衰渴止不滿舌乾已而嚏十二日厥陰病衰囊縱少腹微下大氣皆去病日已矣所謂其餘皆十日以上者如此治之之法各通其臟脈病日衰已矣其未滿三日者可汗而已其滿三日者可泄而已各通其臟脈謂當隨經分治也凡傳經之邪未滿三日者其邪在表故可以汗已滿三日者其邪傳裡故可以下然此言表裡之大體耳按脈大浮數病為在表可發其汗脈實沉數病為在裡可下之日數雖多但有表症而脈浮大者猶宜發汗日數雖少但有里症而脈沉實者即當下之此汗下之法但當以表裡為據有不可以執一也其兩感於寒者一日則巨陽與少陰俱病則頭痛口乾而煩滿兩感者表裡同病也足太陽與少陰為表裡故在太陽則為頭痛在少陰則為口乾煩滿二日則陽明與太陰俱病則腹滿身熱不欲食譫言陽明太陰為表裡二經同病也譫言妄言也陽明病則身熱譫言太陰病則腹滿不欲食三日則少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人六日死少陽厥陰表裡同病也少陽病則為耳聾厥陰病則為囊縮而厥至是則三陰三陽俱受病故水漿不入昏不知人於六日之際當死也五臟已傷六腑不通營衛不行如是之後三日乃死何也如此之後三日乃死謂兩感傳遍之後復三日而死也蓋即六日之義蓋陽明者十二經脈之長也其血氣盛故不知人三日其氣乃盡故死矣陽明為十二經脈之長多氣多血之經若感於邪其邪必甚故不知人凡兩感於邪者三日之後胃氣乃盡故當死也兩感者本表裡之同病似若皆以外邪為言而實未必有盡然者正以內外俱傷便是兩感今見少陰先潰於內而太陽繼之於外者即縱情肆欲之兩感也太陰受傷於裡而陽明重感於表者即勞倦竭力飲食失調之兩感也厥陰氣逆於臟少陽復病於腑者必七情不慎疲筋敗血之兩感也人知兩感為傷寒而不知傷寒之兩感內外俱困病斯劇矣但傷有輕重醫有賢不肖則死生系之或謂兩感之症不多見者蓋亦見之不廣而義有未達耳凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑寒邪中人而成溫病暑病者其在時則以夏至前後言在病則以熱之微甚言故凡溫病暑病皆傷寒也暑當與汗皆出勿止暑氣侵入當令有汗則暑隨汗出故曰勿止溫病暑病後賢另有成書所當詳考熱病已愈時有所遺者熱甚而強食之故有所遺也若此者皆病已衰而熱有所藏因其穀氣相薄兩熱相合治之視其虛實調其逆從可使必已病雖衰而餘熱未除尚有所藏因而強食則病氣與食氣相併兩熱合邪以致留連不解故名曰遺食滯於中者病之實脾弱不能運者病之虛實則瀉虛則補虛實勿失則逆從可調病必已矣當何禁之病熱少愈食肉則復多食則遺此其禁也復者病復作遺則延久也凡病後脾胃氣虛未能消化飲食故於肉食之類皆當從緩若犯食復為害非淺其有挾虛內餒者又不可過於禁制所以貴得宜也有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名陰陽交交者死也汗者陰之液身熱脈躁者陽之邪病溫汗出之後則當邪從汗解熱退脈靜矣今其不為汗衰者乃陽勝之極陰氣不能復也故為狂言為不食正以陽邪交入陰分則陰氣不守故曰陰陽交交者死也人所以汗出者皆生於穀穀生於精穀氣內盛則生精精氣外達則為汗今邪氣交爭於骨肉而得汗者是邪卻而精勝也精勝則當能食而不復熱惟精勝邪所以能汗邪從汗散則當能食不復熱矣復熱者邪氣也汗者精氣也今汗出而輒復熱者是邪勝也不能食者精無俾也俾使也精陰氣也五臟所以藏精臟氣虛則不能使人飲食故曰精氣俾也病而留者其壽可立而傾也病氣留而不退則元氣日敗必致損命矣汗出而脈尚躁盛者死凡汗後脈當遲靜而反躁盛者真陰竭而邪獨勝也故病必死今脈不與汗相應此不勝其病也其死明矣精氣不勝病氣也狂言者是失志失志者死此總五志為言也志舍於精精不勝邪則五臟之志皆失故致狂言者多死今見三死不見一生雖愈必死也汗後輒復熱不能食者一死汗後脈尚躁盛者二死汗後反狂言失志者三死有此三者則必死之候肝熱病者小便先黃腹痛多臥身熱肝脈環陰器故小便黃抵少腹故腹痛肝主筋筋熱則耎故多臥邪在厥陰經則行於股陰腹脅故身熱前言傷寒此即所以治傷寒也但前分傷寒之六經此詳傷寒之五臟正彼此相為發明耳觀後節之復言兩感概可知矣凡欲察傷寒之理者毋忽此義熱爭則狂言及驚脅滿痛手足躁不得安臥熱入於臟則邪正相勝故曰爭下同氣爭於肝則肝氣亂故狂言而驚肝病主驚駭也肝脈布脅肋故脅為滿痛熱極則生風風淫四末故手足躁擾木邪乘土必及於胃胃不和則臥不安庚辛甚甲乙大汗氣逆則庚辛死庚辛屬金肝所畏也故甚而死甲乙屬木肝所王也故汗而愈刺足厥陰少陰少陽為厥陰之表皆可瀉其熱邪藥法皆然下同此義其逆則頭痛員員脈引沖頭也肝脈與督脈會於巔故氣逆於上則頭痛員員脈引衝於頭也員員靡定貌心熱病者先不樂數日乃熱心者神明之所出邪不易犯犯必先覺之故熱邪將入於臟則先有不樂之兆熱爭則卒心痛煩悶善嘔頭痛面赤無汗熱與心氣分爭故卒然心痛而煩悶心火上炎故善嘔頭者精明之府手少陰之脈上出於面故頭痛面赤汗為心液心熱則液亡故無汗壬癸甚丙丁大汗氣逆則壬癸死壬癸屬水心所畏也丙丁屬火心之王也刺手少陰太陽手太陽為少陰之表故皆當刺之脾熱病者先頭重頰痛煩心顏青欲嘔身熱脾胃相為表裡脾病必及於胃也陽明胃脈循頰車上耳前至額顱故頭重頰痛脾脈注心中故煩心脾病則肝木乘之故顏上色青脾胃受邪則飲食不納故欲嘔太陰陽明主肌肉故邪盛則身熱熱爭則腰痛不可俯仰腹滿泄兩頷痛腰者腎之府熱爭於脾則土邪乘腎必注於腰故為腰痛不可俯仰太陰之脈入腹屬脾絡胃故腹滿而泄陽明脈循頤後下廉出大迎故兩頜痛甲乙甚戊己大汗氣逆則甲乙死甲乙木脾所畏也戊己土脾之王也刺足太陰陽明表裡俱當取之以去其熱肺熱病者先淅然厥起毫毛惡風寒舌上黃身熱肺主皮毛熱則畏寒故先淅然惡風寒起毫毛也肺脈起於中焦循胃口肺熱入胃則胃熱上升故舌上黃而身熱熱爭則喘咳痛走胸膺背不得太息頭痛不堪汗出而寒熱爭於肺其變動則為喘為咳肺者胸中之臟背者胸中之腑故痛走胸膺及背且不得太息也喘逆在肺氣不下行則三陽俱壅於上故頭痛不堪熱邪在肺則皮毛不斂故汗出而寒丙丁甚庚辛大汗氣逆則丙丁死丙丁屬火克肺者也庚辛屬金肺所王也刺手太陰陽明出血如大豆立已太陰陽明二經表裡俱當刺之出血者取其絡脈之盛者也腎熱病者先腰痛胻酸苦渴數飲身熱足少陰之絡貫腰脊故先為腰痛其脈循內踝之後以上腨內故為胻酸又其直者循喉嚨挾舌本邪火耗傷腎水故苦渴數飲腎與太陽為表裡太陽之脈從巔下背抵腰走足故為身熱熱爭則項痛而強胻寒且酸足下熱不欲言熱爭在表則太陽經也太陽之脈別下項故項痛而強熱爭在裡則少陰經也少陰之脈斜走足心上腨內挾舌本故為胻寒且酸足熱不言等病其逆則項痛員員淡淡然淡淡精神短少貌陰虛無氣之候也戊己甚壬癸大汗氣逆則戊己死戊己土克腎者也壬癸水腎所王也刺足少陰太陽水臟之表裡也諸汗者至其所勝日汗出也氣王之日即所勝也王則勝邪故汗出而病愈肝熱病者左頰先赤此下言面部五臟之色也肝屬木應在東方故肝熱者左頰當先赤心熱病者顏先赤心屬火其應南方顏額也亦曰庭脾熱病者鼻先赤脾屬土其應中央故鼻先赤肺熱病者右頰先赤肺屬金其應在西故右頰先赤腎熱病者頤先赤腎屬水應在北故兩頤先赤病雖未發見赤色者刺之用藥先及之名曰治未病病雖未見而赤色已見於五部則為病之先兆當求其臟而預治之所謂防於未然也熱病從部所起者至期而已此下言諸熱病並刺治之法也從部所起者至期而已謂如肝色先見於左頰至甲乙日即當汗解之類是也餘臟同義其刺之反者三周而已藥之亦然反謂瀉虛補實也病而反治其病必甚其愈反遲三周者謂三遇所勝之日而後已重逆則死一誤者尚待三周再誤者焉得不死諸治熱病以飲之寒水乃制之必寒衣之居止寒處身寒而止也先飲寒水而後刺欲其陰氣自內達表而熱泄於外也故必寒衣寒處皆外其避溫就涼耳用藥方法亦須仿此熱病先胸脅痛手足躁刺足少陽補足太陰足少陽之脈下胸中循脅裡故為胸脅痛脾主四肢而甲木乘之則風淫末疾故手足躁擾木強土弱所以當瀉足少陽之實補足太陰之虛胸脅痛止墟主之補足太陰之脈當於井榮取之病甚者五十九刺五十九刺其義別詳熱病始手臂痛者刺手陽明太陰而汗出止手臂痛列缺主之列缺者手太陰之絡也欲汗出商陽主之商陽手陽明井也熱病始於頭首者刺項太陽而汗出止天柱主之熱病始於足脛者刺足陽明而汗出止足陽明止汗出當刺內庭陷谷二穴熱病先身重骨痛耳聾好瞑刺足少陰病甚為五十九刺腎主骨在竅為耳熱邪居之故為身重骨痛耳聾熱傷真陰則志氣昏倦故好瞑仲景曰少陰之為病但欲寐也義與此同刺足少陰者本無正主當補瀉榮耳苦其病甚則當用五十九刺熱病先眩冒而熱胸脅滿刺足少陰少陽頭腦運轉曰眩腦者骨之充也眼目矇昧曰冒瞳子者骨子精也皆主於腎又足少陽之脈起目鋭眥循脅裡皆為此症故當取足少陰少陽而刺之亦井榮也太陽之脈色榮顴骨熱病也此下言兩感脈色之死期也榮發見也太陽之脈起於目內眥太陽之筋下結於頄故太陽熱病者赤色當榮於顴骨榮未交曰今且得汗待時而已此榮字與上節之榮不同蓋指榮衛而言榮營古所通用也榮未交者謂邪猶在衛未交於榮其氣不深故曰今且得汗可待時而已也如肝待甲乙心待丙丁脾待戊己肺待庚辛腎待壬癸病必已矣與厥陰脈爭見者死期不過三日脈義有二以寸口之脈言則太陽之脈浮厥陰之脈弦而細以經脈之病言則太陽為頭項痛腰脊強厥陰為煩滿而囊縮今以太陽熱病與厥陰脈症爭見者陰陽俱病當不過三日而死矣何也蓋此言兩感之邪也兩感於寒者一日則巨陽少陰俱病二日則陽明太陰俱病三日則少陽厥陰俱病故六經熱病之序其始太陽其終厥陰今終始爭見則六經兩感俱已傳遍故當三日而死其熱病內連腎少陽之脈色也此承上文而詳言兩感也上文言太陽熱病兼見厥陰之脈症此言腎經熱病兼見少陽之脈色皆兩感也蓋太陽與少陰為表裡少陽與厥陰為表裡以太陽而見厥陰則未有不由少陰者以腎病而見少陽則未有不至厥陰者詳如下文少陽之脈色榮頰前熱病也足少陽之脈下頰車故其熱病赤色當榮於頰前榮未交曰今且得汗待時而已義同前與少陰脈爭見者死期不過三日少陽之脈弦少陰之脈沉而微少陽之症為胸脅痛而耳聾少陰之症為口燥舌乾而渴今以少陽熱病而與少陰脈症爭見者亦當三日而死皆兩感傳遍也如上文言太陽厥陰爭見者太陽為傳表之始厥陰為傳裡之終自始而終也此以少陽少陰爭見者少陽為傳表之終少陰為傳裡之始自終而始也言始言終則六經無不遍矣故不必言陽明太陰之爭見也熱病氣穴三椎下間主胸中熱四椎下間主膈中熱五椎下間主肝熱六椎下間主脾熱七椎下間主腎熱榮在骶也此總言治熱之臟俞也椎脊骨節也榮陰氣也骶尾骶也即督脈之長強穴凡五臟俞旁之穴三椎下者魄戶也四椎下旁膏盲也五椎下旁神堂也六椎下旁譩嘻也七椎下旁膈關也蓋既取陽邪於上仍當補陰於下故曰榮在骶也此節臟俞皆不甚合存其文知其概可也不必與針灸家盡合也項上三椎陷者中也此取脊椎之大法也項上三椎者乃項骨三節非脊椎也三椎之下陷者中方是第一節穴名大椎由此而下數之則諸椎循次可得矣頰下逆顴為大瘕下牙車為腹滿顴後為脅痛頰上者膈上也此以面部之色察腹中之病也疾病第十二寒熱人身非常溫也非常熱也為之熱而煩滿者非素所有故曰非常陰氣少而陽氣勝故熱而煩滿也陰虛者陽必湊之陽邪實於陰分故熱而煩滿人身非衣寒也中非有寒氣也寒從中生者無所因而寒者寒生於中也是人多痹氣也陽氣少陰氣多故身寒如從水中出痹者正氣不行也陽少陰多則榮衛不能充達故寒從中生所謂寒痹之屬人有四肢熱逢風寒如灸如火者凡有內熱而風寒外束之則熱必愈盛故如灸如火也是陰氣虛陽氣盛四肢者陽也兩陽相得而陰氣虛少少水不能滅盛火而陽獨治四肢者諸陽之本也風者陽氣也以四肢之熱而逢風於外是謂兩陽相得況乎陰氣衰少則水不勝火故病為陽獨治治言王也獨治者不能生長也獨勝而止耳陽獨治者孤陽也故不能生長而止能為熱耳逢風而如灸如火者是人當肉爍也肉者陰也陽盛則傷陰故令人肌肉消爍人有身寒湯火不能熱厚衣不能溫然不凍栗是為腎氣素勝以水為事太陽氣衰腎脂枯不長一水不能勝兩火腎者水也而生於骨腎不生則髓不能滿故寒甚至骨也腎氣素勝者必恃勝而多欲故以水為事太陽者少陰之表陰中之陽也欲多則精傷於腎而脂枯不長脂枯則水不勝火火勝則腎水愈虛骨髓不充氣涸於內故寒甚至骨也所以不能凍栗者肝一陽也心二陽也腎孤臟也一水不能勝二火故不能凍栗病名曰骨痹是人當攣節也肝有少陽之相火心為少陰之君火腎一水也一水已竭二火猶存是陰氣已虛於中而浮陽獨勝於外故身骨雖寒而不至凍栗病名骨痹然水不勝火則筋骨皆失所滋故肢節當為拘攣人之肉苛者雖近於衣絮猶尚苛也是謂何疾苛者頑水沉重之謂苛音呵是為營氣虛衛氣實也營氣虛則不仁衛氣虛則不用營衛俱虛則不仁且不用肉如故也人身與志不相有曰死不仁不知痛癢寒熱也不用不能舉動也榮氣者陰氣也主裡衛氣者陽氣也主表上言衛氣實者言肌肉本無恙也下言衛氣虛者正言衛氣之病也營衛俱虛則血氣俱病血虛故為不仁氣虛故為不用人之身體在外五志在內雖肌肉如彼而神氣失守則外雖有形而中已無主若彼此不相有也故當死有病熱而有所痛者也病熱者陽脈也以三陽之動也陽脈者火邪也凡病熱者必因於陽故三陽之脈其動甚也人迎盛少陽二盛太陽三盛陽明入陰也人迎足陽明脈所以候陽也人迎一盛病在足少陽一盛而躁病在手少陽人迎二盛病在足太陽二盛而躁病在手太陽人迎三盛病在足陽明三盛而躁病在手陽明也凡邪熱在表三陽既畢則入於陰分矣夫陽入於陰故病在頭與腹乃䐜脹而頭痛也頭主陽腹主陰陽邪在頭則頭痛及其入於陰分則腹為䐜脹也有五臟六腑寒熱相移者也相移者以此病而移於彼也腎移寒於脾癰腫少氣腎中寒氣移於脾者乃為癰腫凡癰腫之病寒熱皆能為之熱者為陽毒寒者為陰毒蓋脾主肌肉得寒則氣聚而堅堅而不散則為腫為癰也曰癰者壅也腎以寒水之氣反傳所勝侵侮脾土故壅為浮腫少氣者寒盛則陽虛於下陽虛則無以化氣也脾移寒於肝癰腫筋攣脾中寒勝則反傳於肝脾寒則肉寒故為癰腫肝寒則筋寒故為筋攣肝移寒於心狂膈中肝移寒於心傳其所生也心主火其藏神受肝邪之寒逆故神亂而為狂心脈出屬心系下膈陽為陰抑則氣有不行故隔寒不通也心移寒於肺肺消肺消者飲一溲二死不治心與肺二陽臟也心移寒於肺者君火之衰耳火不足則不能溫養肺金肺氣不溫則不能行化津液故飲雖一而溲則倍之夫肺者水之母也水去多則肺氣從而索矣故曰肺消門戶失守本元日竭故死不能治肺移寒於腎為湧水湧水者按腹不堅水氣客於大腸疾行則鳴濯濯如囊裹漿水之病也湧水者水自下而上如泉之湧也水者陰氣也其本在腎其末在肺肺移寒於腎則陽氣不化於下陽氣不化則水泛為邪而客於大腸以大腸為肺之合也但按腹不堅而腸中濯濯有聲者即是其候脾移熱於肝則為驚衄上文言移寒此下言移熱也脾熱移於肝者反傳其勝熱之甚也肝藏血病主驚駭邪熱薄之則風火交作故為驚為鼻中出血也肝移熱於心則死心本屬火而肝以風熱移之木火相燔犯及君主故當死也心移熱於肺傳為膈消肺屬金其化本燥心復以熱移之則燥愈甚而傳為膈消膈消者膈上焦煩飲水多而善消也上文言肺消者因於寒此言膈消者因於熱可見消有陰陽二症不可不辨肺移熱於腎傳為柔痓柔筋軟無力也痓骨強直也肺主氣腎主骨肺腎皆熱則真陰日消故傳為柔痓痓音翅腎移熱於脾傳為虛腸澼死不可治腎移熱於脾者陰火上炎也邪熱在下真陰必虧故傳為虛損腎本水臟而挾熱侮脾故為腸澼下利膿血陰虛反克則水土俱敗故死不治也胞移熱於膀胱則癃溺血胞子宮也在男則為精室在女則為血室膀胱津液之府也俗名謂之溲胞命門火盛則胞宮移熱於膀胱故小便不利為癃甚則為溺血常見相火妄動逆而不通多患此者即其證也胞包脬二音在胞胎之胞則音胞溲胞之胞則音脬膀胱移熱於小腸膈腸不便上為口糜膀胱之熱上行則移熱於小腸小腸之脈循咽下膈抵胃其支者循頸上頰故受熱為膈腸之病則痞塞不便受熱於咽頰之間則上為口糜小腸移熱於大腸為虙瘕為沉小腸之熱下行則移熱於大腸熱結不散或氣或血留聚於曲折之處是為虙瘕虙瘕者謂其隱伏祕匿深沉不易取也虙伏同大腸移熱於胃善食而瘦又謂之食亦大腸移熱於胃燥熱之氣上行也故善於消穀陽明主肌肉而熱爍之則雖食亦病而瘦所以謂之食亦胃移熱於膽亦曰食亦陽明胃熱而移於膽則木火合邪不生脾土故亦當善食而瘦膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不止也膽經之脈起於目鋭眥上抵頭角下耳後曲折布於腦後故膽移熱於腦則為辛頞鼻淵之病辛酸辛也頞音遏鼻莖也傳為衄蔑瞑目腦熱不已則傳為此症衄衊皆為鼻血但甚者為衄微者為衊熱傷陰血則目無所養故令瞑目以羞明不能開也衊音滅故得之氣厥也厥者氣逆也此總結一篇之義皆由氣逆所致乳子而病熱脈懸小者手足溫則生寒則死乳子嬰兒也病熱脈懸小者陽症陰脈本為大禁但小而緩者邪之微也其愈則易小而急者邪之甚也為可慮耳以小兒稚陽之體而加之病熱脈不當小若脈雖小而手足溫者以四肢為諸陽之本陽猶在也故生若四肢寒冷則邪勝其正元陽去矣故死謂從者手足溫逆者手足寒也乳子中風熱喘鳴肩息者脈實大也緩則生急則死此言小兒之外感也風熱中於陽分為喘鳴肩息者脈當實大但大而緩則胃氣存邪漸退故生實而急則真臟見病日進故死此見古人之診小兒者未嘗不重在脈也即雖初脫胞胎亦自有脈可辨何後世幼科如水鏡訣及全幼心鑑等書別有察三關之說於脈則全置不問夫三關乃手陽明之浮絡原不足以候臟腑之氣且凡在小兒無論病與不病此脈皆紫白而兼乎青紅雖時有濃淡之異而四色常不相離也何以辨其紫為風紅為寒青為驚白為疳又何以辨其雷驚人驚水驚獸驚之的確乎近代醫家習以為常全不知脈欲濟其危胡可得也遍考並無三關名目惟經脈有察手魚之色者若乎近之然乃概言診法亦非獨為小兒也則三關之說特後世之異端不足憑也故凡欲診小兒者在必察氣口之脈面部之色呼吸之聲或兼察手魚亦可也且小兒之脈原非大方之比不必多歧但求於大小緩急虛實六者之間可以盡之診得其真取如反掌既明且易豈不愈於彼哉瘧夫痎瘧皆生於風蓄作有時痎皆也瘧殘虐之謂瘧症雖多皆謂之瘧故曰痎瘧諸解不一皆未為得觀痎瘧皆生於風蓋總諸瘧為言於此皆字義可知矣蓄言邪蓄於經有時而伏也作言病見於外不期而發也痎音皆其始發也先起於毫毛伸缺乃作寒栗鼓頷腰脊俱痛寒去則內外皆熱頭痛如破渴或冷飲起於毫毛憎寒而毛豎也伸者伸其四體邪動於經也缺呵缺也陰陽爭引而然也陰陽上下交爭虛實更作陰陽相移也陽氣者下行極而上陰氣者上行極而下邪氣入之則陰陽上下交爭矣陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒邪之所在則邪實正虛故入於陰則陰實陽虛入於陽則陽實陰虛虛實更作者以陰陽相移易也陽並於陰則陰實而陽虛陽明虛則寒栗鼓頷之陽並於陰則陰邪勝陰勝則寒也陽明者胃氣之所出其主肌肉其脈循頤頰故陽明虛則為寒栗鼓頷鼓者振悚之謂巨陽虛則腰背頭項痛腰背頭項皆太陽經也陽虛則寒邪居之故為痛三陽俱虛則陰氣勝陰氣勝則骨寒而痛三陽者兼陽明少陽而言陰氣勝則陽氣不行血脈凝滯故骨寒痛寒生於內故中外皆寒表裡陰邪皆勝也陽盛則外熱陰虛則內熱外內皆熱則喘而渴故欲冷飲也此邪自陰分而復並於陽分並於陽則陽勝陽勝則外內皆熱而喘渴喜冷此皆得之夏傷於暑熱氣盛藏於皮膚之內腸胃之外此營氣之所舍也暑傷於夏其時則熱甚其邪則風寒也故曰痎瘧皆生於風又曰夏暑汗不出者秋成風瘧可知風寒在表必鬱而為熱其藏於皮膚之內腸胃之外即經脈間耳榮行脈中故曰此榮氣之所舍也令人汗空疏腠理開暑氣能開肌表也因得秋氣汗出遏風及得之以浴水氣舍於皮膚之內與衛氣並居暑邪內伏者陰邪也秋氣水氣亦陰氣也新邪與衛氣並居則內合伏暑故陰陽相薄而瘧作矣傷暑為瘧何謂陰邪蓋陽暑傷氣其證多汗感而即發邪不能留其留臟不去者惟陰暑耳以其無汗也故凡患瘧者必因於盛暑之時貪涼取快不避風寒或浴以涼水或澡於河流或過食生冷壯者邪不能居未必致病怯者蓄於榮衛則所不免但外感於寒者多為瘧內傷於寒者多為痢使能慎此二者則瘧痢何由來也衛氣者晝日行於陽夜行於陰此氣得陽而外出得陰而內薄內外相薄是以日作風寒自表而入則與衛氣並居故必隨衛氣以為出入衛氣一日一周是以新感之瘧亦一日一作然則日作之瘧邪在衛耳其氣淺故其治亦易其間日而作者氣之舍深內薄於陰陽氣獨發陰邪內者陰與陽爭不得出是以間日而作也其氣之舍深則邪居榮氣之間連乎臟也榮為陰衛為陽陽氣獨發者其行本速陰邪內著者其行則遲一遲一速相拒而爭則陰邪不得與衛氣俱出故間日而作也其作日晏與日早者邪氣客於風府循膂而下風府督脈穴膂呂同脊骨曰膂象形也一曰挾脊兩旁之肉曰膂下者下行至尾骶也衛氣一日一夜大會於風府其明日日下一節故其作也晏衛氣每至明旦則出於足太陽之精明穴而大會於風府此一日一夜衛氣周行之常度也若邪氣客於風府心循膂而下其氣漸深則日下一節自陽就陰其會漸遲故其作漸晏也此先客於脊背也每至於風府則腠理開腠理開則邪氣入邪氣入則病作以此日作稍益晏也此先客於脊背言初感之伏邪也每至於風府則腠理開言衛氣邪氣之會也會則病作晏則因邪之日下也其出於風府日下一節二十五日下至骶骨二十六日入於脊內注於伏膂之內項骨三節脊骨二十一節共二十四節邪氣自風府日下一節故於二十五日下至尾骶復自後而前故於二十六日入於脊內以注伏膂之脈衝脈之循背者伏行脊膂之間故曰伏膂也其氣上行九日出於缺盆之中其氣日高故作日益早也邪在伏膂之脈循脊而上無關節之窒故九日而出缺盆其氣日高則自陰就陽其邪日退故作漸早也其間日發者由邪氣內薄於五臟橫連募原也其道遠其氣深其行遲不能與衛氣俱行不得皆出故間日乃作也此重申上文未盡之義也諸經募原之氣內連五臟邪在陰分故道遠行遲而間日作也衛氣每至於風府腠理乃發發則邪氣入入則病作今衛氣日下一節其氣之發也不當風府又何所會而病日作也此邪氣客於頭項循膂而下者也故虛實不同邪中異所則不得當其風府也凡邪氣客於頭項則必循膂而下此其常也然邪之所中亦但隨虛實而異其處不必盡當風府也然則所謂日下者惟邪氣耳衛氣周環豈有日下之理但氣至而會其病乃作則邪氣衛氣均為日下一節矣故邪中於頭項者氣至頭項而病中於背者氣至背而病中於腰脊者氣至腰脊而病中於手足者氣至手足而病氣至者衛氣之至也至於邪合然後病作故其蓄作則遲早有時衛氣之所在與邪氣相合則病作故風無常府衛氣之所發必開其腠理邪氣之所合則其府也府者所以聚物故凡風之所居即為風府衛氣之至與邪相合則腠理開開則邪復入之故無論乎上下左右皆可中邪凡邪所中之處亦皆可稱為風府故曰風無常府也夫風之與瘧也相似同類而風獨常在瘧得有時而休者風氣留其處故常在瘧氣隨經絡沉以內薄故衛氣應乃作此風字指風證為言風之與瘧皆因於風本為相似同類然風則無休瘧有時止當知所辨也風氣留其處著而不移瘧氣隨經絡流變不一沉以內薄言其深也即上文薄於五臟橫連募原之謂故必因衛氣之應而作也瘧先寒而後熱者夏傷於大暑其汗大出腠理開發因遇夏氣淒滄之水寒藏於腠理皮膚之中秋傷於風則疾成矣淒滄之水寒謂浴水乘涼之類也因暑受寒則腠理閉汗不出寒邪先伏於皮膚之中得清秋之氣而風襲於外則病發矣夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱也病以時作名曰寒瘧先受陰邪後受陽邪故先寒後熱人之患瘧者多屬此症先熱而後寒者此先傷於風而後傷於寒故先熱而後寒也亦以時作名曰溫瘧先受陽邪後受陰邪故先熱後寒而為溫瘧其但熱而不寒者陰氣先竭陽氣獨發則少氣煩冤手足熱而欲嘔名曰疸瘧疸熱也陽氣獨亢故但熱不寒而煩冤少氣表裡俱病故手足熱而欲嘔以熱邪及於胃也有餘者瀉之不足者補之今熱為有餘寒為不足夫瘧者之寒湯火不能溫也及其熱冰水不能寒也此皆有餘不足之類當此之時良工不能止必須其自衰乃刺之故曰無刺熇熇之熱熇熇熱正盛也熇赫囂二音又呼木切無刺渾渾之脈渾渾之脈陰陽虛實未定也不得其真恐有所誤無刺漉漉之汗漉漉汗大出也其時邪正未定也故為其病逆未可治也於此三者而刺之是逆其病氣也凡為瘧者藥法飲食皆然也當其時避其鋭藥藥餌法法則皆不可犯至於飲食尤所宜慎也夫瘧之始發也陽氣並於陰當是之時陽虛而陰盛外無氣故先寒栗也此陰有餘陽不足也衛氣並於陰分則表虛故曰外無氣陰氣逆極則復出之陽陽與陰復並於外則陰虛而陽實故先熱而渴氣極於裡則復出於外陰虛陽實故熱病而渴夫瘧氣者並於陽則陽勝並於陰則陰勝陰勝則寒陽勝則熱此瘧證或寒或熱之故也瘧者風寒之氣不常也病極則復或陰或陽瘧本不常有先寒後熱者陰極則復於陽也有先熱後寒者陽極則復於陰也至病之發也如火之熱如風雨之不可當也其暴如此故名為瘧方其盛時必毀因其衰也事必大昌此之謂也病邪方盛之時真氣正衰輒加攻治必致毀傷故當因其衰止而後取之則邪氣去而事大昌矣天下凡事何獨不然夫瘧之未發也陰未並陽陽未並陰因而調之真氣得安邪氣乃亡故工不能治其已發為其氣逆也邪氣正發乃陰陽氣逆之時故不可以強治重言申之至深切矣攻之早晏何如瘧之且發也陰陽之且移也必從四末始也陽已傷陰從之故先其時堅束其處令邪氣不得入陰氣不得出審候見之在孫絡盛堅而血者皆取之此真往而未得並者也陰陽且移必從四末始者以十二經井原之氣皆本於四肢也故凡瘧之將發則四肢先有寒意此即其候故治之者當於先時未發之頃堅束其處謂四關之上也使邪氣不得留行乃察其孫絡之堅盛者皆取之今北人多行此法砭出其血謂之放寒其義即此故可令真氣自為往來而邪則能無並也瘧不發其應何如瘧氣者必更盛更虛當氣之所在也病在陽則熱而脈躁病在陰則寒而脈靜瘧不發謂其未作時也欲察其應當求氣之所在故但於證之寒熱脈之躁靜可辨其病之陰陽也極則陰陽俱衰衛氣相離故病得休衛氣集則復病也瘧之或在陰或在陽陰陽盛極氣必俱衰故與衛氣相離而病得休止及衛氣再至則邪正分爭病復作矣時有間二日或至數日發或渴或不渴其間日者邪氣與衛氣客於六腑而有時相失不能相得故休數日乃作也客猶言會也邪在六腑則氣遠會希故或間二日或休數日乃作也此瘧之間二日及數日發者以邪氣深客於腑時與衛氣相失而然其理甚明丹溪謂作於子午卯酉日為少陰瘧作於寅申巳亥日為厥陰瘧作於辰戌醜未日為太陰瘧此不過以六氣司天之義為言然子午雖曰少陰而卯酉則陽明矣巳亥雖曰厥陰而寅申則少陽矣醜未雖曰太陰而辰戌則太陽矣如三日作者猶可藉此為言若四日者又將何以辨之按此必誤學者不可為訓瘧者陰陽更勝也或甚或不甚故或渴或不渴陽勝則熱甚故渴陰勝則否也夏傷於暑秋必病瘧此應四時者也今瘧有不必應其病異形者反四時也夏傷於暑秋必病瘧此應四時也其於春夏冬而病瘧者則病形多異正以四時之氣寒熱各有相反皆能為瘧也其以秋病者寒甚秋以盛熱之後而新涼束之陰陽相激故病為寒甚以冬病者寒不甚陽氣伏藏於內故冬病者雖寒不甚以春病者惡風春時陽氣外泄腠理漸疏余寒未去故多病惡風以夏病者多汗夏時熱甚熏蒸肌表故病此者多汗溫瘧與寒瘧而皆安舍舍於何臟安舍者言其何所居也溫瘧者得之冬中於風寒風雖陽邪其氣則寒故風寒可以並言氣藏於骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏於腎其氣先從內出之於外也腎應冬其主骨髓故冬中風寒而不即病者則邪氣藏於骨髓之中或遇春溫或遇大暑隨觸而發故自內達外而為病也如是者陰虛而陽盛陽盛則熱矣自陰出陽則陰虛陽實也衰則氣復反入入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧陽極而衰故復入於陰分此以冬中於寒發為溫瘧即傷寒之屬故傷寒有溫瘧一症蓋本諸此又有疸瘧者肺素有熱氣盛於身厥逆上衝中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間而發發則陽氣盛陽氣盛而不衰則病矣其氣不及於陰故但熱而不寒肺素有熱者陽盛氣實之人也故邪中於外亦但在陽分而不及於陰則但熱不寒也氣內藏於心而外舍於分肉之間令人消爍脫肉故命曰疸瘧氣藏於心陽走臟也熱在肌肉之間故令人消爍然則疸瘧之所舍者在肺心兩經耳足太陽之瘧令人腰痛頭重寒從背起先寒後熱熇熇暍暍然熱止汗出難已刺郤中出血此下言足六經之瘧刺也頭背腰皆足太陽經之所行故為是病熇熇暍暍皆熱甚貌邪在三陽盛於表也汗不易收故曰難已刺郤中者委中也蓋古法以委中為郤中也足少陽之瘧令人身體解㑊寒不甚熱不甚惡見人見人心惕惕然熱多汗出甚刺足少陽解𠎿也㑊跡也身體解㑊謂不耐煩勞形跡困倦也寒不甚熱不甚者病在半表半裡也見人惕惕然者邪在膽也少陽為木火之經故熱多於寒而汗出甚也當刺足少陽之經俠溪主之足陽明之瘧令人先寒灑淅灑淅寒甚久乃熱熱去汗出喜見日月光火氣乃快然刺足陽明跗上陽明雖多血多氣之經而寒邪勝之故先為寒久乃熱熱去則邪解故汗出陽明病至則惡人與火今反喜見日月光及得火氣乃快然者何也蓋陽明受陽邪胃之實也故惡熱陽明受陰邪胃之虛也故喜暖耳跗上即本經之衝陽穴足太陰之瘧令人不樂好太息不嗜食多寒熱汗出病至則善嘔嘔已乃衰即取之脾者心之子脾病則心氣不舒故不樂脾不化則上焦痞塞故好太息而不嗜食太陰主裡邪不易解故多寒熱汗出脾脈絡胃上膈挾咽故病至則善嘔然必待其嘔已病衰方可取之取之井俞及公孫也皆屬本經故曰即取之足少陰之瘧令人嘔吐甚多寒熱熱多寒少欲閉戶牖而處其病難已腎脈上貫肝膈入肺中循喉嚨陰邪上衝故為嘔吐甚腎病則陰虛陰虛故熱多寒少然在陰者喜靜故欲閉戶牖而處腎為至陰之臟而邪居之故病深難已此不言刺者必取大鐘太溪之本經穴耳足厥陰之瘧令人腰痛少腹滿小便不利如癃狀非癃也數便意恐懼氣不足腹中悒悒刺足厥陰肝脈過陰器抵少腹布脅肋故為腰腹小便之病凡小水不利為癃今曰如癃狀非癃也蓋病不在水而在於肝邪之陷故亦如小便不利而急數欲便也意恐懼者肝氣不足也腹中悒悒不暢之貌皆當刺足厥陰之經太衝主之肺瘧者令人心寒寒甚熱熱間善驚如有所見者刺手太陰陽明此下言五臟瘧刺而並及於胃也肺者心之蓋也以寒邪而乘所不勝故肺瘧者令人心寒寒甚復熱而心氣受傷故善驚如有所見當刺其表裡二經以瀉陽明之實補太陰之虛也手太陰之絡列缺陽明之原合谷主之心瘧者令人煩心甚欲得清水反寒多不甚熱刺手少陰瘧邪在心故煩心甚欲得水以解也心本陽臟為邪所居則陽虛陰盛故反寒多而不甚熱手少陰即神門穴也肝瘧者令人色蒼蒼然太息其狀若死者刺足厥陰見血肝屬木故色蒼蒼然肝鬱則氣逆故太息木病則堅強故其狀若死刺足厥陰見血者中封主之上文已言足厥陰等症而此重言之蓋上文所言者經病也故復明臟病之詳如此下文脾胃腎三臟義同脾瘧者令人寒腹中痛熱則腸中鳴鳴已汗出刺足太陰脾以至陰之臟而瘧邪居之故令人寒脾脈自股入腹故為腹中痛寒已而熱則脾氣行故腸中鳴鳴已則陽氣外達故汗出而解也刺足太陰者商丘也腎瘧者令人灑灑然腰脊痛宛轉大便難目眴眴然手足寒刺足太陽少陰灑灑寒栗貌腎脈貫脊屬腎開竅於二陰故腰脊之痛苦於宛轉而大便難也眴眴然眩動貌目視不明水之虧也手足寒陰之厥也刺足太陽少陰之表裡取穴如前胃瘧者令人且病也善飢而不能食食而支滿腹大刺足陽明太陰橫脈出血腑有六而此獨言胃者以胃為六腑之長也邪在陽明則胃病及脾故善飢不能食而支滿腹大也當兼刺陽明之表裡厲兌解溪三里足陽明取此三穴也足太陰刺其橫脈出血者謂足內踝前斜過大脈則太陰之經即商丘也以上本言刺法而其現症甚詳用藥所當推也火熱復惡寒發熱如有瘧狀或一日發或間數日發凡病寒熱多由外感然有不因風寒而火熱內盛者亦為惡寒發熱其作有期狀雖似瘧而實非瘧症也勝復之氣會遇之時有多少也陰氣多而陽氣少則其發日遠陽氣多而陰氣少則其發日近此勝復相薄盛衰之節瘧亦同法夫寒熱者陰陽之氣也遲速者陰陽之性也人之陰陽則水火也營衛也有熱而反寒者火極似水也寒而反熱者陰極似陽也陰陽和則血氣勻表裡治陰陽不和則勝復之氣會遇之時各有多少矣故陽入之陰則陰不勝陽而為熱陰出之陽則陽不勝陰而為寒又若陰多陽少則陰性緩而會遇遲故其發日遠陽多陰少則陽性速而會遇早故其發日近此勝復盛衰之節雖非瘧症而多變似瘧法亦同然所謂同者皆陰陽出入之理也然同中自有不同則曰是瘧曰非瘧是瘧非瘧者在有邪無邪之辨耳真瘧有邪由衛氣之會以為止作似瘧無邪由水火爭勝以為盛衰此則一責在表一責在裡一治在邪一治在正勿謂法同而治亦同也同與不同之間即殺人生人之歧也學者於此可不慎歟咳人知肺之令人咳不知五臟六腑皆令人咳非獨肺也夫皮毛者肺之合也皮毛先受邪氣邪氣以從其合也邪氣風寒也皮毛先受之則入於肺所以從其合也其寒飲食入胃從肺脈上至於肺則肺寒肺寒則外內合邪因而客之則為肺咳肺脈起於中焦循胃口上膈屬肺故胃中飲食之寒從肺脈上於肺也所謂形寒寒飲則傷肺者此之謂也五臟各以其時受病非其時各傳以與之如肝當受病於春以其時也然有非木令之時而肝亦病者正以肺先受邪而能傳以與之也凡諸臟腑之非時受邪者其義皆然所以五臟六腑雖皆有咳然無不由於肺者人與天地相參故五臟各以治時感於寒則受病微則為咳甚者為泄為痛治時治令之時也上文言外內合邪此即其症邪微者淺而在表故為咳甚者深而入里故為泄為痛乘秋則肺先受邪乘春則肝先受之乘夏則心先受之乘至陰則脾先受之乘冬則腎先受之此即治時受病也故當其時者必先受也何以異之此下辨五臟之咳不同也肺咳之狀咳而喘息有音甚則唾血肺主氣而司呼吸故喘息有音唾血者隨咳而出其病在肺與嘔血者不同心咳之狀咳則心痛喉中介介如梗狀甚則咽腫喉痹心肺起於心中出屬心系上挾於咽故病喉中梗介咽腫喉痹也介介如有所梗妨礙之意肝咳之狀咳則兩脅下痛甚則不可以轉轉則兩胠下滿肝脈布脅肋故病如是胠腋下脅也脾咳之狀咳則右胠下痛陰陰引肩背甚則不可以動動則咳劇脾脈上膈挾咽其支者復從胃別上膈故為胠下痛而陰陰然痛引肩背脾應土其性靜故甚者不可以動動則增劇也脾咳則右胠下痛者蓋陰土之氣應於坤出西南也胃之大絡名曰虛里貫膈絡肺出於左乳下豈非陽土之氣應於艮而出東北乎人與天地相參也腎咳之狀咳則腰背相引而痛甚則咳涎腎脈貫脊繫於腰背故相引而痛其直者入肺中循喉嚨故甚則咳涎蓋腎為水臟主涎飲也六腑之咳又安所受病此下辨六腑之咳不同也夫五臟之咳久乃移於六腑五臟之咳久不已則病及於腑皆各因其合而表裡相移也脾咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出脾與胃合故脾咳不已胃必受之胃不能容則氣逆為嘔長蟲蛔蟲也居腸胃之中嘔甚則隨氣而上出蛔音回肝咳不已則膽受之膽咳之狀咳嘔膽汁膽汁苦汁也肺咳不已則大腸受之大腸咳狀咳而遺矢矢屎也心咳不已則小腸受之小腸咳狀咳而失氣氣與咳俱失小腸之下則大腸也大腸之氣由於小腸之化故小腸受邪而咳則下奔失氣也腎咳不已則膀胱受之膀胱咳狀咳而遺溺膀胱為津液之府故邪氣居之則咳而遺溺久咳不已則三焦受之三焦咳狀咳而腹滿不欲食飲久咳不已則上中下三焦俱病出納升降皆失其和故腹滿不能食飲此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也此下總結諸咳之症而並及其治也諸咳皆聚於胃關於肺者以胃為五臟六腑之本肺為皮毛之合如上文所云皮毛先受邪氣及寒飲食入胃者皆肺胃之候也陽明之脈起於鼻會於面出於口故使人多涕唾而面浮腫肺為臟腑之蓋而主氣故令人咳而氣逆治臟者治其俞治腑者治其合浮腫者治其經脈之所注者為俞所入者為合所行者為經諸臟腑皆然也咳證必由於肺而五臟六腑皆令人咳又曰五臟各以其時受病非其時各傳以與之則不獨在肺矣蓋咳有內傷外感之分故自肺而傳及五臟者有之自五臟而傳於肺者亦有之如風寒暑濕傷於外則必先中於皮毛皮毛為肺之合而受邪不解此則自肺而後傳於諸臟也勞欲情志傷於內則臟氣受傷先由陰分而病及上焦此則自諸臟而後傳於肺也但自表而入者其病在陽故必自表而出之治法宜辛宜溫求其屬而散去外邪則肺氣清而咳自愈矣自內而生者傷其陰也陰虛於下則陽浮於上水涸金枯則肺苦於燥肺燥則癢癢則咳不能已治此者宜甘以養陰潤以養肺使水壯氣復而肺則寧也大法治表邪者藥不宜靜靜則留連不解久必變生他病故最忌寒涼收斂之劑治里症者藥不宜動動則虛火不寧真陰不復燥癢愈增病必日甚故最忌辛香助陽等劑然治表者雖宜從散若形氣病氣俱虛者又當補其中氣而佐以溫解之藥若專於解散恐肺氣益弱腠理益疏外邪乘虛而入病益甚也治里者雖宜靜以養陰若命門陽虛不能納氣則參薑桂附之類亦所必用否則氣不化水終無濟於陰也至若因於火者宜清因於濕者宜利因痰者降其痰因氣者理其氣雖方書條目極多病本惟風寒勞損而已風寒者責在陽實勞損者責在陰虛此咳證之綱領其他治標之法亦不過隨其所見之證而兼以調之則可原非求本之法也至於老人之久嗽者元氣既虛本難全愈多宜溫養脾肺或兼治標但保其不致羸困則善矣若求奇效而必欲攻之則非計之得也喘人之居處動靜勇怯脈亦為之變動凡人之驚恐恚勞動靜皆為變也脈以經脈血氣統言之也是以夜行則喘出於腎淫氣病肺此下四條言喘者喘屬氣病在陽也腎者至陰也陰氣受於夜夜行則勞骨傷陰故喘出於腎淫氣者陰傷則陽勝氣逆為患也肺腎為母子之臟而少陰之脈上入肺中故喘出於腎則病苦於肺有所墮恐喘出於肝淫氣害脾有所墮墜而恐者傷筋損血故喘出於肝肝氣淫則害於脾木乘土也有所驚恐喘出於肺淫氣傷心驚恐則神氣散亂肺藏氣故喘出於肺心藏神故淫氣傷之度水跌僕喘出於腎與骨水起通於腎跌僕傷於骨故喘出焉當是之時勇者氣行則已怯者則著而為病也此結上文而言有病有不病者因氣有強弱不同也故診病之道觀人勇怯骨肉皮膚能知其情以為法也勇可察其有餘怯可察其不足骨可以察腎肉可以察脾皮膚可以察肺望而知其情即善診者也汗飲食飽甚汗出於胃此下五條言汗者汗屬精病在陰也飲食飽甚則胃氣滿而液泄故汗出於胃驚而奪精汗出於心驚則神散神散則奪其精氣故汗出於心持重遠行汗出於腎持重遠行則傷骨腎主骨故汗出於腎疾走恐懼汗出於肝肝主筋而藏魂疾走則傷筋恐懼則傷魂故汗出於肝搖體勞苦汗出於脾搖體勞苦則肌肉四肢皆動脾所主也故汗出於脾又醉飽行房汗出於脾故春秋冬夏四時陰陽生病起於過用此為常也五臟受氣強弱各有常度若勉強過用必損其真則病之所由起也人有熱飲食下胃其氣未定汗則出或出於面或出於背或出於身半其不循衛氣之道而出也飲食入胃其氣各有所行如散精於肝淫氣於筋濁氣歸心淫精於脈之類是也衛氣之道晝行於陽夜行於陰有常度也今有熱飲食者方入於胃其氣之留行未定而汗輒外泄出無方所是不循胃氣之道也外傷於風內開腠理毛蒸理泄衛氣走之固不得循其道風為陽邪有外熱也熱食氣悍因內熱也熱之所聚則開發腠理所以毛蒸理泄而衛氣走之故不循其常道也此氣慓悍滑疾見開而出不得從其道命曰漏泄此即熱食之氣也出不由度故曰漏泄鼓脹有病心腹痛旦食則不能暮食名為鼓脹內傷脾腎留滯於中則心腹脹滿不能再食其脹如鼓故名鼓脹治之以雞矢醴一劑知二劑已雞矢之性能消積下氣通利大小二便蓋攻伐實邪之劑也一劑可知其效二劑可已其病凡鼓脹由於停積及濕熱有餘者皆宜用之若腎脾虛寒發脹及氣虛中滿等症最所忌也誤服則死雞矢醴法用羯雞矢一升研細炒焦色地上出火毒以百沸湯淋汁每服一大盞調木香檳榔末各一錢日三服空腹服以平為度又有用干羯雞矢八合炒微焦入無灰好酒三碗共煎干至一半許用布濾汁五更熱飲則腹鳴辰巳時行二三次皆黑水也次日覺足面漸有皺紋又飲一次則漸皺至膝上而病愈矣此二法似用後者為便其時有復發者飲食不節故也鼓脹之病本因留滯故不可復縱飲食也雖然其病且已時故當病氣聚於腹也病雖將愈而復傷其脾所以氣復聚也應於寸口其脈大堅以澀者脹也脈大者邪之盛也脈堅者邪之實也澀因氣血之虛而不能流利也大都洪大之脈陰氣必衰堅強之脈胃氣必損故大堅以澀則病當為脹何以知臟腑陰為臟陽為腑也澀而堅者為陰其脹在臟大而堅者為陽其脹在腑一曰脈病在陰則脹在臟脈病在陽則脹在腑夫氣之令人脹也血脈之中臟腑之內三者皆存焉然非脹之舍也舍言留止之處也脹之舍在於臟腑之外排臟腑而郭胸脅脹皮膚故命曰脹排擠於臟腑之外以胸脅為郭而居於皮膚之中是即脹之所舍臟腑之在胸脅腹裡之內也若匣匱之臟禁器也各有次舍異名而同處一域之中其氣各異蓋胸腹臟腑之郭也胸腹者所以保障五內故為臟腑之郭膻中者心主之宮城也膻中者胸中也肺覆於上膈膜障於下為清虛周密之宮心主之所居也故曰宮城胃者太倉也胃為水穀之海故曰太倉咽喉小腸者傳達也咽喉傳送者穀氣自上而入小腸傳送者清濁自下而出胃之五竅者閭里門戶也閭巷門也里鄰里也五家為比五比為閭蓋二十五家為閭也五家為軌十軌為里蓋五十家為里也胃之五竅為閭里門戶者非言胃有五竅正以上自胃脘下至小腸大腸皆屬於胃故曰閭里門戶如咽門賁門幽門闌門魄門皆胃氣之所行也故總屬胃謂之五竅廉泉玉英者津液之道也二穴俱屬任脈玉英即玉堂故五臟六腑者各有畔界其病各有形狀畔界各有所屬故病之形見可按也下文所以辨之營氣循脈胃氣逆為脈脹清者為營營在脈中其氣精專未即致脹濁者為衛衛行脈外其氣慓疾滑利而行於分肉之間故必由衛氣之逆而後病及於營則為脈脹是以凡病脹者皆發於衛氣也衛氣並脈循分為膚脹衛氣逆而並於脈復循分肉之間故為膚脹三里而瀉近者一下遠者三下無問虛實工在疾瀉三里足陽明經穴陽明為五臟六腑之海而主肌肉故脹在肌膚者當以針瀉之一下三下謂一次再次三次也蓋邪有遠近故瀉有難易耳心脹者煩心短氣臥不安肺脹者虛滿而喘咳肝脹者脅下滿而痛引小腹脾脹者善噦四肢煩悗體重不能勝衣臥不安腎脹者腹滿引背央央然腰髀痛此五臟之脹也悗悶亂也央央然困苦貌胃脹者腹滿胃脘痛鼻聞焦臭妨於食大便難大腸脹者腸鳴而痛濯濯冬日重感於寒則飧泄不化小腸脹者少腹䐜脹引腰而痛膀胱脹者少腹滿而氣癃三焦脹者氣滿於皮膚中輕輕然而不堅膽脹者脅下痛脹口中苦善太息此六腑之脹也濯濯腸鳴水聲也飧泄不化完穀而泄也氣癃膀胱氣閉小水不通也凡此諸脹者其道在一明知逆順針數不失瀉虛補實神去其室致邪失正真不可定粗之所敗謂之天命補虛瀉實神歸其室久塞其空謂之良工此下言治脹之得失也脹有虛實而當補當瀉其道惟一能察者謂之良工粗者誤用則傷人矣衛氣之在身也常然並脈循分肉行有逆順陰陽相隨乃得天和五臟更始四時循序五穀乃化此衛氣之常度也然後厥氣在下營衛留止寒氣逆上真邪相攻兩氣相搏乃合為脹也上節言衛氣之順此節明衛氣之逆也厥逆之氣自下而上營衛失常故真邪相攻而合為脹也合之於真三合而得脹雖由於衛氣然有合於血脈之中者在經絡也有合於臟者在陰分也有合於腑者在陽分也三合既明得其真矣無問虛實工在疾瀉近者一下遠者三下其有三而不下者焉下者陷於肉肓而中氣穴者也一下三下者言針當必陷於肉盲亦必中於氣穴然後可以取效也不中氣穴則氣內閉針不陷肓則氣不行上越中肉則衛氣相亂陰陽相逐不中穴不陷肓則妄中於分肉間矣故衛氣相亂而陰陽之邪反相逐以乘之也其於脹也當瀉不瀉氣故不下不得其氣穴肉肓也三而不下必更其道氣下乃止不下復始針藥不二必審其脈當瀉當補如鼓應桴惡有不下者乎三而不下必未得其所也故當更穴再刺之針與藥其法一也腫脹一症五臟六腑無不有之如胃脈實氣有餘則脹胃病者腹䐜脹胃脘當心而痛脾氣實則腹脹涇溲不利濁氣在上則生䐜脹此皆實脹也飲食起居失節入五臟則䐜滿閉塞足太陰之別公孫虛則鼓脹此皆虛脹也胃中寒則脹滿臟寒生滿病胃風膈塞不通腹善脹失衣則䐜脹此皆寒脹也二陰一陽發病善脹心滿手少陰終者腹脹閉足太陰終者腹脹閉此心脾受傷之脹也又如太陰所至為重跗腫及土鬱之發太陰之初氣太陰之勝復皆濕勝之腫脹也又曰水運之太過寒勝則浮太陽之司天太陽之勝復皆寒勝之腫脹也有曰少陰之司天少陰之勝復少陽之司天少陽之勝復又曰熱甚則腫皆火勝之腫脹也若厥陰之司天在泉厥陰之復及陽明之復是皆木邪侮土及金氣反勝之腫脹也觀此則不惟五臟六腑即五運六氣亦無不皆有是病然曰諸濕腫滿皆屬於脾又曰其本在腎其末在肺皆聚水也又曰腎者胃之關也關門不利故聚水而從其類也由此言之則諸經雖皆有脹無不幹於脾肺腎三臟蓋脾屬土其主運化肺屬金其主氣腎屬水其主五液凡五氣所化之液悉屬於腎五液所行之氣悉屬於肺轉輸於二臟之中以制水生金者悉屬於脾所以腫脹之生無不由此三者但症有陰陽虛實寒熱新久之別不可不察焉水與膚脹鼓脹腸覃石瘕石水有以別之此六症者病異而形相似故宜有以別之覃音潭水始起也目窠上微腫如新臥起之狀目之下為目窠微腫如新臥起之狀者形如臥蠶也其頸脈動時咳頸脈足陽明人迎也陽明之脈自人迎下循腹裡由水邪乘之故為頸脈動水之標在肺故為時咳陰股間寒足脛瘇腹乃大其水已成矣陰邪始於陰分也以手按其腹隨手而起如裹水之狀此其候也凡按水囊者必隨手而起故病水者亦若是以上皆水腫之候膚脹者寒氣客於皮膚之間𪔣𪔣然不堅腹大身盡腫皮厚𪔣𪔣鼓聲也寒氣客於皮膚之間者陽氣不行病在氣分故有聲若鼓氣本無形故不堅氣無所不至故腹大身盡腫若因於水則有水處腫無水處不腫此為可辨然有水則皮澤而薄無水則皮厚按其腹窅而不起腹色不變此其候也寒氣在膚腠之間按散之則不能猝聚故窅然不起腹色不變即皮厚故也以手按其腹隨手而起者屬水窅而不起者屬氣此固然也然按氣囊者亦隨手而起又水在肌肉之中按而散之猝不能聚如按糟囊者亦窅而不起故未可以起與不起為水氣之的辨但當察其皮厚色蒼或一身盡腫或自上而下者多屬氣若皮薄色澤或腫有分界或自下而上者多屬水也窅音夭深也鼓脹者腹脹身皆大大與膚脹等也色蒼黃腹筋起也腹脹身皆大與上文膚脹者證同色蒼黃者亦皮厚腹色不變之義但腹有筋起為稍異耳蓋此亦病在氣分故名鼓脹也腸覃者寒氣客於腸外與衛氣相搏氣不得榮因有所繫癖而內著惡氣乃起瘜肉乃生覃延布而深也寒氣與衛氣相搏則蓄積不行留於腸外有所繫著故癖積起瘜肉生病日以成矣瘜肉惡肉也其始生也大如雞卵稍以盆大至其成如懷子之狀久者離歲按之則堅推之則移月事以時下也離歲越歲也寒邪客於腸外不在胞中故無妨於月事其非血病可知蓋由汁沫所聚而生此腸覃之候也石瘕生於胞中寒氣客於子門胞即子宮也男女皆有之在男謂之精室在女謂之血海子門即子宮之門也子門閉塞氣不得通惡血當瀉不瀉衃以留止日以益大狀如懷子月事不以時下皆生於女子可導而下衃凝敗之血也子門閉塞則衃血留止其堅如石故曰石瘕月事不以時下惟女子有之也故可以導血之劑下之衃鋪杯切膚脹鼓脹亦可刺先瀉其脹之血絡後調其經刺去其血絡也先瀉其脹之血絡謂無論虛實凡有血絡之外見者必先瀉之而後因虛實以調其經也刺去其血絡即重明先瀉之義所言者凡六證而獨云膚脹鼓脹者蓋兼五證而統言之辭雖簡而意則在也津液水穀入於口輸於腸胃其液別為五天寒衣薄則為溺與氣天熱衣厚則為汗悲哀氣並則為泣中熱胃緩則為唾邪氣內逆則氣為之閉塞而不行不行則為水脹何也五液者陰精之總稱也溺汗泣唾水故名為五五臟化液心為汗肺為涕肝為淚脾為涎腎為唾是為五液精氣津液血脈其辨有六涕唾精津汗血液其名則七無非五液之屬耳水穀皆入於口其味有五各法其海津液各走其道水穀入口五液之所由生也五味之入各有所歸各注其海者人身有四海腦為髓海衝脈為血海膻中為氣海胃為水穀之海也五臟四海各因經以受水穀之氣味故津液隨化各走其道故三焦出氣以溫肌肉充皮膚為其津其流而不行者為液此津液之有辨也宗氣積於上焦營氣出於中焦衛氣出於下焦達於表者陽之氣也故三焦出氣以溫肌肉充皮膚而為其津津屬陽也營於裡者陰之氣也故周流於血脈之間而不散行於外注於臟腑益於精髓而為之液液屬陰也天暑衣厚則腠理開故汗出寒留於分肉之間聚沫則為痛此津液之為汗也熱蒸於表則津泄故腠理開而汗出或為寒邪所感則液凝留於肌肉之間故汗沫聚而為痛天寒則腠理閉氣濕不行水下留於膀胱則為溺與氣此津液之為溺氣也腠理閉密則氣不外泄故氣化為水水必就下故流於膀胱然水即氣也水聚則氣生氣化則水注故為溺與氣五臟六腑心為之主耳為之聽目為之候肺為之相肝為之將脾為之衛腎為之主外此二節言津液之為涕泣也心總五臟六腑為津液為主故耳目肺肝脾腎皆總命於心是以耳之聽目之視無不由乎心也肺朝百脈而主治節故為心之相肝主謀慮決斷故為心之將脾主肌肉而護養臟腑故為心之衛腎主骨而成立其形體故為心之主外也故五臟六腑之津液盡上滲於目心悲氣並則心系急心系急則肺舉肺舉則液上溢夫心系與肺不能常舉乍上乍下故咳而泣出矣心為臟腑之主故五臟之系皆入於心心之總系復上貫於肺通於喉而息由以出故心悲則系急而肺葉舉液即隨之而上溢然心系於肺本不常舉故有乍上乍下當其氣舉而上則為咳為泣也凡人之泣甚而繼以嗽者正以氣並於上而奔迫於肺耳目者宗脈之所聚也上液之道也口鼻者氣之門戶也故悲哀愁憂則心動心動則五臟六腑皆搖搖則宗脈感液道通故涕泣出焉中熱則胃中消穀消穀則蟲上下作腸胃充郭故胃緩胃緩則氣逆故唾出此津液之為唾也蟲為濕熱所化常居腸中胃熱則消穀中空蟲行求食故或上或下動作於腸胃之間充郭者縱滿之謂腸郭則胃緩胃緩則氣逆上行涎隨而溢故多唾也腎為唾而此曰胃為唾是胃之與腎皆主為唾蓋土鬱之唾在胃水泛之唾在腎也五穀之津液和合而為膏者內滲入於骨空補益腦髓而下流於陰股此津液之為精髓也膏脂膏也精液和合為膏以填補於骨空之中則為腦為髓為精為血故上至巔頂得以充實下流陰股得以交通也陰陽不和則使液溢而下流於陰髓液皆減而下下過度則虛虛故腰背痛而脛酸陰陽不和則精氣俱病氣病則不攝精病則不守精氣不相統攝故液溢於下而流泄於陰竅精髓皆減輸泄過度則真陰日虛故為腰痛脛酸等病此勞瘵之所由作也陰陽氣道不通四海閉塞三焦不瀉津液不化水穀並於腸胃之中別於回腸留於下焦不得滲膀胱則下焦脹水溢則為水脹此津液之為水脹也三焦為決瀆之官膀胱為津液之府氣不化則水不行所以三焦不能瀉膀胱不能滲而腫脹之病所由作故治此者當以氣化為主試觀水潦為災使非太陽照臨則陰凝終不能散泥濘終不能幹能知此義則知陰陽氣化之道矣此津液五別之逆順也陰陽和則五液皆精而充實於內陰陽不和則五精皆液而流溢於外此其所謂逆順也水疸頸脈動喘疾咳曰水頸脈謂結喉旁動脈足陽明之人迎也水氣上逆反侵陽明則頸脈動水溢於肺則喘急而疾咳目裹微腫如臥蠶起之狀曰水目裹者目之下胞也胃脈之所至脾氣之所至若見微腫如臥蠶起之狀是水氣淫及脾胃也水者陰也目下亦陰也腹者至陰之所居故水在腹中者必使目下腫也溺黃赤安臥者黃疸疸黃病也身痛而色微黃齒垢黃爪甲上黃黃疸也安臥小便黃赤脈小而寒者不嗜食謂之勞疸以女勞得之也已食如飢者胃疸已食如飢者是胃熱也善消穀食故曰胃疸肺小而澀者不嗜食言中寒也所以治疸者當知陰陽之辨面腫曰風風為陽邪故面腫者曰風陽受風氣也足脛腫曰水水為陰邪故足脛腫者曰水陰受濕氣也目黃者曰黃疸目者宗脈之所聚也諸經有熱則上薰於目故黃疸者其目必黃疸消疸脈實大病久可治脈懸小堅病久不可治消疸者三消之總稱謂內熱消中而肌膚消瘦也邪熱在內脈當實大者為順故病雖久猶可治若脈懸小則陽實陰虛脈證之逆也故不可治五臟皆柔弱者善病消疸又熱則消肌膚亦為消疸也熱中消中不可服高粱芳草石藥石藥發癲芳草發狂多飲數溲謂之熱中多食數溲謂之消中多怒曰癲多喜曰狂熱中消中者皆富貴人也禁高粱是不合其心禁芳草石藥不愈其病也非也高粱厚味也芳草辛香之品也石藥鍛鍊金石之類也三者皆能助熱亦能銷陰凡病熱者所當禁用熱中消中者即內熱病也惟富貴之人多有之凡治消疸肥貴人則高粱之疾也蓋富貴者以肥甘為事肥者令人內熱甘者令人中滿氣積成熱則轉為消中消渴之病故於高粱芳草之類皆不得不禁也芳草之氣美石藥之氣悍二者其氣急疾堅徑非緩心和人不可以服芳美者氣熱而散悍急者性剛而烈也夫熱氣慓悍藥氣亦然二者相遇恐內傷脾脾者陰中之至陰也陽勝則傷陰故二熱合氣必致傷脾脾者土也而惡水服此藥者至甲乙日更論脾傷者畏木故至甲乙日更論蓋謂其必甚也消疸消中者即後世所謂三消症也凡多飲而渴不止者為上消消穀善飢者為中消溲便頻而膏濁不禁者為下消如肺消膈消消渴即上消也疸成為消中胃中熱則消穀令人善飢即中消也腎脈肝脈微小皆為消疸肝腎在下即下消也然消渴之病本濕寒之陰氣極衰燥熱之陽氣太盛故也治當補腎水陰寒之虛瀉心火陽熱之實除腸胃燥熱之甚濟身中津液之衰使道路散而不結津液生而不枯氣血和而不澀則病自已若飲水多而小便多名曰消渴若飲食多不甚渴小便數而消瘦者名曰消中若渴而飲水不絶腿消瘦而小便有脂液者名曰腎消一皆以燥熱太甚三焦腸胃之腠理脈絡怫鬱壅滯雖多飲於中終不能浸潤於外營衛百骸故渴不止而小便多出或數溲也蓋五臟心為君火正化腎為君火對化三焦為相火正化膽為相火對化得其平則烹煉飲食糟粕去焉不得其平則燔灼臟腑津液竭焉夫一身之心火甚於上為膈膜之消甚於中為腸胃之消甚於下為膏液之消甚於外為肌肉之消上甚不已則消及於肺中甚不已則消及於脾下甚不已則消及於肝腎外甚不已則消及於筋骨四臟皆消盡則心始自焚而死矣故有消疸消中消渴風消膈消肺消之說消之症不同歸之火則一也人身之有腎猶木之有根故腎臟受病必先形容憔悴雖加以滋養不能潤澤故患消渴者皆是腎經為病由壯盛之時不自保養快情恣欲飲酒無度食脯炙餌丹石等藥遂使腎水枯竭心火燔盛三焦猛烈五藏渴燥由是渴利生焉此又皆本於腎也又二陽之病發心脾其傳為風消以陽明為十二經之海土衰而木氣乘之故為肌肉風消也心移寒於肺為肺消飲一溲二死不治此言元陽之衰而金寒水冷則為肺腎之消也五臟之脈微小者皆為消疸此言寸口之弱見於外以血氣之衰而消於內也又如歲水太過上臨太陽民病渴而妄冒太陽司天寒氣下臨心火上從民病嗌乾善渴太陽司天寒淫所勝民病嗌乾渴而欲飲是皆以陰抑陽以水致火必以溫劑散去寒邪其疾自愈諸如此者總皆消渴之類也夫消者消耗之謂陽勝固能消陰陰勝獨不能消陽乎故凡於精神血氣肌肉筋骨之消無非消也又不得盡稱為火矣善學者當熟讀而精思因時制宜可也有病口甘者此五氣之溢也名曰脾疸疸熱病也五氣五味之所化也夫五味入口藏於胃脾為之行其精氣津液在脾故令人口甘也脾主為胃行其津液者也故五味入胃則津液在脾脾屬土其味甘脾氣通於口故能令人口甘也此肥美之所發也肥甘太過故發為病此人必數食甘美而多肥也肥者令人內熱甘者令人中滿故其氣上溢轉為消渴肥者味厚助陽故能生熱甘者性緩不散故能留中熱留不去久必傷陰其氣上溢故轉變為消渴之病治之以蘭除陳氣也蘭草性味甘寒能利水道闢不祥除胸中痰癖其氣清香能生津止渴潤肌肉故可除陳積蓄熱之氣有病口苦名曰膽疸取陽陵泉陽陵泉足少陽膽經穴口苦者病在膽故名曰膽疸夫肝者中之將也取決於膽咽為之使謀慮在肝無膽不斷故肝為中之將而取決於膽也又足少陽之脈上挾咽足厥陰之脈循喉嚨之後上入頏顙是肝膽之脈皆會於咽故咽為之使此人者數謀慮不決故膽虛氣上溢而口為之苦治之以膽募俞數謀慮不決則肝膽俱勞勞則必虛虛則氣不固故膽氣上溢而口為之苦膽募在肋本經之日月也膽俞在背足太陽之穴也並前陽陵泉者共六穴皆可治之
