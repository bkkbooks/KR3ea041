body:
  text: 卷四疾病第九病機夫百病之生也皆生於風寒暑濕燥火以之化之變也氣之正者為化氣之邪者為變故曰之化之變也盛者瀉之虛者補之審察病機無失氣宜病隨氣動必察其機治之得要是無失也諸風掉眩皆屬於肝風類不一故曰諸風掉搖也眩運也風主動搖木之化也故屬於肝其虛其實皆能致此如發生之紀其動掉眩巔疾厥陰之復筋骨掉眩之類者肝之實也又如陽明司天掉振鼓栗筋痿不能久立者燥金之盛肝受邪也太陰之復頭頂痛重而掉瘛尤甚者木不制土濕氣反勝皆肝之虛也下虛則厥上虛則眩實者宜涼宜瀉虛則宜補宜溫反而為之禍不旋踵矣余治仿此掉提料切諸寒收引皆屬於腎收斂也引急也腎屬水其化寒凡陽氣不達則榮衛凝聚形體拘攣皆收引之謂如太陽之勝為筋肉拘苛血脈凝泣歲水太過為陰厥為上下中寒水之實也歲水不及為足痿清厥涸流之紀其病癃閉水之虛也水之虛實皆本於腎諸氣膹郁皆屬於肺膹喘急也郁痞悶也肺屬金其化燥燥金盛則清邪在肺而肺病有餘如歲金太過甚則喘咳逆氣之類是也金氣衰則火邪勝之而肺病不足如從革之紀其發喘咳之類是也肺主氣故諸氣膹郁者其虛其實皆屬於肺膹音憤諸濕腫滿皆屬於脾脾屬土其化濕土氣實則濕邪盛行如歲土太過則飲發中滿食減四肢不舉之類是也土氣虛則風木乘之寒水侮之如歲木太過脾土受邪民病腸鳴腹支滿卑監之紀其病留滿痞塞歲水太過甚則腹大脛腫之類是也脾主肌肉故諸濕腫滿等症虛實皆屬於脾諸熱瞀瘛皆屬於火瞀昏悶也瘛抽掣也邪熱傷神則瞀亢陽傷血則瘛故皆屬於火然歲火不及則民病兩臂內痛鬱冒矇昧歲火太過則民病身熱煩心躁悸渴而妄冒此又火之所以有虛實也諸痛癢瘡皆屬於心熱甚則痛熱微則癢心屬火其化熱故瘡瘍皆屬於心也然赫曦之紀其病瘡瘍心邪盛也太陽司天亦發為癰瘍寒水勝也火盛則心實水勝則心虛於此可見諸厥固泄皆屬於下厥逆也厥有陰陽二證陽衰於下則為寒厥陰衰於下則為熱厥固前後不通也陰虛則無氣無氣則清濁不化寒閉也火盛則水虧水虧則精液乾涸熱結也泄二陰不固也命門火衰則陽虛失禁寒泄也命門水衰則火迫注遺熱泄也下腎也蓋腎居五臟之下為水火陰陽之宅開竅於二陰故諸厥固泄皆屬於下諸痿喘嘔皆屬於上痿有筋痿脈痿骨痿肉痿之辨故曰諸痿凡肢體痿弱多在下部而曰屬於上者如五臟使人痿者因肺熱葉焦發為痿躄也肺居上焦故屬於上氣急曰喘病在肺也吐而有物有聲曰嘔病在胃口也逆而不降是皆上焦之病諸禁鼓栗如喪神守皆屬於火禁噤也寒厥咬牙曰禁鼓鼓頷也栗戰也凡病寒戰而精神不能主持如喪失神守者皆火之病也然火有虛實之辨若表裡熱甚而外生寒栗者所謂熱極生寒重陽必陰也心火熱甚亢極而戰反兼水化制之故為寒栗者皆言火之實也若陰盛陽虛而生寒栗者陽虛畏外寒陰勝則為寒寒則真氣去去則虛虛則寒搏於皮膚之間皆言火之虛也有傷寒將解而為戰汗者其人本虛是以作戰有痎瘧之為寒栗者瘧之發也始則陽並於陰既則陽復陰仇並於陽則陽勝並於陰則陰勝陰勝則寒陽勝則熱更寒更熱更實更虛也由此觀之可見諸禁鼓栗雖皆屬火必有虛實之分耳諸痙項強皆屬於濕痙風強病也項為足之太陽濕兼風化而侵寒水之經濕之極也然太陽所至為屈伸不利太陽之復為腰脽反痛屈伸不便者是又為寒水反勝之虛邪矣痙音敬諸逆衝上皆屬於火火性炎上故諸逆衝上者皆屬於火然諸臟諸經皆有逆氣則其陰陽虛實有不同矣其在心脾胃者太陰所謂上走心為噫者陰盛而上走於陽明陽明絡屬心故曰上走心為噫也有在肺者肺苦氣上逆也有在脾者足太陰厥氣上逆則霍亂也有在肝者肝脈若搏令人喘逆也有在腎者少陰所謂嘔咳上氣喘者陰氣在下陽氣在上諸陽氣浮無所依從也有在奇經者如衝脈為病逆氣裡急督脈生病從少腹上衝心而痛不得前後為沖疝也凡此者皆諸逆衝上之病雖諸衝上皆屬於火但陽盛者火之實陽衰者火之虛治分補瀉於此詳之諸脹腹大皆屬於熱熱氣內盛者在肺則脹於上在脾胃則脹於中在肝腎則脹於下此以火邪所至乃為煩滿故曰諸脹腹大皆屬於熱如歲火太過民病脅支滿少陰司天肺䐜腹大滿膨膨而喘咳少陽司天身面胕腫腹滿仰息之類皆實熱也然歲水太過民病腹大脛腫歲火不及民病脅支滿胸腹大流衍之紀其病脹水鬱之發善厥逆痞堅腹脹太陽之勝腹滿食減陽明之復為腹脹而泄又如適寒涼者脹臟寒生滿病胃中寒則脹滿是皆言熱不足寒有餘也腹滿不減減不足言須當下之宜與大承氣湯言實脹也腹脹時減復如故此為寒當與溫藥言虛脹也治此者不可不察也諸躁狂越皆屬於火躁煩躁不寧也狂狂亂也越失常度也熱盛於外則肢體躁擾熱盛於內則神志燥煩蓋火入於肺則煩火入於腎則躁煩為熱之輕躁為熱之甚耳如少陰之勝心下熱嘔逆躁煩少陽之復心熱躁煩便數憎風之類是皆火勝之躁也然有所謂陰躁者如歲水太過寒氣流行邪害心火民病心熱煩心躁悸陰厥譫妄之類陰之勝也是為陰盛發躁名曰陰躁凡內熱而躁者有邪之熱也病多屬火外熱而躁者無根之火也病多屬寒此所以熱躁宜寒陰躁宜熱也狂陽病也邪入於陽則狂重陽者狂如赫曦之紀血流狂妄之類陽狂也然復有虛狂者如悲哀動中則傷魂魂傷則狂妄不精喜樂無極則傷魄魄傷則狂狂者意不存人陽重脫者陽狂石之則陽氣虛虛則狂是狂亦有虛實補瀉不可誤用也諸暴強直皆屬於風暴猝也強直筋病強徑不柔和也肝主筋其化風風氣有餘如木鬱之發善暴僵仆之類肝邪實也風氣不足如委和之紀其動緛戾拘緩之類肝氣虛也此皆肝木本氣之化故曰屬風非外來虛風八風之謂凡諸病風而筋為強急者正以風位之下金氣乘之燥隨風生其燥益甚治宜補陰以制陽養營以潤燥故曰治風先治血血行風自滅此最善之法也設誤認為外感之邪而用疏風愈風等劑則益燥其燥非惟不能去風而適所以致風矣諸病有聲鼓之如鼓皆屬於熱鼓之如鼓脹而有聲也為陽氣所逆故屬於熱然胃中寒則腹脹腸中寒則腸鳴飧泄中氣不足腸為之苦鳴此又皆寒脹之有聲者也諸病胕腫疼酸驚駭皆屬於火胕腫浮腫也胕腫疼酸者陽實於外火在經也驚駭不寧者熱乘陰分火在臟也故如少陰少陽司天皆為瘡瘍胕腫之類是火之實也然伏明之紀其發痛太陽司天為胕腫身後癰太陰所至為重胕腫太陽在泉寒復內余則腰尻股脛足膝中痛之類皆以寒濕之勝而為腫為痛是又火之不足也至於驚駭虛實亦然如少陰所至為驚駭君火盛也若委和之紀其發驚駭陽明之復亦為驚駭此又以木衰金勝肝膽受傷火無生氣陽虛所致當知也諸轉反戾水液渾濁皆屬於熱諸轉反戾轉筋拘攣也水液小便也熱氣燥爍於筋則攣瘛為痛火主燔灼燥動故也小便渾濁者天氣熱則水渾濁寒則清潔水體清而火體濁故也又如清水為湯則自然濁也此所謂皆屬於熱宜從寒者是也然其中亦各有虛實之不同者如傷暑霍亂而為轉筋之類宜用甘涼調和等劑清其亢烈之火者熱之屬也如感冒非時風寒或因暴雨之後濕毒中臟而為轉筋霍亂宜用辛溫等劑理中氣以逐陰邪者寒之屬也大抵熱勝者必多煩躁焦渴寒勝者必多厥逆畏寒故太陽之至為痙太陽之復為腰脽反痛屈伸不便水鬱之發為大關節不利是皆陽衰陰勝之病也水液之濁雖為屬火然思慮傷心勞倦傷脾色欲傷腎三陰損虧者多有是病又中氣不足溲便為之變則陰陽盛衰又未可盡為實熱諸病水液澄徹清冷皆屬於寒水液者上下所出皆是也水體清其氣寒故凡或吐或利水穀不化而澄徹清冷者皆得寒水之化如秋冬寒冷水必澄清也諸嘔吐酸暴注下迫皆屬於熱胃膈熱甚則為嘔火氣炎上之象也酸者肝木之味也由火盛制金不能平木則肝木自甚故為酸也暴注卒暴注泄也腸胃熱甚而傳化失常火性疾速故如是也下迫後重裡急迫痛也火性急速而能燥物故也是皆就熱為言亦屬暴病故耳或有屬虛屬寒屬濕又當久病宜臨病而察之不可捫籥以為日也謹守病機各司其屬有者求之無者求之盛者責之虛者責之必先五勝疏其血氣令其調達而致和平上文一十九條即病機也機者要也變也病變所由出也凡或有或無皆謂之機有者言其實無者言其虛求之者求有無之本也夫大寒而甚熱之不熱是無火也當助其心大熱而甚寒之不寒是無水也熱動復止倏忽往來時動時止是無水也當助其腎內格嘔逆食不得入是有火也病嘔而吐食入反出是無火也暴速注下食不及化是無水也溏泄而久止發無恆是無水也故心盛則生熱腎盛則生寒腎虛則寒動於中心虛則熱收於內又熱不得寒是無水也寒不得熱是無火也夫寒之不寒責其無水熱之不熱責其無火熱之不久責心之虛寒之不久責腎之少有者瀉之無者補之虛者補之盛者瀉之適其中外疏其雍塞令上下無礙氣血通調則寒熱自和陰陽調達矣是以方有治熱以寒寒之而火食不入攻寒以熱熱之而昏躁以生此則氣不疏通雍而為是也紀於水火餘氣可知故曰有者求之無者求之盛者責之虛者責之令氣通調妙之道也五勝謂五行更勝也先以五行寒暑溫涼濕酸鹹甘辛苦相勝為法也邪氣喜怒不節則傷臟臟傷則病起於陰清濕襲虛則病起於下風雨襲虛則病起於上是雖三部至於淫泆不可勝數百病治生無非外感內傷上中下三部之分也至其浸淫流泆則變有不可勝數矣然風雨寒熱不得虛邪不能獨傷人卒然逢疾風暴雨而不病者蓋無虛故邪不能獨傷人必因虛邪之風與其身形兩虛相得乃客其形兩實相逢衆人肉堅其中於虛邪也因於天時與其身形參以虛實大病乃成氣有定舍因處為名上下中外分為三員從沖後來者為虛風傷人者也從所居之鄉來者為實風主生長養萬物者也若人氣不虛雖遇虛風不能傷人故必以身之虛而逢天之虛兩虛相得乃客其形也若天有實風人有實氣兩實相逢而衆人肉堅邪不能入矣三員如虛邪之中人病因表也積聚之已成病因內也情欲之傷臟病在陰也是故虛邪之中人也始於皮膚皮膚緩則腠理開開則邪從毛髮入入則抵深深則毛髮立毛髮立則淅然故皮膚痛此下言陽邪傳舍之次也邪之中人必由表入里始於皮膚表虛則皮膚緩故邪得乘之邪在表則毛髮豎立因而淅然寒邪傷衛則血氣凝滯故皮膚為痛凡寒邪所襲之處必多痠痛察系何經在陰在陽或深或淺從可知矣診表證者當先乎此也留而不去則傳舍於絡脈在絡之時痛於肌肉其痛之時息大經乃代邪在皮毛當治於外留而不去其入漸深則傳舍於絡脈絡淺於經故痛於肌膚之間若肌肉之痛時漸時息是邪將去絡而深大經代受之矣留而不去傳舍於經在經之時灑淅喜驚絡浮而淺經隱而深邪氣自絡入經猶為在表故灑淅惡寒然經氣連臟故又喜驚也留而不去傳舍於輸在輸之時六經不通四肢則肢節痛腰脊乃強凡諸輸穴皆經氣聚會之處其所留止必在關節溪谷之間故邪氣自經傳舍於輸則六經為之不通而肢節腰脊為痛為強也留而不去傳舍於伏沖之脈在伏沖之時體重身痛伏沖之脈即衝脈之在脊者以其最深故曰伏沖邪自經輸留而不去深入於此故為體重身痛等病留而不去傳舍於腸胃在腸胃之時賁向腹脹多寒則腸鳴飧泄食不化多熱則溏出麋邪氣自經入臟則傳舍於腸胃而為奔向腹脹之病寒則澄徹清冷水穀不分故為腸鳴飧泄食不化熱則濁垢下注故為溏為麋以麋穢如泥也留而不去傳舍於腸胃之外募原之間留著於脈稽留而不去息而成積腸胃之外募原之間謂皮裡膜外也是皆隱蔽曲折之處氣血不易流通若邪氣留著於中則止息成積如瘧痞之屬也或著孫脈或著絡脈或著經脈或著輸脈或著於伏沖之脈或著於膂筋或著於腸胃之募原上連於緩筋邪氣淫泆不可勝論此下言邪氣所著淫泆之變也募原如手太陰中府為募太淵為原之類也緩筋支別之柔筋也其著孫絡之脈而成積者其積往來上下臂手孫絡之居也浮而緩不能句積而止之故往來移行腸胃之間水湊滲注灌濯濯有音有寒則䐜脹滿雷引故時切痛凡絡脈之細小者皆孫絡也句拘也邪著孫絡成積者其積能往來上下蓋積在大腸小腸之絡皆屬於經其絡浮而淺緩而不急不能句積而留止之故移行於腸胃之間若有水則湊滲注灌濯濯有聲若有寒則為脹滿及雷鳴相引時為切痛句音垢其著於陽明之經則挾臍而居飽食則益大飢則益小足陽明經挾臍下行故其為積則挾臍而居也陽明屬胃受水穀之氣故飽則大飢則小其著於緩筋也似陽明之積飽食則痛飢則安緩筋在肌肉之間故似陽明之積飽則肉壅故痛飢則氣退故安其著於腸胃之募原也痛而外連於緩筋飽食則安飢則痛腸胃募原痛連緩筋飽則內充外舒故安飢則反是故痛其著於伏沖之脈者揣之應手而動發手則熱氣下於兩股如湯沃之狀伏沖其上行者循背裡終於督脈其下行者注少陰之大絡出於氣街循陰股內廉入膕中故揣按於股則應手而動若起其手則熱氣下行於兩股間此邪著伏沖之驗也其著於膂筋在腸後者飢則積見飽則積不見按之不得膂脊骨也脊內之筋曰膂筋故在腸胃之後飢則腸空故積可見飽則腸滿蔽之故積不可見按之亦不可得也其著於輸之脈者閉塞不通津液不下孔竅乾壅輸脈者所以通血氣若閉塞不通則津液干壅此邪氣之從外入內從上下也此總結上文邪氣之起於陽者必自外而內從上而下也積之始生得寒乃生厥乃成積也厥氣生足悗悗生脛寒脛寒則血脈凝澀血脈凝澀則寒氣上入於腸胃入於腸胃則䐜脹䐜脹則腸外之汁沫迫聚不得散日以成積此言寒氣下逆之成積者也厥氣逆氣也寒逆於下故生足悗謂肢節痛滯不便利也由脛寒而血氣凝澀則寒氣自下而上漸入腸胃腸胃寒則陽氣不化故為䐜脹而腸外汁沫迫聚不散則日以成積矣卒然多食飲則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血腸胃之絡傷則血溢於腸外腸胃有寒汁沫與血相搏則併合凝聚不得散而積成矣此言食飲起居失節之成積者也卒然多食飲謂食不從緩多而暴也腸胃運化不及則汁溢膜外與血相搏乃成食積如嬰童痞疾之類是也又或起居用力過度致傷陰陽之絡以動其血瘀血得寒汁沫相聚於腸外乃成血積此必縱肆口腹及舉動不慎者多有之卒然外中於寒若內傷於憂怒則氣上逆氣上逆則六輸不通溫氣不行凝血蘊里而不散津液澀滲著而不去而積皆成矣此言情志內傷而挾寒成積者也寒邪既中於外憂怒復傷其內氣因寒逆則六經之輸不通暖氣不行則陰血凝聚血因氣逆而成積此必情性乖戾者多有之也其生於陰者憂思傷心重寒傷肺忿怒傷肝醉以入房汗出當風傷脾用力過度若入房汗出浴則傷腎此言情欲傷臟病起於陰也傷心者病在陽傷肺者病在氣傷肝者病在血傷脾者病在營衛傷腎者病在真陰凡傷臟者皆病生於陰也此內外三部之所生病者也邪氣之中人高下有度身半以上者邪中之也身半以下者濕中之也陽受風氣陰受濕氣也中於陰則溜於腑中於陽則溜於經陰之與陽異名同類上下相會經絡之相貫如環無端或於陰或於陽上下左右無有恆常諸陽之會皆在於面中人也方乘虛時及新用力若飲食汗出腠理開而中於邪中於面則下陽明中於項則下太陽中於頰則下少陽此言邪之中於陽經也手足六陽俱會於頭面故為諸陽之會凡足之三陽從頭走足故中於面則自胸腹下行於陽明經也中於項則自脊背下行於太陽經也中於頰則自脅肋下行於少陽經也脈遍周身者惟足六經耳故但言足也其中於膺背兩脅亦中其經膺在前陽明經也背在後太陽經也兩脅在側少陽經也中此三陽經與上同中於陰者常從臂胻始夫臂與胻其陰皮薄其肉淖澤故俱受於風獨傷其陰此言邪之中於陰經也胻足脛也淖澤柔潤也臂胻內廉曰陰手足三陰之所行也其皮薄其肉柔故邪中於此則傷其陰經身之中於風也不必動臟入於陰經臟氣實不能客還之於腑故曰中陽則溜於經中陰則溜於腑邪中陰經當內連五臟而臟氣固者邪不能客未必動臟則還之於腑仍在表也故邪中陽者溜於三陽之經邪中陰者溜於三陰之腑如心之及小腸脾之及胃肝之及膽包絡之及三焦腎之及膀胱此以邪中三陰亦有表證明者所當察也邪之中人臟者愁憂恐懼則傷心形寒飲冷則傷肺以其兩相感觸中外皆傷故氣逆而上行此下言邪之中於五臟也然必其內有所傷而後外邪得以入之心藏神憂愁恐懼則神怯故傷心也肺合皮毛其臟畏寒形寒飲冷故傷肺也若內有所傷而外復有感則中外皆傷故氣逆而上行在表則為寒熱疼痛在裡則為喘咳嘔噦等病有所墮墜惡血留內有所大怒氣上而不下積於脅下則傷肝肝藏血其志為怒其經行脅下也有所擊僕若醉入房汗出當風則傷脾脾主肌肉飲食擊僕者傷其肌肉醉後入房汗出當風者因於酒食故所傷皆在脾有所用力舉重若入房過度汗出浴水則傷腎腎主精與骨用力舉重則傷骨入房過度則傷精汗出浴水則水邪犯其本臟故所傷皆在腎五臟之中風者陰陽俱感邪乃得住此承上言必由中外俱感而後邪乃得往往進也虛邪之中身也灑淅動形正邪之中人也微先見於色不知於身若有若無若亡若存有形無形莫知其形有一脈生數十病者或痛或癰或熱或寒或癢或痹或不仁變化無窮皆邪氣之所生也一脈猶言一經也邪氣即風也虛邪賊風善行數變故其為病變化無窮氣者有真氣有正氣有邪氣真氣者所受於天與穀氣並而充身也真氣即元氣也氣在天者受於鼻而喉主之在水穀者入於口而咽主之然鍾於未生之初者曰先天之氣成於已生之後者曰後天之氣氣在陽分即陽氣在陰即陰氣在表曰衛氣在裡曰營氣在脾曰充氣在胃曰胃氣在上焦曰宗氣在中焦曰中氣在下焦曰元陰元陽之氣皆無非其別名耳正氣者正風也從一方來非實風又非虛風也從一方來謂太乙所居之方也風得時之正者為正風然正風實風本同一方而此曰非實風者以正風之來徐而和故曰正氣實風之來暴而烈故與虛風對言也邪氣者虛風之賊傷人也其中人也深不能自去從沖後來者為虛風其中人也甚故深入不能自去正風者其中人也淺合而自去其氣來柔弱不能勝真氣故自去合而自去謂邪與正合而正勝之故自去也虛邪之中人也灑淅動形起毫毛而發腠理其入深內搏於骨則為骨痹搏於筋則為筋攣搏於脈中則為血閉不通則為癰搏於肉與衛氣相搏陽勝者則為熱陰勝者則為寒寒則真氣去去則虛虛則寒搏於皮膚之間灑淅寒栗也邪之中人變不可測故無分皮肉筋骨著則為病也若與衛氣相搏陽勝則熱陰勝則寒皆邪氣也曰寒則真氣去去則虛蓋氣屬陽人以氣為主寒勝則陽虛所重在氣也陽氣既虛則陰寒搏聚於皮膚之間矣其氣外發腠理開毫毛搖氣往來行則為癢留而不去則痹衛氣不行則為不仁邪之在表者其氣外發或腠理開則汗為不斂或毫毛動搖則毛瘁而敗或氣往來行則流而為癢或邪留不去則痛而為痹若衛氣受傷虛而不行則不知痛癢是謂不仁虛邪偏客於身半其入深內居榮衛榮衛稍衰則真氣去邪氣獨留發為偏枯其邪氣淺者脈偏痛虛邪若中於半身其入深而重者則營衛衰真氣去乃發為偏枯若邪之淺者亦當為半身偏痛也虛邪之入於身也深寒與熱相搏久留而內著寒勝其熱則骨痛肉枯熱勝其寒則爛肉腐肌為膿內傷骨內傷骨為骨蝕邪中於外者必寒氣蓄於內者必熱寒邪深入與熱相搏欠留不去必內有所著故寒勝則傷陽而為痛為枯熱勝則傷陰而為膿為腐其最深者內傷於骨是為骨蝕為侵蝕及骨也有所疾前筋筋屈不得伸邪氣居其間而不反發為筋溜有所疾前筋謂疾有始於筋也筋之初著於邪則筋屈不得伸若久居其間而不退則發為筋溜筋溜者有所流注而結聚於筋也即贅瘤之屬下仿此有所結氣歸之衛氣留之不得反津液久留合而為腸溜邪有所結氣必歸之故致衛氣失常留而不反則蓄積於中流注於腸胃之間乃結為腸溜久者數歲乃成以手按之柔已有所結氣歸之津液留之邪氣中之凝結日以易甚連以聚居為昔瘤其有久者必數歲而後成也然其始也按之雖柔或上或下已有所結及其久也氣漸歸之津液留之復中邪氣則易於日甚乃結為昔瘤昔瘤者非一朝一夕之謂以手按之堅有所結深中骨氣因於骨骨與氣並日以益大則為骨疽又有按之而堅者其深中骨是氣因於骨而然骨與氣並其結日大名為附骨疽也有所結中於肉宗氣歸之邪留而不去有熱則化而為膿無熱則為肉疽又有結於肉中者則宗氣歸之宗大也以陽明之氣為言邪留為熱則潰腐肌肉故為膿無熱則結為粉漿之屬聚而不散是為肉疽凡此數氣者其發無常處而有常名也雖有常名而發無常處無常處則形證亦無常矣此所以變化無常也陰陽夫自古通天者生之本本於陰陽天地之間六合之內其氣九州九竅五臟十二節皆通於天氣自古之有生者皆通天元之氣以為生也其生之本陰陽而已大為六合廣為九州人之九竅五臟天之四時十二節皆氣候之所行營衛之所通也故曰皆通於天氣其生五其氣三數犯此者則邪氣傷人此壽命之本也人生雖本乎陰陽而稟分五行其生五也陰陽盛衰少太有三其氣三也有五有三則生克強弱變出其間矣得其和則為正氣而生物犯其變則為邪氣而傷物其生其死皆此三五耳故為壽命之本蒼天之氣清淨則志意治順之則陽氣固天色深玄故曰蒼天天氣者陽氣也上云生之本本於陰陽此專言陽氣者蓋生氣通天以陽為本陽氣既固陰必從之故聖人諄諄於此其示人之意深矣雖有賊邪勿能害也此因時之序陽氣固者其天全也天全則神全雖有賊風邪氣不能犯之蓋在乎因時之序如四氣調神之謂是也故聖人傳精神服天氣而通神明傳授也服佩也惟聖人者能得天之精神服天之元氣所以與天為一而神明可與天通矣失之則內閉九竅外壅肌肉衛氣散解九竅通於內肌肉衛於外其行其固皆陽氣為之主也失之則失其清陽之化故九竅肌肉皆為閉壅矣人之衛氣本於天之陽氣陽虛則衛虛衛氣散解則天真失守故重在衛陽也此謂自傷氣之削也自傷其真陽元氣削也陽氣者若天與日失其所則折壽而不彰此發明陽氣之本也日不明則天為陰晦陽不固則人為夭折皆陽氣之失所也故天運當以日光明天不自明明在日月月體本黑得日乃明此天運必以日光明也日即陽也陽即明也陽之所在明必隨之明之所及陽之至耳陽明一體本無二也然陽在午則為晝而日麗中天著有象之神明離之陽在外也陽在子則為夜而火伏水中化無形之元氣坎之陽在內也君火以明相火以位曰君曰相無非陽氣之所在苟或失序欲保天年其可得乎是故陽因而上衛外者也欲如運樞起居如驚神氣乃浮此下言陽氣不固者四時之邪皆得以傷之也清陽為天包覆萬物故因於上而衛於外人之衛氣亦猶是也欲其如運樞周旋不已不息若舉動躁妄則神氣浮越即不能固其陽氣也邪乃侵之因於寒體若燔炭汗出而散感寒邪則發熱得汗而解南人曰傷寒北人曰熱病其所感陰陽虛實經絡臟腑即病不即病傳變不傳變惟仲景書另為聖經所當玩索者也因於暑汗煩則喘喝靜則多言暑有陰陽二證陽證因於中熱陰證因於中寒但感在夏至之後者皆謂之暑耳暑是熱中之涼氣非即熱也暑傷於陽者汗出煩躁為喘為大聲呼喝若其靜者亦不免於多言蓋邪傷於陰精神內亂故言無倫次也故曰靜而得之為中暑動而得之為中熱中暑者陰證中熱者陽證避暑熱於深堂大廈得之者名曰中暑其病必頭痛惡寒身形拘急肢節疼痛而煩心肌膚火熱無汗此為房室之陰寒所遏使周身陽氣不得伸越也又有觸熱太過氣不得伸面垢悶倒名曰中暍若行人或農夫於日中勞役得之者名曰中熱其病必苦頭痛發躁熱惡熱捫之肌膚大熱必大渴引飲汗大泄無氣以動乃為天熱外傷肺氣也一中於熱一中於寒皆謂之暑但治寒宜散必汗出而解治熱宜涼必熱清而愈然夏月浮陽在外伏陰在內若人以飲食情欲傷其內或冒暑貪涼勞役過度傷其外及元氣素虛之輩最易患此香薷等豈宜泛用要當以調補元氣為主然後察其寒熱而佐以解暑之劑若果為陰寒所中則附子薑桂先哲每多用之不可因炎熱在外而忽舍時從證之良法也因於濕首如裹濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿濕土用事雖屬長夏之氣然土王四季則感發無時但濕之中人有內外上下之辨濕傷外者雨霧陰濕之屬也濕傷內者酒漿乳酪之屬也濕在上則首如裹謂若以物蒙裹然者凡人行瘴霧之中及酒多之後覺脹壅頭面即其狀也濕熱濕鬱成熱也攘退也濕熱不退而下及肢體大筋受之則血傷故為緛短小筋受之則柔弱故為弛長緛短故拘攣不伸弛長故痿弱無力因於氣為腫四維相代陽氣乃竭因於氣者凡衛氣營氣臟腑之氣皆氣也一有不調皆能致疾四維四肢也相代更迭而病也因氣為腫氣道不行也四肢為諸陽之本胃氣所在病盛而至於四維相代即上文內閉九竅外壅肌肉衛氣散解之謂其為陽氣之竭也可知陽氣者煩勞則張精絶闢積於夏使人煎厥此下言起居不節致傷陽氣也闢病也人以陽氣為生惟恐散失若煩勞過度則形氣弛張於外精神竭絶於中陽擾陰虧不勝炎熱故病積至夏日以益甚令人五心煩熱如煎如熬孤陽外浮真陰內奪氣逆而厥故名煎厥目盲不可以視耳閉不可以聽潰潰乎若壞都汩汩乎不可止目盲耳閉九竅廢也潰潰壞貌都城郭之謂汩汩逝而不返也陰以陽虧精因氣竭精神日銷漸至衰敗真潰潰乎若都邑之壞汩汩乎其去不可綰也汩音骨陽氣者大怒則形氣絶而血菀於上使人薄厥此下言怒氣傷肝及汗濕肥甘風寒之類皆足以傷陽氣也人之陽氣惟貴充和若大怒傷肝則氣血皆逆甚至形氣俱絶則經脈不通故血逆妄行菀積於上焦也相迫曰薄氣逆曰厥氣血俱亂故為薄厥有傷於筋縱其若不容怒傷形氣必及於筋肝主筋也筋傷則縱緩不收手足無措其若不能容者汗出偏沮使人偏枯沮傷也壞也有病偏汗者或左或右浸潤不止氣血有所偏沮久之則衛氣不固於外營氣失守於中故當為半身不隨偏枯之患沮將魚切汗出見濕乃生痤痱汗方出則玄府開若見濕氣或沃涼水必留膚腠甚者為痤微者為痱痤小節也痱暑疹也痤才和切痱音沸高梁之變足生大疔受如持虛高梁即高粱肥甘也足多也能也厚味太過蓄為內熱其變多生大疔熱侵陽分感發最易如持空虛之器以受物故曰受如持虛勞汗當風寒薄為齇郁乃痤形勞汗出坐臥當風寒氣薄之液凝為齇即粉刺也若鬱而稍大乃成小癤是名曰痤凡若此者皆陽氣不固之使然齇支加切陽氣者精則養神柔則養筋此下言陽氣之運用若有不同則為僂為瘻為畏為驚為癰為瘧為隔等症也神之靈通變化陽氣之精明也筋之運動便利陽氣之柔和也故精則養神柔則養筋陽氣去則神明亂筋骨廢為病為危矣開闔不得寒氣從之乃生大僂開謂皮腠發泄闔謂玄府閉封皆衛氣為之主也若衛氣失所則當開不開當閉不閉不得其宜為寒所襲結於經絡之間緛急不伸則形為僂俯矣陽急則反折陰急則俯不伸即此之謂陷脈為瘻留連肉腠陷脈寒氣自經絡而陷入脈中也瘻鼠瘻之屬邪結不散則留連肉腠曼延日甚也俞氣化薄傳為善畏乃為驚駭寒氣自脈漸深流於經俞氣化內薄則侵及臟腑故傳為恐畏為驚駭以陽氣受傷於內也營氣不從逆於肉理乃生癰腫邪氣陷脈則營氣不從營行脈中也不從則不順故逆於肉理聚為癰腫也魄汗未盡形弱而氣爍穴俞以閉發為風瘧魄陰也汗由陰液故曰魄汗汗出未止衛氣未固其時形氣正在消弱而風寒薄之俞穴隨閉邪氣留止鬱而為瘧以所病在風故曰風瘧夏暑汗不出者秋成風瘧亦言俞穴之閉也故風者百病之始也清靜則肉腠閉拒雖有大風苛毒弗之能害此因時之序也凡邪傷衛氣如寒暑濕氣風者莫不緣風氣以入故風為百病之始然衛氣者陽氣也人惟清靜無過勞擾則腠理閉而陽氣固雖有大風苛毒弗之能害也所謂清靜者無他在因四時之氣序耳故病久則傳化上下不並良醫弗為並陰陽交通也病始因風久必傳化及至上下不並則陰陽相離水火不相濟矣雖有良醫弗可為也故陽蓄積病死而陽氣當隔隔者當瀉不亟正治粗乃敗之若邪蓄陽分積而不行陽亢無陰其病當死蓋即上下不並之謂也何以驗之隔塞不通則其證耳當瀉不瀉正以粗工誤之故致敗亡陽氣者一日而主外平旦人氣生日中而陽氣隆日西而陽氣已虛氣門乃閉此下言陽氣之盛衰由於日之升降正以明上文若天與日之義也一日而主外晝則陽氣在外也平旦人氣生以日初升也日中陽氣隆以日當午也日西陽氣虛以日漸降也人氣應之故晝則衛氣行於陽分二十五度至日暮則陽氣之門閉而行於陰分二十五度矣氣門玄府也所以通行營衛之氣故曰氣門是故暮而收拒無擾筋骨無見霧露反此三時形乃困薄此所以順陽氣也陽出而出陽藏而藏暮時陽氣藏於陰分故動宜收斂以拒虛邪無擾筋骨則陽不耗於內無見霧露則邪不侵於外若勞擾不分朝暮反此三時則陽氣失養形體勞困衰薄矣不但因時之序一日之間亦當如此也陰者藏精而起亟也陽者衛外而為固也此以專言陽氣夫及於陰故特明之人有陰陽陽主外而為衛所以固氣也陰主內而藏精所以起亟也陰內陽外氣欲和平不和則病矣亟即氣也精化為氣藏精起氣之謂也亟音氣陰不勝其陽則脈流薄疾並乃狂薄氣相迫也疾急數也並者陽邪入於陽分謂重陽也陰不勝陽則陽邪盛故當為陽脈陽證之外見者如此陽不勝其陰則五臟氣爭九竅不通邪在陰分則臟氣不和故有所爭上七竅五官也下二竅二陰也九竅之氣皆屬於臟陽不勝陰則陰邪盛故當為陰病之內見者如此是以聖人陳陰陽筋脈和同骨髓堅固氣血皆從陳陰陽猶言鋪設得所不使偏勝也故於筋脈骨髓無不和調氣血皆從從則順矣如是則內外調和邪不能害耳目聰明氣立如故耳目聰明以九竅之要者言神氣之全可知也人受天地之氣以立命故曰氣立陰陽和而氣立如故也風客淫氣精乃亡邪傷肝也此下四節皆失調和之道所以為筋骨氣血之病也淫氣者陰陽之亂氣也表不和則風邪客之風木生火淫氣化熱熱則傷陰精乃消亡風氣通於肝故必先傷肝也然風為百病之始故凡病因於外而內連五臟者皆由乎風也因而飽食筋脈橫解腸澼為痔此下三節皆兼上文風客淫氣而言也風氣既淫於外因而飽食則隨客陽明必腸胃橫滿橫滿則有損傷故筋脈弛解病為腸澼為痔而下痢膿血也因而大飲則氣逆酒挾風邪則因辛走肺故肺布葉舉而氣逆上奔也因而強力腎氣乃傷高骨乃壞高骨腰之高骨也凡因風強力者其傷在骨骨傷則腎氣亦傷腎主骨也若強力入房尤傷精髓髓者骨之充骨者髓之府精髓耗傷故高骨壞而不為用凡陰陽之要陽密乃固陽為陰之衛陰為陽之宅必陽氣閉密於外無所妄耗則邪不能害而陰氣完固於內此培養陰陽之要也兩者不和若春無秋若冬無夏因而和之是謂聖度兩陰陽也不和偏病也故陽強不能密陰氣乃絶強亢也孤陽獨用不能固密則陰氣耗而竭絶也陰平陽祕精神乃治平即靜也祕即固也人生所賴惟精與神精以陰生神從陽化故陰平陽祕則精神治矣陰陽離決精氣乃絶決絶也有陽無陰則精絶有陰無陽則氣絶兩相離決非病則亡正以見陰陽不可偏廢也因於露風乃生寒熱上文言風瘧風客淫氣皆未悉風之為義故此復言之而並及四時之邪也因露於風者寒邪外侵陽氣內拒陰陽相簿故生寒熱春傷於風邪氣留連乃為洞泄春傷於風木邪勝也留連既久則剋制脾土故為洞泄夏傷於暑秋為痎瘧夏傷暑邪若不即病而留延至秋寒鬱為熱故寒熱交爭而為痎瘧秋傷於濕上逆為咳發為痿厥濕土用事於長夏之末故秋傷於濕也秋氣通於肺濕鬱成熱則上乘肺金故氣逆而為咳嗽傷於濕者下先受之則為痿為厥痿多屬熱厥則因寒也冬傷於寒春必溫病冬傷寒邪則寒毒藏於陰分至春夏陽氣上升新邪外應乃為溫病藏精者生不藏者死四時之氣更傷五臟風暑寒濕迭相勝負故四時之氣更傷五臟然時氣外傷陽邪也五臟內應陰氣也惟內不守而後外邪得以犯之所以明陰氣不守之為病陰之所生本在五味陰氣五宮傷在五味此下言陰之所以生者在五味而所以傷者亦在五味也五宮五臟也味得地氣故能生五臟之陰若五臟不節則各有所克反傷其陰矣味過於酸肝氣以津脾氣乃絶津溢也酸入肝過於酸則肝氣溢酸從木化木實則剋土故脾氣乃絶味過於咸大骨氣勞短肌心氣抑鹹入腎腎主骨過於咸則傷腎故大骨氣勞勞困劇也咸走血血傷故肌肉短縮咸從水化水勝則剋火故心氣抑味過於甘心氣喘滿色黑腎氣不衡甘入脾過於甘則滯緩上焦故心氣喘滿甘從土化土勝則水病故黑色見於外而腎氣不衡於內衡平也味過於苦脾氣不濡胃氣乃厚苦入心過於苦則心陽受傷而脾失所養氣乃不濡濡潤也脾氣不濡則胃氣留滯故曰乃厚厚者脹滿之謂味過於辛筋脈沮弛精神乃殃辛入肺過於辛則肺氣乘肝肝主筋故筋脈沮弛辛散氣則精神耗傷故曰乃殃是故謹和五味骨正筋柔氣血以流腠理以密如是則氣骨以精謹道如法長有天命五味入口藏於胃以養五臟氣故當謹和五味則骨正筋柔氣血以流陰氣在裡腠理在外而曰腠理以密者陽密足以固陰陰強乃能壯陽也邪因於外為喘喝為痿厥為精亡為洞泄咳嗽陽病及陰也病因於內為煩勞大怒飲食起居不節為煎厥為形氣絶為筋脈腸痔氣逆骨壞是陰病及陽也所以首言陽氣以發通天之大本續言陰氣以備陰陽之義前言氣氣本於天以養陽也後言味味本於地以養陰也曰通氣曰服天氣曰長有天命所重在天則其重在陽氣可知矣然言地者必該乎天言陰者必主乎陽也二陽之病發心脾有不得隱曲女子不月二陽陽明也為胃與大腸二經然大腸小腸皆屬於胃此節所言則獨重在胃耳蓋胃與心母子也人之情欲本以傷心母傷則害及其子胃與脾表裡也人之勞倦本以傷脾臟傷則病連於腑故凡內而傷精外而傷形皆能病及於胃此二陽之病所以發於心脾也不得隱曲陽道病也宗筋會於氣街而陽明為之長既病則陽道外衰故為不得隱曲其在女子當為不月亦其候也其薄為風消其傳為息賁者死不治風木氣也消枯瘦也賁急迫也陽明受病久而傳變則木邪勝土故肌體風消胃病則肺失所養故氣息奔急氣竭於上由精虧於下敗及五臟故死不治三陽為病發寒熱下為癰腫乃為痿厥腨悁三陽太陽也為膀胱小腸二經三陽為表故病發寒熱及為癰腫足太陽之脈從頭下背貫臀入膕循腨抵足故其為病則足膝無力曰痿逆冷曰厥足肚痠疼曰腨肩也腨音篆悁音淵其傳為索澤其傳為㿗疝陽邪在表為熱則皮膚潤澤之氣必皆消散是為索澤也㿗疝者小腹控睪而痛也陽發病少氣善咳善泄一陽少陽也為膽與三焦二經膽屬風木三焦屬相火其為病也壯火則食氣傷肺故為少氣為咳木強則侮土故善泄其傳為心掣其傳為膈心為君火而相火上炎則同氣相求邪歸於心心動不寧若有所引名曰心掣又其傳者以木乘土脾胃受傷乃為膈證二陽一陰發病主驚駭背痛善噫善欠名曰風厥二陽胃與大腸也一陰肝與心主也肝胃二經皆主驚駭背痛者手足陽明之筋皆挾脊也噫噯氣也其主在心欠呵欠也雖主於腎又足陽明病為數欠肝與心包風熱為邪而陽明受之故病名風厥二陰一陽發病善脹心滿善氣二陰心與腎也一陽膽與三焦也膽經邪勝則侮脾故善脹腎經邪勝則乘心故心滿三焦病則上下不行故善氣也三陰三陽發病為偏枯痿易四肢不舉三陽膀胱小腸也三陰脾肺也膀胱之脈自頭背下行兩足小腸之脈自兩手上行肩胛且脾主四肢肺主諸氣四經俱病故當為偏枯為痿易為四肢不舉痿易者痿弱不支左右相掉易也鼓一陽曰鉤鼓一陰曰毛鼓陽勝急曰弦鼓陽至而絶曰石陰陽相過曰溜此舉五脈之體以微盛分陰陽非若上文言經次之陰陽也鼓有力也一陽一陰言陰陽之微也脈於微陽而見鼓者為鉤其氣來盛去衰應心脈也脈於微陰而見鼓者曰毛其氣來輕虛以浮應肺脈也鼓動陽脈勝而急者曰弦其氣來端直以長而不至甚急應肝脈也鼓陽至而絶者陽之伏也脈名曰石其氣來沉以摶應腎脈也陰陽相過謂流通平順也脈名曰溜其氣來柔緩而和應脾脈也陰爭於內陽擾於外魄汗未藏四逆而起起則熏肺使人喘鳴此兼表裡以言陰陽之害也表裡不和則或為臟病陰爭於內也或為經病陽擾於外也然或表或里皆干於肺蓋肺主氣外合於皮毛內為五臟六腑之長魄汗未藏者表不固也四逆而起者陽內竭也甚至正不勝邪則上熏及肺令人氣喘聲鳴此以營衛下竭孤陽獨浮其不能免矣陰之所生和本曰和陰者五臟之真陰也陰之所以生者以臟氣和臟氣之和以陰陽之和也不和則為爭為擾為剛為淖而病由興矣剛與剛陽氣破散陰氣乃消亡此言偏陽之為害也剛與剛陽之極也以火濟火盛極必衰故陽氣反為之破散陽氣散則陰氣不能獨存亦必從而消亡而陰陽俱絶矣淖則剛柔不和經氣乃絶此言偏陰之害也淖謂寒濕妄行陰氣勝也若陽剛陰柔皆失其和經氣從而敗絶矣死陰之屬不過三日而死生陽之屬不過四日而死此言臟氣相傳死生有異也四日而死當作四日而已蓋既屬生陽不當死也所謂生陽死陰者肝之心謂之生陽肝之心自肝傳心也以木生火得其生氣是謂生陽不過四日而愈心之肺謂之死陰心之肺自心傳肺也以火剋金陰氣散亡故曰死陰不過三日而死肺之腎謂之重陰肺金也腎水也雖曰母子而金水俱病故曰重陰無陽之候也腎之脾謂之闢陰死不治闢放闢也土本制水而水反侮脾水無所畏是謂闢陰故死不治闢音劈結陽者腫四肢此下言邪聚諸經之為病也陽六陽也結陽者腫四肢四肢為諸陽之本也結陰者便血一升再結二升三結三升陰六陰也陰主血邪結陰分則血受病故當便血其淺者便血一升則結邪當解若不解而再結以邪盛也故便血二升若又不解則邪為尤甚故曰三結三升也陰陽結邪多陰少陽曰石水少腹腫陰經陽經皆能結聚水邪若多在陰少在陽者名曰石水石水者沉堅在下其證則少腹腫也二陽結謂之消胃與大腸經也陽邪留結腸胃則消渴善飢其病曰消三陽結謂之隔膀胱小腸二經也小腸屬火膀胱屬水邪結小腸則陽氣不化邪結膀胱則津液不行下不通則上不運故為隔塞之病三陰結謂之水脾肺二經也脾土所以制水土病則水反侮之肺金所以生水氣病則水為不行故寒結三陰則氣化為水一陰一陽結謂之喉痹一陰肝與心主也一陽膽與三焦也肝膽屬木心主三焦屬火四經皆從熱化其脈並絡於喉熱邪內結故為喉痹痹閉也三陽為經經大經也周身之脈惟足太陽為巨通巔下背獨統陽分故曰經二陽為維維維絡也陽明經上布頭面下循胸裡獨居三陰之中維絡於前故曰維一陽為遊部少陽在側前行則會於陽明後行則會於太陽出入於二陽之間故曰遊部此知五臟終始視此三陽則五臟之終始可知矣三陰為表三陰太陰也太陰為諸陰之表故曰三陰為表二陰為里二陰少陰腎也腎屬水其氣沉其主骨故二陰為里陰至絶作晦朔卻具合以正其理一陰厥陰也厥盡也厥陰之氣應在戌亥六氣不幾於絶矣然陰陽消長之道陰之盡也如月之晦陽之生也如月之朔既晦而朔則絶而復生此所謂一陰至絶作晦朔也由是而始終循環氣數具合故得以正其造化之理矣三陽者太陽為經三陽脈至手太陰而弦浮而不沉決以度察以心合之陰陽之論手太陰肺經也本屬三陰之脈然諸脈皆會於氣口故特以三陽脈至手太陰為言也下仿此太陽之脈本洪大以長今其弦浮不沉是邪脈也乃當決其衰王之度察以吾心而合之陰陽之論則善惡可明矣二陽脈至手太陰弦而沉急不鼓炅至以病皆死陽明胃脈本浮大而短今則弦而沉急不能振鼓是木邪侮土陰氣乘陽也然熱至為病者尤忌此陰脈犯之為逆必皆死也一陽脈至手太陰上連人迎弦急懸不絶此少陽之病也專陰則死人迎足陽明脈也在結喉兩旁故曰上連人迎懸浮露如懸也少陽之脈其體乍數乍疏乍短乍長今則弦急如懸其至不絶兼之上乘胃經此木邪之勝少陽病也然少陽厥陰皆從木化若陽氣竭絶則陰邪獨盛弦搏至極是曰專陰專陰者死也三陰者六經之所主三陰太陰也三陰之臟脾與肺也肺主朝會百脈脾為萬物之母故三陰為六經之主交於太陰伏鼓不浮上空志心交於太陰謂三陰脈至氣口也肺主輕浮脾主和緩其本脈也今見伏鼓不浮則陰盛陽衰矣當病上焦空虛而脾肺之志以及心神為陰所傷皆致不足故曰上空志心志臟之志也二陰至肺其氣歸膀胱外連脾胃二陰至肺者言腎脈之至氣口也二陰搏至腎沉不浮者是也腎脈上行其直者從腎上貫肝膈入肺中出氣口是二陰至肺也腎主水得肺氣以行降下之令通調水道其氣歸膀胱也肺在上腎在下脾胃居中主其升降之柄故曰外連脾胃也外者腎對脾言即三陰為表二陰在裡之義陰獨至經絶氣浮不鼓鉤而滑一陰獨至厥陰脈勝也厥陰本脈當耎滑弦長陰中有陽乃其正也若一陰獨至則經絶於中氣浮於外故不能鼓鉤而滑而但弦無胃生意竭矣此六脈者乍陰乍陽交屬相併繆通五臟合於陰陽六脈者乍陰乍陽皆至於手太陰是寸口之脈可以交屬相併繆通五臟故能合於陰陽也先至為主後至為客六脈之交至有先後有以陰見陽者有以陽見陰者陽脈先至陰脈後至則陽為主而陰為客陰脈先至陽脈後至則陰為主而陽為客此先至為主後至為客之謂也然至有常變變有真假常陽變陰常陰變陽常者主也變者客也變有真假真變則殆假變無虞真者主也假者客也客主之義有脈體焉有運氣焉有久暫焉有逆順焉有主之先而客之後者焉診之精妙無出此矣肺豈易言哉三陽為父此詳明六經之貴賤也太陽總領諸經獨為尊大故稱為父二陽為衛捍衛諸經陽氣也一陽為紀紀於二陽之間即少陽為樞之義也三陰為母太陰滋養諸經故稱為母二陰為雌少陰屬水水能生物故曰雌亦二陰為里之義也一陰為獨使使者交通始終之謂陰盡陽生惟厥陰主之故為獨使二陽一陰陽明主病不勝一陰脈耎而動九竅皆沉此下言諸經合病有勝制也二陽土也一陰木也陽明厥陰相薄則肝邪侮胃故陽明主病不勝一陰耎者胃氣也動者肝氣也土受木邪則耎而兼動也九竅之氣皆陽明所及陽明病則胃氣不行故九竅皆為沉滯不通利矣三陽一陰太陽脈勝一陰不能止內亂內臟外為驚駭三陽一陰膀胱與肝合病也肝木生火而膀胱以寒水侮之故太陽脈勝一陰肝氣雖強不能禁止由是而風寒相挾內亂五臟肝氣受傷故發為驚駭之病二陰二陽病在肺少陰脈沉勝肺傷脾外傷四肢二陰手少陰也二陽足陽明也少陰為心火之臟火邪則傷金故病在肺陽明為胃土之府土邪必傷水故足少陰之脈沉沉者氣衰不振之謂然胃為脾腑脾主四肢火既勝肺胃復連脾脾病則四肢亦病矣二陰二陽皆交至病在腎罵詈妄行巔疾為狂二陰之至邪在腎也二陽之至邪在胃也水土之邪交至則土勝水虧水虧則陰不勝陽故病在腎土勝則陽明邪實故罵詈妄行巔疾為狂二陰一陽病出於腎陰氣客遊於心脘下空竅堤閉塞不通四肢別離二陰腎也一陽三焦也腎與三焦合病則相火受水之制故病出於腎腎脈之支者從肺出絡心注胸中故陰氣盛則客遊於心脘也陰邪自下而上陽氣不能下行故下焦空竅若有堤障而閉塞不通清陽實四肢陽虛則四肢不為用狀若別離於身者矣一陰一陽代絶此陰氣至心上下無常出入不知喉咽乾燥病在土脾一陰足厥陰肝也一陽足少陽膽也代絶者二臟氣傷脈來變亂也肝膽皆木本生心火病以陽衰則陰氣至心矣然木病從風善行數變故或上或下無有常處或出或入不知由然其為咽喉乾燥者蓋咽為肝膽之使又脾脈結於咽也故病在土脾正以風木之邪必剋土耳二陽三陰至陰皆在陰不通陽陽氣不能止陰陰陽並絶浮為血瘕沉為膿胕陰陽皆壯下至陰陽二陽胃也三陰肺也至陰脾也皆在皆病也脾胃相為表裡病則倉廩不化肺布氣於臟腑病則治節不行故致陰不通陽則陰自為陰不通入於陽分也陽氣不能止陰則陽自為陽不留止於陰分也若是者無復交通陰陽並絶矣故脈浮者病當在外而為血瘕脈沉者病當在內而為膿胕正以陰陽表裡不相交通故脈證之反若此至若陰陽皆壯則亢而為害或以孤陰或以孤陽病之所及下至陰陽蓋男為陽道女為陰器隱曲不調俱成大病也上合昭昭不合冥冥診決死生之期遂至歲首昭昭可見冥冥可測有陰陽之道在也故欲決死生之期者必當求至歲首如甲己之年丙寅作首則二月丁卯三月戊辰子午之年君火司天則初氣太陽二氣厥陰之類以次求之則五行衰王可得其逆順之期矣陰陽表裡上下雌雄相輸應也如三陽獨至者是三陽並至並至如風雨上為巔疾下為漏病三陽獨至雖兼手足太陽而言而尤以足太陽為之主故曰獨至蓋足太陽為三陽之綱領故凡太陽之邪獨至者則三陽氣會皆得隨而並至也陽邪之至疾速無期故如風雨且足太陽之脈上從巔入絡腦下絡腎屬膀胱手太陽之脈上循頸頰下抵胃屬小腸故上為頂巔之疾下為漏病漏病者二陰不禁凡水穀精血之類皆是也外無期內無正不中經紀診無上下三陽並至倏如風雨故外無證據可期內無名目可正病變之至不中於經常綱紀故其證也亦無上下一定之法蓋三陽者至陽也積並則為驚病起疾風至如礔礪九竅皆塞陽氣滂溢干嗌喉塞太陽為至盛之陽故曰至陽若諸陽更為積並則陽盛之極心傷陰氣手太陽之陰心也足太陽之陰腎也心傷其神腎傷其志則為驚駭疾風礔礪皆速暴之謂其為九竅嗌喉之干塞者以手太陽手足少陰之脈皆循咽喉也並於陰則上下無常薄為腸澼陰臟也陽邪自表入臟並聚於陰則或上或下亦無定診若留薄下焦則為腸澼而下痢此謂三陽直心坐不得起臥者便身全三陽之病直心謂邪氣直衝心膈也手太陽之脈循臂外廉出繞肩胛交肩上入缺盆絡心足太陽之脈挾脊貫臀入膕中其別者散之腎循膂當心入散故凡病邪氣直心及坐不得起起不得臥者便身全三陽之病也按三陽之邪多自外入故傷寒家多有直心不得起臥之證凡診外感者不可不察也病傷五臟筋骨以消邪並於陽則陽病並於陰則陰病陰陽俱病故傷五臟臟傷於內則筋骨消於外也腎且絶惋惋日暮從容不出人事不殷腎與足太陽為表裡至陰之臟也如三陽並至而病傷五臟則精虛氣竭筋骨以消矣且太陽傳裡必至少陰是以腎氣受傷真陰且絶故惋惋不已憂疑終日宜其窘窘乎從容之不出岌岌乎人事之不殷也然則陽邪之至害必歸陰五臟之傷窮必及腎此所謂陰陽表裡上下雌雄相輸應也脾虛浮似肺腎小浮似脾肝急沉散似腎此皆工之所時亂也脾本微耎病而虛浮則似肺矣腎本微沉病而小浮則似脾矣肝本微弦病而急沉散則似腎矣脈有相關不能辨之則以此作彼所以時多惑亂也浮而緩曰脾浮而短曰肺小浮而滑曰心急緊而散曰肝搏沉而滑曰腎五臟脈體不可不明也於此有人焉頭痛筋攣骨重怯然少氣噦噫腹滿時驚不嗜臥脈浮而弦切之石堅欲知其解年長則求之於腑年少則求之於經年壯則求之於臟言腎病之疑似也脈浮類肺脈弦類肝脈石堅類腎當比異別類也夫年長者每多口味六腑所以受物故當求之於腑以察其過年少者每多風寒勞倦所受在經故當求之於經以察其傷年壯者多縱房欲五臟所以積精故當求之於臟以察其虛實夫浮而弦者是腎不足也腎脈宜沉浮則陰虛水以生木弦則氣泄故為腎之不足沉而石者是腎氣內著也沉而石沉甚而堅也陰中無陽則腎氣不達故內著不行也怯然少氣者是水道不行形氣消索也精所以成形所以化氣水道不行則形氣消索故怯然少氣也咳嗽煩冤者是腎氣之逆也水臟空虛則上竅母氣故令人咳嗽煩冤是腎氣之上逆也一人之氣病在一臟也此一人之氣病在腎之一臟耳即如頭痛者以水虧火炎也筋攣者腎水不能養筋也骨重者腎主骨也噦噫者腎氣上貫肝膈陰氣逆也腹滿者水邪侮土也時驚者腎藏志志失則驚也不嗜臥者陰虛目不瞑也病皆本於腎也於此有人焉四肢解墮喘咳血泄診之以為傷肺切脈浮大而緊粗工砭石病愈多出血血止身輕欲知其解脈浮大虛者是脾氣之外絶去胃外歸陽明也此言脾病之疑似也夫脾屬陰為胃之裡胃屬陽為脾之表今脈來浮大而虛則外有餘內不足是脾氣之外絶於胃也脾已去胃故氣歸陽明而脈見如此陽明常多氣多血粗工砭石而愈者正所以泄陽明之邪實耳夫二火不勝三水是以脈亂而無常也二火謂二陽臟心肺居於膈上也三水謂三陰臟肝脾腎居於膈下也此五臟之象陰多於陽故曰二火不勝三水是以脾為陰土須賴火生今之脾氣去胃外絶陽明故脈亂無常者以脾中無胃氣也四肢解墮此脾精之不行也脾主四肢也喘咳者是水氣並陽明也脾病不能制水則水邪泛溢並於胃腑氣道不利故為喘為咳蓋五臟六腑皆能令人咳也血泄者脈急血無所行也經脈者所以行血氣而營陰陽也脈之急疾由於氣亂氣亂則血亂故注泄於便無所正行矣血不守中主在脾也若以為傷肺者由失以狂也不引比類是知不明也狂妄也不引比類故因喘咳為傷肺是知之不明也若參合脈證而求之則病在脾而不在肺可類察之矣夫傷肺者脾氣不守胃氣不清經氣不為使真臟壞決經脈旁絶五臟漏泄不衄則嘔此二者不相類也此明傷肺之候也肺金受傷竊其母氣故脾不能守人受氣於谷谷入於胃以傳於肺肺病則穀氣無以行故胃不能清肺者所以行營衛通陰陽肺傷則營衛俱病故經氣不為使真臟言肺臟也肺臟損壞則治節不通以致經脈有所偏絶而五臟之氣皆失其守因為漏泄故不衄血於鼻則嘔血於口此其在脾在肺所本不同故二者不相類也按心肺肝脾腎皆為陰也發明三陰為病之義不及心肝二臟者蓋心為君主邪不可傷傷則死矣肝為將軍之官本氣多強亦不詳言其病也惟腎為藏精之本肺為藏氣之本脾為水穀之本水病則及肺金病則及脾盜母氣也土病則敗及諸臟失化生之原也凡犯三陰虧損者皆在此三本耳三本俱傷鮮能免矣明引比類從容以診是謂道也明引形證皆量異同以法診之是得之也疾病第十經臟肺手太陰也是動則病肺脹滿膨膨而喘咳動言變也變常而為病也肺脈起於中焦循胃口上膈屬肺故病如此少陰司天熱淫所勝亦病乎此火剋金也缺盆中病缺盆雖十二經之道路而肺為尤近故肺病則痛甚則交兩手而瞀此為臂厥瞀木痛不仁也手太陰脈由中府出腋下行肘臂間故為臂厥瞀茂莫務三音是主肺所生病者手之太陰肺所生病也咳上氣喘喝煩心胸滿臑臂內前廉痛厥掌中熱喝聲粗急也太陰之別直入掌中故為痛厥掌熱氣盛有餘則肩背痛風寒汗出中風小便數而欠手太陰筋結於肩藏附於背故邪氣盛則肩背痛肺主皮毛而風寒在表故汗出中風肺為腎母邪傷其氣故小便數而欠欠呼欠也氣虛則肩背痛寒少氣不足以息溺色變為此諸病肩背者上焦之陽分也氣虛則陽病故為痛寒則怯然少氣金衰則水涸故溺色變而黃赤盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛瀉虛補雖以針言藥亦然也熱則疾之氣至速也寒則留之氣至遲也陷下則灸之陽氣內衰脈不起也不盛不虛以病有不因血氣之虛實而惟逆於經者則當隨經所在或飲藥或刺灸以取之也下文諸經之治與此同義也盛者寸口大三倍於人迎虛者則寸口反小於人迎也寸口主陰肺為大腸之臟手太陰經也故肺氣盛者寸口大三倍於人迎虛則反小也人迎者足陽明動脈在結喉旁一寸五分乃三陽脈氣之至也大腸手陽明也是動則病齒痛頸腫手陽明之支者從缺盆上頸貫頰入下齒中也是主津液所生病者大腸與肺為表裡肺主氣而津液由於氣化故凡大腸之或泄或閉皆津液所生之病而主在大腸也目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用手陽明之別者合於宗脈故目黃其他諸病皆本經之脈所及少陰司天熱淫所勝與肺同受病在金也氣有餘則當脈所過者熱腫當脈所過手陽明之次也虛則寒栗不復為此諸病寒栗不復不易溫也此皆手陽明之諸病盛者人迎大三倍於寸口虛者人迎反小於寸口也人迎主陽大腸為肺之腑手陽明經也故盛則人迎大於寸口虛則人迎小於寸口也胃足陽明也是動則病灑灑振寒善呻數欠顏黑胃屬土土病而灑灑振寒者風之勝也善呻數欠胃之郁也厥陰在泉木勝亦病黑水色也土病則水無所畏故黑色反見於顏面病至則惡人與火聞木聲則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走病至而惡人者陽明厥逆則喘而惋惋則惡人也惡火者邪客陽明則熱甚也聞木音而驚者土惡木也欲閉戶而處者陰陽相薄而陰勝陽也欲上高而歌者陽勝則四肢實也棄衣而走者熱甚於身也賁響腹脹是為骭厥賁響腸胃雷鳴也骭足脛也陽明之脈自膝臏下脛骨外廉故為脛骭厥逆骭音干是主血所生病者陽明為多氣多血之經主血所生病也狂瘧溫淫汗出鼽衄口喎唇疹頸腫喉痹喎歪也疹瘡也陽明熱勝則狂風勝則瘧溫氣淫泆則汗出鼽衄口喎等症皆陽明經脈之所及也鼽音求衄女六切喎孔乖切疹音疹大腹水腫胃在中焦土病則不能制水也膝臏腫痛循膺乳氣街股伏兔骭外廉足跗上皆痛中趾不用陽明脈從缺盆下乳內廉挾臍腹前陰由股下足以入中趾故為病如此氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃此陽明實熱在經在臟之辨也氣不足則身以前皆寒栗胃中寒則脹滿為此諸病此陽明虛寒在經在臟之辨也盛者人迎大三倍於寸口虛者人迎反小於寸口也足陽明為太陰之表三陽也故盛衰見於人迎脾足太陰也是動則病舌本強食則嘔脾脈連舌本故強脾病則不連故嘔胃脘痛腹脹善噫脾脈入腹屬脾絡胃故為痛為脹噫噯嘆聲陰盛而上走於陽明故氣滯而為噫得後與氣則快然如衰脾氣通也身體皆重脾主肌肉也厥陰在泉木勝克脾亦如是也是主脾所生病者足太陰土也舌本痛體不能動搖食不下煩心心下急痛溏瘕泄水閉黃疸不能臥強立股膝內腫厥足大趾不用為此諸病太陰脈支者上膈注心中故為煩心心痛脾寒則為溏泄脾滯則為癥瘕脾病不能制水則為泄為水閉黃疸不能臥脾脈起於足拇以上膝股內廉故為腫為厥為大趾不用諸病厥陰司天風淫所勝亦病於脾也盛者寸口大三倍於人迎虛者寸口反小於人迎足太陰為陽明之裡三陰也故脈之盛衰候於氣口心手少陰也是動則病嗌乾心痛渴而欲飲本經支者從心系上挾咽故為嗌乾心痛心火炎則心液耗故渴而欲飲是為臂厥手少陰循臂內後廉出小指之端故為臂厥手太陰脈行肘臂間亦為臂厥是主心所生病者手少陰經心所生病也目黃脅痛臑臂內後廉痛厥掌中熱痛為此諸病少陰之脈系目系故目黃出腋下故脅痛循臑臂內入掌內後廉故為熱痛諸病盛者寸口大再倍於人迎虛者寸口反小於人迎也手少陰為太陽之裡三陰也故脈之盛衰見於寸口小腸手太陽也是動則病嗌痛頷腫本經之脈循咽下膈其支者循頸上頰故為是病太陽在泉寒淫所勝而亦病及火腑也不可以顧肩似拔臑似折手太陽脈循臑外後廉繞肩胛交肩上故肩臑之痛如拔如折是主液所生病者小腸主泌別清濁病則水穀不分而流衍無制是主液所生病也耳聾目黃頰腫頸頷肩臑肘臂外後廉痛為此諸病皆小腸經脈之所及也盛者人迎大再倍於寸口虛者人迎反小於寸口也手太陽為少陰之表故候在人迎膀胱足太陽也是動則病沖頭痛本經脈上額交巔入絡腦故邪氣上衝而為頭痛目似脫項如拔脈起目內眥還出別下項也脊痛腰似折髀不可以曲膕如結腨如裂本經挾脊抵腰中過髀樞循髀外下合膕中貫腨內故病如是太陰在泉司天濕淫所勝土邪傷水亦如是病也是為踝厥足太陽脈出外踝之後筋結於外踝也是主筋所生病者周身筋脈惟足太陽為多為臣其下者結於踵結於腨結於膕結於臀其上者挾腰脊絡肩項上頭為目上綱下結於頄故凡為攣為弛為反張戴眼之類皆足太陽之水虧而主筋所生病者痔瘧狂癲疾脈入肛故為痔經屬表故為瘧邪入於陽故為狂癲疾頭囟項痛目黃淚出鼽衄項背腰尻膕腨腳皆痛小趾不用為此諸病皆足太陽之所及故為此諸病盛者人迎大再倍於寸口虛者人迎反小於寸口也足太陽為少陰之表故候在人迎腎足少陰也是動則病飢不欲食腎雖陰臟元陽所居水中有火為脾胃之母陰動則陽衰陽衰則脾困故病雖飢而不欲食面如漆柴水色黑陰邪色見於面故如漆腎藏精精衰則枯故如柴咳唾則有血喝喝而喘真陰損及其母也坐而欲起陰虛不能靜也目䀮䀮如無所見目之明在瞳子瞳子者骨之精也腎氣內奪則目䀮䀮如無所見故凡目多昏黑者必真水虧於腎也䀮音荒心如懸若飢狀心腎不交則精神離散故心如懸陰虛則內餒故常若飢狀太陰司天土邪淫勝病亦本於腎也氣不足則善恐心惕惕如人將捕之腎在志為恐腎氣怯故惕惕如人將捕之是為骨厥厥逆在骨腎主骨也足主腎所生病者足少陰經腎所生病也口熱舌乾咽腫上氣嗌乾及痛煩心心痛足少陰之脈循喉嚨挾舌本其支者從肺出絡心故病如是黃疸腸澼陰虛陽實故為黃疸腎開竅於二陰故為腸澼脊股內後廉痛痿厥嗜臥足下熱而痛為此諸病足少陰之脈自小趾斜趨足心上腨出膕上股內後廉貫脊屬腎故為此諸證嗜臥者多陰少陽精神匱也腎者水臟主津液主臥與喘也灸則強食生肉緩帶披髮大杖重履而步生肉厚味也味厚所以補腎緩帶披髮大杖重履而步節勞也安靜所以養氣諸經不言此法而惟腎經言之者以真陰所在精為元氣之根也盛者寸口大再倍於人迎虛者寸口反小於人迎也足少陰為太陽之裡故候在寸口心主手厥陰心胞絡也是動則病手心熱臂肘攣急腋腫皆本經之脈所及甚則胸脅支滿心中憺憺大動手厥陰出屬心包絡循胸出脅故也憺音淡動而不寧貌面赤目黃心之華在面目者心之使故病則面赤目黃以上諸證太陽司天寒淫所勝心火受病亦如此也喜笑不休心在聲為笑是主脈所生病者心主脈也煩心心痛掌中熱為此諸病脈起心胸入掌中也盛者寸口大一倍於人迎虛者寸口反小於人迎也手厥陰為少陽之裡故候在寸口三焦手少陽也是動則病耳聾渾渾焞焞嗌腫喉痹渾渾焞焞不明貌三焦之脈上項系耳後故為是病大陰在泉亦同是病蓋濕土所以勝水也焞屯吞二音是主氣所生病者三焦為水瀆之府水病必由於氣也汗出目鋭眥痛頰痛耳後肩臑肘臂外皆痛小指次指不用為此諸病三焦出氣以溫肌肉充皮膚故為汗出其他諸病皆本經之脈所及盛者人迎大一倍於寸口虛者人迎反小於寸口也手少陽為厥陰之表故候在人迎膽足少陽也是動則病口苦善太息膽病則液泄故口苦膽鬱則不舒故善太息心脅痛不能轉側足少陽之別貫心循脅裡也甚則面微有塵體無膏澤足少陽之別散於面膽木為病燥金勝之故面微有塵體無膏澤陽明在泉司天病亦如之足外反熱是為陽厥本經循脾陽出膝外廉下出外踝之前故足外反熱木病從火故為陽厥是主骨所生病者膽味苦苦走骨故膽主骨所生病又骨為幹其質剛膽為中正之官其氣亦剛膽病則失其剛故病及於骨凡驚傷膽者骨必軟即其證也頭痛頷痛目鋭眥痛缺盆中腫痛腋下腫馬刀俠癭馬刀瘰癧也俠癭俠頸之瘤屬也汗出振寒瘧少陽居三陽之中半表半裡者也故陽勝則汗出風勝則振寒為瘧胸脅肋髀膝外至脛絶骨外踝前及諸節皆痛小趾次趾不用為此諸病皆本經之脈所及也盛者人迎大一倍於寸口虛者人迎反小於寸口也足少陽為厥陰之表故候在人迎肝足厥陰也是動則病腰痛不可以俯仰足厥陰支別者與太陰少陽之脈同結於腰踝下中髎下髎之間故為腰痛厥陰之脈令人腰痛腰中如張弓弩弦丈夫㿉疝婦人少腹腫足厥陰氣逆則為睪腫卒疝婦人少腹腫即疝病也甚則嗌乾面塵脫色肝脈循喉嚨之後上入頑顙上出額其支者從目系下頰裡故為此病陽明在泉司天燥淫所勝亦同此病於肝也是主肝所生病者足厥陰經肝所生病也胸滿嘔逆飧泄狐疝遺溺閉癃為此諸病本經上行者挾胃貫膈下行者過陰器抵小腹故為此諸病盛者寸口大一倍於人迎虛者寸口反小於人迎也足厥陰為少陽之裡故候在寸口太陽所謂腫腰脽痛者正月太陽寅寅太陽也此足上文六經為病之義也脽尻臀也正月建寅三陽月也三陽者太陽也故足太陽病為腫腰脽痛也應正月三陽之候脽音誰正月陽氣出在上而陰氣盛陽未得自次也故腫腰脽痛也正月之候三陽雖出而時令尚寒陰氣尚盛陽氣未有次第以陰勝陽故腫腰脽痛正以足太陽之脈挾脊抵腰貫臀也病偏虛為跛者正月陽氣凍解地氣而出也所謂偏虛者冬寒頗有不足者故偏虛為跛也正月東風解凍陽氣尚微足太陽病有或左或右偏虛為跛者應三陽不足於下也足太陽下行之脈循髀膕下出外踝之後故有是證跛補火切所謂強上引背者陽氣大上而爭故強上也太陽之脈下項挾背若陽氣大上而爭則與三陽之氣上升者同故為強上引背也所謂耳鳴者陽氣萬物盛上而躍故耳鳴也太陽支者從巔至耳上角陽邪上盛故為耳鳴也所謂甚則狂巔疾者陽盡在上而陰氣從下下虛上實故狂巔疾也巔癲同所謂甚者言陽邪盛也陽邪實於陽經則陽盡在上陰氣在下上實下虛故當為狂癲之病所謂浮而聾者皆在氣也陽實於上則氣壅為聾亦以其脈至耳也所謂入中為喑者陽盛已衰故為喑也聲由氣發氣者陽也陽盛則聲大陽虛則聲微若陽盛已衰故喑啞不能言也內奪而厥則為喑俳此腎虛也俳廢也內奪者奪其精也精奪則氣奪而厥故聲喑於上體廢於下元陽大虧病本在腎腎脈上挾舌本下走足心故為是病俳當作痱音沸少陰不至者厥也此釋上文內奪而厥之義也少陰者腎脈也與太陽為表裡若腎氣內奪則少陰不至少陰不至者以陰虛無氣無氣則陽衰致厥之由也少陽所謂心脅痛者言少陽盛也盛者心之所表也少陽之脈下胸中循脅裡故心脅痛者言少陽之邪盛也然少陽屬木木以生火故邪之盛者其本在膽其表在心表者標也九月陽氣盡而陰氣盛故心脅痛也膽有相火心有君火火墓在戌陽不勝陰則心脅為痛故應九月之氣所謂不可反側者陰氣藏物也物藏則不動故不可反側也陰邪凝滯藏伏陽中喜靜惡動故反側則痛所謂甚則躍者九月萬物盡衰草木畢落而墮則氣去陽而之陰氣盛而陽之下長故謂躍九月萬物盡衰草木畢落是天地之氣去陽而之陰也人身之氣亦然故盛於陰分則所長在下其有病為跳躍者以足少陽脈下出足之外側陰覆於上陽鼓於下也故應九月之氣陽明所謂灑灑振寒者陽明者午也五月盛陽之陰也陽盛而陰氣加之故灑灑振寒也五月陽氣明盛故曰陽明夏至一陰初生加以陽極之候故病灑灑振寒者以陽明應五月之氣也所謂脛腫而股不收者是五月盛陽之陰也陽者衰於五月而一陰氣上與陽始爭故脛腫而股不收也足陽明脈下髀關抵伏兔下膝脛足附入中趾內間若陰生於下上與陽爭則為脛腫而股不收亦應五月一陰之氣所謂上喘而為水者陰氣下而復上上則邪客於臟腑間故為水也陽明土病則不能制水故陰邪自下而上客於臟腑之間乃化為水水之本在腎末在肺標本俱病故為上喘也所謂胸痛少氣者水氣在臟腑也水者陰氣也陰氣在中故胸痛少氣也邪氣之陰非真陰也陰邪在中故為胸痛陰盛則陽衰故為少氣少氣則氣短而喘矣所謂盛則厥惡人與火聞木音則惕然而驚者陽氣與陰氣相薄水火相惡故惕然而驚也薄氣相迫也陰陽之氣正則相和邪則相惡陰邪薄於陽明故惕然而驚也所謂欲奪閉戶牖而處者陰陽相薄也陽盡而陰盛故欲獨閉戶牖而居陰邪盛則陽明之衰故欲靜也所謂病至則欲乘高而歌棄衣而走者陰陽復爭而外並於陽故使之棄衣而走也寒邪外並陽則身熱多躁故棄衣而走所謂客孫脈則頭痛鼻鼽腹腫者陽明並於上上者則其孫絡太陰也故頭痛鼻鼽腹腫也寒邪客於陽明則在頭為痛在鼻為鼽在腹為腫以陰氣上行而並於本經之孫絡故為是病此太陰者言陰邪之盛非太陰經之謂也太陰所謂病脹者太陰子也十一月萬物氣皆藏於中故曰病脹陰極於子萬物皆藏故曰太陰子也太陰之經入腹凡邪藏於中則病為脹故應十一月之氣所謂上走心為噫者陰盛而上走於陽明陽明絡屬心故曰上走心為噫也脾脈絡胃故陰邪盛則上走於陽明陽明之正上通於心故上走心為噫寒氣客於胃厥逆從下上散復出於胃故為噫兼而言之寒氣犯於心脾胃三經俱能為噫也所謂食則嘔者物盛滿而上溢故嘔也脾胃相為表裡胃受水穀脾不能運則物盛滿而溢故為嘔所謂得後與氣則快然如衰者十一月陰氣下衰而陽氣且出故曰得後與氣則快然如衰也後謂大便氣謂轉失氣陽氣出則陰邪散故快然如衰一陽下動冬至候也故應十一月之氣少陰所謂腰痛者少陰者腎也十月萬物陽氣皆傷故腰痛也腰者腎之府寒邪入腎則為腰痛純陰在下故應十月之氣所謂嘔咳上氣喘者陰氣在下陽氣在上諸陽氣浮無所依從故嘔咳上氣喘也陰陽互倚若陰中無陽沉而不升則孤陽在上浮而不降無所依從故為嘔咳上氣喘也肺主氣腎主精精虛則氣不歸元也所謂邑邑不能久立久坐起則目䀮䀮無所見者萬物陰陽不定未有主也秋氣始至微霜始下而方殺萬物陰陽內奪故目䀮䀮無所見也邑邑不安貌秋氣至微霜下萬物俱衰陰陽未定故內無所主而坐起不常目則䀮䀮無所見以陰肅陽衰精氣內奪故應深秋十月之候所謂少氣善怒者陽氣不治陽氣不治則陽氣不得出肝氣當治而未得故善怒善怒者名曰煎厥陽和不治則肝氣多逆不能調達故善怒而為煎厥所謂多陰者多怒也按煎厥有陰陽虛實二證不似臂厥之以脈所經處同名也所謂恐如人將捕之者秋氣萬物未有畢去陰氣少陽氣入陰陽相薄故恐也陰氣言腎氣也陽氣言邪氣也陰氣將藏未藏而陽邪入之陰陽相薄則傷腎而為恐故亦應秋氣所謂惡聞食臭者胃無氣故惡聞食臭也胃無氣胃氣敗也胃氣所以敗者腎為胃關腎中真火不足不能溫養化原故胃氣虛而惡聞食臭也此即飢不欲食之義所謂面黑如地色者秋氣內奪故變於色也色以應日陽氣之華也陰勝於陽則面黑色變故應秋氣此即面如漆柴之義所謂咳則有血者陽脈傷也陽氣未盛於上而脈滿滿則咳故血見於鼻也陽脈傷者上焦之脈傷也陽氣未盛於上而脈滿則所滿者皆寒邪也蓋腎脈上貫肝膈入肺中故咳則血見於口衄則血見於鼻也厥陰所謂㿗疝婦人少腹腫者厥陰者辰也三月陽中之陰邪在中故曰㿗疝少腹腫也辰季春也五陽一陰陰氣將盡故屬厥陰陰邪居於陽末則為㿗疝少腹腫故應三月之氣所謂腰脊痛不可以俯仰者三月一振榮華萬物一俯而不仰也三月一振陽氣振也故榮華萬物然余寒尚在若陰氣或勝則陽屈俯而不仰故病為腰脊痛亦應三月之氣所謂㿗癃疝膚脹者曰陰亦盛而脈脹不通故曰㿗癃疝也此復明癃疝腫脹之由在陰邪盛也陰盛則陽氣不行故為此諸症所謂甚則嗌乾熱中者陰陽相薄而熱故嗌乾也所謂盛者應三月之陽盛也陽邪盛則薄於陰分故為嗌乾熱中等病足陽明之脈病惡人與火聞木音則惕然而驚鐘鼓不為動陽明者胃脈也胃者土也故聞木音而驚者土惡木也脈即經也木能剋土故惡之其惡火陽明主肉其脈血氣盛邪客之則熱熱甚則惡火陽明經多氣多血邪客之則血氣壅而易為熱熱則惡火也其惡人陽明厥則喘而惋惋則惡人陽明氣逆而厥則為喘惋惋憂驚也故惡人之煩擾或喘而死者或喘而生者如厥逆連臟則死連經則生也連臟者敗及三陰故死連經則肌表之疾耳故生病甚則棄衣而走登高而歌或至不食數日逾垣上屋所上之處皆非其素所能也病反能者也凡癲狂傷寒家多有此證四肢者諸陽之本也陽盛則四肢實實則能登高也其棄衣而走者熱甚於身故棄衣欲走也陽明主肌肉故熱甚於身其妄言罵詈不避親疏而歌者陽盛則使人妄言罵詈不避親疏而不欲食不欲食故妄走也陽盛者陽邪盛也陽明為多氣多血之經而陽邪實之陽之極也陽氣者靜則神藏躁則消亡故神明亂而病如是詈音利太陰陽明為表裡脾胃脈也生病而異者由夫陰陽異位更虛更實更逆更從或從內或從外所從不同故病異名脾為臟陰也胃為腑陽也陽主外陰主內陽主上陰主下是陰陽異位也陽虛則陰實陰虛則陽實是更虛更實也病者為逆不病者為從是更逆更從也凡此者皆所從不同故病亦異名陽者天氣也主外陰者地氣也主內胃屬三陽故主天氣脾屬三陰故主地氣陽道實陰道虛陽剛陰柔也又外邪多有餘故陽道實內傷多不足故陰道虛一曰陰道實則陽道虛矣所謂更虛更實也故犯賊風虛邪者陽受之飲食不節起居不時者陰受之陽受之則入六腑陰受之則入五臟賊風虛邪外傷也故陽受之而入腑飲食起居內傷也故陰受之而入臟入六腑則身熱不時臥上為喘呼入五臟則䐜滿閉塞下為飧泄久為腸澼不時臥不能以時臥也陽邪在表在上故為身熱不臥喘呼陰邪在裡在下故為䐜滿飧泄腸澼喉主天氣咽主地氣喉為肺系所以受氣上通於天咽為胃系所以受水穀下通於地故陽受風氣陰受濕氣風陽氣也故陽分受之濕陰氣也故陰分受之各從其類也陰氣從足上行至頭而下行循臂至指端陽氣從手上行至頭而下行至足手之三陰從臟走手手之三陽從手走頭足之三陽從頭走足足之三陰從足走腹蓋陰氣在下下者必升陽氣在上上者必降脾陰胃陽氣皆然也故陽病者上行極而下陰病者下行極而上陽病極則及於下陰病極則及於上極則變也非惟上下表裡亦然傷於風者上先受之傷於濕者下先受之陽受風氣故上先受之陰受濕氣故下先受之然上非無濕下非無風但受有先後耳曰先受之則後者可知矣脾病而四肢不用四肢皆稟氣於胃而不得至經必因於脾乃得稟也此下言胃氣必因脾氣乃得行也今脾病不能為胃行其津液四肢不得稟水穀氣氣日以衰脈道不利筋骨肌肉皆無氣以生故不用焉四肢之舉動必賴胃氣以為用然胃氣不能自至於諸經必因脾氣之運行則胃中水穀之氣化為津液乃得及於四肢也若脾病則胃氣不行故各經脈道日以衰微而四肢不為用矣蓋脾與胃以膜相連而能為之行其津液故也此下言三陰三陽之脈皆稟於脾胃之氣也足太陰者三陰也其脈貫胃屬脾絡嗌故太陰為之行氣於三陰為之者為胃也脾脈貫胃屬脾足太陰也故為之行氣於三陰三陰者五臟之謂陽明者表也五臟六腑之海也亦為之行氣於三陽陽明者太陰之表也主受水穀以溉臟腑故為五臟六腑之海雖陽明行氣於三陽然亦賴脾氣而後行故曰亦也三陽者即六腑也臟腑各因其經而受氣於陽明故為胃行其津液因其經因脾經也臟腑得稟於陽明者以脾經貫胃故能為胃行其津液也四肢不得稟水穀氣日以益衰陰道不利筋骨肌肉無氣以生故不用焉陰道血脈也此復明脾主四肢之義至深切矣診病之始五決為紀五決者察五臟決死生為診病之綱紀也欲知其始先建其母始病之始也建立也母病之因也不得其因則標本弗辨故當先建其母如下文某臟某經之謂所謂五決者五脈也五脈者五臟之脈也是以頭痛巔疾下虛上實過在足少陰巨陽甚則入腎頭痛巔疾實於上也上實者因於下虛其過在腎與膀胱二經蓋足太陽之脈從巔絡腦而腎與膀胱為表裡陰虛陽實故為是病甚則腑病已而入於臟則腎獨受傷矣徇蒙招尤目瞑耳聾下實上虛過在足少陽厥陰甚則入肝徇當作眴蒙茫昧也招掉搖也尤無定也目無光則矇昧不明頭眩動則招尤不定甚至目瞑者不能視耳聾者無所聞其過在肝膽之氣實於下而虛於上也蓋足少陽之脈起於目鋭眥上抵頭角下耳後足厥陰之脈連目系上出額與督脈會於巔故為此病甚則自臟歸臟而併入於肝矣此下三節皆不言甚則入臟文雖缺而義則同也腹滿䐜脹支膈胠脅下厥上冒過在足太陰陽明支膈塞也胠脅之上也足太陰之脈入腹屬脾絡胃上膈足陽明之脈屬胃絡脾其支者循腹裡且脾胃皆主四肢故為支膈胠脅而四肢厥逆於下胸腹冒悶於上者皆過在足太陰陽明經也咳嗽上氣厥在胸中過在手陽明太陰上氣喘急也肺居胸中手太陰也其脈起於中焦上膈屬肺手陽明大腸也為太陰之表其脈下入缺盆絡肺二經之氣皆能逆於胸中故為咳嗽上氣之病心煩頭痛病在膈中過在手巨陽少陰膈中膈上也手太陽小腸之脈入缺盆絡心其支者循頸上頰至目鋭眥手少陰心脈起於心中出屬心系其支者上挾咽系目系故病在膈中而為心煩頭痛者過在手太陽少陰也虛實人有八虛八虛八溪也皆筋骨之隙氣血之所流注者以候五臟因八虛以察五臟之病肺心有邪其氣留於兩肘肺與心居於膈上其經屬手脾肝腎俱在膈下其經屬足故肺心有邪乘虛而聚其氣必留於兩肘在肺則尺澤在心則少海之次肝有邪其氣留於兩腋肝與膽合其經自足而上皆行脅腋之間故肝邪乘虛而聚者其氣當留於兩腋即期門淵腋等穴之次脾有邪其氣留於兩髀脾與胃合其脈皆自脛股上出衝門氣衝之間故邪氣留於髀跨間者知為脾經之病腎有邪其氣留於兩膕腎與膀胱為表裡其經皆出膝後陰谷委中之間故邪氣留於兩膕者知為腎經之病凡此八虛者皆機關之室真氣之所過血絡之所遊邪氣惡血固不得住留住留則傷經絡骨節機關不得屈伸故痀攣也機關要會也室猶房室也凡此八者皆氣血之所由行也正氣居之則為用邪氣居之則傷經絡機關而屈伸為之不利此八虛可候五臟也病之虛實邪氣盛則實精氣奪則虛邪氣有微盛故邪盛則實正氣有強弱故精奪則虛奪失也此二句為病治之大綱其辭似顯其義甚微最當詳辨而辨之有最難者也蓋實言邪氣實宜瀉也虛言正氣虛宜補也凡邪正相薄而為病則邪實正虛皆可言也主瀉者曰邪盛當瀉主補者曰精奪當補各執一見藉口文飾以至精之訓釀莫大之害不知理之所在有必不可移易者察虛實之緩急有無也無虛者急在邪氣去之不速留則生變也多虛者急在正氣培之不早臨期無濟也微虛微實者亦治其實可一掃而除也甚虛甚實者所畏在虛但固守根本以先為己之不可勝則邪無不退也二虛一實者兼其實開其一面也二實一虛者兼其虛防生不測也總之實而誤補固必增邪猶可解救其禍小虛而誤攻真氣忽去莫可挽回其禍大此虛實之緩急不可不察也所謂有無者察邪氣之有無也凡風寒暑濕燥火皆能為邪邪之在表在裡在腑在臟必有所居求得其本則直取之此所謂有有則邪之實也若無六氣之邪而病出三陰則惟情欲以傷內勞倦以傷外非邪似邪非實似實此所謂無無則病在元氣也不明虛實有無之義必至以逆為從以標作本絶人長命損德多矣可不慎且慎哉五臟虛實之大體氣虛者肺虛也氣逆者足寒也肺主氣故氣虛者即肺虛也氣逆不行則無以及於四肢陽虛於下故足寒也非其時則生當其時則死以肺虛而過秋冬非相賊之時故生若當春則金木不和病必甚當夏則金虛受克病必死也餘臟皆如此心脾肝腎各有衰王以肺為例可類推矣重實者大熱病氣熱脈滿也經絡皆實者是寸脈急而尺緩也皆當治之經十二經也絡十五絡也此以脈口寸尺概察經絡之虛實也寸脈之直行者為太陰之經尺中列缺別走陽明者為太陰之絡以上下言則寸為陽尺為陰以內外言則絡為陽經為陰故寸脈急則邪居於經尺脈緩則熱甚於絡是經絡俱實也皆當治之治言瀉也緩而滑曰熱中又緩者多熱故以尺緩為實也故曰滑則從澀則逆也滑陽脈也澀陰脈也實則兼滑陽氣勝也故為從若見澀則陰邪勝而陽氣去也故為逆夫虛實者皆從其物類始故五臟骨肉滑利可以長久也物之生則滑利死則枯澀皆由陽氣之存亡耳脈之逆順亦猶是也絡氣不足經氣有餘者脈口熱而尺寒也秋冬為逆春夏為從治主病者絡脈在表主陽經脈通里主陰經氣有餘則脈口熱陰分之邪盛也絡氣不足則尺中寒陽分之氣虛也陽虛者畏陰勝之時故秋冬為逆春夏為從治主病者治其所主也王氏以尺寸言陰陽注曰陰分主絡陽分主經與此相反夫尺寸者分陰陽之位耳而陰陽之氣則五臟上下無所不在如寸有肺金陰不在上乎尺有命門陽不在下乎故反言尺寸則可反言經絡則不可也經虛絡滿者尺熱滿脈口寒澀也此春夏死秋冬生也經虛絡滿者陰氣不足陽邪有餘也陰虛者畏陽勝之時故春夏死秋冬生脈氣上虛尺虛是謂重虛陰陽俱虛是重虛也所謂氣虛者言無常也尺虛者行步恇然氣虛即上虛氣虛於上故言亂無常如言而微終日乃復言者此奪氣也尺虛者下虛故行步恇然怯弱也脈虛者不象陰也五臟為陰臟虛則脈虛脈虛者陰虧之象故曰不象陰也如此者滑則生澀則死也寒氣暴上脈滿而實實而滑則生實而逆則死此指傷寒之屬也邪盛者脈當實實而兼滑得陽脈也故生若見陰脈為逆故死脈弱以滑是有胃氣命曰易治脈逆四時為不可治脈實滿手足寒頭熱春秋則生冬夏則死脈之實滿邪有餘也手足寒者陰逆在下頭熱者陽邪在上陰陽乘離故為上實下虛之病春秋為陰陽和平之候得其和氣故可以生冬夏乃陰陽偏勝之時陽劇於夏陰劇於冬故死脈浮而澀澀而身有熱者死浮而身熱陽邪盛也澀為氣血虛陰不足也外實內虛則孤陽不守故死其形盡滿者脈急大堅尺澀而不應也此正言陽實陰虛之候也陽有餘故其形盡滿脈當急大而堅陰不足故當尺澀而不應也如是者從則生逆則死所謂從者手足溫也所謂逆者手足寒也四肢為諸陽之本故陽邪盛者手足當溫為順若手足寒冷則以邪盛於外氣虛於內正不勝邪所以為逆肝病實者兩脅下痛引少腹令人善怒此言實則邪實下言虛則正虛五臟皆同此義虛則目䀮䀮無所見耳無所聞善恐如人將捕之氣逆則頭痛耳聾不聰頰腫心病實者胸中痛脅支滿脅下痛膺背肩甲間痛兩臂內痛虛則胸腹大脅下與腰相引而痛脾病實者身重善飢肉痿足不收行善瘛腳下痛虛則腹滿腸鳴飧泄食不化肺病實者喘咳逆氣肩背痛汗出尻陰股膝髀腨胻足皆痛虛則少氣不能報息耳聾嗌乾腎病實者腹大脛腫喘咳身重寢汗出憎風虛則胸中痛大腹小腹痛清厥意不樂皆隨其經之虛實而補瀉之有餘有五不足亦有五此十者其氣不等也神有餘則笑不休神不足則悲心藏脈脈舍神心氣虛則悲實則笑不休血氣未並五臟安定邪客於形灑淅起於毫毛未入於經絡也故命曰神之微此外邪之在心經也並偏聚也邪之中人久而不散則或並於氣或並於血病乃甚矣今血氣未並邪猶不深故五臟安定但灑淅起於毫毛未及經絡此以浮淺微邪在脈之表神之微病也故命曰神之微氣有餘則喘咳上氣不足則息不利少氣此肺臟之虛實也肺氣虛則鼻塞不利少氣實則喘咳胸盈仰息血氣未並五臟安定皮膚微病命曰白氣微泄此肺金之表邪也肺主皮膚而屬金微邪客之故命曰白氣微泄血有餘則怒不足則恐此肝臟之虛實也肝氣虛則恐實則怒血氣未並五臟安定孫絡外溢則經有留血此肝經之表邪也邪不在臟而在經但察其孫絡之脈有外溢者則知其大經之內有留止之血也形有餘則腹脹涇溲不利不足則四肢不用此脾臟之虛實也涇水名也溲溺也脾濕勝則氣壅不行故腹脹而涇溲不利脾主四肢故虛則四肢不用血氣未並五臟安定肌肉蠕動命曰微風此脾經之表邪也脾主肌肉故微邪未深者但肌肉間蠕動如有蟲之微行也脾土畏風木風主動故命曰微風志有餘則腹脹飧泄不足則厥此腎臟之虛實也腎藏志水之精也水化寒故腎邪有餘則寒氣在腹而為腹脹飧泄腎氣不足則陰虛陽勝而為厥逆上衝腎藏精精舍志腎氣虛則厥實則脹厥則陽氣並於上陰氣並於下陽並於上則火獨光也陰並於下則足寒足寒則脹也血氣未並五臟安定骨節有動皆隨其有餘不足而補瀉之此腎經之微邪也腎主骨邪未入臟而薄於骨故但於骨節之間有鼓動之狀夫氣血以並陰陽相傾氣亂於衛血逆於經血氣離居實一虛並偏勝也傾傾陷也氣為陽故亂於衛血為陰故逆於經陰陽不和則氣血離居故實者偏實虛者偏虛彼此相傾也血並於陰氣並於陽故為驚狂血並於陰是重陰也氣並於陽是重陽也重陰者癲重陽者狂故為驚狂血並於陽氣並於陰乃為炅中血並於陽陰在表也氣並於陰陽在裡也故為炅中炅熱也血並於上氣並於下心煩惋善怒上膈上也下膈下也血並於上則陰邪抑心故煩惋氣並於下則火動於肝故善怒惋烏貫切血並於下氣並於上亂而喜忘血並於下則陰氣不升氣並於上則陽氣不降陰陽離散故神亂而喜忘血並於陰氣並於陽如是血氣離居何者為實何者為虛血並於陰則陽中無陰氣並於陽則陰中無陽陰陽不和故血氣離居血氣者喜溫而惡寒寒則澀不能流溫則消而去之血之與氣體雖異而性則同故皆喜溫而惡寒寒則凝澀而留滯溫則消散而運行邪之或並於血或並於氣由於此矣故氣之所併為血虛血之所併為氣虛氣並於陽則無血是血虛也血並於陰則無氣是氣虛也然人之所有者血與氣耳若言血併為虛氣併為虛是無實乎非也有者為實無者為虛有血無氣是血實氣虛也有氣無血是氣實血虛也氣並則無血血並則無氣血與氣相失故為虛焉相失者不相濟失則為虛矣絡之與孫脈俱輸於經血與氣並則為實焉血之於氣並走於上則為大厥厥則暴死氣復反則生不反則死上文言血與血並氣與氣並偏虛偏實也此言血與氣並並者為實不並者為虛也血氣並走於上則上實下虛下虛則陰脫陰脫則根本離絶而下厥上竭是為大厥所以暴死若氣絶而反則陰必漸回故可復蘇其有一去不反者不能生矣實者何來虛者何去陰之與陽皆有俞會陽注於陰陰滿之外陰陽勻平以充其形九候若一命曰平人俞會經穴有俞有會也陽注於陰則自經歸臟陰滿之外則自臟及經九候若一則陰陽和血氣勻身安無病故曰平人而邪之生也或生於陰或生於陽其生於陽者得之風雨寒暑其生於陰者得之飲食居處陰陽喜怒風雨寒暑生於外也是為外感故曰陽飲食居處陰陽喜怒生於內也是為內傷故曰陰外感多有餘內傷多不足此實之所以來虛之所以去也風雨之傷人也先客於皮膚傳入於孫脈孫脈滿則傳入於絡脈絡脈滿則輸於大經脈血氣與邪並客於分腠之間其脈堅大故曰實實者外堅充滿不可按按之則痛此外感之生實也實痛者必堅滿中有留邪也按之則實邪相拒故痛愈甚虛痛者必柔軟中空無物也按之則氣至而溫故其痛止是以可按者為虛拒按者為實也寒濕之中人也皮膚不收肌肉堅緊營血澀衛氣去故曰虛虛者聶闢氣不足按之則氣足以溫之故快然而不痛此外感之生虛也凡寒濕中人必傷衛氣故皮膚不收而為縱緩肌肉堅緊而為削瘦營血澀於脈中衛氣去於脈外所以為虛凡言語輕小曰聶足弱不能行曰闢皆氣不足也氣虛作痛者按之可以致氣氣至則陽聚陰散故可快然而痛止也聶尼輒切闢音壁喜怒不節則陰氣上逆上逆則下虛下虛則陽氣走之故曰實矣此內傷之生實也陰逆於上則虛於下陰虛則陽邪湊之所以為實然則實因於虛此所以內傷多不足也所重在怒故曰實也怒則氣上正此之謂喜則氣下悲則氣消消則脈空虛因寒飲食寒氣熏滿則血澀氣去故曰虛矣此內傷之生虛也下陷也消散也因寒飲食者寒氣熏滿中焦必傷陽氣故血澀氣去而中為虛也若飲食過度留滯不消雖亦內傷此則虛中挾實是又不可不辨矣陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒陽受氣於上焦以溫皮膚分肉之間寒氣在外則上焦不通上焦不通則寒氣獨留於外故寒栗寒氣在外陰遏衛氣不溫於表而寒氣獨留為寒栗此陽虛則外寒也有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱形氣陰氣也勞倦不慎而形氣衰少傷脾陰也以致鬱熱熏於胸中此陰虛生內熱也勞倦傷形指脾胃也若情欲不節則五臟失守而傷精精傷則水虧故邪火易生陰虛內熱此為尤甚上焦不通利則皮膚緻密腠理閉塞玄府不通衛氣不得泄越故外熱外傷寒邪則上焦不通肌表閉塞衛氣鬱聚無所流行而為外熱所謂人傷於寒則病為熱此外感證也厥氣上逆寒氣積於胸中而不瀉不瀉則溫氣去寒獨留則血凝澀凝則脈不通其脈盛大以澀故中寒厥氣寒厥之氣也或寒氣傷臟或食飲寒涼寒留中焦陽氣乃去經脈凝滯故盛大而澀蓋陽脈流利多滑不滑則無陽可知此內傷證也氣實形實氣虛形虛谷盛氣盛谷虛氣虛脈實血實脈虛血虛此其常也反此者病形立於外氣充於內形氣相合是謂和平故氣實者形實氣虛者形虛此稟賦之常也若形氣相反則偏虛偏實之病生矣人受氣於谷谷入於胃以傳於肺五臟六腑皆以受氣此氣生於穀也是謂穀氣故穀氣盛衰候當相應不應則為病矣脈之盛衰者所以候血氣之虛實也故脈之與血相應者為常不相應者反而病也如何而反氣虛身熱氣盛身寒此以下皆所以釋上文也氣虛者陽虛也當為身寒而反病熱者陰氣虛於內陽氣盛於外也此形氣相逆之反也谷入多而氣少谷入多二陽有餘氣少三陰不足也谷不入而氣多谷不入胃腑受邪氣多及於肺也脈盛血少脈少血多此謂反也脈盛血少者陽實陰虛也脈少血多者陽虛陰實也皆謂之反也氣盛身寒得之傷寒氣虛身熱得之傷暑氣盛身寒得之傷寒者寒傷形也氣虛身熱得之傷暑者暑傷氣也人之傷於寒也則病熱何以身寒者為傷寒身熱者為傷暑不知四時皆有傷寒而傷暑惟在夏月至於夏至之後有感寒暑而同時為病者則不可不察其陰陽也蓋陰邪中人則寒集於表氣聚於裡故邪氣盛實而身本因寒也暑邪中人則熱觸於外氣傷於中故正氣疲困而因熱無寒也此夏月寒暑之辨故以二者並言非謂凡患傷寒者皆身寒無熱也谷入多而氣少者得之有所脫血濕居下也谷入多者胃熱善於消穀也脫血者亡其陰也濕居下者脾腎之不足亦陰虛也陰虛則無氣故谷雖入多而氣則少也谷入少而氣多者邪在胃及與肺也邪在胃則不能食故谷入少邪在肺則息喘滿故氣多脈小血多者飲中熱也脈小者血應少而反見其多必或酒或飲中於熱而動之也脈大血少者厥有風氣水漿不入此之謂也風為陽邪居於脈中故脈大水漿不入則中焦無以生化故血少夫實者氣入也虛者氣出也此下言虛實寒熱之因以用補瀉法也氣入者充滿於內所以為實氣出者漏泄於中所以為虛氣實者熱也氣虛者寒也氣為陽氣實則陽實故熱氣虛則陽虛故寒又有五實死五虛死五實者五臟之實也五虛者五臟之虛也五實五虛具者皆死然氣虛至盡盡而死者理當然也若五實者何以亦死蓋邪之所湊其氣必虛不脫不死仍歸於氣盡耳然虛實俱有真假所當辨耳脈盛皮熱腹脹前後不通悶瞀此謂五實實者邪氣盛實也脈盛者心所主也皮熱者肺所主也腹脹者脾所主也前後不通腎開竅於二陰也悶瞀者肝脈貫膈氣逆於中瞀目不明也脈細皮寒氣少泄利前後飲食不入此謂五虛虛者正氣虛也脈細心虛也皮寒肺虛也氣少肝虛也泄利前後腎虛也飲食不入脾虛也其時有生者漿粥入胃泄注止則虛者活治之者能使漿粥入胃則脾漸蘇泄漸止則腎漸固根本氣回故虛者活也身汗得後利則實者活此其候也得身汗則表邪解得後利則里邪除內外通和故實者活也當今之人實者無幾而虛者七八病實者其來速其去亦速故其治易病虛者損傷有漸不易復元故其治難實者少壯新邪則可攻可拔虛者根本有虧則倏忽變幻可無慮乎夫人之虛損有先天不足者有後天不足者先天者由於稟受宜倍加謹慎急以後天人事培補之庶可延年使覺之不早而慢不為意則未有不夭折者矣後天者由於勞傷宜速知警省即以情性藥食調攝之使治之不早而遷延諱疾則未有不噬臍者矣凡勞傷之辨勞者勞其神氣傷者傷其形體如喜怒思慮則傷心憂愁悲哀則傷肺是皆勞其神氣也飲食失度則傷脾起居不慎則傷肝色欲縱肆則傷腎是皆勞其形體也損其肺者傷其氣為皮焦而毛稿損其心者傷其神為血脈少而不營於臟腑此自上而傷者也損其肝者傷其筋為筋緩不能自收持損其腎者傷其精為骨髓消滅痿弱不能起此自下而傷者也損其脾者傷其倉廩之本為飲食不為肌膚此自中而傷者也心肺損而神色敗肝腎損而形體痿脾胃損而飲食不化感此病者皆損之類也然所損雖分五臟而五臟所藏則無非精與氣耳精為陰人之水也氣為陽人之火也水火得其正則為精為氣水火失其和則為熱為寒此因偏損所以致有偏勝故水中不可無火無火則陰勝而病寒故火中不可無水無水則陽勝而病熱當詳辨陰陽則虛損之治無餘義矣水虧者大補真陰切不可再伐陽氣火虛者大補元陽切不可再傷陰氣蓋陽既不足而復伐其陰陰亦損矣陰已不足而再伐其陽陽亦亡矣實者陰陽因有餘但去所餘則得其平虛者陰陽有不足再去所有則兩者俱敗其能生乎故治虛之要凡陰虛多熱者最嫌辛燥恐助陽邪也尤忌苦寒恐伐生陽也惟喜純甘壯水之劑補陰以配陽則剛為柔制虛火自降而陽歸乎陰矣陽虛多寒者最嫌涼潤恐助陰邪也尤忌辛散恐傷陰氣也只宜甘溫益火之品補陽以配陰則柔得其主沉寒自斂而陰從乎陽矣是以氣虛者宜補其上精虛者宜補其下陽虛者宜補而兼暖陰虛者宜補而兼清此固陰陽之治辨也其有氣因精而虛者自當補精以化氣精因氣而虛者自當補氣以生精又如陽失陰而離者非補陰何以收散亡之氣水失火而敗者非補火何以補隨寂之陰此又陰陽相濟之妙用也故善補陽者必於陰中求陽則陽得陰助而生化無窮善補陰者必於陽中求陰則陰得陽升而泉源不竭故以精氣分陰陽則陰陽不可離以寒熱分陰陽則陰陽不可混此又陰陽邪正之離合也知陰陽邪正之治則陰陽和而生道得矣時令夫百病之始生必起於燥濕寒暑風雨陰陽喜怒飲食居處氣合而有形得臟而有名多以旦慧晝安夕加夜甚如四時之氣然一日分為四時朝為春日中為夏日入為秋夜半為冬朝則人氣始生病氣衰故旦慧日中人氣長長則勝邪故安夕則人氣始衰邪氣始生故加夜半人氣入臟邪氣獨居於身故甚也其有反者是不應四時之氣臟獨主其病也是必以臟氣之所不勝時者甚以其所勝時者起也不應四時之氣者以臟氣獨主其病有所勝所不勝也所不勝者如脾病畏木肺病畏火腎病畏土肝病畏金心病畏水值其時日故病必甚也所勝時者如脾病喜火土肺病喜土金腎病喜金水肝病喜水木心病喜木火值其時日故病當起也順天之時病可與期合人形以法四時五行而治定五臟之氣然後知從逆衰王間甚之時死生之期也如肝主春足厥陰少陽主治厥陰肝乙木也少陽膽甲木也二臟相為表裡故治同其日甲乙甲為陽木乙為陰木皆東方之干內應肝膽即年月日時無不皆然他仿此肝苦急急食甘以緩之肝為將軍之官其志怒其氣急急則自傷反為所苦故宜食甘以緩之則急者可平柔能制剛也病在肝愈於夏夏屬火木所生也肝木畏金火能平之子制其鬼故愈余同夏不愈甚於秋勝己者也秋不死持於冬得母氣以養之生我者也故可執持無害矣余持同起於春水王之時也禁當風風氣通於肝故禁之勿犯肝病者愈在丙丁同前夏氣能制勝己者也丙丁不愈加於庚辛同前秋氣金伐木也庚辛不死持於壬癸同前冬氣得所生也起於甲乙同前春氣逢其王也肝病者平旦慧下晡甚夜半靜平旦寅卯木王時也故爽慧下晡申酉金之勝也故加甚夜半亥子木得生也故安靜肝欲散急食辛以散之用辛補之酸瀉之木不宜郁故欲以辛散之順其性者為補逆其性者為瀉肝喜散而惡收故辛為補酸為瀉心主夏手少陰太陽主治少陰心丁火也太陽小腸丙火也二臟表裡故治同其日丙丁丙為陽火丁為陰火南方之干也心苦緩急食酸以收之心藏神其志喜喜則氣緩而心虛神散故宜食酸以收之病在心愈在長夏長夏土火之子也長夏不愈甚於冬火不勝水也冬不死持於春火得所生也起於夏火之王也禁溫食熱衣恐助火邪也心病者愈在戊己應長夏也戊己不愈加於壬癸應冬氣也壬癸不死持於甲乙應春氣也起於丙丁應夏氣也心病者日中慧夜半甚平旦靜日中己午火王時也故慧夜半亥子水之勝也故甚平旦寅卯火得生也故靜心欲耎急食鹹以耎之用鹹補之甘瀉之心火太過則為躁越故急宜食鹹以耎之蓋咸從水化能相濟也心欲耎故以咸耎為補心苦緩故以甘緩為瀉脾主長夏足太陰陽明主治陽明胃太陰脾戊己土也表裡治同其日戊己戊為陽土己為陰土中宮之干也脾苦濕急食苦以燥之脾以運化水穀制水為事濕勝則反傷脾土故宜食苦溫以燥之病在脾愈在秋秋屬金土之子也秋不愈甚於春土不勝木也春不死持於夏土得火生也起於長夏土之王也禁溫食飽食濕地濡衣溫言非熱防滯也濕地濡衣陰寒也皆能病脾故當禁之脾病者愈在庚辛應愈在秋也庚辛不愈加於甲乙應甚於春也甲乙不死持於丙丁應持於夏也起於戊己應起於長夏王時也脾病者日昳慧日出甚下晡靜白日亥曰昳未土王也故慧日出寅卯木勝土也故甚下晡申酉其子鄉也故靜昳音迭脾欲緩急食甘以緩之用苦瀉之甘補之脾貴充和溫厚其性欲緩故急食甘以緩之脾喜甘而惡苦故苦為瀉而甘為補也肺主秋手太陰陽明主治太陰肺辛金也陽明大腸庚金也表裡治同其日庚辛庚為陽金辛為陰金西方之干也肺苦氣上逆急食苦以泄之肺主氣行治節之令氣病則上逆於肺故宜急食苦以泄之病在肺愈在冬金之子鄉也冬不愈甚於夏金所不勝也夏不死持於長夏金氣得生也起於秋金氣王也禁寒飲食寒衣形寒飲冷則傷肺也肺病者愈在壬癸應愈在冬也壬癸不愈加於丙丁應甚於夏也丙丁不死持於戊己應持於長夏也起於庚辛應起於秋也肺病者下晡慧日中甚夜半靜下晡金王故慧日中火勝之故甚夜半水鄉則子能制邪故靜肺欲收急食酸以收之用酸補之辛瀉之肺應秋氣主收斂故宜食酸以收之肺氣宜聚不宜散故酸收為補辛散為瀉腎主冬足少陰太陽主治少陰腎癸水也太陽膀胱壬水也表裡治同其日壬癸壬為陽水癸為陰水北方之干也腎苦燥急食辛以潤之開腠理致津液通氣也腎為水臟藏津者也陰病者苦燥故宜食辛以潤之蓋辛從金化水之母也其能開腠理致津液者以辛能通氣也水中有真氣惟辛能達之氣至水亦至故可以潤腎之燥病在腎愈在春水之子鄉也春不愈甚於長夏水不勝土也長夏不死持於秋水得生也起於冬水所王也禁犯焠㶼熱食溫炙衣焠㶼燒爆之物也腎惡燥烈故當禁此焠音翠㶼音哀腎病者愈在甲乙應愈在春也甲乙不愈甚於戊己應甚於長夏也戊己不死持於庚辛應持於秋也起於壬癸應起於冬也腎病者夜半慧四季甚下晡靜夜半水王故慧四季土勝之故甚下晡金王水得所生故靜腎欲堅急食苦以堅之用苦補之咸瀉之腎主閉藏氣貴周密故腎欲堅宜食苦以堅之也苦能堅故為補咸能耎堅故為瀉夫邪氣之客於身也以勝相加此下總結上文愈甚持起之由然也凡內傷外感之加於人者皆曰邪氣外感六氣盛衰有時內傷五情間甚隨臟必因勝以侮不勝故曰以勝相加也至其所生而愈我所生也以時而言下同至其所不勝而甚我不勝彼被克者也至於所生而持生我之時也自得其位而起自王之時也故必先定五臟之脈察其從逆衰王乃可言間甚之時死生之期也欲知時氣逆順必須先察臟氣欲察臟氣必須先定五臟所病之脈如肝主弦心主鉤肺主毛腎主石脾主代脈來獨至全無胃氣則其間甚死生之期皆可得而知之如上文所論者是矣肝色青宜食甘粳米牛肉棗葵皆甘此承上文肝苦急急食甘以緩之等義而詳言其所宜之味也心色赤宜食酸小豆犬肉李韭皆酸心苦緩故宜此酸物以收之也肺色白宜食苦麥羊肉杏薤皆苦肺苦氣上逆故宜此苦物以泄之也薤音械根白如小蒜似韭而無實脾色黃宜食鹹大豆豕肉粟藿皆咸咸從水化其氣入腎脾宜食鹹者以腎為胃關胃與脾合咸能潤下利其關竅胃關利則脾氣運故宜食之上文云脾苦濕急食苦以燥之此復言咸者蓋咸之利濕與苦之瀉者各有宜也故諸臟皆同前惟此獨異耳藿豆葉羹也腎色黑宜食辛黃黍雞肉桃蔥皆辛腎苦燥故宜此辛物以潤之也黃黍即糯小米北方謂之黃米辛散酸收甘緩苦堅咸軟此總言五味之用藥石皆然也毒藥攻邪藥以治病因毒為能所謂毒者以氣味之有偏也蓋氣味之正者穀食之屬是也所以養人之正氣氣味之偏者藥餌之屬是也所以去人之邪氣其為故也正以人之為病病在陰陽偏勝耳欲救其偏則惟氣味之偏者能之正者不及也所以大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九是凡可辟邪安正者均可稱為毒藥故曰毒藥攻邪也五穀為養養生氣也五果為助助其養也五畜為益益精血也五菜為充實臟腑也氣味合而服之以補精益氣形不足者溫之以氣精不足者補之以味故氣味和合可以補陰益氣此五者有辛酸甘苦咸各有所利或散或收或緩或急或堅或耎四時五臟病隨五味所宜也此總結上文五臟之氣四時之用各有所利然變出不常則四時五臟因病而藥其氣味當隨宜配合也
