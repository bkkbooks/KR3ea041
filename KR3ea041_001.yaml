body:
  text: 卷一攝生第一今時之人其知道者食飲有節起居有常不妄作勞節飲食以養內慎起居以養外不妄作勞以保其天真虛邪賊風避之有時虛邪謂風從沖後來者主殺主害如避矢石治外之道也志間而少欲心安而不懼形勞而不倦志間而無貪何欲之有心安而無慮何懼之有形勞而神逸何倦之有高下不相慕高忘其貴下安其分兩無相慕知止不殆也嗜欲不能勞其目淫邪不能惑其心和於陰陽調於四時和合也合陰陽之變化調順也順四時之往來積精全神此能益壽而強者也從則治而逆則亂矣春三月此謂發陳發啓也陳故也春陽上升發育庶物啓故從新故曰發陳天地俱生萬物以榮萬象更新也夜臥早起廣步於庭廣大也所以布發生之氣也被髮緩形以使志生緩和緩也舉動和緩以應春氣則神定而志生是即所以使也後仿此生而勿殺豫而勿奪賞而勿罰皆所以養髮生之德也故君子於啓蟄不殺方長不折豫與同此春氣之應養生之道也四時之令春生夏長秋收冬藏應春氣者養生氣也逆之則傷肝夏為寒變奉長者少逆不順也奉承也肝屬木王於春春失所養故傷肝肝傷則心火失其所生當夏令則火有不足而寒水侮之因為寒變寒變者變熱為寒也春生既逆承生氣而夏長者少矣夏三月此謂蕃秀蕃茂也陽王已極萬物俱盛故曰蕃秀蕃音煩天地氣交萬物華實歲氣陰陽盛衰其交在夏天地氣交斯時也陽氣生長於前陰氣收成於後故萬物華實夜臥早起無厭於日起臥同於春時不宜藏也無厭於長日氣不宜惰也使志無怒使華英成秀長夏火土用事怒則肝氣易逆脾土易傷故欲使志無怒則華英成秀華英言神氣也使氣得泄若所愛在外夏氣欲其疏泄泄則膚腠宣通故若所愛在外此夏氣之應養長之道也應夏氣者養長氣也長上聲逆之則傷心秋為痎瘧奉收者少心屬火王於夏夏失所養故傷心心傷則暑氣乘之至秋而金氣收斂暑邪內郁於是陰欲入而陽拒之則為寒火欲出而陰束之則為熱金火相爭故寒熱往來而為痎瘧夏長既逆承長氣而秋收者少矣痎音皆冬至重病火病者畏水也余俱仿此秋三月此謂容平陰升陽降大火西行秋容平定故曰容平天氣以急地氣以明風氣徑疾曰急物色清肅曰明早臥早起與雞俱興早臥以避初寒早起以從新爽使志安寧以緩秋刑陽和日退陰寒日生故欲神志安寧以避肅殺之氣收斂神氣使秋氣平無外其志使肺氣請皆所以順秋氣欲使肺金清淨也此秋氣之應養收之道也應秋氣者養收氣也逆之則傷肺冬為飧泄奉藏者少肺屬金王於秋秋失所養故傷肺肺傷則腎水失其所生當冬令而為腎虛飧泄飧泄者水穀不分而為寒泄也秋收既逆承收氣而冬藏者少矣飧音孫冬三月此謂閉藏陽氣藏伏閉塞成冬也水冰地坼無擾乎陽坼裂也天地閉塞故不可煩擾以泄陽氣坼音策早臥晚起必待日光所以避寒也使志若伏若匿若有私意若已有得皆所以法冬令欲其自重無妄動也去寒就溫無泄皮膚使氣亟奪去寒就溫所以養陽無使泄奪所以養氣亟數也亟棘器二音此冬氣之應養臟之道也應冬氣者養臟氣也逆之則傷腎春為痿厥奉生者少腎屬水王於冬失所養故傷腎腎傷則肝木失其所生肝主筋當春令而筋病為痿陽欲藏故冬不能藏則陽虛為厥冬藏既逆承藏氣而春生者少矣逆春氣則少陽不生肝氣內變春令屬木肝膽應之肝主春足厥陰少陽主治故逆春氣則少陽之令不能生髮肝氣被郁內變為病此不言膽而止言肝者以臟氣為主也後仿此逆夏氣則太陽不長心氣內洞夏令屬火心與小腸應之心主夏手少陰太陽主治故逆夏氣則太陽之令不長而心虛內洞諸陽之病生矣逆秋氣則太陰不收肺氣焦滿秋令屬金肺與大腸應之肺主秋手太陰陽明主治故逆秋氣則太陰之令不收而肺熱葉焦為脹滿也逆冬氣則少陰不藏腎氣獨沉冬令屬水腎與膀胱應之腎主冬足少陰太陽主治故逆冬氣則少陰之令不藏而腎氣獨沉藏者藏於中沉者沉於下腎氣不蓄藏則注泄沉寒等病生矣夫四時陰陽者萬物之根本也生成之所由也所以聖人春夏養陽秋冬養陰以從其根夫陰根於陽陽根於陰陰以陽生陽以陰長所以聖人春夏則養陽以為秋冬之地秋冬則養陰以為春夏之地皆所以從其根也今人有春夏不能養陽者每因風涼生冷傷此陽氣以致秋冬多患瘧瀉此陰勝之為病也有秋冬不能養陰者每因縱欲過熱傷此陰氣以致春夏多患火症此陽勝之為病也養生者慎之故與萬物浮沉於生長之門逆其根則伐其本壞其真矣能順陰陽之性則能浮沉於生長之門矣萬物有所生而獨知守其根百事有所出而獨知守其門則聖人之能事也陰陽第二黃帝曰陰陽者天地之道也道者陰陽之理也陰陽者一分為二也太極動而生陽靜而生陰天生於動地生於靜故陰陽為天地之道萬物之綱紀大曰綱小曰紀總之為綱周之為紀物無巨細莫不由之故為萬物之綱紀變化之父母物生謂之化物極謂之變易曰在天成象在地成形變化見矣然而變化雖多無非陰陽之所生故為之父母生殺之本始生殺之道陰陽而已陽來則物生陽去則物死然陽亦能殺陰亦能長故生於陽者陰能殺之生於陰者陽能殺之萬物死生皆由乎此故謂之本始本根本也始終始也神明之府也神變化不測也明三光著象也府所以藏物也神明出於陰陽故陰陽為神明之府治病必求於本本致病之原也人之疾病或在表或在裡或為寒或為熱或感於五運六氣或傷於臟腑經絡皆不外陰陽二氣必有所本故或本於陰或本於陽病變雖多其本則一知病所從生而直取之是為得一之道倘但知見病治病而不求其致病之因則流散無窮誠哉疏矣故積陽為天積陰為地陰陽體象大小不同形氣生成不積不厚故必積陽至大而為天積陰至厚而為地陰靜陽躁陰性柔陽性剛也陽生陰長陽殺陰藏此即四象之義陽生陰長言陽中之陰陽也陽殺陰藏言陰中之陰陽也蓋陽不獨立必得陰而後成如發生賴於陽和而長養由乎雨露是陽生陰長也陰不自專必因陽而後行如閉藏因於寒冽而肅殺出乎風霜是陽殺陰藏也此於對待之中而復有五臟之道所謂獨陽不生孤陰不成也一曰陽之和者為發生陰之和者為成實故曰陽生陰長陽之亢者為焦枯陰之凝者為固閉故曰陽殺陰藏此又以陰陽之淑慝言也陽化氣陰成形陽動而散故化氣陰靜而凝故成形寒極生熱熱極生寒陰寒陽熱乃陰陽之正氣寒極生熱陰變為陽也熱極生寒陽變為陰也動之始則陽生動之極則陰生靜之始則柔生靜之極則剛生如人傷於寒則病為熱本寒而變熱也內熱已極而反寒栗本熱而變寒也故陰陽之理極則必變寒氣生濁熱氣生清寒氣凝滯故生濁陰熱氣升散故生清陽清氣在下則生飧泄濁氣在上則生䐜脹清陽主升陽衰於下而不能升故為飧泄濁陰主降陰滯於上而不能降故為䐜脹飧泄完穀而泄也䐜脹胸膈滿也飧音孫䐜音嗔此陰陽反作病之逆從也作為也此字承上文治病必求其本以下而言如陰雲長陽云殺寒生熱熱生寒清在下濁在上皆陰陽之反作而病之逆從也順則為從反則為逆逆從雖殊皆有其本故必求其本而治之故清陽為天濁陰為地地氣上為云天氣下為雨雨出地氣云出天氣此下言陰陽精氣之升降以見天人一理也天地者陰陽之形體也雲雨者天地之精氣也陰在下者為精精者水也精升則化為氣云因雨而出也陽在上者為氣氣者云也氣降則化為精雨由云而生也自下而上者地交於天也故地氣上為云又曰云出天氣自上而下者天交於地也故天氣下為雨又曰雨出地氣升已而降降者謂天降已而升升者謂地天氣下降氣流於地地氣上升氣騰於天可見天地之升降者謂之雲雨人身之升降者謂之精氣天人一理此其為最也清陽出上竅濁陰出下竅本乎天者親上本乎地者親下也上竅七謂耳目口鼻下竅二謂前後二陰清陽發腠理濁陰走五臟腠理肌表也陽發散於皮膚故清陽歸之陰受氣於五臟故濁陰走之腠音湊清陽實四肢濁陰歸六腑四肢為諸陽之本故清陽實之六腑傳化水穀故濁陰歸之水為陰火為陽水潤下而寒故為陰火炎上而熱故為陽水火者即陰陽之徵兆陰陽者即水火之性情凡天地萬物之氣無往而非水火之運用故天以日月為水火易以坎離為水火醫以心腎為水火丹以精氣為水火夫腎者水也水中生氣即真火也心者火也火中生液即真水也水火互藏乃至道之所在陽為氣陰為味氣無形而升故為陽味有質而降故為陰此以藥食氣味言也味歸形形歸氣歸依投也五味生精血以成形故味歸於形形之存亡由氣之聚散故形歸於氣氣歸精氣者真氣也所受於天與穀氣並而充身者也人身精血由氣而化故氣歸於精精歸化精者坎水也天一生水為五行之最先故物之初生其形皆水由精以化氣由氣以化神是水為萬物之原故精歸於化精食氣形食味食如子食母乳之義氣歸精故精食氣味歸形故形食味化生精萬物化生必從精始故化生精前言精歸化者言未化之前由精為化也此言化生精者言既化之後由化生精也氣生形氣聚則形生氣散則形死也味傷形氣傷精味既歸形而味有不節必反傷形氣既歸精而氣有失調必反傷精精化為氣精化為氣謂元氣由精而化也前雲氣歸精是氣生精也而精化氣是精生氣也二者正精氣互根之妙天地雲雨之義也夫陽化氣即云之類陰成形即雨之類雨乃不生於地而降於天之云氣歸精也云乃不出於天而升於地之氣精化為氣也人身精氣全是如此故氣聚則精盈精盈則氣盛精氣充而形自強矣氣傷於味上文曰味傷形則未有形傷而氣不傷者如味過於酸肝氣以津脾氣乃絶之類是皆味傷氣陰味出下竅陽氣出上竅味為陰故降氣為陽故升味厚者為陰薄為陰之陽氣厚者為陽薄為陽之陰此言氣味之陰陽而陰陽之中復各有陰陽也味為陰矣而厚者為純陰薄者為陰中之陽氣為陽矣而淳者為純陽漓者為陽中之陰味厚則泄薄則通利氣薄則發泄厚則發熱陰味下行故味厚者能泄於下薄者能通利陽氣上行故氣薄者能泄於表厚者能發熱也壯火之氣衰少火之氣壯壯火食氣氣食少火壯火散氣少火生氣火天地之陽氣也天非此火不能生物人非此火不能有生故萬物之生皆由陽氣但陽和之火則生物亢烈之火反害物故火太過則氣反衰火和平則氣乃壯壯火散氣故云食氣猶言火食此氣也少火生氣故云食火猶言氣食此火也此雖承氣味而言然造化之道少則壯壯則衰自是如此不特專言氣味氣味辛甘發散為陽酸苦湧泄為陰此言正味之陰陽也辛散甘緩故發肌表酸收苦泄故為吐瀉湧湧同陰勝則陽病陽勝則陰病此下言陰陽偏勝之為病也陰陽不和則有勝有虧故皆能為病陽勝則熱陰勝則寒太過所致重寒則熱重熱則寒物極則變也此即上文寒極生熱熱極生寒之義蓋陰陽之氣水極似火火極似水陽盛格陰陰盛格陽故有真寒假熱真熱假寒之辨此而錯認則死生反掌重平聲寒傷形熱傷氣寒為陰形亦屬陰寒則形消故傷形熱為陽氣亦屬陽熱則氣散故傷氣氣傷痛形傷腫氣欲利傷之則痛形有質傷之則腫故先痛而後腫者氣傷形也先腫而後痛者形傷氣也氣先病而後及於形因氣傷形也形先病而後及於氣因形傷氣也風勝則動風勝者為振掉搖動之病即醫和云風淫末疾之類熱勝則腫熱勝者為丹毒癰腫之病即陽淫熱疾之類燥勝則乾燥勝者為津液枯涸內外乾澀之病寒勝則浮寒勝者陽氣不行為脹滿浮虛之病即陰淫寒疾之類濕勝則濡瀉脾惡濕而喜燥濕勝者必侵脾胃為水穀不分濡瀉之病即雨淫腹疾之類是也濡音如濕滯也天有四時五行以生長收藏以生寒暑燥濕風四時者春夏秋冬五行者木火土金水合而言之則春屬木而主生其化以風夏屬火而主長其化以暑長夏屬土而主化其化以濕秋屬金而主收其化以燥冬屬水而主藏其化以寒五行各一惟火有君相之分此言寒暑燥濕風者即五行之化也言寒暑燥濕風火者是為六氣也人有五臟化五氣以生喜怒悲憂恐五臟者心肺肝脾腎也五氣者五臟之氣也由五氣以生五志心在志為喜肝在志為怒脾在志為思肺在志為憂腎在志為恐故喜怒傷氣寒暑傷形喜怒傷內故傷氣寒暑傷外故傷形舉喜怒言則悲憂恐同矣舉寒暑言則燥濕風同矣上文言寒傷形熱傷氣蓋彼以陰陽分形氣此以內外分形氣也暴怒傷陰暴喜傷陽氣為陽血為陰肝藏血心藏神暴怒則肝氣逆而血亂故傷陰暴喜則心氣緩而神逸故傷陽多陽者多喜多陰者多怒亦各從其類也厥氣上行滿脈去形厥逆也言寒暑喜怒之氣暴逆於上則陽獨實故滿脈陽亢則陰離故去形此孤陽之象也脈經曰諸浮脈無根者死有表無里者死其斯之謂歟喜怒不節寒暑過度生乃不固固堅也故重陰必陽重陽必陰重者重疊之義謂當陰時而復感寒陽時而復感熱或以天之熱氣傷人陽分天之寒氣傷人陰分皆謂之重蓋陰陽之道同氣相求故陽傷於陽陰傷於陰然而重陽必變為陰重陰必變為陽下文八句即其徵驗上文重寒則熱寒極生熱義相上下所當互求重平聲冬傷於寒春必病溫冬傷於寒者以類相求其氣入腎其寒侵骨其即病者為直中陰經之傷寒不即病者至春夏則陽氣發越營氣漸虛所藏寒毒為外邪喚出名為溫病所藏者少陰所合者太陽與少陰為表裡也所發者少陽所病者寒熱由內出外而未及於表也然溫病多起於冬不藏精及辛苦飢餓之人蓋冬不藏精則邪能深入而辛苦之人其身常暖其衣常薄暖時竅開薄時忍寒兼以飢餓勞倦致傷中氣則寒邪易入待春而發冬不藏精者死多生少冬傷於寒者死少生多在根本之拔與不拔耳又有天地間一種乖戾之氣時行傳染沿村闔戶虛者先受不必冬寒而病者矣避之之法皆在節欲節勞仍勿忍飢而近其氣自無可慮春傷於風夏生飧泄春傷於風木氣通於肝膽即病者乃為外感若不即病而留連於夏脾土當令木邪相侮病為飧泄也飧完穀而泄也夏傷於暑秋必痎瘧夏傷於暑金氣受邪即病者乃為暑症若不即病而暑汗不出延至於秋新涼外束邪郁成熱金火相拒寒熱交爭故病為痎瘧秋傷於濕冬生咳嗽夏秋之交土金用事秋傷於濕其即病者濕氣通脾故為濡泄等證若不即病而濕蓄金臟久之變熱至冬則外寒內熱相搏乘肺病為咳嗽岐伯曰陽勝則身熱腠理閉喘粗為之俯仰汗不出而熱齒乾以煩冤腹滿死能冬不能夏陽勝者火盛故身熱陽盛者表實故腠理閉陽實於胸則喘粗不得臥故為俯仰汗閉於外則熱鬱於內故齒乾陽極則傷陰故以煩冤腹滿死陰竭者得冬之助猶可支持遇夏之熱不能耐受矣冤鬱而亂也俯俯同能耐同陰勝則身寒汗出身常清數栗而寒寒則厥厥則腹滿死能夏不能冬陰勝則陽衰故身寒陽衰則表不固故汗出而身冷栗戰栗也厥厥逆也陰極者陽竭於中故腹滿而死陽衰者喜暖惡寒故能夏不能冬也陽氣有餘為身熱無汗陰氣有餘為多汗身寒此陰陽更勝之變病之形能也更勝迭為勝負也即陰勝陽病陽勝陰病之義形言陰陽之病形能作態能知七損八益則二者可調不知用此則早衰之節也上文言陰陽之變病此言死生之本原也七為少陽之數八為少陰之數七損者言陽消之漸八益者言陰長之由也夫陰陽者生殺之本始也生從乎陽陽不宜消也死從乎陰陰不宜長也使能知七損八益之道而得其消長之幾則陰陽之柄把握在我故二者可調否則未央而衰矣夫陽長則陰消陽退則陰進陽來則物生陽去則物死所以陰邪之進退皆由乎陽氣之盛衰耳觀周易三百八十四爻皆卷卷於扶陽抑陰者蓋恐其自消而剝自剝而盡生道不幾乎息矣聖賢慮始之心相符若此年四十而陰氣自半也陰真陰也四十之後精氣日衰陰減其半矣然此言常人之大較至若彭殤椿菌稟賦不齊而太極初中則又各有其局象夫真氣為陽真水為陰陽藏水中陰藏氣中氣主於升氣中有真水水主於降水中有真氣真水乃真陰也真氣乃真陽也可見真陰者即真陽之本也後世有以苦寒為補陰者伐陰者也起居衰矣真陰已半所以衰也年五十體重耳目不聰明矣肝受血而能視足受血而能步今精血漸衰故體重而耳目不聰明矣年六十陰痿氣大衰九竅不利下虛上實涕泣俱出矣陰痿陽不舉也陰氣內虧故九竅不利陰虛則陽無所歸而氣浮於上故上實下虛而涕泣俱出知之則強不知則老知謂知損益之道故同出而名異耳同出者陰陽也名異者盛衰也智者察同愚者察異智者能於同處體察愚者止能察其異也不特自察如此所察皆然愚者不足智者有餘愚者失之智者得之也有餘則耳目聰明身體輕強老者復壯壯者益治此智者有餘之徵驗天不足西北西北方陰也而人右耳目不如左明也地不滿東南東南方陽也而人左手足不如右強也天為陽西北陰方故天不足西北地為陰東南陽方故地不滿東南日月星辰天之四象猶人之有耳目口鼻故耳目之左明於右以陽勝於東南也水火土石地之四體猶人之有皮肉筋骨故手足之右強於左以陰強於西北也陽者其精並於上並於上則上明而下虛故耳目聰明而手足不便也陰者其精並於下並於下則下盛而上虛故其耳目不聰明而手足便也並聚也天地之道東升西降升者為陽降者為陰陽氣生於子中極於午中從左升而並於上故耳目之明亦在左而左之手足不便也陰氣生於午中極於子中從右降而並於下故手足之強亦在右而右之耳目不聰也俱感於邪其在上則右甚在下則左甚此天地陰陽所不能全也故邪居之俱兼上下而言也夫邪之所湊必因其虛故在上則右者甚在下則左者甚蓋以天之陽不全於上之右地之陰不全於下之左故邪得居之而病獨甚也天有精地有形天有八紀地有五里五行精氣成象於天則為七政二十八宿以定天之度布位於地則為山川河海以成地之形惟天有精故八節之紀正惟地有形故五方之裡分紀考記也里道里也故能為萬物之父母乾知大始坤作成物陽以化氣陰以成形陰陽合德變化見矣故天地為萬物之父母清陽上天濁陰歸地陽升陰降也天地之動靜神明之綱紀神明者陰陽之情狀也陰陽往來然後能變化生長收藏終而復始一陰一陽互為進退故消長無窮終而復始惟賢人上配天以養頭下象地以養足中傍人事以養五臟清陽在上故頭配天以養其清濁陰在下故足象地以養其靜五氣運行於中故五臟傍人事以養其和此雖以頭足五臟為言而實謂上中下無非法於天地人也天氣通於喉地氣通於嗌天氣清氣也謂呼吸之氣地氣濁氣也謂飲食之氣清氣通於五臟由喉而先入肺濁氣通於六腑由嗌而先入胃嗌咽也天食人以五氣地食人以五味五氣入鼻藏於心肺五味入口藏於腸胃喉主天氣咽主地氣其義皆同嗌音益風氣通於肝風為木氣肝為木臟同氣相求故通於肝上文二句總言天地陰陽通於人此下四句分言五行氣候通於人詳明天氣通喉以及於五臟者也雷氣通於心雷為火氣心為火臟穀氣通於脾山谷土氣脾為土臟雨氣通於腎雨為水氣腎為水臟故相通也六經為川腸胃為海六經者三陰三陽也周流氣血故為之川腸胃者盛受水穀故為之海此詳言地氣通於嗌也九竅為水注之氣上七竅下二竅是為九竅水注之氣言水氣之注也如目之淚鼻之涕口之津二陰之尿穢皆是也雖耳若無水而耳中津氣濕而成垢是即水氣所致氣至水必至水至氣必至故言水注之氣以天地為之陰陽此重申上文言賢人之養身皆法乎天地之陰陽也陰中有陰陽中有陽既言陰矣而陰中又有陰既言陽矣而陽中又有陽此陰陽之道所以無窮平旦至日中天之陽陽中之陽也日中至黃昏天之陽陽中之陰也合夜至雞鳴天之陰陰中之陰也雞鳴至平旦天之陰陰中之陽也午前為陽中之陽午後則陽中之陰也子前為陰中之陰子後為陰中之陽也故以一日分為四時則子午當二至之中卯酉當二分之合日出為春日中為夏日入為秋夜半為冬也夫人亦應之言人之陰陽則外為陽內為陰以表裡言言人身之陰陽則背為陽腹為陰以前後言言人身之臟腑中陰陽則臟者為陰腑者為陽肝心脾肺腎五臟皆為陰膽胃大腸小腸膀胱三焦六腑皆為陽五臟屬裡藏精氣而不瀉故為陰六腑屬表傳化物而不藏故為陽所以欲知陰中之陰陽中之陽者何也為冬病在陰夏病在陽春病在陰秋病在陽皆視其所在為施治也此舉一歲之候以明病治之陰陽也冬氣伏藏故在陰夏氣發越故在陽春病在陰者以春陽尚微而余陰尚盛也秋病在陽者以秋陰尚微而余陽尚盛也必當體察氣宜庶無誤治故背為陽陽中之陽心也背為陽陽中之陰肺也腹為陰陰中之陰腎也腹為陰陰中之陽肝也腹為陰陰中之至陰脾也心肺居於膈上連近於背故為背之二陽臟肝脾腎居於膈下連近於腹故為腹之三陰臟然陽中又分陰陽則心象人之日故曰牡臟為陽中之陽肺象人之天天象玄而不自明故天體雖陽而實包藏陰德較乎日之純陽者似為有間故肺曰牝臟為陽中之陰若陰中又分陰陽則腎屬人之水故曰牝臟陰中之陰也肝屬人之木木火同氣故曰牡臟陰中之陽也脾屬人之土其體象地故曰牝藏為陰中之至陰也此皆陰陽表裡內外雌雄相輸應也故以應天之陰陽也雌雄即牝牡之謂輸應轉輸相應也此總結上文以人應天之義臟象上第三心者君主之官也神明出焉心為一身之君主稟虛靈而含造化其一理以應萬物臟腑百骸惟所是命故曰神明出焉肺者相傅之官治節出焉肺與心皆居膈上位高近君猶之宰輔故稱相傅之官肺主氣氣調則營衛臟腑無所不治故曰治節出焉節制也相去聲肝者將軍之官謀慮出焉肝屬風木性動而急故為將軍之官木主發生故為謀慮所出膽者中正之官決斷出焉膽稟剛果之氣故為中正之官而決斷所出膽附於肝相為表裡肝氣雖強非膽不斷肝膽相濟勇敢乃成故曰決斷所出膻中者臣使之官喜樂出焉膻中在上焦亦名上氣海為宗氣所積之處主奉行君相之令而布施氣化故為臣使之官多陽者多喜多陰者多怒膻中為二陽臟所居故喜樂出焉十二經表裡有心包絡而無膻中正為心包絡包為膜心君之宮室絡為膜外之巷街心君之城府也一為密勿之地一是畿甸之間臣使之義著焉膻中者宮室外之城府也脾胃者倉廩之官五味出焉脾主運化胃司受納通主水穀故皆為倉稟之官五味入胃由脾布散故曰五味出焉大腸者傳道之官變化出焉大腸居小腸之下主出糟粕故為腸胃變化之傳道小腸者受盛之官化物出焉小腸居胃之下受盛胃中水穀而分清濁水液由此而滲於前糟粕由此而歸於後脾氣化而上升小腸化而下降故曰化物出焉腎者作強之官伎巧出焉伎技同腎屬水而藏精精為有形之本精盛形成則作用強故為作強之官水能化生萬物精妙莫測故曰伎巧出焉三焦者決瀆之官水道出焉決通也瀆水道也上焦不治則水泛高原中焦不治則水留中脘下焦不治則水亂二便三焦氣治則脈絡通而水道利故曰決瀆之官膀胱者州都之官津液藏焉氣化則能出矣膀胱位居最下三焦水液所歸是同都會之地故曰州都之官津液藏焉膀胱有下口而無上口津液之入者為水水之化者由氣有化而入而後有出是謂氣化則能出矣然氣化之原居丹田之間是名下氣海天一元氣化生於此元氣足則運化有常水道自利所以氣為水母知氣化能出之旨則治水之道思過半矣凡此十二官者不得相失也失則氣不相使而災害至矣故主明則下安以此養生則壽歿世不殆以為天下則大昌心主明則十二官皆安所以不殆能推養生之道以及齊家治國平天下未有不大昌者矣主不明則十二官危使道閉塞而不通形乃大傷以此養生則殃以為天下者其宗大危戒之戒之心不明則神無所主而臟腑相使之道閉塞不通故自君主而下無不失職所以十二臟皆危而不免於殃也身且不免況於天下乎重言戒之者甚言君心之不可不明也至道在微變化無窮孰知其原至道之大其原甚微及其變化則有莫測不能見道安得知其原哉見道者由窮理盡性以至於命也窘乎哉消者瞿瞿孰知其要閔閔之當孰者為良窘窮也瞿瞿不審貌閔閔憂恤也消者瞿瞿孰知其要謂十二官相失則精神日消瞿瞿然莫審其故誠者窘矣果孰得而知其要也閔閔之當孰者為良謂能憂人之憂而恤人之危者又孰足以當其明哲之良哉蓋甚言知道之少也恍惚之數生於毫釐恍惚者無形之始毫釐者有象之初即至道在微之徵也毫釐之數起於度量千之萬之可以益大推之大之其形乃制毫釐者度量之所起也千之萬之者積而不已而形制益多也喻言大必由於小著必始於微是以變化雖多原則一耳但能知一則無一之不知也不能知一則無一之能知也正以見人之安危休咎亦惟心君為之原耳心者身之本神之變也其華在面其充在血脈為陽中之太陽通於夏氣心為君主而屬陽陽主生萬物系之以存亡故曰生之本心藏神神明由之以變化故曰神之變心主血脈血足則面容光彩脈絡滿盈故曰其華在面其充在血脈心屬火以陽藏而通於夏氣故為陽中之太陽肺者氣之本魄之處也其華在毛其充在皮為陽中之太陰通於秋氣諸氣皆主於肺故曰氣之本肺藏魄故曰魄之處肺主身之皮毛故其華在毛其充在皮肺金以太陰之氣而居陽分故為陽中之太陰通於秋氣腎者主蟄封藏之本精之處也其華在發其充在骨為陰中之少陰通於冬氣腎者胃之關也位居亥子開竅二陰而司約束故為主蟄封藏之本腎主水受五臟六腑之精而藏之故曰精之處也發為血之餘精足則血足而發盛故其華在發腎之合骨也故其充在骨腎為陰臟故為陰中之少陰通於冬氣肝者罷極之本魂之居也其華在爪其充在筋以生血氣此為陽中之少陽通於春氣人之運動由乎筋力運動過勞筋必罷極肝藏魂故為魂之居爪者筋之餘故其華在爪其充在筋肝屬木位居東方為發生之始故以生血氣雖王於春陽猶未盛故為陽中之少陽通於春氣罷音皮脾胃大腸小腸三焦膀胱者倉廩之本營之居也名曰器能化糟粕轉味而入出者也此六者皆主盛受水穀故同稱倉廩之本營者水穀之精氣也水穀貯於六腑故為營之所居而皆名曰器凡所以化糟粕轉五味者皆由乎此也粕音朴其華在唇四白其充在肌此至陰之類通於土氣四白唇之四際白肉也唇者脾之榮肌肉者脾之合脾以陰中之至陰而分王四季故通於土氣此雖若指脾為言而實總結六腑者皆倉廩之本無非統於脾氣也故曰此至陰之類凡十一臟取決於膽也五臟六腑共為十一稟賦不同情志亦異必資膽氣庶得各成其用故皆取決於膽也五臟者主藏精而不瀉故五臟皆內實六腑者主化物而不藏故六腑皆中虛惟膽以中虛故屬於腑然藏而不瀉又類乎臟故足少陽為半表半裡之經亦曰中正之官又曰奇恆之府所以能通達陰陽而十一臟皆取決乎此也然膽者少陽春生之氣春氣升則萬化安故膽氣春生則餘臟從之所以十一臟皆取決於膽肺合大腸大腸者傳道之府此言臟腑各有所合是為一表一里肺與大腸為表裡故相合也心合小腸小腸者受盛之府心與小腸為表裡故相合也肝合膽膽者中精之府肝與膽為表裡故相合也膽為中正之官藏清淨之液故曰中精之府蓋以他府所盛者皆濁而此獨清也脾合胃胃者五穀之府脾與胃為表裡而胃司受納故為五穀之府腎合膀胱膀胱者津液之府也腎與膀胱為表裡而津液藏焉故為津液之府少陽屬腎腎上連肺故將兩臟少陽三焦也三焦之正脈指天散於胸中而腎脈亦上連於肺三焦之下腧屬於膀胱而膀胱為腎之合故三焦亦屬於腎也然三焦為中瀆之府膀胱為津液之府腎以水臟而領水腑理之當然故腎得兼將兩臟將領也兩臟腑亦可以言臟也三焦者中瀆之府也水道出焉屬膀胱是孤之府也是六腑之所與合者中瀆者謂如川如瀆源流皆出其中也即水穀之入於口出於便自上而下必歷三焦故曰中瀆之府水道出焉膀胱受三焦之水而當其疏泄之道氣本相依體同一類故三焦下腧出於委陽並太陽之正入絡膀胱約下焦也然於十二臟之中惟三焦獨大諸臟無與匹者故名曰是孤之府也肺合大腸皆金也心合小腸皆火也肝合膽皆木也脾合胃皆土也腎合膀胱皆水也惟三焦者雖為水瀆之府而實總護諸陽亦稱相火是又水中之火府故曰三焦屬膀胱夫少陽與心主為表裡其在下者為陰屬膀胱而合腎水在上者為陽合包絡而通心火此三焦之所以際上極下象同六合而無所不包觀六腑之別極為明顯以其皆有盛貯因名為腑而三焦者曰中瀆之府是孤之府分明確有一腑蓋即臟腑之外軀體之內包羅諸臟一腔之大腑也故有中瀆是孤之名而亦有大腑之形難經謂其有名無形誠一失也是蓋譬之探囊以計物而忘其囊之為物耳遂致後世紛紛無所憑據有分為前後三焦者有言為腎旁之脂者即如東垣之明亦以手三焦足三焦分而為二夫以一三焦尚云無其形而諸論不一又何三焦之多也畫蛇添足愈多愈失矣後世之疑將焉釋哉東方青色入通於肝開竅於目藏精於肝東為木王之方肝為屬木之臟故相通也青者木之色目者肝之竅木之精氣藏於肝曰魂其病發驚駭風木之氣多振動故病發為驚駭其味酸其類草木酸者木之味其畜雞易曰巽為雞東方木畜也其穀麥麥成最早故應東方春氣其應四時上為歲星木之精氣上為歲星是以春氣在頭也木王春春氣上升也其音角木音曰角其應春其化丁壬巳亥其數八河圖數天三生木地八成之是以知病之在筋也肝主筋也其臭臊臭氣之總名也臊為木氣所化月令曰其臭膻膻與臊類臭許救尺救二切臊音騷南方赤色入通於心開竅於耳藏精於心南為火王之方心為屬火之臟其氣相通赤者火之色耳者心之竅火之精氣藏於心曰神心在竅為舌腎在竅為耳可見舌本屬心耳則兼乎心腎也夫舌本兼腎則心亦兼耳猶下文羊與馬通用言其午未同位也然五官之用無不兼乎心者也否則孰為之主宰耶故病在五臟心為五臟之君主心病則五臟應之其味苦其類火火之味苦其畜羊其畜馬而曰羊者午未俱屬南方耳其谷黍黍之色赤糯小米也其應四時上為熒惑星火之精氣上為熒惑星是以知病之在脈也心主血脈也其音徵火音曰徵其應夏其化戊癸子午其數七地二生火天七成之其臭焦焦為火氣所化中央黃色入通於脾開竅於口藏精於脾土王四季位居中央脾為屬土之臟其氣相通黃者土之色口者脾之竅土之精氣藏於脾曰意故病在舌本脾之脈連舌本散舌下其味甘其類土土之味甘其畜牛牛屬醜而色黃也易曰坤為牛其谷稷稷小米也粳者為稷糯者為黍為五穀之長色黃屬土其應四時上為鎮星土之精氣上為鎮星是以知病之在肉也脾主肌肉也其音宮土音曰宮其應長夏其化甲己醜未其數五其臭香香為土氣所化西方白色入通於肺開竅於鼻藏精於肺西為金王之方肺為屬金之臟其氣相通白者金之色鼻者肺之竅金之精氣藏於肺曰魄故病在背肺在胸中附於背也其味辛其類金金之味辛其畜馬肺為乾象易曰乾為馬其谷稻稻堅而白故屬金其應四時上為太白星金之精氣上為太白星是以知病之在皮毛也肺主皮毛也其音商金音曰商其應秋其化乙庚卯酉其數九地四生金天九成之其臭腥腥為金氣所化北方黑色入通於腎開竅於二陰藏精於腎北為水王之方腎為屬水之臟其氣相通黑者水之色二便者腎之竅水之精氣藏於腎曰志故病在溪肉之大會為谷肉之小會曰溪溪者水所流注也故病在溪溪溪同其味鹹其類水水之味鹹其畜彘彘豬也易曰坎為豕彘音治其谷豆菽也黑者屬水其應四時上為辰星水之精氣上為辰星是以知病之在骨也腎主骨也其音羽水音曰羽其應冬其化丙辛辰戌其數六天一生水地六成之其臭腐腐為水氣所化月令云其臭朽朽與腐類故善為脈者察之善診者必能察此陰陽臟象之精微而合於吾心庶神理明而逆從變化無遁情矣東方生風風者天地之陽氣東者日升之陽方故陽生於春春王於東而東方生風風生木風動則木榮也木生酸洪範五行首先言味故曰曲直作酸凡物之味酸者皆木氣所化酸生肝酸先入肝也肝生筋肝主筋也筋生心木生火也肝主目目者肝之官也其在天為玄玄深微也天道無窮東為陽升之方春為發生之始故曰玄在人為道道者天地之生意也人以道為主而知其所生之本則可與言道矣在地為化化生化也有生化而後有萬物有萬物而後有終始凡自無而有自有而無總稱曰化化化生生道歸一氣故於東方首言之化生五味萬物化生五味具矣道生智生意日新智慧出矣玄生神玄冥之中無有而無不有也神神奇奇所從生矣在天為玄六句他方皆無而東方獨有之蓋東方為生物之始元貫四德春貫四時言東方之化則四氣盡乎其中矣通舉五行六氣之大法非獨指東方為言也神在天為風飛揚散動風之用也鼓之以雷霆潤之以雨露無非天地之神而風則神之一者又風為六氣之首故應東方在地為木五行在地東方成木後仿此在體為筋筋屬衆體之木在臟為肝肝屬五臟之木在色為蒼蒼屬五色之木在音為角角屬五音之木在聲為呼怒則叫呼在變動為握握同搐搦筋之病也在竅為目在味為酸在志為怒強則好怒肝之志也並於肝則憂怒傷肝怒出於肝過則傷肝悲勝怒悲憂為肺金之志故勝肝木之怒悲則不怒是其徵也風傷筋同氣相求故風傷筋燥勝風燥為金氣故勝風木酸傷筋酸走筋過則傷筋而拘攣辛勝酸辛為金味故勝木之酸南方生熱陽極於夏夏王於南故南方生熱熱生火熱極則生火也火生苦火炎上炎上作苦故物之味苦者由火氣之所化苦生心苦先入心也心生血心主血脈也血生脾火生土也心主舌舌為心之官也其在天為熱六氣在天者為熱在地為火在體為脈脈屬衆體之火在臟為心心屬五臟之火在色為赤赤屬五色之火在音為徵徵屬五音之火在聲為笑喜則發笑心之聲也在變動為憂心藏神神有餘則笑不足故憂在竅為舌在味為苦在志為喜心之志也喜傷心喜出於心過則傷心恐勝喜恐為腎水之志故勝心火之喜恐則不喜熱傷氣壯火食氣也寒勝熱水勝火也苦傷氣苦從火化故傷肺氣火剋金也又如陽氣性升苦味性降氣為苦遏則不能舒伸故苦傷氣咸勝苦咸為水味故勝火之苦氣為苦傷而用鹹勝之此自五行相制之理若以辛助金而以甘泄苦亦是捷法蓋氣味以辛甘為陽酸苦鹹為陰陰勝者制之以陽陽盛者制之以陰勝復之妙在乎用之權變耳中央生濕土王中央其氣化濕濕生土潤則土氣王而萬物生土生甘土爰稼穡稼穡作甘凡物之味甘者皆土氣之所化甘生脾甘先入脾也脾生肉脾主肌肉也肉生肺土生金也脾主口口唇者脾之官也其在天為濕氣化於天中央為濕在地為土在體為肉肉屬衆體之土在臟為脾脾屬五臟之土在色為黃黃屬五色之土在音為宮宮屬五音之土在聲為歌得意則歌脾之聲也在變動為噦噦於決切厄逆也在竅為口在味為甘在志為思脾之志也並於脾則畏思傷脾脾志為思過則傷脾怒勝思怒為肝木之志故勝脾土之思怒則不思濕傷肉脾主肉而惡濕故濕勝則傷肉風勝濕木勝土也甘傷肉過於甘也酸勝甘酸為木味勝土之甘西方生燥金王西方其氣化燥燥生金燥則剛徑金氣所生也金生辛金曰從革從革作辛故味辛者皆金氣之所化辛生肺辛先入肺也肺生皮毛肺主皮毛也皮毛生腎金生水也肺主鼻鼻者肺之官也其在天為燥氣化於天在西為燥在地為金在體為皮毛皮毛屬衆體之金在臟為肺肺屬五臟之金在色為白白屬五色之金在音為商商屬五音之金在聲為哭悲哀則哭肺之聲也在變動為咳邪傷於肺其病為咳在竅為鼻在味為辛在志為憂肺之志也金氣慘淒故令人憂並於肺則悲憂傷肺憂則氣消故傷肺也喜勝憂喜為心火之志能勝肺金之憂喜則神暢熱傷皮毛熱勝則津液耗而傷皮毛火剋金也寒勝熱水制火也辛傷皮毛辛散氣故傷皮毛苦勝辛苦為火味故勝金之辛北方生寒水王北方其氣化寒寒生水寒氣陰潤其化為水水生咸水曰潤下潤下作咸故凡物之味鹹者皆水氣之所化咸生腎咸先入腎也腎生骨髓腎主骨髓也髓生肝水生木也腎主耳耳者腎之官也其在天為寒氣化於天在北為寒在地為水在髓為骨骨屬衆體之水在臟為腎腎屬五臟之水在色為黑黑屬五色之水在音為羽羽屬五音之水在聲為呻氣鬱則呻吟腎之聲也在變動為栗戰深也大寒甚怒則有之故屬水在竅為耳南方赤色開竅於耳北方黑色開竅於二陰則耳又為心之竅以耳之高下堅脆而驗腎則耳信為腎之竅而又屬於心也在味為咸在志為恐腎之志也恐傷腎恐則精卻故傷腎凡猝然恐者多遺尿甚則陽痿思勝恐思為脾土之志故勝腎水之恐深思見理恐可卻也寒傷血寒則血凝澀故寒傷血寒傷形蓋形稟於氣而成於血也燥勝寒燥則水涸故勝寒咸傷血咸從水化故傷心血水勝火也食鹹則渴傷血可知甘勝咸甘為土味故勝水之咸詳五方所傷之旨其例有三風傷筋酸傷筋濕傷肉甘傷肉自傷者也熱傷氣苦傷氣寒傷血咸傷血傷己所勝也熱傷皮毛是被勝傷己也辛傷皮毛亦自傷者也凡此三例不同如北方云燥勝寒若以五行正序云濕勝寒但寒濕同類不能相勝故曰燥勝寒也又不同如此蓋因其切要者為言也寒暑燥濕風火在人合之人身之表裡萬物之化生皆合乎天地之氣也東方生風風生木木生酸酸生肝肝生筋筋生心此東方之生化也明此者可以治肝補心其在天為玄在人為道在地為化化生五味道生智玄生神化生氣氣由化生物因氣化也神在天為風在地為木在體為筋在氣為柔得木化者其氣柔軟筋之類也在臟為肝其性為暄暄溫暖也肝為陰中之陽應春之氣故其性暄暄音萱其德為和春陽布和木之德也其用為動春風動搖木之用也其色為蒼其化為榮物色榮美木之化也其蟲毛毛蟲叢植得木氣也其政為散陽散於物木之政也散義有二一曰升散木氣之生也一曰散落金氣之殺也其令宣發宣揚升發春木令也其變摧拉摧拉損折敗壞也風氣剛強木之變也摧坐陪切拉音臘其眚為隕眚災也隕墜落也木兼金化隕為災也眚詩梗切隕音允其味為酸其志為怒怒傷肝悲勝怒風傷筋燥勝風酸傷筋辛勝酸此東方之性用德化政令皆本乎木而內合人之肝氣者也故肝主於左南方生熱熱生火火生苦苦生心心生血血生肉此南方之生死也明此者可以治心補脾其在天為熱在地為火在體為脈在氣為息經絡流行脈之體也血氣和平息之調也心生血脈故皆屬火在臟為心其性為暑南方暑熱火之性也心為火臟其氣應之其德為顯陽象明顯火之德也其用為燥陽用燥動火之性也其色為赤其化為茂萬物茂勝火之化也其蟲羽羽蟲飛揚得火氣也其政為明陽明普照火之政也其令鬱蒸暑熱鬱蒸夏火令也其變炎爍炎爍焦枯火之變也爍收灼切其眚燔焫燔焫焚燒火之災也燔音煩焫如歲切其味為苦其志為喜喜傷心恐勝喜熱傷氣寒勝熱苦傷氣咸勝苦此南方之性用德化政令皆本乎火而內合人之心氣者也故心主於前中央生濕濕生土土生甘甘生脾脾生肉肉生肺此中央之生化也明此者可以治脾補肺其在天為濕在地為土在體為肉在氣為充土之施化其氣充盈故曰充氣脾健則肉豐在臟為脾其性靜兼脾屬至陰故其性靜土養萬物故其性兼其德為濡濡潤澤物土之德也其用為化萬化所歸土之用也其色為黃其化為盈萬物充盈土之化也其蟲裸赤體為裸土應肉也裸郎果切其政為謐謐靜也安靜寧謐土之政也謐音密其令雲雨雲雨濕蒸土之令也其變動注風雨動注土之變也其眚淫潰霖淫崩潰土之災也其味為甘其志為思思傷脾怒勝思濕傷肉風勝濕甘傷脾酸勝甘此中央之性用德化政令皆本乎土而內合人之脾氣者也故脾主乎中其在天為燥在地為金在體為皮毛在氣為成物得金氣而後堅故金曰堅成在臟為肺其性為涼西方涼爽金之氣也肺為金臟故應之其德為清秋氣清肅金之德也其用為固堅而能固金之用也其色為白其化為斂萬物收斂金之化也其蟲介皮甲堅固得金氣也其政為徑風氣剛徑金之政也其令霧露涼生霧露秋金令也其變肅殺凋殘肅殺金之變也其眚蒼落青蒼毀敗金之災也其味為辛其志為憂憂傷肺喜勝憂熱傷皮毛寒勝熱辛傷皮毛苦勝辛此西方之性用德化政令皆本乎金而內合人之肺氣也故肺主乎右北方生寒寒生水水生咸感生腎腎生骨髓髓生肝此北方之生化也明此者可以治腎補肝其在天為寒在地為水在體為骨在氣為堅物之熱者遇寒則堅在臟為腎其性為凜凜烈戰栗水之性也其德為寒冬氣寒冷水之德也其用為藏閉藏生氣水之用也其色為黑其化為肅肅然靜定水之化也其蟲鱗鱗潛就下得水氣也其政為靜清靜澄徹水之政也其令閉塞天地閉塞冬水令也其變凝冽寒凝嚴冽水之變也其眚冰雹非時冰雹水之災也雹音泊其味為咸其志為恐恐傷腎思勝恐寒傷血燥勝寒咸傷血甘勝咸此北方之性用德化政令皆本乎水而內合人之腎氣者也故腎主於下五氣更立各有所先五行之氣化有不同天干所臨是為五運地支所司是為六氣皆有主客之分以主歲氣也非其位則邪當其位則正運氣既立則位之當與不當氣之或邪或正可得而察矣病之生變氣相得則微不相得則甚主客相遇上下相臨相得者如彼此相生則氣和而病微不相得者如彼此相剋則氣乖而病甚也氣有餘則制己所勝而侮所不勝其不及則己所不勝侮而乘之己所勝輕而侮之己所勝我勝彼也所不勝彼勝我也假令木氣有餘則制己所勝而土受其克濕化乃衰侮所不勝則金反受木之侮而風化大行也木氣不足則己所不勝者乘虛來侮而金令大行己所勝者因弱相輕而上邪反甚也侮反受邪侮而受邪寡於畏也五行之氣各有相制寡於畏則肆無忌憚而勢極必衰所以反受其邪自然之道也脾不主時脾者土也治中央常以四時長四臟各十八日寄治不得獨主於時也脾屬土而蓄養萬物位居中央寄王四時各一十八日為四臟之長而不獨主於時也脾臟者常著胃土之精也土者生萬物而法天地故上下至頭足不得主時也脾胃相為表裡脾常依附於胃以膜連著而為之行其津液然脾胃皆屬乎土所以生成萬物故曰法天地也土為萬物之木脾胃為臟腑之本故上至頭下至足無所不及又豈得獨主一時而已哉所以四時五臟皆不可一日無土氣也心之合脈也其榮色也其主腎也心生血血行脈中故合於脈血華在貌故榮於色心屬火受水之制故以腎為主肺之合皮也其榮毛也其主心也肺屬金皮得金之堅故合於皮毛得皮之養故榮於毛五臟之應天者肺故肺主皮毛凡萬物之體其表必堅正合乾金之象所謂物物一太極也金受火之制故肺以心為主肝之合筋也其榮爪也其主肺也肝屬木木曲直而柔筋體象之故合於筋爪者筋之餘故榮於爪木受金之制故肝以肺為主脾之合肉也其榮唇也其主肝也脾屬土肉象地之體故合肉也脾氣通於唇故榮唇也土受木之制故脾以肝為主腎之合骨也其榮發也其主脾也腎屬水腎藏精骨藏髓精髓同類故腎合骨發為精血之餘精髓充滿其發必榮故榮在發水受土之制故腎以脾為主是故多食鹹則脈凝泣而變色咸從水化水能剋火故病在心之脈與色也禁咸泣澀同多食苦則皮稿而毛拔苦從火化火能剋金故病在肺之皮毛也禁苦多食辛則筋急而爪枯辛從金化金能剋木故病在肝之筋爪也禁辛多食酸則肉胝䐢而唇揭胝皮厚也手足胼胝之謂酸從木化木能剋土故病在脾之肉與唇也禁酸胝音支䐢音皺多食甘則骨痛而發落此五味之所傷也甘從土化土能剋水故病在腎之骨與發也禁甘故心欲苦合於火也肺欲辛合於金也肝欲酸合於木也脾欲甘合於土也腎欲咸合於水也此五味之所合五臟之氣也凡此皆五味之合於五臟者也凡刺之法必先本於神血脈營氣精神此五臟之所藏也至其淫泆離臟則精失魂魄飛揚志意恍亂智慮去身何謂德氣生精神魂魄心意志思智慮耶天之在我者德也地之在我者氣也德流氣薄而生者也天地之大德曰生人生於地懸命於天陽先陰後陽施陰受肇生之德本乎天成形之氣本乎地故天之在我者德也地之在我者氣也德流氣薄而生者言理賦形全而生成之道斯備矣故生之來謂之精太極動而生陽靜而生陰陰陽二氣各有其精所謂精者天以一生水地以六成之而為五行之最先故萬物初生其來皆水如果核未實皆水也卵胎未成猶水也即凡人之有生以及昆蟲草木無不皆然男女媾精萬物化生此之謂也兩精相搏謂之神兩精者陰陽之精也搏交接也二五之精妙合而凝萬物生成之道莫不陰陽交而後神明見人之生也必合陰陽之氣形神乃成故曰事其神者神去之休其神者神居之則凡治身者太上養神其次養形也搏音博隨神往來者謂之魂並精而出入者謂之魄精對神而言則神為陽而精為陰魄對魂而言則魂為陽而魄為陰故魂則隨神而往來魄則並精而出入也所以任物者謂之心心為君主之官統神靈而參天地故萬物皆有所在心有所憶謂之意憶思憶也謂一念之生心有所向而未定者曰憶意之所存謂之志意之所存謂意已決而卓有所立者曰志因志而存變謂之思因志而存變謂意志雖定而復有反覆計度者曰思因思而遠慕謂之慮深思遠慕必生憂疑故曰慮因慮而處物謂之智疑慮既生而處得其善者曰智接此數者各有所主之臟今皆生之於心此正諸臟為之相使而心則為之主宰耳故智者之養生也必順四時而適寒暑和喜怒而安居處節陰陽而調剛柔如是則僻邪不至長生久視四時寒暑喜怒居處皆明顯易曉惟節陰陽調剛柔其義最精其用最博凡食息起居病治脈藥皆有最切於此而不可忍者是故怵惕思慮者則傷神神傷則恐懼流淫而不止言情志所傷之為害也怵恐也惕驚也流淫謂流泄淫溢也思慮而兼怵惕則神傷而心怯心怯則恐懼恐懼則傷腎腎傷則精不固蓋以心腎不交故不能攝收如此怵出恤二音因悲哀動中者竭絶而失生悲則氣消悲哀太甚則胞絡絶故致失生竭者絶之漸絶則盡絶無餘矣喜樂者神憚散而不藏喜發於心樂散於外暴喜傷陽故神氣憚散而不藏憚驚惕也愁憂者氣閉塞而不行愁憂則氣不能舒故脈道為之閉塞盛怒者迷惑而不治怒則氣逆甚者必亂故致昏迷皇惑而不治不治亂也恐懼者神蕩憚而不收恐懼則神志驚散故蕩憚而不收上文云不藏者神不能持而流蕩也此云不收者神為恐懼而散失也心怵惕思慮則傷神神傷則恐懼自失破䐃脫肉毛悴色夭死於冬言情志所傷之病而死各有時也心藏神神傷則心怯故恐懼自失䐃者筋肉結聚之處心虛則脾弱故破䐃脫肉毛悴者皮毛惟悴也色夭者心之色赤欲如白裹朱不欲如赭也火衰畏水故死於冬後仿此䐃劬允切脾愁憂而不解則傷意意傷則悗亂四肢不舉毛悴色夭死於春憂本肺之志而亦傷脾者母子氣通也憂則脾氣不舒不舒則不能運行故悗悶而亂四肢皆稟氣於胃而不得至經必因於脾乃得稟也故脾傷則四肢不舉脾色之夭者土衰畏木故死於春悗美本切肝悲哀動中則傷魂魂傷則狂忘不精不精則不正當人陰縮而攣筋兩脅骨不舉毛悴色夭死於秋肝藏魂悲哀過甚則傷魂魂傷則為狂為忘而不精明精明失則邪妄不正其人當陰縮攣筋兩脅骨不舉者皆肝經之敗也肝色之夭者木衰畏金故死於秋肺喜樂無極則傷魄魄傷則狂狂則意不存人皮革焦毛悴色夭死於夏喜本心之志而亦傷肺者暴喜傷陽火邪乘金也肺藏魄魄傷則神亂而為狂意不存人者旁若無人也五臟之傷無不毛悴而此獨云皮革焦者以皮毛為肺之合而更甚於他也肺色之夭者金衰畏火故死於夏腎盛怒而不止則傷志志傷則喜忘其前言腰脊不可以俯仰屈伸毛悴色夭死於季夏怒本肝之志而亦傷腎者肝腎為子母其氣相通也腎藏志志傷則意失而善忘其前言也腰脊不可俯仰屈伸者腰為腎之府也腎色之夭者水衰畏土故死於季夏恐懼而不解則傷精精傷則骨痠痿厥精時自下此亦言心腎之受傷也蓋盛怒雖云傷腎而恐懼則腎臟之本志恐則氣下而陷故能傷精腎主骨故精傷則骨痠痿者陽之痿厥者陽之衰命門不守則精時自下是雖腎臟受傷之為病與愁憂恐懼則傷心之義同痠酸同是故五臟主藏精者也不可傷傷則失守而陰虛陰虛則無氣無氣則死矣此總結上文而言五臟各有其精傷之則陰虛以五臟之精皆陰也陰虛則無氣以精能化氣也氣聚則生氣散則死然則死生在氣而氣本於精年四十而陰氣自半者正指此陰字也用針者察觀病人之態以知精神魂魄之存亡得失之意五者以傷針不可以治之也用針者必當察病者之形態以酌其可刺不可刺也設或五臟精神已損必不可妄用針矣蓋針能治有餘而不可治虛損也肝藏血血舍魂肝氣虛則恐實則怒肝藏魂人臥血歸於肝血有餘則怒不足則恐脾藏營營舍意脾氣虛則四肢不用五臟不安實則腹脹經溲不利營出中焦受氣取汁變化而赤是謂血故曰脾藏營營舍意即脾藏意也脾虛則四肢不用五臟不安以脾主四肢而脾為五臟之原也太陰脈入腹絡胃故脾實則腹脹經溲不利經當作涇溲音搜心藏脈脈舍神心氣虛則悲實則笑不休心主脈藏神神有餘則笑不休神不足則悲肺藏氣氣舍魂肺氣虛則鼻塞不利少氣實則喘喝胸盈仰息喘喝者氣促聲粗也胸盈脹滿也仰息仰面而喘也肺藏魄氣有餘則喘咳上氣不足則息利少氣腎藏精精舍志腎氣虛則厥實則脹腎藏精舍志志有餘則腹脹飧泄不足則厥五臟不安必審五臟之病形以知其氣之虛實謹而調之也既明情志損傷第分五臟虛實凡五臟有不安者必審其病形虛實情志所屬乃可隨其臟以調之也氣口獨為五臟主氣口之義其名有三手太陰肺經脈也肺主諸氣氣之盛衰見於此故曰氣口肺朝百脈脈之大會聚於此故曰脈口脈出太淵其長一寸九分故曰寸口是名雖三而實則一耳五臟六腑之氣味皆出於胃變見於氣口故為五臟之主乃統兩手而言非獨指右手為氣口也因其為脈之大會五臟六腑之所終始故取法焉毋執左強為外感而攻其表右盛為內傷而攻其里人之臟氣有不齊脈候有稟賦或左脈素大於右或右脈素大於左孰者為常孰者為變或於偏弱中略見有力已隱虛中之實或於偏盛中稍覺無神便是實中之虛設不知此執左右以分表裡豈左無里而右無表乎夫人迎為足陽明之脈不可以言於手氣口總手太陰而言不可以分左右三陽在頭人迎行氣於三陽三陰在手脈口行氣於三陰故診法有三一取三部九候以診通身之脈一取太陰陽明以診陰陽之本一取左右氣口以診臟腑之氣則人迎自有其位在結喉兩旁足陽明之脈也謂左手關前一分為人迎誤也胃者水穀之海六腑之大源也五味入口藏於胃以養五臟氣氣口亦太陰也是以五臟六腑之氣味皆出於胃變見於氣口人有四海而胃居其一是為水穀之海六腑之本又為五臟六腑之海氣口本屬太陰而脾亦太陰者何也蓋氣口屬肺手太陰也布行胃氣則在於脾足太陰也胃氣必歸於脾脾氣必歸於肺而後行於臟腑營衛所以氣口雖為手太陰而實即足太陰之所歸故曰氣口亦太陰也是以五臟六腑之氣味皆出於胃而變見於氣口故胃為臟腑之大源無不由脾達肺也見音現故五氣入鼻藏於心肺心肺有病而鼻為之不利也氣味之化在天為氣在地為味五味入口藏於胃者味為陰也五氣入鼻藏於心肺者氣為陽也鼻為肺之竅故心肺有病而鼻為之不利凡治病必察其下適其脈觀其志意與其病也此治病之四要也下言二陰二陰者腎之竅胃之關也倉廩不藏者是門戶不要也得守者生失守者死故二便為胃氣之關鎖而系一生元氣之安危此下之不可不察也適測也脈為氣血之先故獨取寸口以決吉凶之兆人無胃氣曰逆逆者死脈無胃氣亦死此脈之不可不察也志意和則精神專直魂魄不散悔怒不起五臟不受邪矣是志意關乎神氣而存亡系之此志意之不可不察也病有標本不知求本則失其要矣病有真假不知逆從則及於禍矣此病因之不可不察也合是四者而會觀之則治病之妙無遺法矣拘於鬼神者不可與言至德惡於針石者不可與言至巧病不許治者病必不治治之無功矣食氣入胃散精於肝淫氣於筋精食氣之精華也肝主筋故胃散穀氣於肝則浸淫滋養於筋也食氣入胃濁氣歸心淫精於脈濁言食氣之厚者也受谷者濁受氣者清心主血脈故食氣歸心則精氣浸淫於脈也脈氣流經經氣歸於肺肺朝百脈輸精於皮毛精淫於脈脈流於經經脈流通必由於氣氣主於肺為百脈之朝會毛為肺之合故肺精輸焉毛脈合精行氣於府肺主毛心主脈肺藏氣心生血一氣一血稱為父母二臟獨占胸中故曰毛脈合精行氣於府府者氣聚之府也是謂氣海亦曰膻中府精神明留於四臟氣歸於權衡宗氣積於肺神明出於心氣盛則神王故氣府之精為神明神王則臟安故肺肝脾腎四臟無不賴神明之留以為主宰然後臟氣鹹得其平而歸於權衡矣權衡平也權衡以平氣口成寸以決死生臟腑之氣既得其平則必變見於氣口而成寸尺可於此以決生死也上言食氣入胃下言飲入於胃也飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺遊浮遊也溢湧溢也水飲入胃則其氣化精微必先輸運於脾是謂中焦如漚也脾乃散氣上如雲霧而歸於肺是謂上焦如霧也通調水道下輸膀胱肺氣運行水隨而注故肺能通調水道下輸膀胱是謂水出高原下焦如瀆也水精四布五經並行水因氣生氣為水母凡肺氣所及則水精布焉然水名雖一而清濁有分清者為精精如雨露濁者為水水如江河故精歸五臟水歸膀胱而五經並行矣五經五臟之經絡也合於四時五臟陰陽揆度以為常也女子七歲腎氣盛齒更髮長七為少陽之數女本陰體而得陽數者陰中有陽也人之初生先從腎始女至七歲腎氣稍盛腎主骨齒者骨之餘故齒更腎為精血之臟發者血之餘故髮長蓋天地萬物之道惟陰陽二氣而已陰陽作合原不相離所以陽中必有陰陰中必有陽如離中偶而坎中奇也震坎艮為三男而陰多於陽巽離兌為三女而陽多於陰故女子外陰而內陽男子外陽而內陰是陰陽互更之義也更平聲長上聲下同二七而天癸至任脈通太衝脈盛月事以時下故有子天癸者非精非血乃天一之真故男子亦稱天癸非若今之人惟以月事為天癸也任沖者奇經之二也任主胎胞沖為血海氣盛脈通故月事下而有子月事者言女子經水按月而至其盈虛消長應於月象經以應月者陰之所生也三七腎氣平均故真牙生而長極腎氣即天癸也平均充滿之謂真牙謂牙之最後生者腎主骨故腎氣平則真牙生而長極四七筋骨堅髮長極身體盛壯女子天癸之數七七而止年當四七正及材力之中故身體盛壯髮長極矣五七陽明脈衰面始焦發始墮女為陰體不足於陽故其衰也自陽明始陽明之脈行於面循髮際故面焦發墮六七三陽脈衰於上面皆焦發始白三陽脈皆盛於面也七七任脈虛太衝脈衰少天癸竭地道不通形壞而無子也至是則衝任血少陰氣竭故經水止絶而坤道不通也天癸竭絶故形體衰壞而不能有子矣男子八歲腎氣實齒更髮長八為少陰之數男本陽體而得陰數者為陽中有陰也齒更髮長義同前二八腎氣盛天癸至精氣溢瀉陰陽和故能有子男女真陰皆稱天癸天癸既充精乃溢瀉陰陽合和故能生子子者統男女而言夫有子之道歷代名家論無中窾得其實理者則乾道成男坤道成女陽勝陰者為男陰勝陽者為女此為不易之至論然陰陽有盛衰如老陽少陰強弱判矣羸陽壯陰盛衰分矣壯而不蓄同乎弱矣老而知養同於少矣期候有陰陽忽之者其氣衰起居有消長得之者其氣盛兩軍相對氣可奪於先聲一靜自持機待時而後動以寡擊衆孰謂無方轉弱為強果有妙用受與不受在闔闢不在淺深言遲疾者殊謬男與不男在盈虛不在沖裹道先後者尤差凡寡欲而得之男女貴而壽多欲而得之男女濁而夭何莫非乾坤之道乎知之者鮮矣三八腎氣平均筋骨徑強故真牙生而長極腎水生肝血故筋亦徑強也余則同前女子四八筋骨隆盛肌肉滿壯男子氣數至此盛之極也五八腎氣衰發墮齒稿男為陽體不足於陰故其衰也自腎始而發齒其徵也六八陽氣衰竭於上面焦髮鬢頒白陽氣謂三陽氣也頒斑同七八肝氣衰筋不能動天癸竭精少腎臟衰形體皆極肝主筋肝衰故筋不能動腎主骨腎衰故形體疲極八八則齒髮去衰之甚也腎者主水受五臟六腑之精而藏之故五臟盛乃能瀉腎為水臟精即水也五臟六腑之精皆藏於腎非腎臟獨有精也故五臟盛則腎乃能瀉今五臟皆衰筋骨解惰天癸盡矣故髮鬢白身體重行步不正而無子耳凡物壯則老此所謂天數也解懈同有其年已老而有子此其天壽過度氣脈常通而腎氣有餘也此天稟有餘即所謂材力也此雖有子男不過盡八八女不過盡七七而天地之精氣皆竭矣天癸大數女已盡於七七男已盡於八八精氣已竭此外多難於子矣夫道者能卻老而全形身年雖壽能生子也道者言合道之人也既能道合天地則其材力天數自是非常卻老全形壽而生子固有出人之表而不可以常數限者矣又有積精全神而能以人力勝天者或守丹於內或假藥於外法則天地而合同於道者也人之始生以母為基以父為楯失神者死得神者生人之生也合父母之精而有其身父得乾之陽母得坤之陰陽一而施陰兩而承故以母為基以父為楯譬之稼穡者必得其地乃施以種種劣地優肖由乎父種優地劣變成乎母地種皆得而陰陽失序者雖育無成也故三者相合而象變斯無窮矣夫地者基也種者楯也陰陽精氣者神也知乎此則知人生之所以然也血氣已和榮衛已通五臟已成神氣舍心魂魄畢具乃成為人神者陰陽合德之靈也二氣合而生人則血氣榮衛五臟以次相成神明從而見矣惟是神之為義有二分言之則陽神曰魂陰神曰魄以及意志思慮之類皆神也合言之則神藏於心而凡情志之屬惟心所統是為吾身之全神也夫精全則氣全氣全則神全未有形氣衰而神能王者亦未有神既散而形獨存者故曰失神者死得神者生至於魂魄之義氣形盛則魂魄盛氣形衰則魂魄衰魂是魄之光焰魄是魂之根柢魄陰主藏受故魄能記憶在內魂陽主運用故魂能動作發揮二物本不相離精聚則魄聚氣聚則魂聚是為人物之體至於精竭魄降則氣散魂遊而無所知矣人之壽夭各不同五臟堅固血脈調和肌肉解利皮膚緻密營衛之行不失其常呼吸微徐氣以度行六腑化谷津液布揚各如其常故能長久堅固者不易損調和者不易亂解利者可無留滯緻密者可免中傷營衛之行不失其常者經脈和也呼吸微徐氣以度行者三焦治也六腑化谷津液布揚則臟腑和平精神充暢故能長久而多壽也使道隧以長基牆高以方通調營衛三部三里起骨高肉滿百歲乃得終使道指七竅而言謂五臟所使之道路即五官之道路也隧深邃貌基牆指面部而言骨骼為其蕃蔽為牆凡營衛部里及骨高肉滿者即致壽之道故得百歲而終其氣之盛衰以至其死人生十歲五臟始定血氣已通其氣在下故好走天地之氣陽主乎升升則向生陰主乎降降則向死故幼年元氣在下者亦自下而升也二十歲血氣始盛肌肉方長故好趨三十歲五臟大定肌肉堅固血脈盛滿故好步盛滿則不輕捷故好步矣四十歲五臟六腑十二經脈皆大盛以平定腠理始疏榮華頽落發頗斑白平盛不搖故好坐物極必變盛極必衰人當四十陰氣已半故發頗斑白而平盛不搖好坐者衰之漸也五十歲肝氣始衰肝葉始薄膽汁始減目始不明六十歲心氣始衰苦憂悲血氣懈惰故好臥七十歲脾氣虛皮膚枯八十歲肺氣衰魂離故言善誤九十歲腎氣焦四臟經脈空虛百歲五臟皆虛神氣皆去形骸獨居而終矣魄離者形體衰敗也腎氣焦者真陰虧竭也女盡七七男盡八八言陰陽之限數此十言者言人生之全數然則人之氣數固有定期而長短不齊者有出於稟受有因於人為故惟智者不以人欲害其天真以自然之道養自然之壽而善終其天年其不能終壽而死者五臟皆不堅使道不長不長短促也空外以張九竅張露也喘息暴疾喘息者氣促暴疾者易傷皆非延壽之徵也又卑基牆薄脈少血其肉不石石堅也數中風寒血氣虛脈不通真邪相攻亂而相引數中風寒表易犯也血氣虛中不足也脈不通經絡多滯也故致真邪易於相攻然正本拒邪正氣不足邪反隨之而入故曰相引數音朔故中壽而盡也凡此形體血氣既已異於上壽則其中壽而盡固有所由稟受而然也養能合道下可以希中中可以希上否則上僅得其次次僅其得下矣形有緩急氣有盛衰骨有大小肉有堅脆皮有厚薄以立壽夭伯高曰形與氣相任則壽不相任則夭任相當也蓋形以寓氣氣以充形有是形當有是氣有是氣當有是形故表裡相稱者壽一強一弱而不相稱者夭皮與肉相果則壽不相果則夭肉堅皮固者為相果肉脆皮疏者為不相果相果者氣必蓄故壽不相果者氣易失故夭血氣經絡勝形則壽不勝形則夭血氣經絡者內之根本也形體者外之枝葉也根本勝者壽枝葉勝者夭形充而皮膚緩者則壽形充而皮膚急者則夭皮膚和緩者氣脈從容故當壽皮膚緊急者氣脈促迫故當夭形充而脈堅大者順也形充而脈小以弱者氣衰衰則危矣形充脈大者表裡如一故曰順形充脈弱者外實內虛故曰危若形充而顴不起者骨小骨小則夭矣人之形體骨為君肉為臣君勝臣者順臣勝君者逆顴者骨之綱也故形充而顴不起者其骨必小骨小肉充臣勝君者也故當夭形充而大肉䐃堅而有分者肉堅肉堅則壽矣形充而大肉無分理不堅者肉脆肉脆則夭矣大肉臀肉也䐃者筋肉積聚之處堅而厚者是也有分者肉中分理明顯也形體雖充又必以肉之堅脆分壽夭也其必驗於大肉者以大肉為諸肉之宗也故凡形充而臀削者必非福壽之兆臀音豚此天之生命所以立形定氣而視壽夭必明乎此而後以臨病人決死生若牆基卑高不及其地者不滿三十而死其有因加疾者不及二十而死也牆基者面部四旁骨骼也地者面部之肉也基牆不及其地者骨衰肉勝也所以不壽再加不慎而致疾其夭更速故不及二十而死也明堂者鼻也闕者眉間也庭者顏也蕃者頰側也蔽者耳門也其間欲方大去之十步皆見於外如是者壽夫形氣之相勝平人而氣勝形者壽人之生死由乎氣氣勝則神全故平人以氣勝形者壽設外貌雖充而中氣不足者必非壽器病而形肉脫氣勝形者死形勝氣者危矣若病而至於形肉脫雖其氣尚勝形亦所必死蓋氣為陽形為陰陰以配陽形以寓氣陰脫則陽無所附形脫則氣獨難留故不免於死或形肉未脫而元氣衰竭者形雖勝氣不過陰多於陽病必危矣此自天稟為言外有地勢使然又當別論也人之肢節以應天地天圓地方人頭圓足方以應之圓者徑一圍三陽奇之數方者徑一圍四陰偶之數人首屬陽居上故圓而應天人足屬陰居下故方而應地天有日月人有兩目日月照臨萬方兩目明見萬象地有九州人有九竅九州者荊梁雍豫徐揚青兗冀也九竅者上有七竅下有二陰清陽出上竅而有陽中之陰陽濁陰出下竅而有陰中之清濁天有風雨人有喜怒和風甘雨天之喜摧拉霖潰天之怒天有雷霆人有音聲陰陽相搏天地發為雷霆情志所見人物發為音聲天有四時人有四肢四肢者兩手兩足也天有五音人有五臟五音宮商角徵羽五臟心肝脾肺腎天有六律人有六腑六律者黃鐘太簇姑洗蕤賓夷則無射為六陽律大呂夾鍾仲呂林鐘南呂應鐘為六陰律六腑者胃膽大腸小腸三焦膀胱也天有冬夏人有寒熱寒應冬熱應夏也天有十日人有手十指十日者甲乙丙丁戊己庚辛壬癸是謂天干故應人之手指辰有十二人有足十指莖垂以應之女子不足二節以抱人形十二辰者子醜寅卯辰巳午未申酉戌亥是謂地支故應人之足指足指為十並莖垂為十二莖者宗筋也垂者睪丸也女子少此二節故能以抱人形抱者懷胞之義如西北稱伏雞為抱者是也睪音高天有陰陽人有夫妻天為陽地為陰夫為陽妻為陰故曰夫乃婦之天歲有三百六十五日人有三百六十節節骨節也地有高山人有肩膝肩膝骨大而高故以應山地有深谷人有腋膕腋膕深陷故以應谷膕音國地有十二經水人有十二經脈地有泉脈人有衛氣泉脈出於地下衛氣行於肉中地有草蓂人有毫毛蓂莢瑞草也堯時生於庭隨月凋榮朔後一日莢生望後一日莢落歷得其分度則蓂莢生天有晝夜人有臥起晝為陽人應陽而動夜為陰人應陰而靜天有列星人有牙齒齒牙疏朗故象似列星女子三七男子三八則真牙生而長極是以後生之大者為牙也女子七歲男子八歲齒更是以前生之小者為齒也故男子八月生齒八歲而齔女子七月生齒七歲而齔齔毀齒也齔抄近切地有小山人有小節小節者小骨指節之類地有山石人有高骨高骨顴肩膝踝之類地有林木人有募筋募者筋脈聚蓄之處募音暮地有聚邑人有䐃肉䐃肉者脂肉之聚處也歲有十二月人有十二節四肢各三節是為十二節地有四時不生草人有無子地有不毛之地人有不育之人此人與天地相應者也婦人無須者衝脈任脈皆起於胞中上循背裡為經絡之海凡男婦之有須無須者皆由於沖任二脈之血有盛衰也沖任為經絡之海其起脈之處則在胞中而上行於背裡所謂胞者子宮是也此男女藏精之所皆得稱為子宮惟女子於此受孕因名曰胞然沖任督脈皆起於此所謂一原而三歧也其浮而外者循腹右上行會於咽喉別而絡唇口血氣盛則充膚熱肉血獨盛則淡滲皮膚生毫毛沖任陰脈也故循腹右上行然左乳之下則有胃之大絡此正左陽右陰相配之妙也今婦人之生有餘於氣不足於血以其數脫血也衝任之脈不榮口唇故須不生焉數脫血謂血不留而月事以時下也衝任為血之海須為血之餘血不足則衝任之脈不榮於口而須不生矣數音朔士人有傷於陰陰氣絶而不起其須不去陰不用者陽痿不舉也此言士人之陰傷而絶者其須不去宦者去其宗筋傷其衝脈血瀉不復皮膚內結唇口不榮故須不生士人者陰氣雖傷而宗筋未壞彼宦官者去其宗筋而傷其衝脈矣血一瀉而不能復皮膚內結而經道不行故衝脈不榮於口而須不生也有天宦者未嘗被傷不脫於血然其須不生謂身為男子而終身無須若天生之宦然故曰天宦此天之所不足也其任沖不盛宗筋不成有氣無血唇口不榮故須不生天之所不足言先天所稟有任沖之不足者故亦不生須也是故視其顏色黃赤者多熱氣青白者少熱氣黑色者多血少氣黃赤者為陽青白黑者為陰也美眉者太陽多血通髯極須者少陽多血美須者陽明多血此其時然也在頰曰髯在口下及兩頤者曰須在口上曰髭凡此所言者即其經行之地夫人之常數太陽常多血少氣少陽常多氣少血陽明常多血多氣厥陰常多氣少血少陰常多血少氣太陰常多血少氣此天之常數也十二經之血氣多少各有不同氣血多少四字極易混亂傳録之誤也當以所論血氣形志者為是臟象下第三人之肥瘦大小寒溫有老壯少小之別人年五十以上為老二十以上為壯十八以下為少六歲以下為小有肥有膏有肉䐃肉堅皮滿者肥䐃肉不堅皮緩者膏皮肉不相離者肉䐃肉肉之聚處也此言偉壯之人而有脂膏肉三者之異膏者其肉淖而粗理者身寒細理者身熱脂者其肉堅細理者熱粗理者寒淖柔而潤也膏者肉淖脂者肉堅若其寒熱則粗理者皆寒細理者皆熱淖音鬧膏者多氣而皮縱緩故能縱腹垂腴肉者身體容大脂者其身收小縱寬縱也腴脂肥也膏者縱腹垂腴脂者其身收小是膏肥於脂也肉為皮肉連實自與脂膏者有間縱去聲腴音俞膏者多氣多氣者熱熱者耐寒肉者多血則充形充形則平脂者其血清氣滑少故不能大此別於衆人者也膏者多氣氣為陽故質熱而耐寒也肉者多血血養形故形充而氣質平也脂者血清而氣滑少故不能大若此三者雖肥盛皆別於衆人而脂者之氣血似不及乎膏肉也肥白之人多氣虛蒼瘦之氣虛者固不減於肥白是不可泥也衆人皮肉脂膏不能相加也血與氣不能相多故其形不小不大各自稱其身命曰衆人衆人者言三者之外衆多之常人也其皮肉脂膏血氣各有品格故不能相加亦不能相多而形體大小皆相稱而已必先別其三形血之多少氣之清濁而後調之治無失常經也三形既定血氣既明則宜補宜瀉自可勿失常經矣十二經脈以應十二經水清濁不同經脈經水各有清濁之異受谷者濁受氣者清人身之氣有二濁氣者穀氣也故曰受谷者濁清氣者天氣也故曰受氣者清二者總稱真氣所受於天者與穀氣並而充身也天地之精氣其大數常出三入一故谷不入半日則氣衰一日則氣少矣是又入者為天氣出者為穀氣也清者注陰濁者注陽喉主天氣故清氣自喉而注陰陰者五臟也咽主地氣故濁氣自咽而注陽陽者六腑也濁而清者上出於咽清而濁者則下行清濁相干命曰亂氣濁之清者自內而出故上行清之濁者自外而入故下行一上一下氣必交併二者相合一有不正則亂氣出乎其中矣夫陰清而陽濁濁者有清清者有濁氣之大別清者上注於肺濁者下走於胃胃之清氣上出於口肺之濁氣下注於經內積於海大別言大概之分別也清者上升故注於肺濁者下降故走於胃然而濁中有清故胃之清氣上出於口以通呼吸津液清中有濁故肺之濁氣下注於經以為血脈營衛而其積氣之所乃在氣海間也上氣海在膻中下氣海在丹田諸陽皆濁手太陽獨受陽之濁手太陰獨受陰之清手太陽小腸也小腸居胃之下承受胃中水穀清濁未分穢汙所出雖諸陽皆濁而此其濁之濁者也故曰獨受陽之濁手太陰肺也肺者五臟六腑之蓋也為清氣之所注雖諸陰皆清而此其清之清者也故曰獨受陰之清諸陰皆清足太陰獨受其濁足太陰脾也胃司受納水穀而脾受其氣以為運化所以獨受其濁而為清中之濁也清者其氣滑濁者其氣澀此氣之常也故刺陰者深而留之刺陽者淺而疾之清濁相干者以數調之也此以針下之氣言清濁陰陽也清者氣滑針利於速濁者氣澀針利於遲陰者在裡故宜深而留之陽者在表故宜淺而疾之其或清中有濁濁中有清乃為清濁相干當察其孰微孰甚而酌其數以調之也首面與身屬骨連筋同血合氣天寒地裂手足懈惰其面不衣人之頭面身形本同一氣嚴寒地裂肢體凜栗面獨不懼蓋十二經脈三百六十五絡其血氣皆上於面而走空竅頭面為人之首凡周身陰陽經絡無所不聚故其血氣皆上行於面而走諸竅空孔同其精陽氣上走於目而為睛精陽氣者陽氣之精華也五臟六腑之精氣皆上注於目而為之精其彆氣走於耳而為聽彆氣者旁行之氣也氣自兩側上行於耳氣達則竅聰所以能聽其宗氣上出於鼻而為臭宗氣大氣也宗氣積於胸中上通於鼻而行呼吸所以能臭其濁氣出於胃走唇舌而為味濁氣穀氣也谷入於胃氣達於唇舌所以知味其氣之津液皆上熏於面凡諸氣之津液皆上熏於面肺氣通於鼻心氣通於舌肝氣通於目脾氣通於口腎氣通於耳此五臟之氣皆上通乎七竅不獨諸陽經絡乃得上頭也而皮又厚其肉堅故天氣甚寒不能勝之也一身血氣既皆聚於頭面故其皮厚肉堅異於他處而寒氣不能勝之也蓋頭為諸陽之會言為陽聚之處非曰無陰也如傷寒止言足經而手在其中非無手經也十二經脈三百六十五絡其血氣皆上於面而走空竅其義明矣手少陰上挾咽走喉嚨系舌本出於面系目系合目內眥手厥陰循喉嚨出耳後合少陽完骨之下手足太陰少陰皆會於耳中上絡左角手太陰循喉嚨足少陰循喉嚨系舌本上至項結於枕骨與足太陽之筋合足太陰合於陽明上行結於咽連舌本支者結舌本貫舌中散舌下足厥陰循喉嚨之後上入頏顙絡於舌本連目系上出額與督脈會於巔其支者從目系下頰裡環唇內人有並行並立年之長少等衣之厚薄均卒遇烈風暴雨或病或不病或皆病或皆不病卒音猝少俞曰春青風夏陽風秋涼風冬寒風此四時之風者其所病各不同形四時之風各有所王有所王則有所制故其所病各不同形也黃色薄皮弱肉者不勝春之虛風黃者土之色黃色薄皮弱肉者脾氣不足也故不勝春木之虛風虛風虛邪賊風也白色薄皮弱肉者不勝夏之虛風白者金之色白色薄皮弱肉者肺氣不足也故不勝夏火之虛風青色薄皮弱肉者不勝秋之虛風青者木之色青色薄皮弱肉者肝氣不足也故不勝秋金之虛風赤色薄皮弱肉者不勝冬之虛風也赤色火之色赤色薄皮弱肉者心氣不足也故不勝冬水之虛風黑色而皮厚肉堅固不傷於四時之風其皮薄而肉不堅色不一者長夏至而有虛風者病矣黑者水之色黑色而皮薄肉不堅及色時變而不一者腎氣不足也故不勝長夏土令之虛風其皮厚而肌肉堅者長夏至而有虛風不病矣其皮厚而肌肉堅者必重感於寒外內皆然乃病若黑色而皮厚肉堅者雖遇長夏之虛風亦不能病但既感於風又感於寒是為重感既傷於內又傷於外是為外內俱傷乃不免於病也然則黑色而皮肉堅者誠有異於他色之薄弱易病者矣人之忍痛與不忍痛者皮膚之薄厚肌肉之堅脆緩急之分非勇怯之謂也此性質之當辨也勇者目深以固長衡直揚三焦理橫其心端直其肝大以堅其膽滿以旁怒則氣盛而胸張肝舉而膽橫眥裂而目揚毛起而面蒼目者五臟六腑之精也目深以固臟氣之堅也長衡闊大也即從衡之意直揚視直而光露也三焦理橫凡剛急者肉必橫柔緩者肉必縱也其心端直者剛勇之氣也大以堅滿以旁者旁即旁開之謂過於人之常度也怒則氣盛而胸張眥裂而目揚勇者之肝膽強肝氣上衝也毛起者肝血外溢也面蒼者肝色外見也勇怯之異由於肝膽故肝曰將軍之官而取決於膽怯者目大而不減陰陽相失其焦理縱𩩲骬短而小肝系緩其膽不滿而縱腸胃挺脅下空雖方大怒氣不能滿其胸肝肺雖舉氣衰復下故不能久怒減當作緘封藏之謂目大不緘者神氣不堅也陰陽相失者血氣易亂也即轉盼驚顧之意其焦理縱者肉理不橫也𩩲骬短小者其心卑小而甘出人下也肝系緩者不急也膽不滿而縱者汁少形畏也腸胃挺者曲折少也脅下空者肝氣不實也此其肝膽下充氣不能滿以故旋怒旋衰怯之由然勇者剛之氣怯者懦之質然勇有二曰血氣之勇曰禮義之勇若臨難不恐遇痛不動此其資稟過人然隨觸而發未必皆能中節也若夫禮義之勇固亦不恐不動而其從容有度自非血氣之勇所可並言者蓋血氣之勇出於肝禮義之勇出乎心苟能守之以禮制之以義則血氣之勇可自有而無充之以學擴之以見則禮義之勇可自無而有昔人謂勇可學者在明理養性而已然則勇與不勇雖由肝膽而其為之主者則仍在乎心耳縱平聲𩩲骬音結於怯士得酒怒不避勇酒者水穀之精熟谷之液也其氣慓悍其入於胃中則胃脹氣上逆滿於胸中肝浮膽橫當是之時比於勇士氣衰則悔名曰酒悖慓急也悍猛也酒之性熱氣悍故能脹胃浮肝上氣壯膽方其醉也則神為之惑性為之亂自比於勇及其氣散肝平乃知自悔是因酒之所使作為悖逆故曰酒悖夫酒為水穀之液血為水穀之精酒入中焦必求同類故先歸血分凡飲酒者身面皆赤即其徵也然血屬陰而性和酒屬陽而氣悍血欲靜而酒動之血欲藏而酒亂之血無氣不行故血亂氣亦亂氣散血亦散擾亂一番而血氣能無耗損者未之有也又若人之稟賦臟有陰陽而酒之氣質亦有陰陽蓋酒成於釀其性則熱汁化於水其質則寒故陽臟者得之則愈熱陰臟者得之則愈寒所以縱酒不節者無論陰陽均能為害凡熱盛而過飲者陽日盛則陰日消每成風疸腫脹寒盛而過飲者熱性去而寒質留多至傷腎敗脾當其少壯則旋耗旋生固無所覺及乎中衰而力有不勝則宿孽為殃莫能御矣然則酒悖之為害也所關於壽夭非細其可不知節乎慓音飄悍音旱骨強筋弱肉緩皮膚厚者耐痛其於針石火焫亦然黑色而美骨者耐堅肉而薄皮者不耐美骨者骨強之謂病或同時或易已或難已其身多熱者易已多寒者難已指外邪致病為言也多熱者病在陽分故易已多寒者病在陰分故難已胃厚色黑大骨及肥者勝毒瘦而薄胃者不勝毒也胃厚者臟堅色黑者表固骨大者體強肉肥者血盛故能勝峻毒之物若肉瘦而胃薄者血氣本屬不足安能勝毒藥也勝平聲腦髓骨脈膽女子胞此六者地氣之所生也皆藏於陰而象於地故藏而不瀉名曰奇恆之府凡此六者原非六腑之數以其藏蓄陰精故曰地氣所生皆稱為腑然膽居六腑之一獨其藏而不瀉與他腑之傳化者為異女子之胞子宮是也亦以出納精氣而成胎孕者為奇故此六者均稱為奇恆之府奇異也恆常也胃大腸小腸三焦膀胱此五者天氣之所生也其氣象天故瀉而不藏此受五臟濁氣名曰傳化之府此不能久留輸瀉者也凡此五者是名六腑膽稱奇恆則此為五矣若此五腑包藏諸物而屬陽故曰天氣所生傳化濁氣而不留故曰瀉而不藏因其轉輸運動故曰象天之氣魄門亦為五臟使水穀不得久藏魄門肛門也大腸與肺為表裡肺藏魄而主氣肛門失守則氣陷而神去故曰魄門不獨是也雖諸腑糟粕固由其瀉而臟氣升降亦賴以調故亦為五臟使所謂五臟者藏精氣而不瀉也故滿而不能實六腑者傳化物而不藏故實而不能滿也五臟主藏精氣六腑主傳化物精氣質清藏而不瀉故但有充滿而無所積實水穀質濁傳化不藏故雖有積實而不能充滿所以然者水穀入口則胃實而腸虛食未下也食下則腸實而胃虛水穀下也故曰實而不滿滿而不實也五臟受氣於其所生傳之於其所勝氣舍於其所生死於其所不勝病之且死必先傳行至其所不勝病乃死凡五臟病氣有所受有所傳有所舍有所死舍留止也受氣所生者受於己之所生者也傳所勝者傳於己之所克者也氣舍所生者舍於生己者也死所不勝者死於克己者也此言氣之逆行也故死不勝則逆故曰逆行逆則當死肝受氣於心傳之於脾氣舍於腎至肺而死此詳言一臟之氣皆能遍及諸臟也肝氣受於心心者肝之子受氣於其所生也脾者肝之克傳其所勝也腎者肝之母氣舍所生也肺者肝之畏死所不勝也心受氣於脾傳之於肺氣舍於肝至腎而死脾受氣於肺傳之於腎氣舍於心至肝而死肺受氣於腎傳之於肝氣舍於脾至心而死腎受氣於肝傳之於心氣舍於肺至脾而死此皆逆死也逆死之義如此下言順傳之序也一日一夜五分之此所以占死生之早暮也五分者朝主甲乙晝主丙丁四季土主戊己晡主庚辛夜主壬癸此一日五行之次而臟有不勝即其死生之期也五臟相通移皆有次五臟有病則各傳其所勝傳其所勝者風入於肺為肺痹弗治則肺傳之肝為肝痹弗治則肝傳之脾為脾風弗治則脾傳之腎曰疝瘕弗治則腎傳之心曰瘛弗治則心復反傳而行之肺法當死也不治法三月若六月若三日若六日傳五臟而當死病不早治必至相傳遠則三月六月近則三日六日五臟傳遍於法當死所謂三六者蓋天地之氣以六為節如三陰三陽是為六氣六陰六陽是為十二月故五臟相傳之數亦以三六為盡若三月而傳遍一氣一臟也六月而傳遍一月一臟也三日者晝夜各一臟也六日者一日一臟也臟惟五而傳遍以六者假令病始於肺一也肺傳肝肝傳脾脾傳腎腎傳心心復傳肺是為六傳六傳已盡不可再傳有七日而病退得生者以真元未至大傷故六傳畢而經盡氣復乃得生也是順傳所勝之次上言逆者言臟之氣蓋五臟受克其氣必逆故曰逆行此言順者言病之傳凡傳所勝必循次序故曰順傳是順傳者即氣之逆也故五臟傳遍者當死故曰別於陽者知病從來別於陰者知死生之期陽者言表謂外候也陰者言里為臟氣也察其外即知病在何經故別於陽者知病從來病傷臟氣必敗真陰察其本即可知危在何日故別於陰者知死生之期此以表裡言陰陽也言知至其所困而死至其所困而死死於其所不勝也凡年月日時其候皆然精氣津液血脈一氣辨為六名六者之分總由氣化故曰一氣形不同而名則異故當辨之兩神相搏合而成形常先身生是謂精兩神陰陽也搏交也精天一之水也凡陰陽合而萬形成無不先從精始故曰常先身生是謂精按兩精相搏謂之神兩神相搏合而成形常先身生是謂精蓋明陰陽之互用即合一之道也上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣上焦胸中也開發通達也宣布散也氣者人身之大氣名曰宗氣亦名為真氣積於胸中出於喉嚨以貫心脈而行呼吸焉所受於天與穀氣並而充身也谷入於胃以傳於肺五臟六腑皆以受氣故能熏膚充身澤毛若霧露之溫潤而溉養萬物者為氣也腠理發泄汗出溱溱是謂津津者陽之液汗者津之泄也腠理者皮膚之隙溱溱滋澤貌溱音臻谷入氣滿淖澤注於骨骨屬屈伸泄澤補益腦髓皮膚潤澤是謂液淖澤濡潤也液者陰之精谷入於胃其氣滿而化液故淖澤而注於骨凡骨屬舉動屈伸則經脈流行而泄其澤故內而補益腦髓外而潤澤皮膚皆謂之液夫津液本為同類亦有陰陽之分蓋津者液之清液者津之濁津為汗而走腠理屬陽液注骨而補腦髓屬陰三焦出氣以溫肌肉充皮膚為津其留而不行者為液正此義也泄泄同中焦受氣取汁變化而赤是謂血中焦者並胃中出上焦之下凡水穀之入必先歸胃故中焦受谷之氣取谷之味輸脾達臟由黃白而漸變為赤以奉生身者是謂之血壅遏營氣令無所避是謂脈壅遏者堤防之謂猶道路之有封疆江河之有崖岸俾營氣無所回避而必行其中者是謂之脈然則脈者非氣非血而所以通乎氣血者也精脫者耳聾腎藏精耳者腎之竅故精脫則耳聾氣脫者目不明五臟六腑精陽之氣皆上注於目而為精故陽氣脫則目不明津脫者腠理開汗大泄汗陽津也汗大泄者津必脫故曰亡陽液脫者骨屬屈伸不利色夭腦髓消脛酸耳數鳴液所以注骨益腦而澤皮膚者液脫則骨髓無以充故屈伸不利而腦消脛酸皮膚無以滋故色枯而夭液脫則陰虛故耳鳴也血脫者色白夭然不澤血之榮在色故血脫者色白如鹽夭然不澤謂枯稿無神也其脈空虛此其候也脈貴有神其脈空虛即六脫之候六氣者各有部主也其貴賤善惡可為常主然五穀與胃為大海也一氣辨為六名故云六氣言六者無非一氣之所化也部主謂各部所主也如腎主精肺主氣脾主津液肝主血心主脈也貴賤善惡以衰旺邪正言如春夏則木火為貴秋冬則金水為貴而失時者為賤也六氣之得正者為善而太過不及者為惡也貴賤善惡主各有時故皆可為常主然六氣資於五谷五穀運化於胃是為水穀之海故胃氣為臟腑之本谷所從出入淺深遠近長短有度唇至齒長九分口廣二寸半長深也廣闊也齒以後至會厭深三寸半大容五合會厭在喉嚨之上乃所以分水穀司呼吸而不容其相混者也舌重十兩長七寸廣二寸半咽門重十兩廣二寸半至胃長一尺六寸咽門即食喉也其名曰咽至胃長一尺六寸乃並胃脘而言胃紆曲屈伸之長二尺六寸大一尺五寸徑五寸大容三斗五升紆曲曲折也大言周圍之數徑言直過之數其中之谷常留二斗水一斗五升而滿紆音於小腸後附脊左環回周疊積其注於回腸者外附於臍上回運環十六曲大二寸半徑八分分之少半長三丈二尺小腸居胃之下在臍上二寸所後附於脊左旋而環其下口注於回腸者外附近於臍上一寸當水分穴處是也八分分之少半言八分之外尚有如一分之少半也回腸當臍左環回周葉積而下回運環反十六曲大四寸徑一寸寸之少半長二丈一尺回腸大腸也葉積如葉之積亦疊積之義大腸上口即小腸下口當臍左旋而下接廣腸也廣腸傳脊以受回腸左環葉脊上下闢大八寸徑二寸寸之大半長二尺八寸廣腸大腸下節也亦名直腸直腸居後繞脊而下故曰傳脊傳布也葉脊上下言疊於脊之上下而至尾骶也闢闢同以其最廣故云闢大八寸腸胃初入至所出長六丈四寸四分回曲環反三十二曲也此自口而入自便而出之全數三十二曲合小腸大腸而言也人不食七日則死胃大一尺五寸徑五寸長二尺六寸橫屈受水穀三斗五升其中之谷常留二斗水一斗五升而滿上焦泄氣出其精微慓悍滑疾下焦下溉諸腸精微慓悍滑疾言水穀之精氣也下溉諸腸言水穀之質粕也小腸大二寸半徑八分分之少半長二丈二尺受谷二斗四升水六升三合合之大半回腸大四寸徑一寸寸之少半長二丈一尺受谷一斗水七升半廣腸大八寸徑二寸寸之大半長二尺八寸受谷九升三合八分合之一腸胃之長凡五丈八尺四寸受水穀九斗二升一合合之大半此腸胃所受水穀之數也五丈八尺四寸乃止合腸胃之數非總計唇口咽門而言也平人則不然胃滿則腸虛腸滿則胃虛更虛更滿故氣得上下五臟安定血脈和利精神乃居故神者水穀之精氣也受水穀九斗二升一合合之大半者乃言腸胃能容之總數也若平人常數則不皆然蓋胃中滿則腸中虛腸中滿則胃中虛有滿有虛則上下之氣得以通達五臟血脈得以和調而精神乃生故神為水穀之精氣也故腸胃之中常留谷二斗水一斗五升故平人日再後後二升半一日中五升七日五七三斗五升而留水穀盡矣故平人不食飲七日而死者水穀精氣津液皆盡故也平人腸胃之中所存水穀惟三斗五升而已然人之二便大約日去五升當七日而盡故平人不食飲七日而死也古今量數不同非若今之升斗尺寸也人之血氣精神以奉生而周於性命奉養也周給也血氣為本精神為用合是四者以奉生而性命周全矣經脈者所以行血氣而營陰陽濡筋骨利關節者也經脈者即營氣之道營運也濡潤也營行脈中故主於裡而利筋骨衛氣者所以溫分肉充皮膚肥腠理司關闔者也肉有分理故云分肉衛行脈外故主表而司皮毛之關闔志意者所以御精神收魂魄適寒溫和喜怒者也御統御也適調燮也是故血和則經脈流行營覆陰陽筋骨徑強關節清利矣覆包藏也衛氣和則分肉解利皮膚調柔腠理致密矣緻音致志意和則精神專直魂魄不散悔怒不起五臟不受邪矣專直其靜也專其動也直言其專一而正也寒溫和則六腑化谷風痹不作經脈通利肢節得安矣此人之常平也凡此是皆常人之平者也五臟者所以藏精神血氣魂魄者也六腑者所以化水穀而行津液者也此人之所以具受於天也無愚智賢不肖無以相倚也倚偏也然有其獨盡天壽而無邪僻之病百年不衰雖犯風雨卒寒大暑猶有弗能害此言天稟有出常之強者有其不離屏蔽室內無怵惕之恐然猶不免於病也此言天稟有出常之弱者蓋謂五臟者所以參天地副陰陽而連四時化五節者也參參同副配也連通也化五節者應五行之節序而為之變化也固有小大高下堅脆端正偏傾者六腑亦有小大長短厚薄結直緩急凡此二十五者各不同或善或惡或吉或凶五臟化五節五五二十五也言所以為強弱者皆由臟腑之氣致然也心小則安邪弗能傷易傷以憂心大則憂不能傷易傷於邪心高則滿於肺中悗而善忘難開以言心下則臟外易傷於寒易恐以言心堅則臟安守固心脆則善病消疸熱中心端正則和利難傷心偏傾則操持不一無守司也心小則祛故必多憂大則不固故邪易傷之高則滿於肺而竅多不利下則陽氣抑而神必不揚堅則安固心脆者火必易動端正則悔吝不侵偏傾者不得其中此其所以各有病也悗悶也消疸內熱病也肺小則少飲不病喘喝肺大則多飲善病胸痹喉痹逆氣肺高則上氣肩息咳肺下則苦賁迫善脅下痛肺堅則不病咳上氣肺脆則苦病消疸易傷肺端正則和利難傷肺偏傾則胸偏痛也喘喝氣喘聲急也肩息咳聳肩喘息而咳也肺下則氣道不利故苦於賁迫而脅下痛也賁奔祕二音肝小則臟安無脅下之病肝大則逼胃迫咽迫咽則苦膈中且脅下痛肝高則上支賁切脅悗為息賁肝下則逼胃脅下空脅下空則易受邪肝堅則臟安難傷肝脆則善病消疸易傷肝端正則和利難傷肝偏傾則脅下痛也上支賁切謂肝經上行之支脈賁壅迫切故脅為悗悶為息賁喘急也左右兩脅皆肝膽之經所以肝病者多見於脅脾小則臟安難傷於邪也脾大則苦湊䏚而痛不能疾行脾高則䏚引季脅而痛脾下則下加於大腸下加於大腸則臟苦受邪脾堅則臟安難傷脾脆則善病消疸易傷脾端正則和利難傷脾偏傾則善滿善脹也湊塞也䏚脅下軟肉處也季脅小肋也䏚音秒腎小則臟安難傷腎大則善病腰痛不可以俯仰易傷以邪腎高則苦背膂痛不可以俯仰腎下則腰尻痛不可以俯仰為狐疝腎堅則不病腰背痛腎脆則善病消疸易傷腎端正則和利難傷腎偏傾則苦腰尻痛也膂音呂夾脊肉也尻開高切尾骶骨也凡此二十五變者人之所苦常病五變者曰小大曰高下曰堅脆曰端正曰偏傾也人有五臟臟有五變是為二十五變人所苦於常病也赤色小理者心小粗理者心大無𩩲骬者心高𩩲骬小短舉者心下𩩲骬長者心堅𩩲骬弱小以薄者心脆𩩲骬直下不舉者心端正𩩲骬倚一方者心偏傾也理肉理上𩩲骬鳩尾骨也白色小理者肺小粗理者肺大巨肩反膺陷喉者肺高合腋張脅者肺下好肩背厚者肺堅肩背薄者肺脆背膺厚者肺端正脅偏疏者肺偏傾也胸前兩旁為膺胸突而向外者是為反膺肩高胸突其喉必縮是為陷喉合腋張脅者腋斂脅開也脅偏疏者脅骨欹斜而不密也青色小理者肝小粗理者肝大廣胸反骹者肝高合脅兔骹者肝下胸脅好者肝堅脅骨弱者肝脆膺腹好相得者肝端正脅骨偏舉者肝偏傾也脛骨近足之細處曰骹今詳反骹兔骹以候肝似以脅下之骨為骹也反骹者脅骨高而張也兔骹者脅骨低合如兔也骹音敲黃色小理者脾小粗理者脾大唇揭者脾高唇下縱者脾下唇堅者脾堅唇大而不堅者脾脆唇上下好者脾端正唇偏舉者脾偏傾也脾氣通於口其榮在唇故脾之善惡驗於唇而可知也黑色小理者腎小粗理者腎大高耳者腎高耳後陷者腎下耳堅者腎堅耳薄不堅者腎脆耳好前居牙車者腎端正耳偏高者腎偏傾也腎氣通於耳故腎之善惡驗於耳而可知也凡此諸變者持則安減則病也以上諸變使能因其偏而善為持守則可獲安若少有損減則不免於病矣五臟六腑邪之舍也若五臟皆小者少病苦燋心大愁憂五臟皆大者緩於事難使以憂五臟皆高者好高舉措五臟皆下者好出人下五臟皆堅者無病五臟皆脆者不離於病五臟皆端正者和利得人心五臟皆偏傾者邪心而善盜五臟六腑所以藏精神水穀者也一有不和邪乃居之故曰邪之舍也肺合大腸大腸者皮其應心合小腸小腸者脈其應肝合膽膽者筋其應脾合胃胃者肉其應腎合三焦膀胱三焦膀胱者腠理毫毛其應肺本合皮而大腸亦應之心本合脈而小腸亦應之膽胃皆然故表裡之氣相同也惟是腎本合骨而此云三焦膀胱者三焦出氣以溫肌肉充皮毛此其所以應腠理毫毛也肺應皮皮厚者大腸厚皮薄者大腸薄皮緩腹裡大者大腸大而長皮急者大腸急而短皮滑者大腸直皮肉不相離者大腸結此言六腑之應肺與大腸為表裡肺應皮故大腸腑狀亦可因皮而知也不相離者堅實之謂心應脈皮厚者脈厚脈厚者小腸厚皮薄者脈薄脈薄者小腸薄皮緩者脈緩脈緩者小腸大而長皮薄而脈衝小者小腸小而短諸陽經脈皆多紆屈者小腸結心與小腸為表裡心應脈故小腸腑狀亦可因脈而知也然脈行皮肉之中何以知其厚薄但察其皮肉即可知也沖虛也諸陽經脈言脈之浮淺而外見者也紆屈盤曲不舒之謂脾應肉肉䐃堅大者胃厚肉䐃麼者胃薄肉䐃小而麼者胃不堅肉䐃不稱身者胃下胃下者下管約不利肉䐃不堅者胃緩肉䐃無小里纍者胃急肉䐃多少里纍者胃結胃結者上管約不利也脾與胃為表裡脾應肉故胃腑之狀亦可因肉而知也䐃肉之聚處也麼細薄也約不舒也少里纍之義未詳或云揣其䐃肉少有纍然結實之謂稱去聲肝應爪爪厚色黃者膽厚爪薄色紅者膽薄爪堅色青者膽急爪濡色赤者膽緩爪直色白無約者膽直爪惡色黑多紋者膽結也肝與膽為表裡肝應爪故膽腑之狀亦可因爪而知也結者膽氣不舒之謂腎應骨密理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄疏腠理者三焦膀胱緩皮急而無毫毛者三焦膀胱急毫毛美而粗者三焦膀胱直稀毫毛者三焦膀胱結也腎與膀胱為表裡而三焦亦合於腎所以三焦膀胱之狀可因腠理毫毛而知也視其外應以知其內臟則知所病矣外形既明內臟可察病亦因而可知矣身形支節者臟腑之蓋也非面部之閲也五臟者肺為之蓋巨肩陷咽候見其外肺為五臟六腑之蓋觀巨肩陷咽者即其外候而肺之大小高下堅脆偏正俱可知矣心為之主缺盆為之道骷骨有餘以候𩩲骬缺盆居肩之前骨之上五臟六腑皆稟命於心故為之主而脈皆上出於缺盆故為之道骷䯙髂也䯙髂即膝骨之名𩩲骬蔽心之骨亦名鳩尾觀乎此而心之小大高下堅脆偏正可知矣骷音枯肝者主為將使之候外欲知堅固視目小大肝者將軍之官目者肝之外候故察於目則可知肝之狀矣脾者主為衛使之迎糧視唇舌好惡以知凶吉脾主運化水穀肌肉臟腑皆賴其養故為衛為倉廩之官職在轉輸故曰使之迎糧察其飲食及唇舌之善惡則脾之吉凶可知也腎者主為外使之遠聽視耳好惡以知其性腎為作強之官伎巧所出主於外其竅為耳試遠聽察耳之善惡則腎臟之象可因而知之矣六腑者胃之為海廣骸大頸張胸五穀乃容骸骸骨也廣骸者言骨骼之大骸音鞋鼻隧以長以候大腸唇厚人中長以候小腸目下果大其膽乃橫鼻孔在外膀胱漏泄鼻柱中央起三焦乃約此所以候六腑者也上下三等臟且安良矣果裹同目下囊裹也橫剛強也在外掀露也約固密也臟居於中形見於外故舉身面之外狀而可以候內之六腑然或身或面又必上中下三停相等庶臟腑相安而得其善矣以五臟之皮脈肉爪骨而候六腑義當互求人有陰陽有陰人有陽人天地之間六合之內不離於五人亦應之非徒一陰一陽而已也蓋有太陰之人少陰之人太陽之人少陽之人陰陽和平之人凡五人者其態不同其筋骨氣血各不等少師曰太陰之人貪而不仁下齊湛湛此言五人之情性也下齊謙下整齊也湛湛水澄貌亦卑下自明之意好內而惡出心和而不發心和者陰性柔也不發者陰多藏也內納同不務於時知有已也動而後之不先發也此太陰之人也此其深情厚貌狡猾不露者是為太陰之人少陰之人小貪而賊心貪小利而心殘賊也見人有亡常若有得見他人之有失為自己之得志即幸災樂禍之謂好傷好害陰性殘忍也見人有榮乃反慍怒心多忌刻憂人富貴也心疾而無恩心存嫉妒故無恩也此少陰之人也陰險貪殘小人之品此少陰之人也太陽之人居處於於于于自足貌好言大事無能而虛説喜誇張而無實際也志發於四野心妄好強也舉措不顧是非粗疏不精也為事如常自用事雖敗而常無悔為事庸常而喜自用雖至於敗而自是不移故無反悔之心此太陽之人也有始無終虎皮羊質此太陽之人也少陽之人諟諦好自貴諟諦審而又審也小有聰明因而自貴諟音是諦音帝有小小官則高自宜局量褊淺易盈滿也好為外交而不內附務虛文也此少陽之人也妄自尊貴不知大體此少陽之人也陰陽和平之人居處安靜安靜處順無妄動也無為懼懼心有所主乃能不動貧賤不能移威武不能屈是無懼懼也懼平聲無為欣欣利欲不能入富貴不能淫是無欣欣也婉然從物君子之接人也言忠信行篤敬雖蠻貊之邦行矣是婉然從物也婉音苑或與不爭聖人之道為而不爭以其不爭故天下莫能與爭之與時變化時移則事變世更則俗易惟聖人隨世以為法因時而致宜故能陰能陽能弱能強隨機動靜而與化推移也夫冰炭鉤繩何時能合若以聖人為之中則兼覆而並之未有可是非者也尊則謙謙位尊而志謙也天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可逾君子之終也談而不治是謂至治談而不治無為而治也無為而治治之至也致中和天地位焉萬物育焉其陰陽和平之人之謂乎故善用針灸者視人五態乃治之盛者瀉之虛者補之太陰之人多陰而無陽其陰血濁其衛氣澀陰陽不和緩筋而厚皮不之疾瀉不能移之無陽則氣少故血濁不清而衛氣澀滯也曰陰陽不和者四態之人無不然於此而首言之他可概見矣氣少不行故其筋緩陰體重濁故其皮厚皮厚血濁非疾瀉之不能移易也少陰之人多陰少陽小胃而大腸六腑不調其陽明脈小而太陽脈大必審調之其血易脫其氣易敗也小胃故足陽明之胃脈亦小大腸故手太陽之小腸脈亦大此其多陰少陽者以陽明為五臟六腑之海小腸為傳送之府胃小則藏貯少而氣必微小腸大則傳送速而氣不蓄陽氣既少而又不蓄則多陰少陽矣必當審察而善調之然其氣少不能攝血故多致血易脫而氣易敗也太陽之人多陽而少陰必謹調之無脫其陰而瀉其陽陽重脫者易狂陰陽皆脫者暴死不知人也太陽之人少陰者也陰氣既少而復瀉之其陰少脫故曰無脫其陰而但可瀉其陽耳然陰不足者陽亦無根若瀉之太過則陽氣重脫而脫陽者狂甚至陰陽俱脫則暴死不知人也少陽之人多陽少陰經小而絡大血在中而氣外實陰而虛陽獨瀉其絡脈則強氣脫而疾中氣不足病不起也經脈深而屬陰絡脈淺而屬陽故少陽之人多陽而絡大少陰而經小也血脈在中氣絡在外所當實其陰經而瀉其陽絡則身強矣惟是少陽之人尤以氣為主若瀉之太過以致氣脫而疾則中氣乏而難於起矣陰陽和平之人其陰陽之氣和血脈調不幸而病謹診其陰陽視其邪正安容儀審有餘不足盛則瀉之虛則補之不盛不虛以經取之此所以調陰陽別五態之人者也不盛不虛以經取之者言本無盛虛之可據而或有邪正之不調者但求所在之經以取其病也五五二十五人而五態之人不與焉五態之人尤不合於衆也太陰之人其狀黮黮然黑色念然下意臨臨然長大膕然未僂此太陰之人也黮黮色黑不明也念然下意意念不揚也即下齊之謂臨臨然臨下貌膕然未僂言膝膕若屈而實非傴僂之疾也蓋以太陰之人稟質陰濁故其形色志意有如此者黮萏探二音僂音呂少陰之人其狀清然竊然固以陰賊立而躁嶮行而似伏此少陰之人也清然者言似清也竊然者行如鼠雀也固以陰賊者殘賊之心堅不可破也堅立而躁嶮者陰嶮之性時多躁暴也出沒無常行而似伏此則少陰人之態度嶮險同太陽之人其狀軒軒儲儲反身折膕此太陽之人也軒軒高大貌猶俗謂軒昂也儲儲蓄積貌盈盈自得也反身折膕言仰腰挺腹其膕似折也是皆妄自尊大之狀此則太陽人之態度儲音除少陽之人其狀立則好仰行則好搖其兩臂兩肘則常出於背此少陽之人也立則好仰志務高也行則好搖性多動也兩臂兩肘出於背喜露而不喜藏也此則少陽人之態度陰陽和平之人其狀委委然隨隨然顒顒然愈愈然䁢䁢然豆豆然衆人皆曰君子此陰陽和平之人也委委雍容自得也隨隨和光同塵也顒顒尊嚴謹慎也愈愈悅樂也䁢䁢周旋也豆豆磊落不亂也若人者人人得而敬愛之故衆人皆曰君子君子者其得天地之正氣者也顒魚容切愈音余䁢音旋五五二十五人之政而陰陽之人不與焉其態又不合於衆者五也二十五人之形血氣之所生別而以候從外以知內五行之中又各有五如五形之人而又分左之上下右之上下是為五矣五而五之計有二十五人也然此言五形之詳非止五態而已故曰陰陽之人不與焉又不合於衆者五也別而以候別其外而知其內也與去聲別入聲先立五形金木水火土別其五色異其五形之人而二十五人具矣木形之人比於上角似於蒼帝比屬也角為木音蒼為木色木形之人言稟木氣之全者也音比上角而象類東方之蒼帝其為人蒼色小頭象木之巔也長面木形長也大肩背木身大也直身木體直也小手足木枝細也比以體象而言好有才隨斫成材木之用也勞心發生無窮木之化也少力木性柔也多憂勞於事木不能靜也能春夏不能秋冬木得陽而生長得陰而凋落此以性而言也感而病生足厥陰他他然足厥陰肝木之經也肝主筋為罷極之木故曰他他然他他筋柔遲重之貌足厥陰為木之臟足少陽為木之腑此言臟而下言腑者蓋以厥陰少陽為表裡而腑為腑之主耳故首云上角厥陰者總言木形之全也後云大角左角釱角判角少陽者分言木形之詳也茲於上角而分左右左右而又分上下正以明陰陽之中復有陰陽也他音駝大角之人比於左足少陽少陽之上遺遺然稟五形之偏者各四曰左之上下右之上下而此言木形之左上者是謂大角之人也其形之見於外者屬於左足少陽之經如下文所謂足少陽之上氣血盛則通髯美長以及血氣多少等辨正合此大角之人也遺遺柔退貌凡五人者其態不同是統言大體而分其陰陽五態也此以木火土金水五形之人而復各分其左右上下是於各形之中而又悉其太少之義耳總皆發明稟賦之異而示人以變化之不同也大太同左角之人比於右足少陽少陽之上隨隨然左角一曰少角隨隨從順貌下文云足少陽之下血氣盛則脛毛美長者正合此少角之人而此言其右之下也釱角之人比於右足少陽少陽之上推推然一曰右角角形而並於右足少陽之上者是謂右角之人此即言其右之上也推推前進貌釱音代又音第判角之人比於左足少陽少陽之下栝栝然判半也應在大角之下者是謂判角之人而屬於左足少陽之下即言其左之下也栝栝方正貌凡此遺遺隨隨推推栝栝者皆所以表木形之象火形之人比於上徵似於赤帝徵為火音火形之人總言火氣之全者也音屬上徵而象類南方之赤帝其為人赤色火之色也廣䏖䏖音引當脊肉也鋭面小頭火上尖也好肩背髀腹火勢炎上而盛於中也小手足火勢之旁者小也行安地火體下重也疾心火性速也行搖火象動也肩背肉滿即廣䏖好肩背之意有氣人屬陽而多氣也輕財火性多散也少信火性易變也多慮見事明火明而善燭也好顏火色光明也急心火性急也不壽暴死急速之性不耐久也能春夏不能秋冬陽王春夏而畏水也秋冬感而病生手少陰核核然手少陰心火經也火不耐於秋冬故秋冬生病核核然火不得散而結聚為形也此言手少陰下言手太陽者以少陰太陽為表裡而皆屬於火也質徵之人比於左手太陽太陽之上肌肌然一曰質之人一曰大徵以徵形而應於左之上是謂大徵之人而屬於左手太陽之上也肌肌膚淺貌少徵之人比於右手太陽太陽之下慆慆然應右徵之下者是謂少徵之人而屬於右手太陽之下也慆慆不反貌又多疑也慆音叨右徵之人比於右手太陽太陽之上鮫鮫然一曰熊熊然以徵形而屬於右手太陽之上是謂右徵之人鮫鮫踴躍貌鮫音交質判之人比於左手太陽太陽之下支支頤頤然一曰質徵此居質徵之下故曰質判而屬於左手太陽之下判亦半之義也支支枝離貌頤頤自得貌凡此几几之類者皆所以表火形之象土形之人比於上宮似於中央黃帝宮為土音土形之人總言土氣之全者也音屬上宮而象類中央之黃帝其為人黃色土色黃也圓面土形圓也大頭土形廣而平也美肩背土體厚也大腹土廣載也美股脛土主四肢也小手足盛在中也多肉土之合也上下相稱土豐盛也行安地土安重也舉足浮大氣舉之也安心土性靜也好利人土成物也不喜權勢土自重也善附人也藏垢納汙也能秋冬不能春夏畏風濕也春夏感而病生足太陰敦敦然足太陰脾土經也敦敦重實貌此言太陰下言足陽明者以太陰陽明為表裡而皆屬於土也大宮之人比於左足陽明陽明之上婉婉然以宮形而應於左之上故屬於左足陽明之上也婉婉多順貌加宮之人比於左足陽明陽明之下坎坎然一曰衆之人應在大宮之下者是謂加宮之人而屬於左足陽明之下也坎坎深固貌少宮之人比於右足陽明陽明之上樞樞然應在大宮之右故曰少宮之人而屬於右足陽明之上也樞樞圓轉貌右宮之人比於右足陽明陽明之下兀兀然兀兀獨立不動貌凡此婉婉之類者皆所以表土形之象也金形之人比於上商似於白帝商為金音金形之人總言金氣之全者也音屬上商而象類西方之白帝其為人方面金形方也白色金色白也小頭小肩背小腹小手足金形堅小也如骨發踵外足跟外堅如有骨發踵外者骨輕金體皆重而金無骨故骨不能獨重也身清廉金性潔也急心金性剛也靜悍金性靜動則悍善為吏肅而威也能秋冬不能春夏金喜寒而畏火也春夏感而病生手太陰敦敦然手太陰肺金經也敦敦堅實貌手足太陰皆曰敦敦而義稍不同金堅土重也此言手太陰下言手陽明者以太陰陽明為表裡而皆屬於金耳釱商之人比於左手陽明陽明之上廉廉然釱亦大也左右之上俱可言釱故上云釱角者比於右足少陽之上此釱商者比於左手陽明之上也廉廉稜角貌右商之人比於右手陽明陽明之下脫脫然脫脫瀟灑貌大商之人比於左手陽明陽明之上監監然監監多察貌少商之人比於右手陽明陽明之下嚴嚴然應在右之下者是謂少商之人而屬於右手陽明之下也嚴嚴莊重貌凡此廉廉之類者皆所以表金形之象也水形之人比於上羽似於黑帝羽為水音水形之人總言水氣之全者也音屬上羽而象類北方之黑帝其為人黑色水色黑也面不平水有波也大頭水面廣也廉頤高流急也小肩支流細也大腹容物如海也動手足發行搖身水流動也下尻長水流長也背延延然亦長意也不敬畏任性趨下不向上也善欺紿人水無實也戮死水無恆情故多厄也能秋冬不能春夏水王秋冬衰於春夏也春夏感而病生足少陰汗汗然足少陰腎水經也汗汗濡潤貌此言足少陰下言足太陽者以少陰太陽為表裡而皆屬於水也大羽之人比於右足太陽太陽之上頰頰然以水形而應於右之上者是謂大羽之人而屬於右足太陽之上也頰頰得色貌少羽之人比於左足太陽太陽之下紆紆然應在左之下者是謂少羽之人而屬於左足太陽之下也紆紆曲折貌衆之為人比於右足太陽太陽之下潔潔然衆常也一曰加之人應在右之下者曰衆之為人而屬於右足太陽之下也潔潔清靜貌諸形皆言太少而此獨曰衆意者水形多變而此獨潔潔故可同於衆也桎之為人比於左足太陽太陽之上安安然桎窒同局窒不通之義居左之上者曰桎之為人而屬於左足太陽之上也安安定靜貌諸不言桎而此獨言者蓋以水性雖流而為器所局則安然不動故云桎也凡此頰頰之類者皆所以表水形之象也是故五形之人二十五變者衆之所以相欺者是也形分為五而又分為二十五稟賦既偏則不免強弱勝負之相欺故惟不偏不易而鍾天地之正氣者斯為陰陽和平之人是以有聖跖賢愚之別也形勝色色勝形者至其勝時年加感則病行失則憂矣形色當相合否則為病矣得其形者所謂二十五形也形勝色者如以木形人而色見黃也色勝形者如以木形人而色見白也勝時年者如木王土衰而又逢丁壬之木運或東方之干支或厥陰氣候之類值其王氣相加而感之則病矣既病而再有疏失乃可憂也形色相得者富貴大樂氣質調和也形色相勝之時年則年忌下上之人大忌常加七歲年忌者忌有常數所以示人之避患也下上之人如上文五形或上或下之人其年忌常以七歲為始十六歲二十五歲三十四歲四十三歲五十二歲六十一歲皆人之大忌不可不自安也此言年忌始於七歲以至六十一歲皆遞加九年者蓋以七為陽之少九為陽之老陽數極於九而極必變故自七歲以後凡遇九年皆為年忌感則病行失則憂矣當此之時無為姦事是謂年忌至於脈之上下血氣之候則足陽明之上血氣盛則髯美長血少氣多則髯短氣少血多則髯少血氣皆少則無髯兩吻多畫此言手足三陽之外候也足陽明胃經之脈行於上體者循鼻外挾目環唇故此經氣血之盛衰皆形見於口旁之髯也吻口角也畫紋也陽明血氣不充兩吻故多紋畫足陽明之下血氣盛則下毛美長至胸血多氣少則下毛美短至臍行則善高舉足足指少肉足善寒足陽明之脈行於下體者由歸來至氣街陰陽總宗筋之會會於氣街而陽明為之長故形見於下毛而或有至胸至臍也行則善高舉足者因其血多蓋四肢皆稟氣於胃足受血而能步也足指少肉足善寒者因其氣少蓋四肢者諸陽之本陽氣不足則指少肉而善寒也血少氣多則肉而善瘃瘃寒腫也血少氣多則浮見於外故下體肉分多為腫也瘃音竹血氣皆少則無毛有則稀枯悴善痿厥足痹悴憔悴也足陽明為五臟六腑之海主潤宗筋束骨而利機關也今氣血俱少於下故為痿厥足痹等病足少陽之上氣血盛則通髯美長血多氣少則通髯美短血少氣多則少須血氣皆少則無須足少陽膽經之脈行於上體者抵於䪼下頰車故其氣血之盛衰必形見於鬚髯也在頤曰須在頰曰髯感於寒濕則善痹骨痛爪枯也此皆筋骨之病以少陽厥陰為表裡而肝主筋也足少陽之下血氣盛則脛毛美長外踝肥血多氣少則脛毛美短外踝皮堅而厚血少氣多則胻毛少外踝皮薄而軟血氣皆少則無毛外踝瘦無肉足少陽之脈行於下體者出膝外廉下外輔骨外踝之前故其形見者皆在足之外側踝胡寡切胻音杭足太陽之上血氣盛則美眉眉有毫毛血多氣少則惡眉面多少理血少氣多則面多肉血氣和則美色足太陽膀胱之脈行於上體者起於目內眥其筋之支者下顏結於鼻故其氣血之盛衰皆形見於眉面之間也足太陽之下血氣盛則跟肉滿踵堅氣少血多則瘦跟空血氣皆少則喜轉筋踵下痛足太陽經之行於下體者從後廉下合膕中貫腨內出外踝之後結於踵故其形見為病皆在足之跟踵也手陽明之上血氣盛則髭美血少氣多則髭惡血氣皆少則無髭手陽明大腸之脈行於上體者挾口交人中上挾鼻孔故其氣血之盛衰必形見於髭也在口上曰髭在口下曰須手陽明之下血氣盛則腋下毛美手魚肉以溫氣血皆少則手瘦以寒手陽明之行於下體者上臑外前廉下近於腋且陽明太陰為表裡而太陰之脈出腋下故腋下毛美手魚肉者大指本節後厚肉也本經之脈起次指出合谷故形見於此手少陽之上血氣盛則眉美以長耳色美血氣皆少則耳焦惡色手少陽三焦之脈行於上體者出耳前後至目鋭眥故其血氣之盛衰皆見於眉耳之間手少陽之下血氣盛則手卷多肉以溫血氣皆少則寒以瘦氣少血多則瘦以多脈手少陽之脈行於下體者起名指端循手腕出臂外上肘故其形見若此手太陽之上血氣盛則有多須面多肉以平血氣皆少則面瘦惡色手太陽小腸之脈行於上體者循頰上䪼斜絡於顴故其血氣之盛衰皆形見於須面之間也手太陽之下血氣盛則掌肉充滿血氣皆少則掌瘦以寒手太陽之脈行於下體者循手外側上腕故其形見者如此首言五形者以臟為主而言其稟此言六陽者以腑為表而言其形稟質相合象變斯具矣此所以有左右上下之分也刺之有約美眉者足太陽之脈氣血多惡眉者氣血少其肥而澤者血氣有餘肥而不澤者氣有餘血不足瘦而無澤者氣血俱不足審察其形氣有餘不足而調之可以知逆順矣此言足太陽一經之盛衰而他經之有餘不足亦由是也審察既明而後調之則不失其逆順矣刺其諸陰陽按其寸口人迎以調之寸口在手太陰脈也人迎在頭陽明脈也太陰行氣於三陰陽明行氣於三陽故按其寸口人迎而可以調陰陽也切循其經絡之凝澀結而不通者此於身皆為痛痹甚則不行故凝澀切深也循察也經絡為病身必痛痹甚則血氣不行故脈道凝澀也凝澀者致氣以溫之血和乃止其結絡者脈結血不行決之乃行血脈凝澀氣不至也故當留針以補而致其氣以溫之致使之至也決者開泄之謂氣有餘於上者導而下之氣有餘於上者病必在上故當刺其穴之在下者以導而下之導引也氣不足於上者推而休之氣不足於上者即刺其在上之穴仍推其針而休息之休者留針以待氣也其稽留不至者因而迎之稽留不至言氣至之遲滯者接之引之而使其必來也迎去聲凡物未來而迓之使來也必明於經隧乃能持之寒與熱爭者導而行之其菀陳血不結者則而豫之隧道也必明經脈之道路而後能執持之也其有寒熱不和者因其偏而導去之脈道雖有菀陳而血不結者則其勢而豫治之則度也豫與同菀郁同必先明知二十五人則血氣之所在左右上下刺約畢也凡刺之道須明血氣故必知此二十五人之脈理而刺之大約可以盡矣
