body:
  text: 卷三經絡下第五十五別絡者手太陰之別名曰列缺起於腕上分間並太陰之經直入掌中散入於魚際此下即十五絡穴也不曰絡而曰別者以本經由此穴而別走鄰經也手太陰之絡名列缺在腕後一寸五分上側分肉間太陰自此別走陽明者其太陰本經之脈由此直入掌中散於魚際也人或有寸關尺三部脈不見自列缺至陽溪見者俗謂之反關脈此經脈虛而絡脈滿千金翼謂陽脈逆反大於氣口三倍者是也其病實則手鋭掌熱虛則缺㰦小便遺數取之去腕半寸別走陽明也掌後高骨為手鋭骨實為邪熱有餘故手鋭掌熱缺㰦張口伸腰也虛因肺氣不足故為缺㰦及小便遺而且數體倦則呻志倦則㰦也治此者取列缺實可瀉之虛可補之諸經准此半寸當作寸半此太陰之絡別走陽明而陽明之絡曰偏歷亦入太陰以其相為表裡故互為注絡以相通也他經皆然㰦音去手少陰之別名曰通里去腕一寸半別而上行循經入於心中系舌本屬目系其實則支膈虛則不能言取之掌後一寸別走太陽也手少陰之絡名通里在腕後一寸陷中別走手太陽者也此經入心下膈故邪實則支膈謂膈間若有所支而不暢也其支者上系舌本故虛則不能言當取通里以治之也手心主之別名曰內關去腕二寸出於兩筋之間循經以上繫於心包絡心系實則心痛虛則為頭強取之兩筋間也手厥陰之絡名內關在掌後去腕二寸兩筋間別走手少陽者也此經繫心包絡心系又出耳後合少陽完骨之下故邪實則心痛虛則頭強不利也皆取內關以治之手太陽之別名曰支正上腕五寸內注少陰其別者上走肘絡肩髃實則節弛肘廢虛則生疣小者如指痂疥取之所別也手太陽之絡名支正在腕後五寸走臂內側注手少陰者也此經走肘絡肩故邪實則脈絡壅滯而節弛肘廢正虛則血氣不行大則為疣小則為指間痂疥之類取之所別即支正也疣音尤贅瘤也手陽明之別名曰偏歷去腕三寸別入太陰其別者上循臂乘肩髃上曲頰偏齒其別者入耳合於宗脈實則齲聾虛則齒寒痹膈取之所別也手陽明之絡名偏歷在腕後三寸上側間別走手太陰者也按本經筋脈皆無入耳上目之文惟此別絡有之宗脈者脈聚於耳目之間者也齲齒蠹病也此經上曲頰偏齒入耳絡肺下膈故實則為齒齲耳聾虛則為齒寒內痹而膈治此者當取所別之偏歷齲耳雨切手少陽之別名曰外關去腕二寸外繞臂注胸中合心主病實則肘攣虛則不收取之所別也手少陽之絡名外關在腕後二寸兩筋間別走手厥陰心主者也此經繞臂故為肘攣及不收之病治此者當取所別之外關足太陽之別名曰飛揚去踝七寸別走少陰實則鼽窒頭背痛虛則鼽衄取之所別也足太陽之絡名飛揚在足外踝上七寸別走足少陰者也此經起於目內眥絡腦行頭背故其為病如此治此者當取所別之飛揚鼽音求鼻塞也足少陽之別名曰光明去踝五寸別走厥陰下絡足跗實則厥虛則痿躄坐不能起取之所別也足少陽之絡名光明在外踝上五寸別走足厥陰者也此經下絡足跗故為厥為痿躄治此者當取所別之光明躄音璧足不能行也足陽明之別名曰豐隆去踝八寸別走太陰其別者循脛骨外廉上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痹瘁喑實則狂癲虛則足不收脛枯取之所別也足陽明之絡名豐隆在外踝上八寸別走足太陰者也此經循喉嚨入缺盆胃為五臟六腑之海而喉嗌缺盆為諸經之孔道故合諸經之氣下絡喉嗌而為病如此治之者當取所別之豐隆也足太陰之別名曰公孫去本節之後一寸別走陽明其別者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則鼓脹取之所別也足太陰之絡名公孫在足大指本節後一寸別走足陽明者也厥氣者脾氣失調而或寒或熱皆為厥氣逆而上行則為霍亂本經入腹屬脾入胃故其所病如此治此者當取所別之公孫也足少陰之別名曰大鐘當踝後繞跟別走太陽其別者並經上走於心包下外貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所別也足少陽之絡名大鐘在足跟後骨上兩筋間別走足太陽者也前十二經脈言本經從肺出絡心此言上走心包下外貫腰脊故其為病如此而治此者當取所別之大鐘也足厥陰之別名曰蠡溝去內踝五寸別走少陽其別者循脛上睪結於莖其病氣逆則睪腫卒疝實則挺長虛則暴癢取之所別也足厥陰之絡名蠡溝在足內踝上五寸別走足少陽者也本經絡陰器上睪結於莖故其所病如此而治此者當取所別之蠡溝莖陰莖也任脈之別名曰尾翳下鳩尾散於腹實則腹皮痛虛則癢瘙取之所別也尾當作屏任脈之絡名屏翳即會陰穴在大便前小便後兩陰之間任督沖三脈所起之處此經由鳩尾下行散於腹故其為病如此而治之者當取所別之會陰督脈之別名曰長強挾膂上項散頭上下當肩胛左右別走太陽入貫膂實則脊強虛則頭重高搖之挾脊之有過者取之所別也督脈之絡名長強在尾骶骨端別走任脈足少陰者也此經上頭項走肩背故其病如此頭重高搖之謂力弱不勝而顫掉也治此者當取所別之長強脾之大絡名曰大包出淵腋下三寸布胸脅實則身盡痛虛則百節盡皆縱此脈若羅絡之血者皆取之脾之大絡脈也脾之大絡名大包在淵腋下三寸布胸脅出九肋間總統陰陽諸絡由脾灌溉五臟者也故其為病如此羅絡之血者言此大絡包羅諸絡之血故皆取脾之大絡以去之大絡即大包也凡此十五絡者實則必見虛則必下視之不見求之上下人經不同絡脈異所別也十二經共十二絡而外有任督二絡及脾之大絡是為十五絡也凡人之十二經脈伏行分肉之間深不可見其脈之浮而可見者皆絡脈也然又必邪氣盛者脈乃壅盛故實則必見正氣虛者脈乃陷下而視之不見矣故當求上下諸穴以相印證而察之也蓋以人經有肥瘦長短之不同絡脈亦異其所別故不可執一而求也按足太陰之別名曰公孫絡名大包足陽明之別名曰豐隆絡名虛里諸經之絡惟一脾胃之絡各二蓋以脾胃為臟腑之本而十二經皆以受氣者也經脈筋絡本明針灸之理而行藥治病之要一以貫之至於氣穴溪谷井滎腧合等法專言針灸者另有全書祖述之此不備焉經脈十二而手太陰足少陰陽明獨動不休是明胃脈也胃為五臟六腑之海其清氣上注於肺肺氣從太陰而行之其行也以息往來故人一呼脈再動一吸脈亦再動呼吸不已故動而不止手足之脈共十二經然惟手太陰足少陰足陽明三經獨多動脈而三經之脈則手太陰之太淵足少陰之太溪足陽明上則人迎下則衝陽皆動之尤甚者也是明胃脈者言三經之動皆因於胃氣也氣之過於寸口也上十息下八伏盛衰不等難窮往還寸口手太陰脈也上下言進退之勢也十八喻盛衰之形也此其往還之道真有難窮者而氣之離臟也卒然如弓弩之發如水之下岸上於魚以反衰其餘氣衰散以逆上故其行微凡脈氣之內發於臟外達於經其卒然如弓弩之發如水之下岸言其徑鋭之氣不可遏也然強弩之末其力必柔急流之末其勢必緩故脈由寸口以上魚際盛而反衰其餘氣以衰散之勢而逆上故其行微此脈氣之盛衰所以不等也足陽明之動胃氣上注於肺其悍氣上衝頭者循咽上走空竅循眼系入絡腦出顑下客主人循牙車合陽明並下人迎此胃氣別走於陽明者也胃氣上注於肺而其悍氣之上頭者循咽喉上行從眼系入絡腦出顑下會於足少陽之客主人以及牙車乃合於陽明之本經並下人迎之動脈此內為胃氣之所發而外為陽明之動也牙車即曲牙頰車也顑痛刺足陽明曲周動脈見血立已治狂者取頭兩顑當在腦之下鬢之前客主人之上其即鬢骨之上兩太陽之間為顑也顑音坎又海敢切陰陽上下其動也若一故陽病而陽脈小者為逆陰病而陰脈大者為逆陰陽俱靜俱動若引繩相傾者病陰陽上下者統上文手太陰而言也蓋胃氣上注於肺本出一原雖胃為陽明脈上出於人迎肺為太陰脈下出於寸口而其氣本相貫故彼此之動其應若一也然人迎屬腑為陽陽病則陽脈宜大而反小者為逆寸口屬臟為陰陰病則陰脈宜小而反大者為逆故氣口候陰人迎候陽也是以陰陽大小脈各有體設陰陽不分而或為俱靜或為俱動若引繩之勻者則其陰陽之氣非此即彼必有偏傾而致病者矣足少陰之動衝脈者十二經之海也與少陰之大絡起於腎下出於氣街循陰股內廉斜入膕中循脛骨內廉並少陰之經下入內踝之後入足下其別者斜入踝出屬跗上入大指之間注諸絡以溫足脛此脈之常動者也足少陰之脈動者以衝脈與之並行也衝脈亦十二經之海與少陰之絡同起於腎下出於足陽明之氣衝循陰股膕中內踝等處以入足下其別者斜出屬跗上注諸絡以溫足脛此太溪等脈所以常動不已也營衛之行也上下相貫如環之無端今有其卒然遇邪氣及逢大寒手足懈惰其脈陰陽之道相輸之會行相失也氣何由還營衛之行陰陽有度若邪氣居之則其運行之道宜相失也又何能往還不絶夫四末陰陽之會者此氣之大絡也四街者氣之徑路也故絡絶則徑通四末解則氣從合相輸如環終而復始也四末四肢也十二經皆終始於四肢故曰陰陽之會而為氣之大絡也然大絡雖會於四肢復有氣行之徑路謂之四街所謂氣街者是也凡邪之中人多在大絡故絡絶則徑通及邪已行而四末解彼絶此通氣從而合回環轉輸何能相失此所以如環無端也夫人之常數太陽常多血少氣少陽常少血多氣陽明常多氣多血少陰常少血多氣厥陰常多血少氣太陰常多氣少血此天之常數十二經血氣各有多少不同乃天稟之常數凡治病當詳察血氣而為之補瀉也按屢言血氣之數三陽皆同三陰皆異考之他條微有舛誤當以此節為正足太陽與少陰為表裡少陽與厥陰為表裡陽明與太陰為表裡是為足陰陽也足太陽膀胱也足少陰腎也是為一合足少陽膽也足厥陰肝也是為二合足陽明胃也足太陰脾也是為三合陽為腑經行於足之外側陰為臟經行於足之內側此足之表裡也手太陽與少陰為表裡少陽與心主為表裡陽明與太陰為表裡是為手之陰陽也手太陽小腸也手少陰心也是為四合手少陽三焦也手心主厥陰也是為五合手陽明大腸也手太陰肺也是為六合陽為腑經行於手之外側陰為臟經行於手之內側此手之表裡也知手足陰陽所苦去其苦伺所欲瀉有餘補不足燮理錚錚矣諸脈者皆屬於目目者宗脈之所聚也故諸脈者皆屬於目諸髓者皆屬於腦腦為髓海故諸髓皆屬之諸筋者皆屬於節筋力堅強所以連屬骨節久行傷筋以諸筋皆屬於節故也諸血者皆屬於心心生血主血脈故諸血皆屬於心諸氣者皆屬於肺肺藏氣其大氣之搏而不行者積於胸中命曰氣海出於肺循喉咽故呼則出吸則入此諸氣之皆屬於肺也此四肢八溪之朝夕也四肢兩手兩足也八溪者手有肘與腋足有胯與膕也此四肢之關節故稱為溪朝夕者言人之諸脈髓筋血氣無不由此出入而朝夕運行不離也故人臥血歸於肝人寤則動動則血隨氣行陽分而運於諸經人臥則靜靜則血隨氣行陰分而歸於肝以肝為藏血之臟也故人凡寐者其面色多白以血藏故耳肝受血而能視肝開竅於目肝得血則神聚於目故能視足受血而能步足得之則神在足故步履健矣掌受血而能握掌得之則神在手故把握固矣指受血而能攝指得之則神在指故攝指強矣血氣者人之神也但言血而不言氣何也蓋氣屬陽而無形血屬陰而有形而人之形體以陰而成人之所以生成者血脈也血者神氣也血脈和則精神乃居故此皆言血者謂神依形生用自體出也臥出而風吹之血凝於膚者為痹臥出之際若玄府未閉魄汗未藏者為風所吹則血凝於膚或致麻木或生疼痛而病為痹凝於脈者為泣風寒外襲血凝於脈則脈道泣滯而為病也凝於足者為厥四肢為陽諸之本風寒客之而血凝於足則陽衰陰勝而氣逆為厥也此三者血行而不得反其空故為痹厥也血得熱則行得寒則凝凡風寒所客則血脈凝澀不能運行而反其空故為痹厥之病也空孔同謂血行之道五臟常內閲於上七竅也閲歷也五臟位次於內而氣達於外故閲於上之七竅人身共有九竅上者七下者二是也故肺氣通於鼻肺和則鼻能知臭香矣心氣通於舌心和則舌能知五味矣肝氣通於目肝和則目能辨五色矣脾氣通於口脾和則口能知五穀矣腎氣通於耳腎和則耳能聞五音矣其氣各有所通亦各有所用然必五臟氣和而後各稱其職否則臟有所病則竅有所應矣五臟不和則七竅不通六腑不和則留為癰五臟屬陰主裡故其不和則七竅為之不利六腑屬陽主表故其不利則肌腠留為癰瘍矣邪在腑則陽脈不和陽脈不和則氣留之氣留之則陽氣盛矣陽氣太盛則陰不利陰脈不利則血留之血留之則陰氣盛矣陰氣太盛則陽氣不能榮也故曰關陽氣太盛則陰氣不能榮也故曰格陰陽俱盛不得相榮故曰關格關格者不得盡期而死也陰陽之氣貴乎和平邪氣居之不在於陰必在於陽故邪氣在腑則氣留之而陽勝陽勝則陰病矣陰病則血留之而陰勝陰勝則陽病矣故陰氣太盛則陽氣不榮而為關陽氣太盛則陰氣不榮而為格陰陽俱勝不得相榮故陰自陰陽自陽不相浹洽而為關格故不得盡天年而死矣人迎盛者為格陽寸口盛者為關陰人受氣於谷谷入於胃以傳於肺五臟六腑皆以受氣人之生由乎氣氣者所受於天與穀氣並而充身者也故穀食入胃化而為氣是為穀氣亦曰胃氣此氣出自中焦傳化於脾上歸於肺積於胸中氣海之間乃為宗氣宗氣之行以息往來通達三焦而五臟六腑皆以受氣是以胃為水穀血氣之海而人所受氣者亦唯谷而已故谷不入半日則氣衰一日則氣少矣其清者為營濁者為衛穀氣出於胃而氣有清濁之分清者水穀之精氣也濁者水穀之悍氣也清者屬陰其性精專故化生血脈而周行於經隧之中是為營氣濁者屬陽其性慓疾滑利故不循經絡而直達肌表充實於皮毛分肉之間是為衛氣然營氣衛氣無非資藉於宗氣故宗氣盛則榮衛和宗氣衰則營衛弱矣營在脈中衛在脈外營營運於中也衛護衛於外也脈者非氣非血其猶氣血之橐籥也營屬陰而主裡衛屬陽而主表故營在脈中衛在脈外其浮氣之不循經者為衛氣其精氣之行於經者為營氣營周不休五十而復大會陰陽相貫如環無端營氣之行周流不休凡一晝一夜五十周於身而復為大會其十二經脈之次則一陰一陽一表一里迭行相貫終而復始故曰如環無端也衛氣行於陰二十五度行於陽二十五度分為晝夜故氣至陽而起至陰而止衛氣之行夜則行陰分二十五度晝則行陽分二十五度凡一晝一夜亦五十周於身氣至陽而起至陰而止晝興夜息之義故曰日中而陽隴為重陽夜半而陰隴為重陰此分晝夜之陰陽以明營衛之行也隴盛也晝為陽日中為陽中之陽故曰重陽夜為陰夜半為陰中之陰故曰重陰隴音籠故太陰主內太陽主外各行二十五度分為晝夜太陰手太陰也太陽足太陽也內言營氣外言衛氣營氣始於手太陰而復會於太陰故太陰主內衛氣始於足太陽而復會於太陽故太陽主外營氣周流十二經晝夜各二十五度衛氣晝則行陽夜則行陰亦各二十五度營衛各為五十度以分晝夜也夜半為陰隴夜半後而為陰衰平旦陰盡而陽受氣矣日中為陽隴日西而陽衰日入陽盡而陰受氣矣夜半後為陰衰陽生於子也日西而陽衰陰生於午也平旦至日中天之陽陽中之陽也日中至黃昏天之陽陽中之陰也合夜至雞鳴天之陰陰中之陰也雞鳴至平旦天之陰陰中之陽也故人亦應之夜半而大會萬民皆臥命曰合陰平旦陰盡而陽受氣如是無已與天地同紀大會言營衛陰陽之會也營衛之行表裡異度故常不相值惟於夜半子時陰氣已極陽氣將生營氣在陰衛氣亦在陰故萬民皆瞑而臥命曰合陰合陰者營衛皆歸於臟而會於天一之中也平旦陰盡而陽受氣故民皆張目而起此陰陽消息之道常如是無已而與天地同其紀所謂天地之紀者如天地日月各有所會之紀也天以二十八舍為紀地以十二辰次為紀日月以行之遲速為紀故天與地一歲一會如玄枵加於子宮是也天與日亦一歲一會如冬至日躔星紀是也日與月則一月一會如晦朔之同宮是也人之營衛以晝夜為紀故一日凡行五十周而復為大會焉老人不夜瞑少壯之人不晝瞑壯者之血氣盛其肌肉滑氣道通營衛之行不失其常故晝精而夜瞑老者之氣血衰其肌肉枯氣道澀五臟之氣相摶其營氣衰少而衛氣內伐故晝不精夜不瞑老者之氣血衰故肌肉枯氣道澀五臟之氣摶聚不行而營氣衰少矣營氣衰少故衛氣乘虛內伐衛失其常故晝不精營失其常故夜不瞑也營出於中焦衛出於下焦營氣者由谷入於胃中焦受氣取汁化其精微而上注於肺乃自手太陰始周行於經隧之中故營氣出於中焦衛氣者出其悍氣之慓疾而先行於四末分肉皮膚之間不入於脈故於平旦陰盡陽氣出於目循頭項下行始於足太陽膀胱經而行於陽分日西陽盡則始於足少陰腎經而行於陰分其氣自膀胱與腎由下而出故衛氣出於下焦按人身不過表裡表裡不過陰陽陰陽即營衛營衛即血氣臟腑筋骨居於內必賴營氣以資之經脈以疏之皮毛分肉居於外經之所不通營之所不及故賴衛氣以詬之孫絡以濡之而後內而精髓外而髮膚無勿得其養者皆營衛之化也衛氣屬陽乃出於下焦下者必升故其氣自下而上亦猶地氣上為云也營本屬陰乃自中焦而出於上焦上者必降故營氣自上而下亦猶天氣降為雨也雖衛主氣而在外然亦何嘗無血營主血而在內然亦何嘗無氣故營中未必無衛衛中未必無營但行於內者謂之營行於外者謂之衛此人身陰陽交感之道分之則二合之則一而已上焦出於胃上口並咽以上貫膈而布胸中走腋循太陰之分而行還至陽明上至舌下足陽明胃上口即上脘也咽為胃系水穀之道路也膈上曰胸中即膻中也其旁行者走兩腋出天池之次循手太陰肺經之分而還於手陽明其上行者至於舌其下行者交於足陽明以行於中下二焦皆上焦之部分也常與營俱行於陽二十五度行於陰亦二十五度一周也故五十度而復大會於手太陰矣上焦者肺之所居宗氣之所聚營氣者隨宗氣以行於十四經脈之中故上焦之氣常與營氣俱行於陽二十五度陰亦二十五度言晝夜周行五十度至次日寅時復會於手太陰肺經是為一周然則營氣雖出於中焦而施化則由於上焦也中焦亦並胃中出上焦之後此所受氣者泌糟粕蒸津液化其精微上注於肺脈乃化而為血以奉生身莫貴於此故獨得行於經隧命曰營氣後下也受氣者五穀入胃其糟粕津液宗氣分為三隧以注於三焦而中焦者泌糟粕蒸津液受氣取汁變化而赤是謂血以奉生身而行於經隧是為營氣故曰營出中焦下焦別回腸注膀胱則自膈膜之下至臍上一寸水分穴之上皆中焦之部分也泌音祕營衛者精氣也血者神氣也故血之與氣異名同類焉故奪血者無汗奪汗者無血人生有兩死而無兩生營衛之氣雖分清濁然皆水穀之精華故曰精氣血由化而赤莫測其妙故曰神氣然血化於液液化於氣是血之於氣本為同類而血之與汗亦非兩種但血主營為陰為里汗屬衛為陽為表一表一里無可並攻故奪血者無取其汗奪汗者無取其血若表裡俱奪則不脫於陰必脫於陽脫則死矣故曰人生有兩死然而人之生也陰陽之氣皆不可少未有孤陽能生亦未有孤陰能生者故曰無兩生也下焦者別回腸注於膀胱而滲入焉故水穀者常並居於胃中成糟粕而俱下於大腸而成下焦滲而俱下濟泌別汁循下焦而滲入膀胱焉回腸大腸也濟泲同猶釃濾也泌如狹流也別汁分別清濁也別回腸者謂水穀並居於胃中傳化於小腸當臍上一寸水分穴處糟粕由此別行回腸從後而出津液由此別滲膀胱從前而出膀胱無上口故云滲入凡自水分穴而下皆下焦之部分也下焦者當膀胱上口主分別清濁其言上口者以滲入之處為言非真謂有口也如果有口則不言滲入矣釃音篩人飲酒酒亦入胃谷未熟而小便獨先下酒者熟谷之液也其氣悍以清故後谷而入先谷而液出焉酒之氣悍則直連下焦酒之質清則速行無滯故後谷而入先谷而出也上焦如霧中焦如漚下焦如瀆此之謂也如霧者氣浮於上也言宗氣積於胸中司呼吸而布濩於經隧之間如天之霧故曰上焦如霧也漚者水上之泡水得氣而不沉者也言營血化於中焦隨氣流行以奉生身如漚處浮沉之間故曰中焦如漚也瀆者水所注泄言下焦主出而不納逝而不及故曰下焦如瀆也然則肺司霧脾司漚大腸膀胱司川瀆之化也三焦者本全體之大臟統上中下而言也發明之處不啻再四難經謂三焦有名無形遂起後世之疑莫能辨正觀此則明且悉矣任脈者起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目以下任沖督脈皆奇經也中極任脈穴名在曲骨上一寸中極之下即胞宮之所任沖督三脈皆起於胞宮而出於會陰之間任由會陰而行於腹督由會陰而行於背沖由會陰出並少陰而散於胸中故此自毛際行腹裡關元上至咽喉面目者皆任脈之道也衝脈者起於氣街並少陰之經挾臍上行至胸中而散起言外脈之所起非發源之謂也下仿此氣街即氣衝足陽明經穴在毛際兩旁衝脈起於氣街並足少陰之經合於橫骨大赫等十一穴挾臍上行至胸中而散此言衝脈之前行者也然少陰之脈上股內後廉貫脊屬腎衝脈亦入脊內為伏沖之脈然則衝脈之後行者當亦並少陰無疑也所謂伏沖者以其最深也故凡十二經之氣血此皆受之榮養周身所以為五臟六腑經脈之海也任脈為病男子內結七疝女子帶下瘕聚任脈自前陰上毛際行腹裡故男女之為病如此帶下赤白帶下也瘕癥瘕也聚積聚也衝脈為病逆氣裡急衝脈挾臍上行至於胸中故其氣不順則膈塞逆氣血不和則胸腹裡急也督脈為病脊強反折督脈貫於脊中故令脊強反折而屈伸不利督脈者起於少腹以下骨中央女子入系廷孔此下皆言督脈也少腹小腹也胞宮之所居骨中央橫骨下近外之中央也廷正也直也言正中之直孔即溺孔也其孔溺孔之端也女人溺孔在前陰中橫骨之下孔之上際謂之端乃督脈外起之所此雖以女子為言然男子溺孔亦在橫骨下中央第為宗筋所函故不見耳溺娘吊切其絡循陰器合篡間繞篡後督脈別絡自溺孔之端循陰器分行向後復合於篡間乃又自篡間分而為二繞行於篡之後篡交篡之義謂兩便爭行之所即前後二陰之間也篡初患切別繞臀至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎足少陰之脈上股內後廉足太陽之脈外行者過髀樞中行者挾脊貫臀故此督脈之別絡自篡後繞臀至股內後廉少陰之分與巨陽中絡者合少陰之脈並行而貫脊屬腎也與太陽起於目內眥上額交巔上入絡腦還出別下項循肩髆內挾脊抵腰中入循膂絡腎此亦督脈之別絡並足太陽之經上頭下項挾脊抵腰中復絡於腎若其直行者自尻上循脊裡上頭由鼻而至於人中也其男子循莖下至篡與女子等其少腹直上者貫臍中央上貫心入喉上頤環唇上系兩目之下中央按此自少腹直上者皆任脈之道而列為督脈蓋任脈衝脈皆起於胞中上循背裡為經絡之海則前亦督而後亦任也任脈循背謂之督脈自少腹直上者謂之任脈亦謂之督脈是以背腹分陰陽而言任督若三脈者名雖異而體則一耳故任沖督一源而三歧也此生病從少腹上衝心而痛不得前後為沖疝此督脈自臍上貫於心故其為病如此名為沖疝蓋兼沖任而為病者不得前後即倉公所謂不得前後溲也女子不孕癃痔遺溺嗌乾在女子為不孕癃痔遺溺嗌乾等證雖皆由此督脈所生而實亦任沖之病任脈者女子得之以任養也衝脈者以其氣上衝也督脈者以其督領經脈之海也此三脈皆由陰中而上行故其為病如此督脈生病治督脈治在骨上甚者在臍下營骨上謂橫骨上毛際中曲骨穴也臍下營謂臍下一寸陰交穴也皆任脈之穴而治此督脈之病雖分三脈其所言治但云督而不云任沖所用之穴亦以任為督可見三脈一體督即任沖之綱領任沖即督之別名耳略舉針石以言則用藥之法該乎此矣蹺脈者少陰之別起於然骨之後少陰之別足少陰腎經之別絡也然骨之後照海也足少陰穴即陰蹺之所生此言陰蹺之起而未及陽蹺陽蹺脈者起於跟中循外踝上行入風池陰蹺者亦起於跟中循內踝上行至咽喉交貫衝脈故陰蹺為足少陰之別起於照海陽蹺為足太陽之別起於申脈也上內踝之上直上循陰股入陰上循胸裡入缺盆上出人迎之前入頄屬目內眥合於太陽陽蹺而上行氣並相還則為濡目氣不榮則目不合蹺脈自內踝直上陰股入陰循胸裡者皆並足少陰而上行也然足少陰之直者循喉嚨而挾舌本此則入缺盆上出人迎之前入頄屬目內眥以合於足太陽之陽蹺是蹺脈有陰陽之異也陰蹺陽蹺之氣並行回環而濡潤於目若蹺氣不榮則目不能合故曰陰蹺陽蹺陰陽相交陽入陰陰出陽交於目鋭眥陽氣盛則瞋目陰氣盛則瞑目此所以目之瞑與不瞑皆蹺脈為之主也其氣之行也如水之流如日月之行故陰脈榮其臟陽脈榮其腑陰榮其臟指陰蹺也陽榮其腑指陽蹺也言無分臟腑蹺脈皆所必至也男子數其陽女子數其陰當數者為經其不當數者為絡也蹺脈陰陽之數男女各有所屬男屬陽當數其陽女屬陰當數其陰故男子以陽蹺為經陰蹺為絡女子以陰蹺為經陽蹺為絡也三陰三陽之離合也聖人南面而立前曰廣明後曰太衝云聖人者素人道之大宗也南面而立者正陰陽之向背也任脈循腹裡至咽喉上頤循面入目衝脈循背裡出頏顙其輸上在於大杼分言之則任行乎前而會於陽明沖行乎後而為十二經脈之海故前曰廣明後曰太衝合言之則任沖名位雖異而同出一原通乎表裡此腹背陰陽之離合也太衝之地名曰少陰少陰之上名曰太陽太陽根起於至陰結於命門名曰陰中之陽衝脈並少陰而行故太衝之地為少陰地者次也有少陰之裡則有太陽之表陰氣在下陽氣在上故少陰經起於小指之下太陽經止於小指之側故曰少陰之上名太陽也太陽之脈起於目止於足下者為根上者為結故曰根於至陰結於命門命門者目也此以太陽而合於少陰故為陰中之陽然離則陰陽各其經合則表裡同其氣是為水臟陰陽之離合也下仿此中身而上名曰廣明廣明之下名曰太陰太陰之前名曰陽明陽明根起於厲兌名曰陰中之陽中身身之中半也中身而上心之所居必屬火而通神明故亦曰廣明心臟之下太陰脾也故廣明之下名曰太陰太陰之表陽明胃也故太陰之前名曰陽明陽明脈止於足之次指與太陰為表裡故曰根起於厲兌為陰中之陽此土臟陰陽之離合也厥陰之表名曰少陽少陽根起於竅陰名曰陰中之少陽少陽與厥陰為表裡而少陽止於足之小指次指端故厥陰之表為陰中之少陽也所謂少者以厥陰氣盡陰盡而陽始故曰少陽此木臟陰陽之離合也是故三陽之離合也太陽為開陽明為闔少陽為樞此總三陽為言也太陽為開謂陽氣發於外為三陽之表也陽明為闔謂陽氣蓄於內為三陽之裡也少陽為樞謂陽氣在表裡之間可出可入如樞機也三經者不得相失也搏而勿浮命曰一陽三經者言陽經也陽從陽類不得相失也其為脈也雖三陽各有其體然陽脈多浮若純於浮則為病矣故但欲搏手有力得其陽和之象而勿至過浮是為三陽合一之道故命曰一陽此三陽脈之離合也外者為陽內者為陰然則中為陰外者為陽言表也內者為陰言里也然則中為陰總言屬裡者為三陰如下文也其衝在下名曰太陰太陰根起於隱白名曰陰中之陰其衝在下名曰太陰以太陰居衝脈之上也上曰廣明之下名曰太陰廣明以心為言衝脈並腎而言蓋心脾腎三臟心在南脾在中腎在北也凡此三陽三陰皆首言衝脈者以沖為十二經脈之海故先及之以舉其綱領也太陰起於足大指故根於隱白以太陰而居陰分故曰陰中之陰太陰之後名曰少陰少陰根起於湧泉名曰陰中之少陰脾下之後腎之位也故太陰之後名曰少陰少陰脈起於小指之下斜趨足心故根於湧泉穴腎本少陰而居陰分故為陰中之少陰少陰之前名曰厥陰厥陰根起於大敦陰之絶陽名曰陰之絶陰腎前之上肝之位也故曰少陰之前名曰厥陰厥陰起於足大指故根於大敦絶盡也此陰極之經故曰陰之絶陽又曰陰之絶陰是故三陰之離合也太陰為開厥陰為闔少陰為樞此總三陰為言亦有內外之分也太陰為開居陰分之表也厥陰為闔居陰分之裡也少陰為樞居陰分之中也開者主出闔者主入樞者主出入之間亦與三陽之義同三經者不得相失也搏而勿沉名曰一陰三經皆陰陰脈皆沉不得相失也若過於沉則為病矣故但宜沉搏有神各得其陰脈中和之體是為三陰合一之道故名曰一陰此三陰脈之離合也按所言惟足經陰陽而不及手經者何也人之腰以上為天腰以下為地言足則通身上下經氣皆盡而手在其中矣故不必言手也然足為陰故於三陽也言陰中之陽三陰也言陰中之陰然則手經亦有離合其在陽經當為陽中之陽其在陰經當為陰中之陰可類推矣皮有分部以經脈為紀皮之有部紀以經脈因經以察部則脈而知之也陽明之陽名曰害蜚害損也蜚古飛字陽明之陽釋陽明下准此害蜚者以後心主之陰名曰害肩者相對陽明兩陽合明也厥陰兩陰交盡也蓋三陽之陽惟陽明為盛故曰合明三陰之陰惟厥陰為盛故曰交盡此云蜚者飛揚也言陽明盛而浮也凡盛極者必損故陽之盛也在陽明陽之損也亦在陽明是以陽明之陽名曰害蜚上下同法視其部中有浮絡者皆陽明之絡也上者言手大腸經也下者言足胃經也二經皆屬陽明故視察之法相同凡其上下部中有浮絡之見者皆陽明之絡也其色多青則痛多黑則痹黃赤則熱多白則寒五色皆見則寒熱也絡盛則入客於經陽主外陰主內此因陽明浮絡之色而察陽明經病之異也凡病之始生必自淺而後深故絡脈之邪盛而後入於經脈絡為陽故主外經為陰故主內內有陰陽外亦有陰陽在內者五臟為陰六腑為陽在外者筋骨為陰皮膚為陽也凡後六經之上下五色之為病其陰陽內外皆同此少陽之陽名曰持樞樞機也持主持也樞少陽居三陽表裡之間如樞之運而持其出入之機故曰樞持上下同法視其部中有浮絡者皆少陽之絡也絡盛則入客於經故在陽者主內在陰者主出以滲於內諸經皆然上者手少陽三焦經也下者足少陽膽經也凡二經部中有浮絡之見於外者皆少陽之絡也其五色為病皆與陽明者同然邪必由絡入經故其在陽者主內言自陽分而入於內也在陰者主出以滲於內言出於經而滲入於臟也此邪氣之序諸經皆然出進也非外出之謂下文少陰經云其出者從陰內注於骨與此出字義同太陽之陽名曰關樞關衛固也少陽為三陽之樞展布陽氣於中太陽則衛固其氣而約束於外故曰關樞上下同法視其部中有浮絡者皆太陽之絡也絡盛則入客於經上者手太陽小腸經下者足太陽膀胱經二經色病皆如前少陰之陰名曰樞儒儒柔也順也少陰為三陰開闔之樞而陰氣柔順故名曰樞儒上下同法視其部中有浮絡者皆少陰之絡也絡盛則入客於經其入經也從陽部注於經其出者從陰內注於骨上者手少陰心經下者足少陰腎經二經色病俱如前其入也從陽部注於經即自絡入經之謂其出者從陰內注於骨謂出於經而入於骨即前少陽經在陰者主出以滲於內之義也心主之陰名曰害肩心主之陰手厥陰之陰也厥陰者兩陰交盡陰之極也肩任也載也陽主乎運陰主乎載陰盛之極其氣必傷是陰之盛也在厥陰陰之傷也亦在厥陰故曰害肩然則陽明曰害蜚此曰害肩者即陰極陽極之義上下同法視其部中有浮絡者皆心主之絡也絡盛則入客於經上者手厥陰心主也下者足厥陰肝經也二經色病皆如前此但言心主而又曰上下同法則肝經在所遺耳太陰之陰名曰關蟄關者固於外蟄者伏於中陰主藏而太陰衛之故曰關蟄上下同法視其部中有浮絡者皆太陰之絡也絡盛則入客於經上者手太陰肺經下者足太陰脾經二經色病皆如前凡言上下同法者括手足二經也凡十二經絡脈者皮之部也浮絡見於皮故曰皮之部是故百病之始生也必先於皮毛邪中之則腠理開開則入客於絡脈留而不去傳入於經留而不去傳入於腑廩於腸胃廩積也聚也邪之始入於皮也泝然起毫毛開腠理泝然豎起也寒栗貌腠理膚腠之文理也泝音素逆流曰泝其入於絡也則絡脈盛色變絡脈盛色變異於常也其入客於經也則感虛乃陷下感虛乃陷下言邪所客者必因虛乃深也其留於筋骨之間寒多則筋攣骨痛熱多則筋弛骨消肉爍䐃破毛直而敗攣急也弛縱緩也消枯竭也爍消爍也寒多則血脈凝澀故為筋攣骨痛熱多則真陰散亡故為筋弛骨消等症䐃破者反側多而熱漬肌肉也毛直而敗者液不足而皮毛枯槁也皮者脈之部察之於皮其脈可知故曰脈之部邪客於皮則腠理開開則邪入客於絡脈絡脈滿則注於經脈經脈滿則入舍於腑臟也故皮者有分部不與而生大病也言若不預為之治則邪將日深而變生大病也人有髓海有血海有氣海有水穀之海胃者水穀之海其輸上在氣街下至三里人受氣於水谷水穀入口藏於胃以養五臟氣故五臟六腑之氣味皆出於胃而胃為水穀之海也其胃氣運行之輸上者在氣街即氣衝穴下者至三里在膝下三寸衝脈者為十二經之海其輸上在於大杼下出於巨虛之上下廉此即血海也衝脈起於胞中其前行者並足少陰之經挾臍上行至胸中而散其後行者上循背裡為經絡之海其上行者出於頏顙下行者出於足故其輸上在於足太陽之大杼下在於足陽明之巨虛上下廉衝脈起於胞中陽明會於前陰故男女精血皆由前陰而降者以二經血氣總聚於此故均稱為五臟六腑十二經之海誠有非他經之可比也膻中者為氣之海其輸上在於柱骨之上下前在於人迎膻中胸中也肺之所居諸氣者皆屬於肺是為真氣亦曰宗氣宗氣積於胸中出於喉嚨以貫心脈而行呼吸故膻中為之氣海柱骨項後天柱骨也頏顙者分氣之所泄也故氣海運行之輸一在頏顙之後即柱骨之上下謂督脈之喑門大椎也一在頏顙之前謂足陽明之人迎也腦為髓之海其輸上在於其蓋下在風府凡骨之有髓惟腦為最巨故諸髓皆屬於腦而腦為髓之海蓋腦蓋骨也即督脈之囟會風府亦督脈穴此皆髓海之上下前後輸也氣海有餘者氣滿胸中悗息面赤氣海不足則少氣不足以言氣有餘者邪氣實也氣不足者正氣虛也下仿此氣海在胸中而屬陽故氣實則胸中悗悶喘息面熱而赤聲由氣發氣不足則語言輕怯不能出聲如言而微終日乃復言者此奪氣也悗母本切又音瞞血海有餘則常想其身大怫然不知其所病血海不足亦常想其身小狹然不知其所病形以血充故血有餘則常想其身大怫怫鬱也重滯不舒之貌血不足則常想其身小狹隘狹也索然不廣之貌此皆血海不調之為病病在血者徐而不顯故茫然不覺其所病怫音拂水穀之海有餘則腹滿水穀之海不足則飢不受穀食有餘者水穀留滯於中故腹為脹滿不足者脾虛則不能運胃虛則不能納故雖飢不受穀食髓海有餘則輕徑多力自過其度髓海不足則腦轉耳鳴脛酸眩冒目無所見懈怠安臥髓海充足即有餘也故身輕而徑便利多力自有過人之度而無病也若其不足則在上者為腦轉以腦空而運似旋轉也為耳鳴以髓虛者精必衰陰虛則耳鳴也為脛酸髓空無力也為眩冒忽不知人為目無所見怠惰安臥皆以髓為精類精衰則氣去而諸證以見矣審守其輸而調其虛實無犯其害順者得復逆者必敗審守其輸謂審察其輸穴無犯其害無盛盛無虛虛也順者得復逆者必敗戒夫天時人事皆宜慎而不可忽也標本第六六氣標本所從不同六氣者風寒暑濕火燥天之令也標末也本原也有從本者有從標本者有不從標本者也少陽太陰從本六氣少陽為相火是少陽從火而化故火為本少陽為標太陰為濕土是太陰從濕而化故濕為本太陰為標二氣之標本同故經病之化皆從乎本少陰太陽從本從標少陰為君火從熱而化故熱為本少陰為標是陰從乎陽也太陽為寒水從寒而化故寒為本太陽為標是陽從乎陰也二氣之標本異故經病之化或從乎標或從乎本也陽明厥陰不從標本從乎中也陽明為燥金從燥而化故燥為本陽明為標厥陰為風木從風而化故風為本厥陰為標但陽明與太陰為表裡故以太陰為中氣而金從濕土之化厥陰與少陽為表裡故以少陽為中氣而木從相火之化是皆從乎中也故從本者化生於本從標本者有標本之化從中者以中氣為化也六氣之太過不及皆能為病病之化生必有所因故或從乎本或從乎標或從乎中氣知其所從則治無失矣有脈從而病反者謂脈之陰陽必從乎病其有脈病不應而相反者也脈至而從按之不鼓諸陽皆然陽病見陽脈脈至而從也若浮洪滑大之類本皆陽脈但按之不鼓指下無力便非真陽之候不可誤認為陽凡諸陽證得此者似陽非陽皆然也故有為假熱有為格陽等證此脈病之為反也諸陰之反脈至而從按之鼓甚而盛也陰病見陰脈脈至而從矣若雖細小而按之鼓甚有力者此則似陰非陰也凡諸陰病而得此有為假寒有為格陰表裡異形所以為反凡此相反者皆標本不同也如陰脈而陽證本陰標陽也陽脈而陰證本陽標陰也故治病當必求其本百病之起有生於本者有生於標者有生於中氣者有取本而得者有取標而得者有取中氣而得者有取標本而得者有逆取而得者有從取而得者中氣中見之氣也如少陽厥陰互為中氣陽明太陰互為中氣太陽少陰互為中氣以其相為表裡故其氣互通也取求也病生於本者必求其本而治之病生於標者必求其標而治之病生於中氣者必求中氣而治之或生於標或生於本者必或標或本而治之取有標本治有逆從以寒治熱治真熱也以熱治寒治真寒也是為逆取以熱治熱治假熱也以寒治寒治假寒也是為從取逆正順也若順逆也病熱而治以寒病寒而治以熱於病似逆於治為順故曰逆正順也病熱而治以熱病寒而治以寒於病若順於治為反故曰若順逆也逆者正治從者反治知標與本用之不殆明知逆順正行無問不知是者不足以言用運用也殆危也正行執中而行不偏不倚也無問無所疑問以資惑亂也不有真見烏能及此故曰粗工嘻嘻以為可知言熱未已寒病復始同氣異形迷診亂經此之謂也粗工淺輩也嘻嘻自得貌妄謂道之易知故見標之陽輒從火治假熱未除真寒復起雖陰陽之氣若同而變見之形異粗工昧此未有不迷亂者矣夫陰陽逆從標本之為道也小而大言一而知百病之害少而多淺而博可以言一而知百也以淺而知深察近而知遠言標與本易而勿及此標本逆從陰陽之道似乎淺近言之雖易而實無能及者治反為逆治得為從此釋逆從為治之義得相得也猶言順也先病而後逆者治其本先逆而後病者治其本先寒而後生病者治其本先病而後生寒者治其本先熱而後生病者治其本有因病而致血氣之逆者有因逆而致變生之病者有因寒熱而生為病者有因病而生為寒熱者但治其所因之本原則後生之標病可不治而自愈矣先熱而後生中滿者治其標先病而後泄者治其本先泄而後生他病者治其本必且調之乃治其他病先病而後生中滿者治其標先中滿而後煩心者治其本諸病皆先治本而惟中滿者先治其標蓋以中滿為病其邪在胃胃者臟腑之本也胃滿則藥石之氣不能行而臟腑皆失其所稟故先治此者亦所以治本也人有客氣有同氣客氣者流行之運氣也往來不常故曰客氣同氣者四時之主氣也歲歲相同故曰同氣氣有不和則客氣同氣皆令人病矣小大不利治其標小大利治其本無論客氣同氣之為病即先有他病而後為小大不利者亦先治其標諸皆治本此獨治標蓋二便不通乃危急之候雖為標病必先治之此所謂急則治其標也凡諸病而小大利者皆當治本無疑矣先小大不利而後生病者治其本二便不利皆為急證故無論標本即當先治按治本者十之八九治標者惟中滿及小大不利二者而已蓋此二者亦不過因其急而不得不先之也如治病必求於本必字即中滿及小大不利二證亦有急與不急之分而先後乎其間者何今之醫動稱急則治其標緩則治其本正不知孰為可緩孰為最急顛倒錯認但見其舉手誤人耳況二便之治小便尤難但知氣化則能出矣之意則大腸之血燥者不在硝黃而膀胱之氣閉者又豈在五苓之類病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本此以病氣強弱而言標本也如病發之氣有餘則必侮及他臟他氣而因本以傳標故必先治其本病發之氣不足則必受他臟他氣之侮而因標以傳本故心先治其標蓋亦治所從生也謹察間甚以意調之間者並行甚者獨行間者言病之淺甚者言病之重也病淺者可以兼治故曰並行病甚者難容雜亂故曰獨行蓋治不精專為法之大忌故當加意以調之也又病輕者邪氣與元氣互為出入故曰並行病甚者邪專王而肆虐故曰獨行間去聲氣味第七草生五色五色之變不可勝視草生五味五味之美不可勝極此以草言者木亦在其中矣青黃赤白黑五色之正也然色有淺深間雜之異故五色之變不可勝視酸辛甘苦咸五味之正也然味有厚薄優劣之殊故五味之美不可勝極即此五色五味之變已不可窮而天地萬物之化又烏得而量哉嗜欲不同各有所通物性不齊各有嗜欲聲色臭味各有所宜故各有所通也天食人以五氣地食人以五味天以五氣食人者臊氣入肝焦氣入心香氣入脾腥氣入肺腐氣入腎也地以五味食人者酸先入肝苦先入心甘先入脾辛先入肺咸先入腎也清陽化氣出乎天濁陰成味出乎地故天食人以氣地食人以味此即天地之運陽陰之化而人形之所以成也五氣入鼻藏於心肺上使五色修明音聲能彰五氣入鼻由喉而藏於心肺以達五臟心氣充則五色修明肺氣充則聲音彰著蓋心主血故華於面肺主氣故發於聲五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生五味入口由咽而藏於腸胃胃藏五味以養五臟之氣而化生津液以成精精氣充而神自生人生之道止於是耳而其所以成之者則在於天之氣地之味氣味之以於用者則在乎藥食之間而已五味入胃各走其所喜穀味酸先走肝穀味苦先走心穀味甘先走脾穀味辛先走肺穀味咸先走腎五臟嗜欲不同各有所喜故五味之走亦各有先然既有所先必有所後而生克佐使五臟皆有相涉矣穀氣津液已行營衛大通乃化糟粕以次傳下穀氣入於營衛其糟粕之質降為便溺以次下傳而出於大腸膀胱之竅其精微者先出於胃之兩焦以溉五臟別出兩行營衛之道谷之精氣先出於胃即中焦也而後至上下兩焦以溉五臟之至也溉灌注也兩行言清者入營營行脈中濁者入衛衛行脈外故營主血而濡於內衛主氣而布於外以分營衛之道其大氣之摶而不行者積於胸中出於肺循喉咽故呼則出吸則入大氣宗氣也摶聚也蓋人有三氣營氣出於中焦衛氣出於下焦宗氣積於上焦出於肺由喉嚨而為呼吸出入故膻中曰氣海天地之精氣其大數常出三入一故谷不入半日則氣衰一日則氣少矣人之呼吸通天地之精氣以為吾身之真氣故真氣者所受於天與穀氣並而充身也然天地之氣以吸而入穀食之氣從呼而出總計出入大數則出者三分入止一分惟其出多入少故半日不食則谷化之氣衰一日不食則谷化之氣少矣知氣為吾身之寶而得養氣之玄者可以語道矣谷之五味粳米甘麻酸大豆咸麥苦黃黍辛粳俗作粳麻芝麻也大豆黃黑青白等豆均稱大豆黍糯小米也可以釀酒北人呼為黃米又曰黍子此五穀之味合五行者粳音庚果之五味棗甘李酸栗咸杏苦桃辛此五果之味合五行者畜之五味牛甘犬酸豬咸羊苦雞辛此五畜之味合五行者菜之五味葵甘韭酸藿咸薤苦蔥辛藿大豆葉也薤野蒜也薤似韭而無實此五菜之味合五行者薤音械五色黃色宜甘清色宜酸黑色宜咸赤色宜苦白色宜辛凡此五者各有所宜五宜所言五色者此五色之合於五味者脾病者宜食粳米飯牛肉棗葵此下言臟病所宜之味也脾屬土甘入脾故宜用此甘物心病者宜食麥羊肉杏薤心屬火苦入心故宜用此苦物腎病者宜食大豆黃卷豬肉栗藿大豆黃卷大豆芽也腎屬水鹹入腎故宜用此咸物肝病者宜食麻犬肉李韭肝屬木酸入肝故宜用此酸物肺病者宜食黃黍雞肉桃蔥肺屬金辛入肺故宜用此辛物此上五節皆用本臟之味以治本臟之病也五禁肝病禁辛辛味屬金能克肝木心病禁咸鹹味屬水能克心火脾病禁酸酸味屬木能克脾土腎病禁甘甘味屬土能克腎水肺病禁苦苦味屬火能克肺金肝色青宜食甘梗米飯牛肉棗葵皆甘此下言臟氣所宜之味即肝苦急急食甘以緩之之意也心色赤宜食酸犬肉麻李韭皆酸心苦緩急食酸以收之也脾色黃宜食鹹大豆豕肉栗藿皆咸此乃調利機關之義也腎為胃關脾與胃合故假咸柔耎以利其關關利而胃氣乃行胃行而脾氣方化故脾之宜味與他臟不同亦即脾苦濕急食苦以燥之之意也肺色白宜食苦麥羊肉杏薤皆苦肺苦氣上逆急食苦以泄之腎色黑宜食辛黃黍雞肉桃蔥皆辛腎苦燥急食辛以潤之開腠理致津液以通氣也五味入口各有所走各有所病酸走筋多食之令人癃咸走血多食之令人渴辛走氣多食之令人洞心苦走骨多食之令人變嘔甘走肉多食之令人悗心蓋謂酸入於胃其氣澀以收上之兩焦弗能出入也謂上中二焦澀結不舒也不出即留於胃中胃中和溫則下注膀胱膀胱之胞薄以懦得酸則縮綣約而不通水道不行故癃綣不分也約束也癃小水不利也味過於酸則上之兩焦弗能出入若留於胃中則為吞酸等疾若胃中溫和不留則下注膀胱膀胱得酸則縮故為癃也胞者如女子胞胞移熱於膀胱者衝脈任脈皆起於胞中也胞音包皆指子宮為言也此膀胱之胞者因音拋以溲脬為言也蓋胞音有二而字則相同特加膀胱二字以明此非子宮乃俗名尿脬也陰者積筋之所終也故酸入而走筋矣陰者陰器也積筋者宗筋之所聚也肝主筋其味酸故內為膀胱之癃而外走肝經之筋也酸走筋筋病無多食酸鹹入於胃其氣上走中焦注於脈則血氣走之血與咸相得則凝凝則胃中汁注之注之則胃中竭竭則咽路焦故舌本干而善渴血脈者中焦之道也故鹹入而走血矣血為水化咸亦屬水咸與血相得故走注血脈若味過於咸則血凝而結水液注之則津竭而渴然血脈必化於中焦故鹹入中焦而走血咸走血血病無多食鹹辛入於胃其氣走於上焦上焦者受氣而營諸陽者也薑韭之氣熏之營衛之氣不時受之久留心下故洞心辛與氣俱行故辛入而與汗俱出洞心透心若空也營諸陽營養陽分也辛味屬陽故走上焦之氣分過於辛則開竅而散故為洞心為汗出辛走氣氣病無多食辛苦入於胃五穀之氣皆不能勝苦苦入下脘三焦之道皆閉而不通故變嘔齒者骨之所終也故苦入而走骨故入而復出知其走骨也苦味性堅而沉故走骨味過於苦則抑遏胃中陽氣不能運化故五穀之氣不能勝之三焦之道閉而不通所以入而復出其變為嘔又如齒為骨之所終苦通於骨內不能受其氣復從口齒而出正因其走骨也苦走骨骨病無多食苦甘入於胃其氣弱小不能上至於上焦而與谷留於胃中者令人柔潤者也胃柔則緩緩則蟲動蟲動則令人悗心其氣外通於肉故甘走肉甘性柔緩故其氣弱小不能至於上焦味過於甘則與穀氣留於胃中令人柔潤而緩久則甘從濕化致生諸蟲蟲動於胃甘緩於中心當悗矣悗悶也甘入脾脾主肉故甘走肉甘走肉肉病無多食甘論治第八陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也凡天地萬物變化生殺神明之道總不外乎陰陽之理故陰陽為萬事之本治病必求於本萬事萬變既皆本於陰陽而病機藥性脈息論治則最切於此故凡治病者在必求於本或本於陰或本於陽求得其本然後可以施治本之一字合之則惟一分之則無窮所謂合之惟一者陰陽也未有不明陰陽而能知事理者亦未有不明陰陽而能知疾病者此天地萬物之大本必不可不知也所謂分之無窮者有變必有象有象必有本凡事有必不可不顧者即本之所在也死以生為本欲救其死勿傷其生邪以正為本欲攻其邪必顧其正陰以陽為本陽在則生陽盡則死靜以動為本有動則活無動則止血以氣為本氣來則行氣去則凝證以脈為本脈吉則吉脈凶則凶先者後之本從此來者須從此去急者緩之本孰急可憂孰緩無慮內者外之本外實者何傷中敗者堪畏下者上之本滋苗者先固其根伐下者必枯其上虛者實之本有餘者拔之無難不足者攻之何忍真者假之本淺陋者只知見在精妙者疑似獨明至若醫家之本在學力學力足以盡求本之妙始可與言治矣淮南子曰所以貴扁鵲者知病之所從生也所以貴聖人者知亂之所由起也順其志順之為用最為肯綮不順不能因其勢以利導之非通變之士也故入國問俗入家問諱上堂問禮臨病人問所便問病人之所便即取順之道也夫中熱消疸則便寒寒中之屬則便熱此下皆言治病之所便也中熱者中有熱也消疸者內熱為疸善飢渴而日消瘦也凡熱在中則治便於寒寒在中則治便於熱是皆所以順病情而救之也胃中熱則消穀令人懸心善飢消穀者穀食易消也懸心者胃火上炎心血被爍而懸懸不寧也胃熱消穀故令人善飢臍以上皮熱腸中熱則出黃如糜臍以上者胃與小腸之分也故臍以上皮熱者腸中亦熱也出黃如糜者以胃中濕熱之氣傳於小腸所致也糜腐爛也上二節皆熱證便寒之類臍以下皮寒胃中寒則腹脹腸中寒則腸鳴飧泄臍以下皮寒者以腸胃中寒也胃中寒則不能運化而為腹脹腸中寒則陰氣留滯不能泌別清濁而為腸鳴飧泄是皆寒證便熱之類胃中寒腸中熱則脹而且泄上文言腸中寒者泄而此言腸中熱者泄所以有熱泄寒泄之不同而熱泄謂之腸垢寒泄謂之鶩溏也胃中熱腸中寒則疾飢小腹痛脹胃中熱則善消穀故疾飢腸中寒則陰氣聚結不行故小腹切痛而脹上二節皆當因其寒熱而隨所宜以調治者也胃欲寒飲腸欲熱飲禁之則逆其志順之則加其病胃中熱者欲寒飲腸中寒者欲熱飲緩急之治當有先後而喜惡之欲難於兩從且以貴人多任性此順之所以難而治之當有法也告之以其敗導之以所便春夏先治其標後治其本秋冬先治其本後治其標此言治有一定之法有難以順其私欲而可為假借者故特舉標本之治以言其概耳春夏發生宜先養氣以治標秋冬收藏宜先固精以治本便其相逆便其相逆者委曲以便其情也飲食衣服適其寒溫寒無悽愴暑無出汗食飲者熱無灼灼寒無滄滄寒溫中適故氣將持乃不致邪僻也適當也此言於便之之中而欲得其當也即如飲食衣服之類法不宜寒欲寒但可令其微寒而勿使至於悽愴法不宜熱欲熱但可令其微熱而勿使至於汗出又如飲食之欲熱者亦不宜灼灼之過欲寒者亦不宜滄滄之甚寒熱適其中和則元氣得以執持邪僻無由而致是即用順之道也否則治民與自治治彼與治此治小與治大治國與治家未有逆而能治之也氣有多少病有盛衰治有緩急方有大小五運六氣各有太過不及故曰氣有多少人之疾病必隨氣而為盛衰故治之緩急方之大小亦必隨其輕重而有要約也氣有高下病有遠近證有中外治有輕重適其至所為故也歲有司天在泉則氣有高下經有臟腑上下則病有遠近在裡曰中在表曰外緩者治宜輕急者治宜重也適其至所為故言必及於病至之所而務得其已然之故也大要曰君一臣二奇之制也君二臣四偶之制也君二臣三奇之制也君二臣六偶之制也大要古法也主病之謂君君宜倍用佐君之謂臣臣以助之奇者陽數即古所謂單方也偶者陰數即古所謂復方也故君一臣二其數三君二臣三其數五皆奇之制也君二臣四其數六君二臣六其數八皆偶之制也奇方屬陽而輕偶方屬陰而重近者奇之遠者偶之汗者不以偶下者不以奇近者為上為陽故用奇方用其輕而緩也遠者為下為陰故用偶方用其重而急也汗者不以偶陰沉不能達表也下者不以奇陽升不能降下也舉奇偶陰陽以分汗下之概則氣味之陰陽又豈後於奇偶哉故下文復言之此其微意正不止於品數之奇偶而實以發明方制之義耳學者當因之以深悟奇音箕補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄適其至所此之謂也補上治上制以緩欲其留布上部也補下治下制以急欲其直達下焦也故欲急者須氣味之厚欲緩者須氣味之薄若制緩方而氣味厚則峻而去速用急方而氣味薄則柔而不前惟緩急厚薄得其宜則適其病至之所而治得其要矣此制方主治之要領故重言以申明之病所遠而中道氣味之者食而過之無越其制度也言病所有深遠而藥必由於胃設用之無法則藥未及病而中道先受其氣味矣故當以食為節而使其遠近皆達是過之也如欲其遠者藥在食前則食催藥而致遠矣欲其近者藥在食後則食隔藥而留止矣由此類推則服食之疾徐根梢之升降以及湯膏丸散各有所宜必無越其制度也是故平氣之道近而奇偶制小其服也遠而奇偶制大其服也大則數少小則數多多則九之少則二之平氣之道平其不平之謂也如在上為近在下為遠遠者近者各有陰陽表裡之分故遠方近方亦各有奇偶相兼之法如方奇而分兩偶方偶而分兩奇皆互用之妙也故近而奇偶制小其服小則數多而盡於九蓋數多則分兩輕分兩輕則性力薄而僅及近處也遠而奇偶制大其服大則數少而止於二蓋少則分兩重分兩重則性力專而直達深遠也是皆奇偶兼用之法若病近而大其制則藥勝於病是謂誅伐無過病遠而小其制則藥不及病亦猶風馬牛不相及耳上言近者奇之遠者偶之言法之常也此言近而奇偶遠而奇偶言用之變也知變知常則應變可以無方矣奇之不去則偶之是謂重方偶之不去則反佐以取之所謂寒熱溫涼反從其病也此示人以圓融通變也如始也用奇奇之而病不去此其必有未合乃當變而為偶奇偶迭用是曰重方即後世所謂復方也若偶之而又不去則當求其微甚真假而反佐以取之反佐者謂藥同於病而順其性也如以熱治寒而寒拒熱則反佐以寒而入之以寒治熱而熱格寒則反佐以熱而入之又如寒藥熱用借熱以行寒熱藥寒用借寒以行熱是皆反佐變通之妙用蓋欲因其勢而利導之耳五味陰陽之用辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽六者或收或散或緩或急或燥或潤或耎或堅以所利而行之調其氣使其平也湧吐也泄瀉也滲泄利小便及通竅也辛甘酸苦咸淡六者之性辛主散主潤甘主緩酸主收主急苦主燥主堅咸主耎淡主滲泄五味之用升而輕者為陽降而重者為陰各因其利而行之則氣可調而平矣病有非調氣而得者有毒無毒所治為主適大小為制也非調氣謂病有不因於氣而得者也病生之類有四一者始因氣動而內有所成謂積聚癥瘕瘤氣癭氣結核癲癇之類二者因氣動而外有所成謂癰腫瘡瘍疣疥疽痔掉瘛浮腫目赤熛疹胕腫痛癢之類也三者不因氣動而病生於內謂留飲癖食飢飽勞損宿食霍亂悲恐喜怒想慕憂結之類也四者不因氣動而病生於外謂瘴氣賊魅蟲蛇蠱毒蜚尸鬼擊沖薄墜墮風寒暑濕所射刺割捶撲之類也凡此四類有獨治內而愈者有兼治內而愈者有獨治外而愈者有兼治外而愈者有先治內後治外而愈者有先治外後治內而愈者有須齊毒而攻擊者有須無毒而調引者其於或重或輕或緩或急或收或散或潤或燥或耎或堅用各有所宜也或有宜毒者有不宜毒者但以所治為主求當於病而已故其方之大小輕重皆宜因病而為之制也制之道君一臣二制之小也君一臣三佐五制之中也君一臣三佐九制之大也寒者熱之熱者寒之治寒以熱治熱以寒此正治法也微者逆之甚者從之病之微者如陽病則熱陰病則寒真形易見其病則微故可逆之逆即正治也病之甚者如熱極反寒寒極反熱假證難辨其病則甚故當從之從即反治也堅者削之客者除之勞者溫之結者散之留者攻之燥者濡之急者緩之散者收之損者益之逸者行之驚者平之上之下之摩之浴之薄之劫之開之發之適事為故逆者正治從者反治從少從多觀其事也溫之溫養之也逸者奔逸潰亂也行之行其逆滯也平之安之也上之吐之也摩之按摩之也薄之追其隱藏也劫之奪其強盛也適事為故適當其所事之故也正治反治注見上文從少謂一同而二異從多謂二同而一異必觀其事之輕重而為之增損然則宜於全反者自當盡同無疑矣治有逆從者以病有微甚病有微甚者以證有真假也寒熱有真假虛實亦有真假真者正治假者反治如寒熱之真假者真寒則脈沉而細或弱而遲為厥逆為嘔吐為腹痛為飧泄下利為小便清頻即有發熱必欲得衣此浮熱在外而沉寒在內也真熱則脈數有力滑大而實為煩躁喘滿為聲音壯厲或大便祕結或小水赤澀或發熱掀衣或脹疼熱渴此皆真病真寒者宜溫其寒真熱者宜解其熱是當正治者也至若假寒者陽證似陰火極似水也外雖寒而內則熱脈數而有力或沉而鼓擊或身寒惡衣或便熱祕結或煩渴引飲或腸垢臭穢此則惡寒非寒明是熱證所謂熱極反兼寒化亦曰陽盛隔陰也假熱者陰證似陽水極似火也外雖熱而內則寒脈微而弱或數而虛或浮大無根或弦芤斷續身雖熾熱而神則靜語雖譫妄而聲則微或虛狂起倒而禁之即止或蚊跡假斑而淺紅細碎或喜冷水而所用不多或舌苔面赤而衣被不撤或小水多利或大便不結此則惡熱非熱明是寒證所謂寒極反兼熱化亦曰陰盛隔陽也此皆假病假寒者清其內熱內清則浮陰退舍矣假熱者溫其真陽中溫則虛火歸原矣是當從治者也又如虛實之治至虛有盛候則有假實矣大實有羸狀則有假虛矣總之虛者正氣虛也為色慘形疲為神衰氣怯或自汗不收或二便失禁或夢遺精滑或嘔吐隔塞或病久攻多或氣短似喘或勞傷過度或暴困失志雖外證似實而脈弱無神者皆虛證之當補也實者邪氣實也或外閉於經絡或內結於臟腑或氣壅而不行或血留而凝滯必脈病俱盛者乃實證之當攻也然則虛實之間最多疑似有不可不辨其真耳若正氣既虛則邪氣雖盛亦不可攻蓋恐邪未去而正先脫呼吸變生措手無及故治虛邪者當先顧正氣正氣存則不致於害且補中自有攻意蓋補陰即所以攻熱補陽即所以攻寒世未有正氣復而邪氣不退者亦未有正氣竭而命不傾者如必不得已亦當酌量緩急權宜多少寓戰於守斯可矣至於熱因寒用寒因熱用塞因塞用通因通用必伏其所主而先其所因其始則同其終則異可使破積可使潰堅可使氣和可使必已熱因寒用者如大寒內結當治以熱然寒甚格熱熱不得前則以熱藥冷服下嗌之後冷體既消熱性便發情且不違而致大益此熱因寒用之法也寒因熱用者如大熱在中以寒攻治則不入以熱攻治則病增乃以寒藥熱服入腹之後熱氣既消寒性遂行情且協和而病以減此寒因熱用之法也治熱以寒溫而行之治寒以熱涼而行之亦寒因熱用熱因寒用之義塞因塞用者如下氣虛乏中焦氣壅欲散滿則更虛其下欲補下則滿甚於中治不知本而先攻其滿藥入或減藥過依然氣必更虛病必漸甚乃不知少服則資壅多服則宣通峻補其下以疏啓其中則下虛自實中滿自除此塞因塞用之法也通因通用者如大熱內蓄或大寒內凝積聚留滯瀉利不止寒滯者以熱下之熱滯者以寒下之此通因通用之法也以上四治必伏其所主者制病之本也先其所因者求病之由也既得其本而以真治真以假治假其始也類治似同其終也病變則異矣是為反治之法故可使破積潰堅氣和而病必已也逆之從之逆而從之從而逆之疏氣令調則其道也氣調而得者言氣本調和而偶感於病則或因天時或因意料之外者也其治法亦無過逆從而已或可逆者或可從者或先逆而後從者或先從而後逆者但疏其邪氣而使之調和則治道盡矣方制有君臣主病之謂君佐君之謂臣應臣之謂使非上下三品之謂所以明善惡之殊貫也主病者對證之要藥也故謂之君君者味數少而分兩重賴之以為主也佐君者謂之臣味數稍多而分兩稍輕所以匡君之不逮也應臣者謂之使數可出入而分兩更輕所以備通行嚮導之使也此則君臣佐使之義非上下三品如善惡殊貫之謂也處方之制有君臣佐使三品言藥性善惡故有上中下之殊上藥為君主養命以應天中藥為臣主養性以應人下藥為佐使主治病以應地所謂善惡之殊貫也病有中外從內之外者調其內從外之內者治其外從內之外者內為本從外之內者外為本但治其本無不愈矣從內之外而盛於外者先調其內而後治其外從外之內而盛於內者先治其外而後調其內病雖盛於標治必先其本而後可愈此治病之大法也中外不相及則治主病中外不相及謂既不從內又不從外則但求其見在所主之病而治之此即三因之義也千般疢難不越三條一者經絡受邪入臟腑為內所因也二者四肢九竅血脈相傳壅塞不通為外皮膚所中也三者房室金刃蟲獸所傷也故三因方有內因外因不內外因蓋本諸此耳疢昌震切病也調氣之方必別陰陽定其中外各守其鄉內者內治外者外治微者調之其次平之盛者奪之汗之下之寒熱溫涼衰之以屬隨其攸利方法也陰陽之道凡病治脈藥皆有關係故必當詳別之中外表裡也微者調之謂小寒之氣和之以溫小熱之氣和之以涼也其次平之謂大寒之氣平之以熱大熱之氣平之以寒也盛者奪之謂邪之甚者當直攻而取之如甚於外者汗之甚於內者下之凡宜寒宜熱宜溫宜涼當各求其屬以衰去之惟隨其攸利而已攸所也病在中而不實不堅且聚且散無積者求其臟虛則補之藥以祛之食以隨之行水漬之和其中外可使畢已積者有形之病有積在中則堅實不散矣今其不實不堅且聚且散者無積可知也無積而病在中者臟之虛也故當隨病所在求其臟而補之藥以祛之去其病也食以隨之養其氣也行水漬之通其經也若是則中外和調而病可已矣祛者非攻擊之謂凡去病者皆可言祛漬資四切浸洗也治寒以熱治熱以寒繩墨也有病熱者寒之而熱有病寒者熱之而寒二者皆在新病復起是治王氣所以反也病有陰陽氣有衰王不明衰王則治之反盛如陽盛陰衰者陰虛火王也治之者不知補陰以配陽專用苦寒是治火之王也陽衰陰盛者氣弱生寒也治之者不知補陽以配陰專用辛溫是治陰之王也如夏令本熱而伏陰在內每多中寒冬令本寒而伏陽在內每多內熱設不知此而必欲用寒於夏治火之王用熱於冬治寒之王則有中寒隔陽者服寒反熱中熱隔陰者服熱反寒矣是皆治王之謂而病之所以反也春秋同法而不知諸寒之而熱者取之陰熱之而寒者取之陽所謂求其屬也諸寒之而熱者謂以苦寒治熱而熱反增非火之有餘乃真陰之不足也陰不足則陽有餘而為熱故當取之於陰不宜治火也只補陰以配其陽則陰氣復而熱自退矣熱之而寒者謂以辛熱治寒而寒反甚非寒之有餘乃真陽之不足也陽不足則陰有餘而為寒故當取之於陽不宜攻寒也但補水中之火則陽氣復而寒自消也益火之源以消陰翳壯水之主以制陽光臟腑之原有寒熱溫涼之主取心者不必齊以熱取腎者不必齊以寒但益心之陽寒亦通行強腎之陰熱之猶可故或治熱以熱治寒以寒所謂求其屬也屬者根本之謂水火之本則皆在命門之中耳不治王而然者五味之屬治有不當也夫五味入胃各歸所喜攻久而增氣物化之常也氣增而久夭之由也不因治王而病不愈者以五味之屬治有不當也凡五味必先入胃而後各歸所喜攻之臟喜攻者謂五味五臟各有所屬也如病在筋無食酸病在氣無食辛病在骨無食鹹病在血無食苦病在肉無食甘犯之者即所謂五味之屬不當也五味之性各有所入若味有偏用則氣有偏病偏用既久其氣必增此物化之常也氣增而久則臟有偏勝臟有偏勝則必有偏絶矣此致夭之由也如味過於酸肝氣以津脾氣乃絶味過於咸大骨氣勞短肌心氣抑之類是也言寒熱者言病機也後言五味者言藥餌也藥餌病機必審其真設有謬誤鮮不害矣邪風之至疾如風雨邪風中人疾速如此故善治者治皮毛皮毛尚淺用力少而成功易也其次治肌膚深於皮毛矣其次治筋脈深於肌膚矣其次治六腑深於筋脈矣其次治五臟治五臟者半死半生也邪愈深則治愈難故上工救其萌芽下工救其已成救其已成者用力多而成功少凶吉相半矣天之邪氣感則害人五臟水穀之寒熱感則害於六腑天之邪氣即風寒暑濕火燥受於無形者也喉主天氣而通於臟故感則害人五臟水穀之寒熱即穀食之氣味受於有形者也咽主地氣而通於腑故感則害於六腑地之濕氣感則害皮肉筋脈人之應土者肉也濕勝則營衛不行故感則害於皮肉筋脈善診者察色按脈先別陰陽此下皆言診法診之一字所該者廣先別陰陽不可緩也審清濁而知部分色者神之華故可望顏察色審清濁而知部分如病人有氣色見於面部鼻頭色青腹中痛苦冷者死鼻頭色微黑者有水氣色黃者胸中有寒色白者亡血也設微赤非時者死又色青為痛色黑為勞色赤為風色黃者便難色鮮明者有留飲之類是也視喘息聽音聲而知所苦病苦於中聲發於外故可視喘息聽音聲而知其苦也如肝在音為角聲為呼心在音為徵聲為笑脾在音為宮聲為歌肺在音為商聲為哭腎在音為羽聲為呻之類又如病人語聲寂然喜驚呼者骨節間病語聲喑喑然不徹者心膈間病語聲啾啾然細而長者頭中病息搖肩者心中堅息引胸中上氣者咳息張口短氣者肺痿唾沫吸而微數其病在中焦實也當下之則愈虛者不治在上焦者其吸促在下焦者其吸遠此皆難治呼吸動搖振振者不治又設令病人向壁臥聞師到不驚起而盻視若三言三止脈之咽唾者此詐病也設令脈自和處但言此病大重須服吐下藥及針灸數十百處當自愈師持脈病人缺者無病也脈之呻者痛也言遲者風也搖頭言者里痛也行遲者表強也坐而伏者短氣也坐而下一腳者腰痛也裡實護腹如懷卵者心痛也人病恐怖者脈形如循絲纍纍然其面白脫色也人愧者脈浮而面色乍白乍赤也此皆疾病之聲色總之聲由氣發氣充則聲壯氣衰則聲怯陽候多語陰證無聲多語者易濟無聲者難榮然則音聲不惟知所苦而且可知死生矣觀權衡規矩而知病所主權衡規矩所包者多權言其重衡言其輕規言其圓矩言其方能明方圓輕重之理則知變通之道矣按尺寸觀浮沉滑澀而知病所生以治所以別陰陽表裡也無過以證則不失矣過失也言無失諸法則治亦可以無失矣故因其輕而揚之因其重而減之因其衰而彰之輕者浮於表故宜揚之揚者散也重者實於內故宜減之減者瀉也衰者氣血虛故宜彰之彰者補之益之而使氣血復彰也於此三者而表裡虛實之治盡之矣形不足者溫之以氣精不足者補之以味此正言彰之之法而在於藥食之氣味也以形精言則形為陽精為陰以氣味言則氣為陽味為陰陽者衛外而為固也陰者藏精而起亟也故形不足者陽之衰也非氣不足以達表而溫之精不足者陰之衰也非味不足以實中而補之陽性暖故曰溫陰性靜故曰補按本篇有云味歸形形食味氣歸精精食氣可知形以精成精以氣化氣以味生味以氣行以陰陽言則形與氣皆陽也故可以溫味與精皆陰也故可以補以清濁言則味與形皆濁也故味歸形氣與精皆清也故氣歸精然氣不能外乎味味亦不能外乎氣雖氣味有陰陽清濁之分而實則相須為用者也其高者因而越之越發揚也謂升散之湓湧之可以治其上之表裡也其下者引而竭之竭祛除也謂蕩滌之疏利之可以治其下之前後也中滿者瀉之於內中滿二字最宜詳察即痞滿大實堅之謂故當瀉之於內若外見浮腫而脹不在內者非中滿也妄行攻瀉必至為害此節之要在一中字其有邪者漬形以為汗邪在肌表故當漬形以為汗漬浸也如許胤宗用黃耆防風湯數十斛置於床下以蒸汗張苗燒地加桃葉於上以蒸汗或用藥煎湯熏之沐之皆漬形之法也其在皮者汗而發之前言有邪者兼經絡而言言其深也此言在皮者言其淺也均為表證故皆宜汗其慓悍者按而收之此兼表裡而言凡邪氣之急利者按得其狀則可收而制之矣如今之刮痧揣摩推拿收驚之類亦其遺也其實者散而瀉之陽實者宜散之陰實者宜瀉之審其陰陽以別柔剛形證有柔剛脈色有柔剛氣味尤有柔剛柔者屬陰剛者屬陽知剛柔之化者知陰陽之妙用矣故必審而別之陽病治陰陰病治陽陽勝者陰必病陰勝者陽必病如諸寒之而熱者取之陰熱之而寒者取之陽壯水之主以制陽光益火之源以消陰翳之類皆陽病治陰陰病治陽之道也定其血氣各守其鄉病之或在血分或在氣分當各察其處而不可亂也血實宜決之決謂泄去其血氣虛宜掣引之掣挽也氣虛者無氣之漸無氣則死矣故當挽回其氣而引之使復也如上氣虛者升而舉之下氣虛者納而歸之中氣虛者溫而補之也一病而治各不同皆愈者地勢使然也地勢不同則氣習有異故治法亦隨而不一也故東方之域天地之所始生也天地之氣自東而升為陽生之始故發生之氣始於東方而在時則為春魚鹽之地海濱傍水地不滿東南故東南低下而多水魚鹽海濱皆傍水之地利也其民食魚而嗜咸皆安其處美其食得魚鹽之地故居安食美魚者使人熱中魚鱗蟲也魚生水中水體外陰而內陽故能熱中然水從寒化亦脾寒者所忌鹽者勝血食鹹者渴勝血之徵也故其民皆黑色疏理其病皆為癰瘍血弱故黑色疏理熱多故為癰瘍其治宜砭石故砭石者亦從東方來砭石石針也即瓷鋒之屬高氏之山有石如玉可以為針即砭也東方之民疏理而癰瘍其病在肌表故用砭石砭石者其治在淺凡後世所用砭石之法亦自東方來也來起見也砭音邊西方者金玉之域沙石之處天地之所收引也地之剛在西方故多金玉沙石然天地之氣自西而降故為天地之收引而在時則應秋其民陵居而多風水土剛強陵居高處也故多風金氣肅殺故水土剛強其民不衣而褐薦華食而脂肥不衣不事服飾也褐毛布也薦草茵也華濃厚也謂酥酪膏肉之類飲食華厚故人多脂肥邪不能傷其形體其病生於內水土剛強飲食肥厚肌肉充實膚腠閉密故邪不能傷其外而惟飲食男女七情病多生於內也其治宜毒藥故毒藥者亦從西方來病生於內故非針灸按導所能治而宜用毒藥也毒藥者總括藥餌而言凡能除病者皆可稱為毒藥然治此輩正不必純甘至靜也凡後世所用毒藥之法亦自西方來也北方者天地所閉藏之域也天之陰在北故其氣閉藏而在時則應冬其地高陵居風寒冰冽地高陵居西北之勢也風寒冰冽陰氣勝也其民樂野處而乳食臟寒生滿病野處乳食北人之性胡地至今猶然地氣寒乳性亦寒故令人臟寒臟寒多滯故生脹滿等病其治宜灸焫故灸焫者亦從北方來灸焫艾灸火灼也亦火針之屬凡治牛馬類行此法北人宜用之故後世所用灸焫之法亦自北方來也焫如瑞切南方者天地所長養陽之所盛處也天之陽在南故萬物長養而時應夏其地下水土弱霧露之所聚也南方低下而濕故水土弱而多霧露其民嗜酸而食胕胕腐也物之腐者如鼓鮓曲醬之屬是也胕音父故其民皆致理而赤色其病攣痹嗜酸者收食胕者濕故其民致理而攣痹攣痹者濕熱盛而病在筋骨也南方屬火故其色赤致密也其治宜微針故九針者亦從南方來病在筋絡故宜用九針凡後世所用針法亦自南方來也中央者其地平以濕天地所以生萬物也衆土體平土性濕土王於四方之中而為萬物之母故其生物也衆其民食雜而不勞四方輻輳萬物所歸故民食雜土性和緩故不勤勞也故其病多痿厥寒熱土氣通脾而主四肢故濕滯則為痿寒熱則為厥中央者四方之氣交相集故或寒或熱也其治宜導引按蹺故導引按蹺者亦從中央出也導引謂搖筋骨動肢節以行氣血也按捏按也蹺即陽蹺陰蹺之義蓋謂推拿溪谷蹺穴以除疾病也病在肢節故用此法凡後世所用導引按摩之法亦自中州出也蹺音喬又極虐切故聖人雜合以治各得其所宜治雖異而病皆愈者得病之情知治之大體也雜合五方之治而隨機應變則各得其宜矣故治法雖異而病無不愈知變通之道者即聖人之能事也豈特治病而已哉形樂志苦病生於脈治之以灸刺形樂者身無勞也志苦者心多慮也心主脈深思過慮則脈病矣脈病者當治經絡故當隨其宜而灸刺之形樂志樂病生於肉治之以針石形樂者逸志樂者閒飽食終日無所運用多傷於脾脾主肌肉故病生焉肉病者或為衛氣留或為膿血聚故當用針石以取之形苦志樂病生於筋治之以尉引形苦者身多勞志樂者心無慮勞則傷筋故疾生於筋尉以藥尉引謂導引形苦志苦病生於咽嗌治之以甘藥形苦志苦必多憂思憂則傷肺思則傷脾脾肺氣傷則虛而不行氣必滯矣脾肺之脈上循咽嗌故病生於咽嗌如人之悲憂過度則喉嚨哽咽食飲難進思慮過度則上焦痞膈咽中核塞即其徵也隔則閉絶上下不通則暴憂之病也病在嗌者因損於臟故當以甘藥調補之形數驚恐經絡不通病生於不仁治之以按摩醪藥驚者氣亂恐者氣下數有驚恐則氣血散亂而經絡不通故病不仁不仁者頑痹耎弱也故治宜按摩以導氣行血醪藥以養正除邪醪藥藥酒也醪音勞是謂五形志也重申形志不同以足上文之意病有久新方有大小有毒無毒固宜常制病重者宜大病輕者宜小無毒者宜多有毒者宜少皆常制也大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九藥性有大毒常毒小毒無毒之分去病有六分七分八分九分之制者蓋以治病之法藥不及病則無濟於事藥過於病則反傷其正而生他患矣故當知制而進止有度也穀肉果菜食養盡之無使過之傷其正也病已去其八九而有餘未盡者則當以穀肉果菜飲食之類培養正氣而餘邪自盡矣如飲食亦貴得宜皆不可使之太過過則反傷其正也不盡行復如法如此而猶有未盡則再行前法以漸除之寧從乎慎也必先歲氣無伐天和五運有紀六氣有序四時有令陰陽有節皆歲氣也人氣應之以生長收藏即天和也設不知歲氣變遷而妄呼寒熱則邪正盛衰無所辨未免於犯歲氣伐天和矣夭枉之由此其為甚無盛盛無虛虛而遺人夭殃邪氣實者復助之盛其盛矣正氣奪者復攻之虛其虛矣以致真氣日消病氣日甚遺人夭殃醫之咎也無致邪無失正絶人長命盛其盛是致邪也虛其虛是失正也重言之者所以深戒夫伐天和而絶人長命以見歲氣不可不慎也其久病者有氣從不康病去而瘠化不可代時不可違化造化也時時候也養之和之靜以待時謹守其氣無使傾移其形乃彰生氣以長養者養以氣味和者和以性情靜以待時者預有修為而待時以復也如陽虛者喜春夏陰虛者喜秋冬病在肝者愈於夏病在心者愈於長夏病在脾者愈於秋病在肺者愈於冬病在腎者愈於春皆其義也謹守其氣無使傾移則固有弗失日新可期是即復原之道而生氣可漸長矣大要曰無代化無違時必養必和待其來復此之謂也大要上古書名此引古語以明化不可代時不可失不可不養不可不和以待其來復未有不復者矣婦人重身毒之有故無殞亦無殞也重身孕婦也毒之謂峻利藥也故有是故而用是藥所謂有病則病受之故孕婦可以無殞而胎氣亦無殞也殞傷也重平聲殞音允大積大聚其故可犯也然衰其大半而止過者死身雖孕而有大積大聚非用毒藥不能攻攻亦無害故可犯也然但宜衰其大半便當止藥如大毒治病十去其六者是也若或過用則病未必盡而胎已受傷多致死矣揆度奇恆所指不同揆度揣度也奇恆異常也所指不同有言疾病者有言脈色者有言臟腑者有言陰陽者也揆度者度病之深淺也奇恆者言奇病也奇病異常之病也病而異常非揣度淺深之詳不易知也五色脈變揆度奇恆道在於一色脈奇恆其變雖多其道則一神轉不回回則不轉乃失其機神者陰陽之變化也轉運行不息也回逆而邪也神機之用循環無窮故在天在人無不賴之以成化育之功者皆神轉不回也設其回而不轉則至數逆生機失矣故曰神去則機息又曰失神者亡也至數之要迫近以微至數即神之機也要在乎機機在乎神神機之道纖毫無間至精至微無往不切故曰迫近以微容色見上下左右各在其要天之神機見於氣候人之神機見於脈色凡此上下左右及下文淺深逆從日數之類皆色脈至數之要不可不察也其色見淺者湯液主治十日已色淺則病微故可以湯液主治而愈亦速也湯液者五穀之湯液蓋調養之道非後世湯藥之謂其色見深者必齊主治二十一日已色深則病深故當以齊主治而愈稍遲齊劑同藥劑也其見大深者醪酒主治百日已色大深者病尤甚故必以醪酒主治醪酒藥酒也如雞矢醴之類色夭面脫不治百日盡已色夭面脫者神氣已去故不可治百日盡則時更氣易至數盡而已上言病已此言命已也脈短氣絶死脈短氣絶者中虛陽脫也故死病溫虛甚死病溫邪有餘虛甚正不足正不勝邪故死色見上下左右各在其要上為逆下為從要即逆從之要也其色上行者病益甚其色下行如雲徹散者病方已故上為逆下為從女子右為逆左為從男子左為逆右為從女為陰右亦為陰色在右則陰病甚矣故女以右為逆男為陽左亦為陽色在左則陽病甚矣故男以左為逆此雖以色為言而病之逆從亦猶是也易重陽死重陰死易變易也男以右為從而易於左則陽人陽病是重陽也女以左為從而易於右則陰人陰病是重陰也重陽重陰者陰陽偏勝也有偏勝則有偏絶故不免於死矣陰陽反作治在權衡相奪反作反順為逆也逆則病生矣治在權衡相奪謂度其輕重而奪之使平猶權衡也奇恆事也揆度事也此承上文而言陰陽反作者即奇恆事也權衡相奪者即揆度事也搏脈痹躄寒熱之交上文言奇恆之色此下言奇恆之脈搏脈者搏擊於手也為邪盛正衰陰陽乖亂之脈故為痹為躄為或寒或熱之交也痹頑痹也躄足不能行也脈孤為消氣虛泄為奪血脈孤者孤陰孤陽也孤陽者洪大之極陰氣必消孤陰者微弱之甚陽氣必消故脈孤為消氣也脈虛兼泄者必亡其陰陰亡則血虛故虛泄為奪血也孤為逆虛為從孤者偏絶之謂絶者不可復生故為逆虛者不足之稱不足者猶可補故曰從行奇恆之法以太陰始肺為百脈之朝會故脈變奇恆之辨當以太陰始太陰者手太陰之氣口也行所不勝曰逆逆則死行所不勝克我者也如以木見金以金見火之類是也行所勝曰從從則活行所勝我克者也如以木見土以土見水之類是也八風四時之勝終而復始八風之至隨四時之勝至數有常則終而復始此順常之令也逆行一過不復可數論要畢矣設或氣令失常逆行一過是為回則不轉而至數紊亂無復可以數計矣過失也喻言人之色脈一有失調則奇恆反作變態百出亦不可以常數計也此則天人至數之要在逆從之間察其神而畢矣其有不從毫毛生而五臟陽已竭也津液充郭其魄獨居孤精於內氣耗於外形不可與衣相保此四極急而動中是氣拒於內而形施於外不從毫毛生病生於內也五臟陽已竭有陰無陽也津液水也郭形體胸腹也陰無陽不行水無氣不化今陽氣既竭不能通調水道故津液妄行充於郭也魄者陰之屬形雖充而氣則去故其魄獨居也精中無氣則孤精於內陰內無陽則氣耗於外三焦閉塞水道不通皮膚脹滿身體羸敗故形不可與衣相保也四肢者諸陽之本陽氣不行故四極多陰而脹急也脹由陰滯以胃中陽氣不能制水而肺腎俱病喘咳繼之故動中也此以陰氣格拒於內故水脹形施於外而為是病也平治於權衡平治之法當如權衡者欲得其平也且水脹一症其本在腎其標在肺如五臟陽已竭魄獨居者其主在肺肺主氣氣須何法以化之津液充郭孤精於內其主在腎腎主水水須何法以平之然肺金生於脾腎水制於土故治腫脹者必求脾肺腎三臟隨盛衰而治得其平是為權衡之道也去宛陳莝是以微動四極溫衣繆刺其處以復其形開鬼門潔淨府精以時服五陽已布疏滌五臟故精自生形自盛骨肉相保巨氣乃平宛積也陳久也莝斬草也謂去其水氣之陳積欲如斬草而漸除之也四極四肢也微動之欲其流通而氣易行也溫衣欲助其肌表之陽而陰凝易散也然後繆刺之以左取右以右取左而去其大絡之留滯也鬼門汗孔也肺主皮毛其藏魄陰之屬也故曰鬼門淨府膀胱也上無入孔而下有出竅滓穢所不能入故曰淨府邪在表者散之在裡者化之故曰開鬼門潔淨府也水氣去則真精服服行也陰邪除則五陽布五陽五臟之胃氣也由是精生形盛骨肉相保而巨氣可平矣宛郁同莝音銼古人居禽獸之間動作以避寒陰居以避暑內無眷慕之纍外無伸宦之形此恬淡之世邪不能深入也故毒藥不能治其內針石不能治其外故可移精祝由而已古人巢居穴處天真完固氣血堅實邪不能入故無事於毒藥針石但以祝由即可移易精氣而愈其病也祝咒同由病所由生也故曰祝由今之世不然憂患緣其內苦形傷其外又失四時之從逆寒暑之宜賊風數至虛邪朝夕內至五臟骨髓外傷空竅肌膚所以小病必甚大病必死故祝由不能已也內傷五臟外逆四時則表裡俱傷為病必甚故不能以祝由治之也臨病人觀死生決嫌疑知其要如日月之光上古僦貸季理色脈而通神明合之金木水火土四時八風六合不離其常理色脈察內外之精微也通神明色脈辨而神明見也色脈之應無往不合如五行之衰王四時之往來八風之變六合之氣消長相依無不有常度也變化相移以觀其妙則色脈是矣五行四時八風之氣迭有盛衰則變化相移色脈隨之而應故可以觀其妙凡人之五臟六腑百骸九竅脈必由乎氣氣必合乎天雖其深微難測而惟於色脈足以察之故曰知其要則色脈是矣色以應日脈以應月常求其要則其要也色分五行而明晦是其變日有十干而陰晴是其變故色以應日脈有十二經而虛實是其變月有十二建而盈縮是其變故脈以應月常求色脈之要則明如日月而得其變化之要矣夫色之變化以應四時之脈此上古之所以合於神明遠死而近生生道以長上古知色脈之應故能見機察微合於神明常遠於死常近於生生道永昌中古之治病至而治之湯液十日以去八風五痹之病十日不已治以草蘇草荄之枝本末為助標本已得邪氣乃服中古之治病必病至而後治之其治也先以湯液湯液者五穀所制而非藥也服之十日八風五痹之病可以去矣使十日不已則治以草蘇草荄之枝蘇葉也荄根也枝莖也根枝相佐故云本末為助即後世之煎劑也病源為本病變為標得其標木邪無不服此中古之治雖不若上古之見於未然而猶未若後世之誤也荄音該莫世之治病也則不然治不本四時不知日月不審逆從病形已成乃欲微針治其外湯液治其內既不能防於未然又不能察其見在心粗見淺針藥亂施也所謂粗工凶凶以為可攻故病未已新病復起粗工學不精而庸淺也凶凶好自用而孟浪也若輩者意其為實而攻之則假實未去而真虛至意其為熱而寒之則故熱未除而新寒起是不足以治人而適足以害人耳必也治之極於一一者因得之因者所因也得其所因又何所而不得哉凡診病者必問嘗貴後賤雖不中邪病從內生名曰脫營嘗貴後賤者其心屈辱神氣不伸雖不中邪而病生於內營者陰氣也營行脈中心之所主心志不舒則血無以生脈日以竭故為脫營嘗富後貧名曰失精五氣留連病有所並嘗富後貧者憂煎日切奉養日廉故其五臟之精日加消敗是為失精精失則氣衰氣衰則不運故為留聚而病有所並矣不在臟腑不變軀形診之而疑不知病名如前二病者求之內證則臟腑無可憑求之外證則形軀無所據診者不明其故則未有不疑而莫識其為何病也身體日減氣虛無精其病漸深則體為瘦減其氣日虛則精無以生病深無氣灑灑然時驚及其病深則真氣消索故曰無氣無氣則陽虛故灑然畏寒也陽虛則神不足故心怯而驚也病深者以其外耗於衛內奪於榮精氣俱損則表裡受困故外耗於衛內奪於榮此其所以為深也良工所失不知病情此亦治之一過也雖曰良工而不能察此則不得其情焉知其本此過誤之一也凡診病者必問飲食居處飲食有膏粱藜藿之殊居處有寒溫燥濕之異因常知變必詳問而察之暴樂暴苦始樂後苦皆傷精氣精氣竭絶形體毀沮樂則喜喜則氣緩苦則悲悲則氣消故苦樂失常皆傷精氣甚至竭絶則形體毀沮沮壞也暴怒傷陰暴喜傷陽怒傷肝肝藏血故傷陰喜傷心心藏神故傷陽厥氣上行滿脈去形厥氣逆氣化凡喜怒過度而傷其精氣者皆能令人氣厥逆而上行氣逆於脈故滿脈精脫於中故去形愚醫治之不知補瀉不知病情精華日脫邪氣乃並此治之二過也不明虛實故不知補瀉不察所因故不知病情以致陰陽敗竭故精華日脫陽脫者邪並於陰陰脫者邪並於陽故曰邪氣乃並此愚醫之所誤過之二也善為脈者必以比類奇恆從容知之為工而不知道此診之不足貴此治之三過也比類比別例類也奇恆異常也從容安詳靜察也凡善診者必比類相求故能因陰察陽因表察里因正察邪因此察彼是以奇恆異常之脈證皆自從容之法而知之矣引而伸之觸類而長之天下之能事畢矣工不知此何證之有此過誤之三也又如脾虛浮似肺腎小浮似脾肝急沉散似腎此皆工之所時亂也惟從容而後得之診有三常必問貴賤封君敗傷及欲侯王三常即常貴賤常貧富常苦樂之義封君敗傷者追悔已往及欲侯王者妄想將來皆致病之因故貴脫勢雖不中邪精神內傷身必敗亡抑鬱不伸故精神內傷迷而不達不亡不已也始富後貧雖不傷邪皮焦筋屈痿躄為攣憂愁思慮則心肺俱傷氣血俱損故為是病醫不能嚴不能動神外為柔弱亂至失常病不能移則醫事不行此治之四過也戒不嚴則無以禁其欲言不切則無以動其神又其詞色外為柔弱而委隨從順任其好惡則未有不亂而至失其常者如是則病不能移其於醫也何有此過誤之四也凡診者必知終始有知餘緒切脈問名當合男女必知終始謂原其始要其終也有知餘緒謂察其本知其末也切其脈必問其名欲得其素履之詳也男女有陰陽之殊脈色有逆順之別必辨男女而察其所合也離絶菀結憂恐喜怒五臟空虛血氣離守工不能知何術之語離者失其親愛絶者斷其所懷菀謂思慮抑鬱結謂深情難解憂則氣沉恐則氣怯喜則氣緩恚則氣逆凡此皆傷其內故令五臟空虛血氣離守醫不知此何術之有嘗富大傷斬筋絶脈身體復行令澤不息大傷謂甚勞甚苦也故其筋如斬脈如絶以耗傷之過也雖身體猶能復舊而行然令澤不息矣澤精液也息生長也故傷敗結留薄歸陽膿積寒炅故舊也言舊之所傷有所敗結血氣留薄不散則鬱而成熱歸於陽分故膿血蓄積令人寒炅交作也炅居永切熱也粗工治之亟刺陰陽身體解散四肢轉筋死日有期粗工不知寒熱為膿積所生膿積以勞傷所致乃治以常法急刺陰陽奪而又奪以致血氣復傷故身體解散四肢轉筋則死日有期謂非粗工之誤之者耶醫不能明不問所發惟言死日亦為粗工此治之五過也但知死日而不知致死者由於施治之不當此過誤之五也凡此五者皆受術不通人事不明也不通者不通於理也物理不通焉知人事以上五條所不可不知也故治病也必知天地陰陽四時經紀陰陽氣候之變人身應之以為消長此天道之不可不知也五臟六腑雌雄表裡刺灸砭石毒藥所主臟腑有雌雄經絡有表裡刺灸石藥各有所宜此臟象之不可不知也從容人事以明經道貴賤貧富各異品理問年少長勇怯之理經道常道也不從容於人事則不知常道不能知常焉能知變人事有不齊品類有同異知之則隨方就圓因變而施此人事之不可不知也審於部分知病本始八正九候診必副矣八正八節之正氣也副稱也能察形色於分部則病之本始可知能察邪正於九候則脈之順逆可據明斯二者診必稱矣此色脈之不可不知也上言五過未明四德而此四節一言天道一言臟象一言人事一言脈色即四德也明此四者醫道全矣誠缺一不可也治病之道氣內為寶循求其理求之不得過在表裡氣內者氣之在內者也即元氣也凡治病者當先求元氣之強弱元氣既明大意見矣求元氣之病而無所得然後察其過之在表在裡以治之斯無誤也此下五節亦皆四德內事按氣有外氣天地之六氣也有內氣人身之元氣也氣失其和則為邪氣氣得其和則為正氣亦曰真氣但真氣所在其義有三上有氣海曰膻中也其治在肺中有水穀氣血之海曰中氣也其治在脾胃下有氣海曰丹田也其治在腎人之所賴惟此氣耳氣聚則生氣散則死故曰氣內為寶此誠最重之辭醫家最切之旨也夫經脈十二絡脈三百六十五此皆人之所明知工之所循用也循依順也此言經絡之略人所知也所以不十全者精神不專志意不理外內相失故時疑殆不知陰陽逆從之理此治之一失也受師不卒妄作離術謬言為道更名自功此治之二失也受師不卒者學業未精苟且自是也妄作離術者不明正道假借異端也謬言為道更名自功者侈口妄談巧立名色以欺人也不適貧富貴賤之居坐之厚薄形之寒溫不適飲食之宜不別人之勇怯不知比類足以自亂不足以自明此治之三失也診病不問其始憂患飲食之失節起居之過度或傷於毒不先言此卒持寸口何病能中妄言作名為粗所窮此治之四失也世人之語馳千里之外工之得失則譭譽之遠聞也不明不中棄術於市自遺其咎五疫之至皆相染易無問大小病狀相似不施救療如何可得不相移易五疫即五運疫癘之氣移易傳染也正氣存內邪不可干避其毒氣天牝從來復得其往氣出於腦即不邪干疫癘乃天之邪氣若吾身正氣內固則邪不可干故不相染也天牝鼻也鼻受天之氣故曰天牝氣自空虛而來亦欲其自空虛而去故曰避其毒氣天牝從來復得其往也蓋以氣通於鼻鼻連於腦中流布諸經令人相染矣氣出於腦為嚏或張鼻泄之則邪從鼻出毒氣可令散也氣出於腦即先想心如日日為太陽之氣應人之心想心如日即所以存吾之氣壯吾之神使邪氣不能犯也將欲入於疫室先想青氣自肝而出左行於東化作林木心之所至氣必至焉故存想之則神有所注而氣可王矣左行於東化作林木之狀所以壯肝氣也次想白氣自肺而出右行於西化作戈甲所以壯肺氣也次想赤氣自心而出南行於上化作焰明所以壯心氣也次想黑氣自腎而出北行於下化作水所以壯腎氣也次想黃氣自脾而出存於中央化作土所以壯脾氣也五氣護身之畢以想頭上如北斗之煌煌然後可入於疫室煌煌輝耀貌天行疫癘傳染最速凡入病家男病坐其床尾女病坐其床頭蓋癘氣男從上出女從下出也故當謹避之耳
