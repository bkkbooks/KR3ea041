body:
  text: 緒言黃帝作內經史册載之而其書不傳不知何代明夫醫理者托為君臣問答之辭撰素問靈樞二經傳於世想亦聞陳言於古老敷衍成之雖文多敗缺實萬古不磨之作窺其立言之旨無非竊擬壁經故多繁辭然不逮拜手賡揚都俞吁咈之風遠矣且是時始命大撓作甲子其干支節序占候豈符於今日而旨酒溺生禹始惡之當其玄酒味淡人誰嗜以為漿以致經滿絡虛肝浮膽橫耶至於十二經配十二水名彼時未經地平天成何以江淮河濟方隅畛域竟與後世無歧如此罅漏不一而足近有會稽張景嶽出有以接乎其人而才大學博膽志頗堅將二書串而為一名曰類經誠所謂別裁偽體者歟惜乎疑信相半未能去華存實余則一眼覷破既非聖經賢傳何妨割裂於是雞窗燈火數更寒暑徹底掀翻重為刪述望聞問切之功備矣然不敢創新立異名之曰醫經原旨為醫家必本之經推原其大旨如此至於針灸一法另有專書故略收一二余多節去其據文注釋皆廣集諸家之説約取張氏者為多苟或義理未暢間嘗綴以愚見冒昧之責何所逃避際此醫風流弊之日苟有一人熟讀而精思之則未必無小補云乾隆十九年歲在甲戌掃葉老人薛雪撰
