body:
  text: 卷六疾病第十三胎孕何以知懷子之且生也身有病而無邪脈也身有病謂經斷惡阻之類也身病者脈亦當病或斷續不調或弦澀細數是皆邪脈則真病也若六脈和滑而身有不安者其為胎氣無疑矣人有重身九月而喑婦人懷孕則身中有身故曰重身喑聲啞不能出也胞之絡脈絶也胎懷九月兒體已長故能阻絶胞中之絡脈何以言之胞絡者繫於腎少陰之脈貫腎系舌本故不能言無治也當十月復胞中之絡衝任之脈也胞絡者繫於腎而上會於咽喉故胞中之絡脈絶則不能言十月子生而胞絡復通則能言矣故不必治無損不足益有餘以成其疹疹疾也不當治而治之反以成疾無損不足者身羸瘦無用鑱石也妊娠九月則身重疲勞養胎力困正虛羸不足之時必不可用針石以復傷其氣無益其有餘者腹中有形而泄之泄之則精出而病獨擅中故曰疹成也胎元在胞而刺之則精氣必泄精泄則胎氣傷而病獨專於中是益其有餘故疹成也胎孕之道顱囟經云一月為胞胎精血疑也二月為胎形始成胚也三月陽神為三魂四月陰靈為七魄五月五行分五臟也六月六律定六腑也七月精開竅通光明也八月元神具降真靈也九月宮室羅布以定生人也十月受氣足萬象成也生後六十日瞳子成能咳笑應和人百五十日任脈成能自反覆百八十日髖骨成能獨坐二百一十日掌骨成能扶伏三百日臏骨成能行也若不能依期者必有不平之處巢元方曰妊娠一月名胎胚足厥陰脈養之二月名始膏足少陽脈養之三月名始胎手心主脈養之當此之時血不流行形象始化未有定儀因感而變欲於端正莊嚴常口談正言身行正事欲子美好宜佩白玉欲子賢能宜看詩書是謂外象而內感者也四月始成其血脈手少陽脈養之五月始成其氣足太陰脈養之六月始成其筋足陽明脈養之七月始成其骨手太陰脈養之八月始成膚革手陽明脈養之九月始成毛髮足少陰脈養之十月五臟六腑關節人神皆備此其大略也當推其理若足厥陰者肝脈也足少陽者膽脈也此一臟一腑之經也余皆如此凡四時之令必始春木故十二經之養始於肝膽所以養胎在一月二月手心主包絡也手少陽三焦也屬火而王夏所以養胎在三月四月足太陰脾也足陽明胃也屬土而王長夏所以養胎在五月六月手太陰肺也手陽明大腸也屬金而王秋所以養胎在七月八月足少陰腎也屬水而王冬所以養胎在九月至十月兒於母腹之中受足諸臟之氣然後待時而生也然十二經中惟手少陰心脈手太陽小腸脈及足太陽膀胱脈皆不言養胎者蓋九月之養在腎則膀胱亦在其中矣惟心與小腸為表裡心為五臟六腑之主雖其尊而無為然臟氣所及則神無不至小腸切近胞胎丙火所化則氣無不至所以皆不主月而實無月不在也胎孕之道無出此矣第胎有男女則成有遲速體有陰陽則懷分向背故男動在三月陽性早也女動在五月陰性遲也女胎背母而懷故母之腹軟男胎面母而懷故母之腹硬此又男胎女胎之有不同者也至若既生之後兒之壽夭其因有二蓋一則由於稟賦一則由於撫養夫稟賦為胎元之本精氣之受於父母者是也撫養為壽夭之本居處寒溫飲食得失者是也凡少年之子多有羸弱欲勤而精薄也老年之子反多強壯者欲少而精全也多飲者子多不育蓋以酒亂精則精半非真而濕熱勝也多欲者子多不育以孕後不節則盜泄母陰奪養胎之氣也此外如飢飽勞逸五情六氣無不各有所關是皆所謂稟賦也至於撫養之法俗傳有云若要小兒安須帶三分飢與寒此言殊為未當恐飲食之過傷脾而積聚生故當防其放肆無度疊進而驟脾不及化必使飲食勻調節其生冷何病之有若云帶飢則不可也至若寒之一字關係非淺聖人避風如避箭則風寒之為害也不小彼嬰兒以未成之血氣嫩薄之肌膚較之大人相去百倍顧可令其帶寒耶新産之兒多生驚風抽搐等病蓋其素處腹中裹護最密及胞胎初脫極易感邪而收生者遲慢不慎則風寒襲之多致不救及其稍長每多發熱輕則為鼻塞咳嗽重則為小兒傷寒幼科不識一概呼為變蒸誤藥致斃者此也或寒氣傷臟則為吐為瀉或因寒生熱則為驚為疳種種變生多由外感雖稟體強盛不畏風寒者亦所常有但強者三之一弱者三之二傷熱者十之三傷寒者十之七矧膏粱貧賤氣質本自不同醫家不能察本但知見熱攻熱嬰兒不能言病家不能辨徒付之命誠可嘆也又有謂小兒為純陽之體多宜清涼之治者此說尤為誤人女子二七男子二八而後天癸至夫天癸者陰氣也小兒之陰氣未至故曰純陽原非陽氣有餘之謂特稚陽耳稚陽之陽其陽幾何使陽本非實而誤認為火則必用寒涼妄攻其熱陰既不足又伐其陽多致陰陽俱敗脾腎俱傷又將何所藉賴而望其生乎又曰小兒無補腎法此何說耶夫小兒之陰氣未成即腎虛也或父母多欲而所稟水虧亦腎虛也陰既不足而不知補之陰絶則孤陽亦滅矣何謂無可補耶此義惟薛立齊獨得之血枯病有胸脅支滿者妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血何以名之支滿者滿如支膈也肺主氣其臭腥肝主血其臭臊肺其不能平肝則肝肺俱逆於上濁氣不降清氣不升故聞腥臊而吐清液也口中唾血血不歸經也四肢清冷氣不能周也頭目眩運失血多而氣隨血去也氣既亂故於前陰後陰血不時見而月信反無期矣病名血枯此得之年少時有所大脫血若醉入房中氣竭肝傷故月事衰少不來也血枯者月水斷絶也致此之由其原有二一則以少時有所大脫血如胎産既多及崩淋吐衄之類皆是也一則以醉後行房血盛而熱因而縱肆則陰精盡泄精去則氣去故中氣竭也夫腎主閉臟肝主疏泄不惟傷腎而且傷肝及至其久則三陰俱虧所以有先見諸證如上所云而終必至於血枯則月事衰少不來也此雖以女子為言丈夫有犯前證亦不免為精枯之病則勞損之屬皆是也治之何術以四烏鰂骨一藘茹二物併合之丸以雀卵大如小豆以五丸為後飯飲以鮑魚汁利腸中及傷肝也後飯者先藥後飯也烏鰂即烏賊也骨名海螵蛸其氣味鹹溫下行故主女子赤白漏下及血閉血枯其性澀故亦能令人有子藘茹亦名茹蘆即茜草也氣味甘寒無毒能止血治崩又能益精氣活血通經脈作䕡茹者非蓋䕡茹有毒豈血枯者所宜未之詳耳雀即麻雀也雀卵氣味甘溫能補益精血主男子陰痿不起故可使多精有子及女子帶下便溺不利鮑魚即今之淡乾魚也諸魚皆可為之惟石首鯽魚者為勝其氣味辛溫無毒魚本水中之物故其性能入水臟通血脈益陰氣煮汁服之能同諸藥通女子血閉也以上四藥皆通血脈血主於肝故凡病傷肝者亦皆可用之血枯一症與血膈相似皆經閉不通之候然而枯之與膈則相反有如冰炭夫枯者枯竭之謂血虛之極也膈者阻隔之謂血本不虛而或氣或寒或積有所逆也膈者病發於暫其證則或痛或實通之則血行而愈可攻者也枯者其來也漸沖在內竭其症無形必不可通者也今人每用四物加桃仁紅花甚至硝朴稜莪之類無所不至夫血既枯矣只當補養陰氣使其血充則勿招自至奚俟通也若勉強逼之則枯者愈枯不危何待癲狂病有怒狂者怒狂者多怒而狂也即罵詈不避親疏之謂生於陽也陽氣者因暴折而難決故善怒也名曰陽厥陽氣宜於暢達若暴有折銼則志無所伸或事有難決則陽氣被抑逆而上行故為怒狂病名陽厥陽明者常動巨陽少陽不動不動而動大疾此其候也陽明常動者謂如下關地倉大迎人迎氣衝衝陽之類皆有脈常動者也巨陽少陽不動者謂巨陽惟委中崑崙少陽惟聽會懸鐘其脈雖微動而動不甚也於其不甚動者而動且大疾則其常動者更甚矣此即陽厥怒狂之候奪其食即已夫食入於陰長氣於陽故奪其食即已食少則氣衰故節奪其食不使胃火復助陽邪則陽厥怒狂者可已使之服以生鐵洛為飲夫生鐵洛者下氣疾也生鐵洛即爐冶間錘落之鐵屑用水研浸可以為飲其屬金其氣寒而重最能墜熱開結平水火之邪故可以下氣疾除狂怒也凡藥中用鐵精鐵華粉針砂鐵鏽水之類皆同此意癲疾脈搏大滑久自已脈小堅急死不治搏大而滑為陽脈陽盛氣亦盛故久將自已若小堅而急則肝之真臟脈也全失中和而無胃氣故死不治故又曰癲疾之脈虛則可治實則死虛則柔緩邪氣微也故生實則弦急邪氣盛也故死人生而有病癲疾者何得之言人之初生者未犯邪氣即有癲疾也病名為胎病此得之在母腹中時其母有所大驚氣上而不下精氣並居故令子發為癲疾也驚則氣亂而逆故氣上不下氣亂則精亦隨之故精氣並及於胎令子為癲癇疾也卒痛人之五臟卒痛者經脈流行不止環周不休寒氣入經而稽遲泣而不行客於脈外則血少客於脈中則氣不通故卒然而痛其痛或有卒然而止者或痛甚不休者或痛甚不可按者或按之而痛止者或按之無益者或喘動應手者或心與背相引而痛者或脅肋與少腹相引而痛者或腹痛引陰股者或痛宿昔而成積者或卒然痛死不知人少間復生者或痛而嘔者或腹痛而後泄者或痛而閉不通者凡此諸痛皆當別之寒氣客於脈外則脈寒脈寒則縮蜷縮蜷則脈絀急絀急則外引小絡故卒然而痛得炅則痛立止蜷不申也絀屈曲也炅熱也寒氣客於脈外者邪不甚深衛氣不得流通則外引小絡而卒然為痛故但得炅暖之氣其痛則立止也蜷音拳絀音屈因重中於寒則痛久矣重中於寒則不易解散也寒氣客於經脈之中與炅氣相薄則脈滿滿則痛而不可按也陽氣行於脈中而寒襲之則寒熱相薄留而不行則邪實於經故脈滿而痛不可按也寒氣稽留炅氣從上則脈充大而血氣亂故痛甚不可按也炅氣從上陽主升也寒邪遏之則脈充於內而血氣亂故其痛必甚寒氣客於腸胃之間膜原之下血不得散小絡急引故痛按之則血氣散故按之痛止膜筋膜也原肓之原也義詳下章腸胃之間膜原之下皆有空虛之處血不散而小絡滿則急引而痛按之則寒氣可散小絡可緩故其痛止非若經脈之無罅隙者按之則愈實而愈痛也其著於腸胃之募原也飽食則安飢而痛寒氣客於挾脊之脈則深按之不能及故按之無益也挾脊者足太陽經也其最深者則伏沖伏膂之脈故按之不能及其處寒氣客於衝脈衝脈起於關元隨腹直上寒氣客則脈不通脈不通則氣因之故喘動應手矣關元任脈穴在臍下三寸衝脈起於胞中即關元也其脈並足少陰腎經挾臍上行會於咽喉而腎脈上連於肺若寒氣客之則脈不通脈不通則氣亦逆故喘動應手也寒氣客於背俞之脈則脈泣脈泣則血虛血虛則痛其俞注於心故相引而痛按之則熱氣至熱氣至則痛止矣背俞五臟俞也皆足太陽經穴太陽之脈循膂當心入散上出於項故寒氣客之則脈澀血虛為背與心相引而痛因其俞注於心也按之熱至而痛止者正以血虛故耳寒氣客於厥陰之脈厥陰之脈者絡陰器繫於肝寒氣客於脈中則血泣脈急故脅肋與少腹相引痛矣肝經之脈循陰股入髦中抵少腹布脅肋也厥氣客於陰股寒氣上及少腹血泣在下相引故腹痛引陰股厥氣寒逆之氣也少腹陰股之間乃足三陰衝脈之所中行也寒氣之犯皆相引而痛寒氣客於小腸膜原之間絡血之中血泣不得注於大經血氣稽留不得行故宿昔而成積矣小腸為受盛之府化物所出若寒氣客於膜原絡血之間則血澀不行故不得注於大經稽留漸久因成積也寒氣客於五臟厥逆上泄陰氣竭陽氣未入故卒然痛死不知人氣復反則生矣寒傷臟氣則氣不得降而厥逆上泄乃致真陰暴竭陽氣未能遽入故卒然痛死必待臟氣復返則生矣寒氣客於腸胃厥逆上出故痛而嘔也腸胃亦言腑也水穀之在六腑必自上而下乃其順也若寒氣客之則逆而上出故為痛為嘔寒氣客於小腸小腸不得成聚故後泄腹痛矣小腸為丙火之府而寒邪勝之則陽氣不化水穀不得停留故病為後泄腹痛矣熱氣留於小腸腸中痛疸熱焦渴則堅幹不得出故痛而閉不通矣熱留小腸是陽臟陽病也故為疸熱焦竭堅干痛閉之疾治痛之法有曰痛無補法者有曰通則不痛痛則不通者有曰痛隨利滅者人相傳誦皆以此為不易之法凡是痛症無不執而用之不知痛隨利滅利字訓作通字非下也假令在表者實汗而利之在裡者實下而利之在氣血者實散之行之而利之則得治實之法也然痛症亦有虛實治法亦有補瀉其辨之之法不可不詳凡痛而脹閉者多實不脹不閉者多虛痛而拒按者為實可按者為虛喜寒者多實愛熱者多虛飽而甚者多實飢而甚者多虛脈實氣粗者多實脈虛氣少者多虛新病壯年者多實愈攻愈劇者多虛痛在經者脈多弦大痛在臟者脈多沉微必兼脈症而察之則虛實自有明辨實者可利虛者亦可利乎不當利而利之則為害不淺故凡治表虛而痛者陽不足也非溫經不可裡虛而痛者陰不足也非養榮不可上虛而痛者心脾受傷也非補中不可下虛而痛者脫泄亡陰也非速救脾腎溫補命門不可夫以溫補而治痛者古人非不多也惟近代薛立齊尤得之奈何明似丹溪而亦曰諸痛不可補氣局人意見如此痹風寒濕三氣雜至合而為痹痹者閉也一陰一陽結謂之喉痹食痹而吐是皆閉塞之義也故風寒濕三氣雜至則壅閉經絡血氣不行而病為痹即痛風不仁之屬痹音祕其風氣勝者為行痹風者善行數變故為行痹凡走注歷節疼痛之類皆是也寒氣勝者為痛痹陰寒之氣客於肌肉筋骨之間則凝結不散陽氣不行故痛不可當即痛風也濕氣勝者為著痹也著痹者肢體重著不移或為疼痛或為頑木不仁濕從土化病多發於肌肉其有五者以冬遇此者為骨痹以春遇此者為筋痹以夏遇此者為脈痹以至陰遇此者為肌痹以秋遇此者為皮痹遇此者指上文之三氣也內舍五臟六腑五臟皆有合病久而不去者內舍於其合也皮肉筋骨脈皆有五臟之合病在外而久不去則各因其合而內連於臟矣故骨痹不已復感於邪內舍於腎筋痹不已復感於邪內舍於肝脈痹不已復感於邪內舍於心肌痹不已復感於邪內舍於脾皮痹不已復感於邪內舍於肺所謂痹者各以其時重感於風寒濕之氣也舍者邪入而居之也時謂氣王之時五臟各有所應也病久不去而復感於邪氣必更深故內舍其合而入於臟凡痹之客五臟者肺痹者煩滿喘而嘔肺在上焦其脈循胃口故為煩滿喘而嘔也心痹者脈不通煩則心下鼓暴上氣而喘嗌乾善噫厥氣上則恐心合脈而痹氣居之故脈不通心脈起於心中其支者上挾咽其直者卻上肺故病此諸症厥氣陰氣也心火衰則邪乘之故神怯而恐肝痹者夜臥則驚多飲數小便上為引如懷肝藏魂肝氣痹則魂不安故主夜臥驚駭肝脈下者過陰器抵少腹上者循喉嚨之後上入頏顙故為病如此腎痹者善脹尻以代踵脊以代頭腎者胃之關腎氣痹則陰邪乘胃故腹善脹尻以代踵者足攣不能伸也脊以代頭者身僂不能直也以腎脈入跟中上踹內出膕內廉貫脊屬腎故為是病脾痹者四肢解墮發咳嘔汁上為大塞脾主四肢故令解墮其脈屬脾絡胃上膈挾咽今其氣痹不行故發咳嘔汁甚則上焦痞隔為大塞不通也腸痹者數飲而出不得中氣喘爭時發飧泄腸痹者兼大小腸而言腸間病痹則下焦之氣不化故雖數飲而水不得出水不出則本末俱病故與中氣喘爭蓋其清濁不分故時發飧泄胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕胞膀胱之脬也膀胱氣閉故按之則內痛水閉不行則蓄而為熱故若沃以湯且澀於小便也膀胱之脈從巔入絡腦故上為清涕陰氣者靜則神藏躁則消亡陰氣者臟氣也五臟者所以藏精神魂魄志意者也人能安靜則邪不能幹故精神完固而內臟若躁擾妄動則精氣耗散神志消亡故外邪得以乘之五臟之痹因而生矣飲食自倍腸胃乃傷六腑者所以受水穀而化物者也若過用不節致傷脾胃則六腑之痹因而生矣淫氣喘息痹聚在肺淫氣憂思痹聚在心淫氣遺溺痹聚在腎淫氣乏竭痹聚在肝淫氣肌絶痹聚在脾淫氣邪亂之氣也五臟之痹上文雖已詳言然猶有其辨者如此又可因之以知其聚在何臟也諸痹不已亦益內也在表者不去必日內而益深矣其風氣勝者其人易已也風為陽邪可以散之故易已然則寒濕二痹愈之較難以陰邪留滯不易行也痹其時有死者或疼久者或易已者肰其入臟者死其留連筋骨間者疼久留皮膚間者易已入臟者死傷真陰也留連筋骨者疼久邪之深也留皮膚者易已邪之淺也其客於六腑者亦其食飲居處為其病本也水穀之寒熱感則害及六腑居處之邪氣感則傷在六陽故食飲居處為六腑致病之本六腑亦各有俞風寒濕氣中其俞而食飲應之循俞而入各舍其腑也俞言周身之穴凡邪可入皆謂之俞非榮俞背俞之謂食傷於內邪中於外表裡相應故得乘虛而入舍於腑榮衛之氣不令人痹蓋榮者水穀之精氣也和調於五臟灑陳於六腑乃能入於脈也故循脈上下貫五臟絡六腑也衛者水穀之悍氣也其氣慓疾滑利不能入於脈也故循皮膚之中分肉之間熏於肓膜散於胸腹肓者凡控腹肉理之間上下空隙之處也膜筋膜也逆其氣則病從其氣則愈不與風寒濕氣合故不為痹營衛之氣但不可逆故逆之則病從之則愈然非若皮肉筋骨血脈臟腑之有形者也無跡可著故不與三氣為合蓋無形亦無痹也痹或痛或不痛或不仁或寒或熱或燥或濕痛者寒氣多也有寒故痛也寒多則血脈凝滯故必為痛其不痛不仁者病久入深榮衛之行澀經絡時疏故不痛皮膚不營故為不仁其寒者陽氣少陰氣多與病相益故寒也凡病寒者不必盡由於外寒但陽氣不足陰氣有餘則寒從中生與病相益故為寒症其熱者陽氣多陰氣少病氣勝陽遭陰故為痹熱遭逢也陽盛遭陰則陰氣不能勝之故為痹熱其多汗而濡者此其逢濕盛也陽氣少陰氣盛兩氣相感故汗出而濡也上文兼燥而言此則全提寒濕兩氣也其文法如此陰氣有餘為多汗身寒亦此義也夫痹而不痛者痹在於骨則重在於脈則血凝而不流在於筋則屈不伸在於肉則不仁在於皮則寒具此五者則不痛也具此五者則筋骨皮肉血脈間氣無不痹故不得為痛也凡痹之類逢寒則急逢熱則縱周痹之在身也上下移徙隨脈其上下左右相應間不容空此痛在血脈之中邪將在分肉之間乎何以其痛之移也間不及下針其慉痛之時不及定治而痛已止慉痛動而痛也間不及下針不及定治言移動之速也慉音觸此名衆痹非周痹也各在其處更發更止更居更起以右應左以左應右非能周也更發更休也各在其處謂隨聚而發也不能周遍上下但或左或右更發更休患無定所故曰衆痹必刺其處勿令復起治從其本故可勿令復起周痹者在於血脈之中隨脈以上隨脈以下不能左右各當其所能上能下但隨血脈而周遍於身故曰周痹非若衆痹之左右移易也痛從上下者先刺其下以過之後刺其上以脫之痛從下上者先刺其上以過之後刺其下以脫之過者去之之謂脫者拔絶之謂先刺以過之去其標也後刺以脫之拔其本也此痛安生而有名風寒濕氣客於外分肉之間迫切而為沫沫得寒則聚聚則排分肉而分裂也分裂則痛邪氣客於肌表漸入分肉之間則迫切津液而為汁沫沫得寒則聚而不散故排裂肉理為痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痹發發則如是痛則心注其處故神歸之神歸即氣歸也氣歸則熱熱則寒散而痛暫解然其逆氣仍在故痛雖解而厥未除則別有所聚故或自上而下或自下而上他痹發矣是名周痹發仍如此此內不在臟而外未發於皮獨居分肉之間真氣不能周故命曰周痹真氣不能周即氣閉不行也故曰痹者閉也足太陽之筋病小趾支跟踵痛膕攣其筋起於足小趾結於踵上循跟結於膕也脊反折項筋急肩不舉腋支缺盆中紐痛不可左右搖其別者結於臀上挾脊上項其支者結於肩髃入腋下上出缺盆故為此病治在燔針名曰仲春痹也仲春痹者足太陽之經應二月之氣也此以手足六經分主十二月蓋以辨陰陽盛衰之義也足少陽之筋病小趾次趾支轉筋引膝外轉筋膝不可屈伸膕筋急足少陽之經起於小趾次趾上循脛外廉結於膝外廉也前引髀後引尻即上乘䏚季脅痛其筋之支者上走髀前者結於伏兔後者結於尻其直者上乘䏚及季脅也上引缺盆膺乳頸維筋急其直者繫於膺乳結於缺盆上循耳後也維者牽繫之謂從左之右右目不開上過右角並蹺脈而行左絡於右從左之右則右目不開是右病由左也然則左目不開者病由於右可知矣角額角也並蹺脈而行者陰蹺陽蹺陰陽相交陽入陰陰出陽交於目鋭眥故左絡於右故傷左角右足不用命曰維筋相交傷左角之筋而右足不用則其從右之左者亦然蓋筋之維絡相交如此也治在燔針名曰孟春痹也足少陽以生陽之經故應正月之氣也足陽明之筋病足中趾支脛轉筋腳跳堅本經之筋起於中趾結於跗上邪外上行加於輔骨上結於膝外廉其直者上循骭結於膝也跳者跳動堅者堅強也伏兔轉筋髀前腫㿉疝腹筋急其直者上循伏兔結於髀聚於陰器上腹而布也引缺盆乃頰卒口僻急者目不合熱則筋縱目不開頰筋有寒則急引頰移口有熱則筋弛縱緩不勝收故僻僻歪斜也其經自缺盆上頸頰挾口上合於太陽太陽為目上綱陽明為目下綱故凡目之不合不開口之急縱歪僻者皆足陽明之筋病寒則急而熱則緩也治之以馬膏膏其急者以白酒和桂以塗其緩者以桑鉤鉤之即以生桑炭置之坎中高下以坐等以膏尉急頰且飲美酒啖美炙肉不飲酒者自強也為之三拊而已馬膏馬脂也其性味甘平柔潤能養筋治痹故可以膏其急者白酒辣桂性味辛溫能通經絡行血脈故可以塗其緩者桑之性平能和關節除風寒濕痹諸痛故以桑鉤鉤之者鉤正其口也復以生桑火炭置之地坎之中高下以坐等者欲其深淺適中便於坐而得其暖也然後以前膏尉其急頰且飲之美酒啖之美肉皆助血舒筋之法也雖不善飲亦自強之三拊而已言再三拊摩其患處則病自已矣啖音淡拊音府治在燔針名曰季春痹也足陽明正盛之經三月應之氣也足太陰之筋病足大趾支內踝痛轉筋痛足太陰之筋起大趾之端上結於內踝也膝內輔骨痛陰股引髀而痛陰器紐痛下引兩臍脅痛引膺中脊內痛其直者絡於膝內輔骨上陰股結於髀聚於陰器上臍腹胸脅其內者著於脊也治在燔針命曰仲秋痹也蓋足太陰之經應八月之氣也足少陰之筋病足下轉筋及所過而結者皆痛及轉筋足少陰之經起於小趾之下故病足下轉筋所過而結者以其並足太陰之筋斜走內踝之下結於踵又與太陽之經合而上結於內輔之下又並太陰之筋而上循陰股結於陰器皆能為痛及轉筋也病在此者主癇瘛及痙癇癲癇也瘛牽急也痙堅強反張尤甚於瘛者也足少陰為天一之經真陰受傷故為此病瘛音熾在外者不能俯在內者不能仰故陽病者腰反折不能俯陰病者不能仰在外者與太陽之筋合故不能俯在內者循脊內挾膂上至項故不能仰陽病者即在外者也陰病者即在內者也治在燔針在內者尉引飲藥此筋折紐紐發數甚者死不治尉引所以舒筋飲藥所以養血折紐者即轉筋之甚發日數病日甚者陰虧之極也故當死不治名曰孟秋痹也蓋足少陰為生陰之經應七月之氣也足厥陰之筋病足大趾支內踝之前痛內輔痛陰股痛轉筋足厥陰之筋起於大趾之上結於內踝之前又結於內輔骨之下上循陰股也陰器不用傷於內則不起傷於寒則陰縮入傷於熱則縱挺不收陰器者前陰之具也厥陰之筋結於此陰器病者有此三者之異治在行水清陰氣清理也此言當以藥治之在通行水臟而調陰氣蓋水則肝之母也其病轉筋者治在燔針轉筋者治當在經也命曰季秋痹也足厥陰者陰盡之經也故應九月之氣也手太陽之筋病小指支肘內鋭骨後廉痛循臂陰入腋下腋下痛腋後廉痛繞肩脾引頸而痛應耳中鳴痛引頷目瞑良久乃得視手太陽之筋起於小指上結於腕結於肘內鋭骨之後上結於腋下上肩循頸結於耳後結於頷上屬目外眥故其痛引耳頷則瞑目良久方可開視也頸筋急則為筋瘻頸腫寒熱在頸者治在燔針筋瘻頸腫即鼠瘰之屬其為腫者復而鋭之刺而腫不退者復刺之當用鋭針即鑱針也本支者上曲牙循耳前屬目外眥上頷結於角其痛當所過者支轉筋本支者即其直支也角耳上角也凡當其所過之處皆當轉筋而痛治在燔針名曰仲夏痹也手太陽之筋應五月之氣也手少陽之筋病當所過者即支轉筋舌卷手少陽之筋起於小指次指之端結於腕上循臂結於肘上繞臑外廉上肩走頸其支者當曲頰入系舌本故當所過者為轉筋而痛治在燔針名曰季夏痹也手少陽之經應六月之氣也手陽明之筋病當所過者支痛及轉筋肩不舉頸不可左右視手陽明之筋起於大指次指之端結於腕上結於肘外上臑結於髃其支者達肩胛挾脊其直者從肩髃上頸又支者上頰結於頄又直者上左角絡頭下右頷故當所過之處為支痛轉筋如此治在燔針名曰孟夏痹也手陽明為兩陽合明之經故應四月之氣手太陰之筋病當所過者支轉筋痛甚成息賁脅急吐血手太陰之筋起於大指循指上行結於魚後上循臂入肘中上臑內廉入腋下出缺盆結肩前髃上結缺盆下結胸裡散貫賁合賁下抵季脅故其所過之處當轉筋痛甚而病如此治在燔針名曰仲冬痹也手太陰之經應十一月之氣也手心主之筋病當所過者支轉筋前及胸痛息賁手厥陰之筋起於中指結於肘內廉上臂陰結腋下下散前後挾脅其支者入腋散胸中結於賁故當所過者為病如此治在燔針名曰孟冬痹也手厥陰以兩陰交盡之經故應十月之氣手少陰之筋病內急心承伏梁下為肘網其病所過者支轉筋筋痛承承於下也伏梁堅伏之積也網如網羅之牽急也手少陰之筋起於小指內側結於鋭骨上結肘內廉上入腋挾乳里結於胸中下繫於臍故在內側為急為伏梁在外則為肘網及當其所過之處為轉筋筋痛等病治在燔針其成伏梁唾血膿者死不治臍上臍下皆為伏梁若伏梁已成而唾見血膿者病劇臟傷故死不治名曰季冬痹也手少陰之筋應十二月之氣也治在燔針者燔針劫刺以知為數以痛為輸燔針燒針也劫刺因火氣而劫散寒邪也燔針焠針義以知為數知其氣至為度也以痛為輸即其痛處是穴也經筋之病寒則反折筋急熱則筋弛縱不收陰瘻不用陽急則反折陰急則俯不伸此以下皆結上文經筋為病而總言之也陽急陰急指足太陽少陰為言皆為背病陽急在外則反張而折陰急在內則俯不能伸也焠刺者刺寒急也熱則筋縱不收無用燔針筋痹之病屬寒者多故以上皆言治在燔針劫刺然有因於熱者治當遠熱無用燔針驗在筋之急與縱耳足之陽明手之太陽筋急則口目為噼眥急不能卒視治皆如右方也此申言口眼歪僻之證必系足陽明手太陽之筋病也痹疝厥陰有餘病陰痹厥陰者風木之氣也風木有餘則邪並於肝肝經之脈結於諸陰之分故病為陰痹此下皆提脈象以明之也善診者無泥於文不足病生熱痹厥陰之氣不足則陽邪勝之故病生熱痹滑則病狐疝風滑為陽邪有餘而病風者熱則生風也疝者前陰少腹之病男女五臟皆有之狐之晝伏夜出陰獸也疝在厥陰其出入上下不常與狐相類故曰狐疝風此非外之入風乃以肝邪為言也澀則病少腹積氣澀為氣虛為血滯故邪氣留止而病為積聚少陰有餘病皮痹隱軫少陰者君火之氣也火盛則剋金皮者肺之合故為皮痹隱軫即癮疹也不足病肺痹火不足則金無所畏燥邪獨勝故病為肺痹滑則病肺風疝滑實則君火為邪故乘於肺病在氣也澀則病積溲血澀為心血不足故經滯而為積聚血亂而為溲血也太陰有餘病肉痹寒中太陰者濕土之氣也濕邪有餘故為肉痹寒濕在脾故為寒中不足病脾痹上弱則脾氣不行也滑則病脾風疝太陰脈滑則土邪有餘脾風疝者即㿗腫重墜之屬病在濕也澀則病積心腹時滿脾脈入腹上注心中澀因脾弱故病脾積及心腹時滿陽明有餘病脈痹身時熱陽明者燥金之氣也其合大腸與胃燥氣有餘則血脈虛而陰水弱故病脈痹及身為時熱不足病心痹燥氣不足則火勝為邪故病為心痹滑則病心風疝滑則燥熱生風熱則主於心也故為心風疝澀則病積時善驚澀則胃虛而滯故病胃積虛者風木乘之故善驚太陽有餘病骨痹身重太陽者寒水也之氣其合腎其主骨故太陽寒邪有餘者主為骨痹為身重不足病腎痹不足則腎氣弱故病為腎痹滑則病腎風疝太陽滑實者風寒挾邪故病腎風疝澀則病積善時巔疾太陽之脈交巔上絡腎屬膀胱故其脈澀氣滯當為腎積及頂巔之病少陽有餘病筋痹脅滿少陽者相火之氣也其合肝膽其主筋其脈行於脅肋故少陽之邪有餘者病筋痹脅滿不足病肝痹少陽不足則肝臟氣虛故病為肝痹滑則病肝風疝滑實則風熱合邪而為肝風疝病在筋也澀則病積時筋急目痛澀以血滯故病肝積肝主筋開竅於目故為筋急目痛疝症不一狐疝出入不常又從下而上也㿗疝頑腫不仁又從上而下也沖疝自少腹上衝心而痛也厥疝積氣在腹中氣逆為疝也有瘕者以少腹冤熱而痛出白一名曰蠱也有六經風疝者如上所云也有小腸疝者小腹痛腰脊控睪而痛時窘之後者亦疝之屬也任脈為病男子內結七疝女子帶下瘕聚蓋任脈者起於中極之下以上毛際循腹裡上關元總諸陰之會故諸疝之在小腹者無不由任脈為之原而諸經為之派耳云七疝者乃總諸疝為言不過六七耳後世俗工所立謬名又獨以厥陰經為言者皆未當也大都此症寒則多痛熱則多縱濕則多腫墜虛者亦然若重在血分者不移在氣分者多動分察六者於諸經各因其多少虛實而兼治之自無不效也痿五臟各有所合皆能使人痿痿者痿弱無力舉動不能也故肺熱葉焦則毛皮虛弱急薄著則生痿躄也肺痿者皮毛痿也蓋熱乘肺金在內則為葉焦在外則皮毛虛弱而為急薄若熱氣留著不去而及於筋脈骨肉則病生痿躄躄者足弱不能行也心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折挈脛縱而不在地也心痿者脈痿也心氣熱則火獨上炎故三陰在下之脈亦皆厥逆上上逆則下虛乃生脈痿脈痿者凡四肢關節之處如樞紐之折而不能提掣足脛縱緩而不能任地也肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿肝痿者筋痿也膽附於肝肝氣熱則膽汁溢泄故為口苦筋膜受熱則血液乾燥故拘急而攣為筋痿也脾氣熱則胃干而渴肌肉不仁發為肉痿脾痿者肉痿也脾與胃以膜相連而開竅於口故脾氣熱則胃干而渴脾主肌肉今熱蓄於內則精氣耗傷故肌肉不仁發為肉痿腎氣熱則腰脊不舉骨枯而髓減發為骨痿腎痿者骨痿也腰者腎之府其脈貫脊其主骨髓故腎氣熱則見症若此何以得之肺者臟之長也為心之蓋也有所失亡所求不得則發肺鳴鳴則肺熱葉焦發為痿躄肺位最高故謂之長覆於心上故謂之蓋肺志不伸則氣鬱生火故喘息有聲發為肺鳴金臟病則失其清肅之化故熱而葉焦五臟之陰皆為之不足此痿躄之生於肺也悲哀太甚則胞絡絶胞絡絶則陽氣內動發則心下崩數溲血也胞絡者子宮之絡脈也胞脈屬心而絡於胞中故悲哀太甚則心系急而胞絡絶上下不交亢陽內動逼血下崩令人數為溺血也故大經空虛發為肌痹傳為脈痿血失則大經空虛無以滲灌肌肉榮養脈絡故先為肌肉頑痹而後傳為脈痿者生於心也思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫思想無窮所願不得欲不遂也意淫於外入房太甚陰氣傷也故宗筋弛縱發為筋痿宗筋者聚於前陰精傷於內氣陷於下故為白淫即今之所謂帶濁也故曰筋痿者生於肝使內也肝主筋故使內而筋痿者生於肝也有漸於濕以水為事若有所留居處相濕肌肉濡漬痹而不仁發為肉痿漸有由來也以水為事從事於卑濕之所也相並也脾主肌肉而惡濕濕著於肉則衛氣不榮故肌肉頑痹而為肉痿漬早四切故曰肉痿者得之濕地也地之濕氣感則害皮肉筋脈病生於脾也有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水臟也今水不勝火則骨枯而髓虛故足不任身發為骨痿遠行勞倦最能生熱陽盛則內伐真陰水不勝火故主於腎故曰骨痿者生於大熱也熱甚則精髓乾涸故骨枯而為痿病生於腎也何以別之肺熱者色白而毛敗心熱者色赤而絡脈溢肝熱者色蒼而爪枯脾熱者色黃而肉蠕動腎熱者色黑而齒槁蠕音軟微動貌言治痿者獨取陽明此下言治痿之法也以陽明為五臟六腑之海主潤宗筋宗筋主束骨而利機關也陽明胃脈也主納水穀化氣血以資養表裡故為五臟六腑之海而下潤宗筋宗筋者前陰所聚之筋也為諸筋之會凡腰脊溪谷之筋皆屬於此故主束骨而利機關也衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋經脈之海者衝脈為十二經之血海也故主滲灌溪谷衝脈起於氣街並少陰之經挾臍上行陽明脈亦挾臍旁去中行二寸下行故皆會於宗筋陰陽總宗筋之會會於氣街而陽明為之長皆屬於帶脈而絡於督脈宗筋聚於前陰前陰者足之三陰陽明少陽及沖任督蹺九脈之所會也九者之中則陽明為五臟六腑之海沖為經脈之海此一陰一陽總乎其間故曰陰陽總宗筋之會也會於氣街者氣街為陽明之正脈故陽明獨為之長帶脈者起於季脅圍身一周督脈者起於會陰分三歧為任沖而上行腹背故諸經者皆聯屬於帶脈支絡於督脈也故陽明虛則宗筋縱帶脈不引故足痿不用也陽明虛則血氣少不能潤養宗筋故至弛縱宗筋縱則帶脈不能收引故足痿不為用此所以當治陽明也治之各補其榮而通其俞調其虛實和其逆順筋脈骨肉各以其時受月則病已矣諸經之所溜為榮所注為俞補者所以致氣通者所以行氣上文云獨取陽明此復云各補其榮而通其俞蓋治痿者當取陽明又必察其所受之經而兼治之可也腸澼腸澼便血身熱則死寒則生腸澼滯下也利而不利之謂便血赤利也身熱者陽勝陰敗故死寒則榮氣未傷故生腸澼下白沫脈沉則生脈浮則死白沫白利也病在陰而見陰脈者為順故生見陽脈者為逆故死腸澼下膿血脈懸絶則死滑大則生下膿血者見白赤而言也懸絶者謂太過則堅而搏不足則微而脫皆胃氣去而真臟見也邪實正虛勢相懸絶故死滑因血盛大以氣充血氣未傷故生腸澼之屬身不熱脈不懸絶亦得滑大者曰生懸澀者曰死以臟期之以臟期之者肝見庚辛死心見壬癸死肺見丙丁死脾見甲乙死腎見戊己死腸澼一症即今之所謂痢疾也自仲景而後又謂之滯下無有能治者惟薛立齊獨得其義欲相資借當讀其書伏梁病有少腹盛上下左右皆有根名曰伏梁伏藏伏也梁強梁堅硬之謂裹大膿血居腸胃之外不可治治之每切按之致死按抑也切按之者謂過於妄攻也故必致死何也此下則因陰必下膿血上則迫胃脘生膈挾胃脘內癰此病連居三陰沖帶之間裹大膿血而伏於腸胃之外其上下左右皆有根系故下行者能下膿血上行者能迫胃脘致生膈胃間癰瘍也此久病也難治此非一朝夕所致者延積既久根結日深故不易治居齊上為逆居齊下為從居臍上則漸逼心肺故為逆在下者其勢猶緩故為從心脈微緩為伏梁在心下上下行時唾血又手少陰之筋病內急心承伏梁又心之積名曰伏梁起臍上大如臂上至心下然此既云齊上為逆齊下為從下文又云環齊而痛病名伏梁是不獨以心積為伏梁也蓋凡積有內伏而堅強者皆得名之獨言伏梁者其總諸積為言也勿動亟奪動動大便也奪奪土鬱也皆下之之謂言勿得妄攻而數奪其胃氣不及於病徒傷無益也有曰人有身體髀股胻皆腫環齊而痛病名伏梁此亦在衝脈之分而結於臍腹者也衝脈之在上者出頏顙循背裡在中者挾齊腹在下者伏行股足之間故其為病如此此風根也其氣溢於大腸而著於肓肓之原在齊下故環齊而痛也風根即寒氣也如積之始生得寒乃生厥乃成積即此謂也肓之原在齊下即下氣海也一名下肓謂之脖脥者即此今病在衝脈則與大小腸相附而當氣海之間故其為病如此不可動之動之為水溺澀之病不當動而妄下之則反傷其陰陰傷則積氣愈壅於下而水道為之不利也病脅下滿氣逆二三歲不已名曰息積積不在中而在脅之下者初起微小久而至大則脅滿氣逆喘促息難故曰息積今人有積在脅之下俗名為痞者其即此症惟小兒為尤多蓋以胃之大絡名曰虛里貫膈胳肺出於左乳下其動應衣為陽明宗氣所出之道也若飲食過傷脾不及化則餘氣留滯而結聚於此其根正在脅間陽明病劇則上連於肺此其所以為息積也此不妨於食不可灸刺積為導引服藥藥不能獨治也積不在胃故不妨於食喘者忌灸恐助火邪羸者忌刺恐瀉胃氣故必漸次積為導引久久行之以開其滯仍用藥餌以和其氣二者並行斯病可愈若專恃於藥而不積為導引則藥亦不能獨治之可見治之不易也人有尺脈數甚筋急而見尺脈數甚陰邪有餘而水不足也筋急而見筋脈拘急而形色外見也筋者肝之合陰氣不足則肝失所養故筋急而見所謂疹筋是人腹必急白色黑色見則病甚疹筋者病在筋也尺外以候腎尺裡以候腹故尺脈數甚則候當在腹腹者太陰陽明之所布今其肝邪外見而腹為脹急乃木賊傷脾之病也若其色見白黑則陽氣內虧病為尤甚五變少俞曰百疾之始期也必生於風雨寒暑循毫毛而入腠理或復還或留止或為風腫汗出或為消疸或為寒熱或為留疸或為積聚奇邪淫溢不可勝數同時得病或病此或病彼非天之生風有所私也犯者得之避者得無殆非求人而人自犯之殆危也天非求人而人自犯之所以有少病多病者亦在乎人之慎與不慎也試比匠人磨斧斤礪刀削斫材木本之陰陽尚有堅脆堅者不入脆者皮弛至其交節而缺斤斧焉夫一木之中堅脆不同堅者則剛脆者易傷況其材木之不同皮之厚薄汁之多少而各異耶此借木之材質以方人之稟賦也夫木之早花先生葉者遇春霜烈風則花落而葉萎久曝大旱則脆木薄皮者支條汁少而葉萎久陰淫雨則薄皮多汁者皮潰而漉卒風暴起則剛脆之木枝折杌傷秋霜疾風則剛脆之木根搖而葉落凡此五者各有所傷況於人乎此言木之凋殘各有所因以方人之疾病亦無不有所致之也杌音兀木之無枝者也木之所傷也皆傷其枝枝之剛脆而堅未成傷也人之有常病也亦因其骨節皮膚腠理之不堅固者邪之所舍也故常為病也木有堅脆所以傷有重輕人有堅脆所以病有微甚故雖同時遇風而有受有不受此病之所以異也人之善病風厥漉汗者何以候之風邪逆於腠理而汗出漉漉不止者病名風厥肉不堅腠理疏則善病風何以候肉之不堅也膕肉不堅而無分理者粗理粗理而皮不致者腠理疏此言其渾然者膝灣曰膕即足太陽經委中穴也膕中為溪谷之大會故其理粗而皮不致者可以驗通身腠理之疏也人之善病消疸者何以候之五臟皆柔弱者善病消疸何以知五臟之柔弱也夫柔弱者必有剛強剛強多怒柔者易傷也性氣剛暴而肌肉弱者乃易於傷故善病消疸何以候柔弱之與剛強此人薄皮膚而目堅固以深者長沖直揚其心剛皮膚薄者肌肉必弱目堅固而視直揚者其心必剛沖者目光突露之謂剛則多怒怒則氣上逆胸中蓄積血氣逆留臗皮充肌血脈不行轉而為熱熱則消肌膚故為消疸此其人暴剛而肌肉弱者也怒則氣逆氣逆則血留故鬱而為熱而成消疸人之善病寒熱者何以候之小骨弱肉者善病寒熱骨屬腎肉屬脾皆至陰之所在也陰不足則陽邪易入故善病寒熱何以候骨之小大肉之堅脆色之不一也顴骨者骨之本也顴大則骨大顴小則骨小目下頰骨曰顴周身骨骼大小可驗於此也皮膚薄而其肉無䐃其臂懦懦然其地色殆然不與其天同色汙然獨異此其候也䐃肉之結聚而堅者也懦懦然柔弱貌地氣陰濁天氣清明質色有餘而神色不足是地不與天同色也故殆然汙然其狀有異肉有堅脆色有不同於此可驗強弱也然後臂薄者其髓不滿故善變寒熱也髓為骨之充陰之精也故髓不滿者當病寒熱何以候人之善病痹者粗理而肉不堅者善病痹肉不堅則風寒濕邪易以入也欲知其高下者各視其部人之上下左右虛實自有不同故當各視其部人之善病腸中積聚者何以候之皮膚薄而不澤肉不堅而淖澤如此則腸胃惡惡則邪氣留止積聚乃傷脾胃之間寒溫不次邪氣稍至稸積留止大聚乃起皮膚薄者肉不堅也不潤澤者血不足也淖澤者濕滯多也此其腸胃薄惡氣稟之有虧也故或中外邪留而不去或腸胃寒溫有不以次皆足致邪而大聚起矣欲知其時先立其年時高則起時下則殆先立其年則五運六氣各有所主故知其時凡病遇生王則時之高也故可以起起言愈也如逢衰克則時之下也病當危殆矣雖不陷下當年有沖通其病必起是謂因形而生病五變之紀也雖非衰克陷下之時時年有所沖則氣有所通其病亦因而起此非上節之所謂起也如水火相沖火當畏水金木相沖木當畏金然火勝則水亦病木勝則金亦病故有以金形之人而反病於丁壬年者有以木形之人而反病於甲巳年者是謂因形生病五變之紀也病變病成而變不可不預成言病之本變言病之標標本不同是謂之變預早識也風成為寒熱風陽邪也善行而數變或並於里則陽虛陽虛則外寒或並於表則陽實陽實生外熱因於露風乃生寒熱是風成而變為寒熱也疸成為消中疸熱邪也熱積於內當病為消中善食易飢也厥成為巔疾厥逆氣也氣逆於上則或為疼痛或為眩僕而成頂巔之疾也一曰氣逆則神亂而病為巔狂久風為飧泄風從木化久風不已則脾土受傷病為飧泄而下利清穀也脈風成為癘風寒客於血脈久而不去則膚肉敗壞其病為癘病之變化不可勝數此舉風熱之邪以見致病之概其他變化百出有不可以數計者亦猶此也雜病凡治消疸僕擊偏枯痿厥氣滿發逆肥貴人則高粱之疾也消疸熱消也僕擊暴僕如擊也偏枯半身不隨也痿痿弱無力也厥四肢厥逆也高粱膏粱也肥貴之人每多厚味夫肥者令人熱中甘者令人中滿熱蓄於內多傷其陰故為此諸病隔則閉絶上下不通則暴憂之病也愁憂者氣閉塞而不行故或上或下致為痞隔而水穀有不通也暴厥而聾偏塞閉不通內氣暴薄也暴厥氣暴逆也此以內氣之逆暴有所簿而然薄侵迫之謂不從內外中風之病故瘦留著也有病不從內而外中風寒藏蓄不去則伏而為熱故致燔爍消瘦此以表邪留薄而著於肌肉筋骨之間也跖跛寒風濕之病也足不可行謂之跖一足偏廢謂之跛此在下者必風寒濕氣之病也跖音只跛波上聲黃疸暴痛癲疾厥狂久逆之所生也此以氣逆之久而陰陽營衛有所不調然後成此諸症皆非一朝所致也五臟不平六腑閉塞之所生也六腑閉塞則水穀無以化津液無以行精氣失所養故五臟有不平矣頭痛耳鳴九竅不利腸胃之所生也頭耳九竅皆手足陽明經脈所及故病由腸胃之所生然腸胃二字實兼六腑為言蓋六腑俱屬三陽三陽偏於九竅也人之缺者衛氣晝日行於陽夜半則行於陰陰者主夜夜者臥陽者主上陰者主下故陰氣積於下陽氣未盡陽引而上陰引而下陰陽相引故數缺缺者張口呼吸或伸臂展腰以陰陽相引而然也夫陽主晝陰主夜陽主升陰主降凡人之寤寐由於衛氣衛氣者晝行於陽則動而為寤夜行於陰則靜而為寐故人於欲臥未臥之際缺必先之者正以陽氣將入陰分陰積於下陽猶未靜故陽欲引而升陰欲引而降上下相引而缺由生也今人有神疲勞倦而為缺者即陽不勝陰之候陽氣盡陰氣盛則目瞑陰氣盡而陽氣盛則寤矣衛氣不得入於陰當留於陽留於陽則陽氣滿陽氣滿則陽蹺盛不得入於陰則陰氣虛而目不瞑矣衛氣留於陰不得行於陽留於陰則陰氣盛陰氣盛則陰蹺滿不得入於陽則陽氣虛故目閉也覺與陽合寐與陰並寤多者魂強寐久者魄壯魂強者生之徒魄壯者死之徒是皆陰陽盛衰之義瀉足少陰補足太陽衛氣之行於陽者自足太陽始行於陰者自足少陰始陰盛陽衰所以為缺又曰腎主為缺故當瀉少陰之照海陰蹺所出也補太陽之申脈陽蹺所出也藥法准此人之噦者谷入於胃胃氣上注於肺今有故寒氣與新穀氣俱還入於胃新故相亂真邪相攻氣並相迎復出於胃故為噦人之水穀入胃其精微之氣必上注於肺而後行於臟腑榮衛若中焦先有寒氣則新入之穀氣凝聚而不行氣不行則新故真邪還留於胃留則逆而上出故為噦也又曰肺主為噦蓋寒氣上逆而為噦氣病於胃而主於肺也補手太陰瀉足少陰手太陰肺經也足少陰腎經也寒氣自下而升逆則為噦故當補肺於上以壯其氣瀉腎於下以引其寒蓋寒從水化噦之標在胃噦之本在腎也人之唏者此陰氣盛而陽氣虛陰氣疾而陽氣徐陰氣盛而陽氣絶故為唏唏欷同歔欷也悲泣氣咽而抽息也一云泣餘聲一云哀而不泣曰唏悲憂之氣生於陰慘故為陰盛陽虛之候又曰陰與陽絶則陽不附陰故當補足太陽瀉足少陰使剛柔相濟則乖者和矣補足太陽瀉足少陰亦是陽蹺申脈陰蹺照海也人之振寒者寒氣客於皮膚陰氣盛陽氣虛故為振寒寒栗補諸陽振寒者身怯寒而振栗也補諸陽者凡手足三陽之原合及陽蹺等穴皆可酌而用之人之噫者寒氣客於胃厥逆從下上散復出於胃故為噫噫噯氣也如飽食息也此與上文之噦皆以寒氣在胃而然但彼云故寒氣者以久寒在胃言其深也此云寒客於胃者如客之寄言其淺也故厥逆之氣從下上散則復出於胃而為噫也補足太陰陽明一曰補眉本也補足太陰陽明二經使脾胃氣溫則客寒自散而噫可除眉本即足太陽經攢竹穴是亦補陽氣也人之嚏者陽氣和利滿於心出於鼻故為嚏陽氣和平順利而滿溢於心必上達於肺故出於鼻而為嚏然人有感於風寒而為嚏者以寒邪束於皮毛則陽氣無從泄越故嚏而上出是嚏從陽而發益又可知仲景曰欲嚏不能此人肚中寒正謂其陽虛也故人病陽虛等症者久無嚏而忽得之則陽氣漸回之佳兆也補足太陽眉本一曰眉上也凡陽虛於下則不能上達而為嚏補足太陽之榮於眉本者其名攢竹又名眉上蓋太陽與腎為表裡所以補陰中之陽也人之嚲者胃不實則諸脈虛諸脈虛則經脈懈惰經脈懈惰則行陰用力氣不能復故為嚲嚲懈惰貌不自持也蓋胃為五臟六腑之海故胃不實則諸脈虛而懈惰生再有行陰用力則陽氣益虛故為嚲王實甫詞云嚲著香肩即此義也嚲音妥因其所在補分肉間四體各有分部胃者肉其應故當因病所在補分肉間以壯其胃氣人之哀而泣涕出者心為五臟六腑之主也目為宗脈之所聚上液之道也口鼻為氣之門戶也故悲哀愁憂則心動心動則五臟六腑皆搖搖則宗脈感宗脈感則液道開液道開故泣涕出焉宗總也凡五臟六腑之精氣皆上注於目而為之精故目為宗脈之所聚又為上液之道氣由口鼻出入故為氣之門戶然氣之所至液必隨之如涎出於口涕出於鼻泣出於目是皆上液之屬也人之泣涕上出者皆本乎心蓋心為五臟六腑之主若悲哀憂愁動其心則五臟六腑皆應而搖臟腑搖則宗脈皆應而動動則液道開而泣涕所以出也液者所以灌精濡空竅者也故上液之道開則泣泣不止則液竭液竭則精不灌精不灌則目無所見矣故名曰奪精精由液而化孔竅得液而充故以灌精濡孔竅也液去精傷則目昏以至漸無所見者是奪其精也世之因泣而喪目者蓋亦不少矣補天柱經挾頸天柱足太陽膀胱經穴其經挾頸項之後又曰頭中分也人之太息者憂思則心系急心系急則氣道約約則不利故太息以伸出之太息者息長而大即嘆息也約猶束縛也憂愁思慮則氣抑不伸而心系急氣道約約則滿悶於中此嘆息之不容已也補手少陰心主足少陽留之也手少陰心經也心主手厥陰經也足少陽膽經也助木火之臟則陽氣可舒抑鬱可解故皆宜留針補之以針喻藥字字當體會入微人之涎下者飲食入胃胃中有熱則蟲動蟲動則胃緩胃緩則廉泉開故涎下足陽明之脈出於口胃中有熱則蟲動胃緩故廉泉開而涎下凡目之多淚鼻之多涕亦皆因熱而上液之道開也有謂肺熱甚則鼻涕出者義亦猶此補足少陰腎為胃關而脈繫於舌故當補之以壯水制火則液有所主而涎自止脾強亦能制涎不可泥也人之耳中鳴者耳為宗脈之所聚也故胃中空則宗脈虛虛則下溜脈有所竭者故耳鳴手足三陽三陰之脈皆入耳中故耳亦宗脈之所聚也陽明為諸脈之海故胃中空而宗脈虛宗脈虛則陽氣不升而下溜下溜則上竭輕則為鳴甚則為聾矣然少陽太甚壅窒為鳴者亦有之但虛者漸而實者暴虛者多而實者少其辨在有邪無邪耳學者當推廣之補客主人手大指爪甲上與肉交者也客主人足少陽經穴為手足少陽足陽明之會手大指爪甲上者手太陰之少商穴為肺氣所出之井故皆當補之以助其陽氣人之自齧舌者此厥逆走上脈氣輩至也少陰氣至則齧舌少陽氣至則齧頰陽明氣至則齧唇矣輩者類也厥逆走上則血湧氣騰至生奇疾所至之處各有其部如少陰之脈行舌本少陽之脈循耳頰陽明之脈環唇口故或為腫脹或為怪癢各因其處隨而齧之不獨止於舌也視主病者則補之察主病之經以補之也凡此十二邪者皆奇邪之走空竅者也不同常疾故曰奇邪故邪之所在皆為不足惟正氣不足然後邪得乘之難經曰不能治其虛安問其餘則深意可知矣故上氣不足腦為之不滿耳為之苦鳴頭為之苦傾目為之眩傾者沉重不能支也中氣不足溲便為之變腸為之苦鳴水由氣化故中氣不足則溲便變常而或為黃赤或為短澀多由情欲勞倦過傷精氣而然昧者概認為火鮮不誤矣且中氣不足則濁氣居之故腸胃為之苦鳴也下氣不足則為痿厥心悗痿足痿弱也厥四肢清冷也悗悶也下氣不足則升降不交故心氣不舒而為悶悗補足外踝下留之此崑崙穴也為足太陽所行之經凡於上中下氣虛之病皆可留針補之疾病第十四涕淚哭泣而淚不出者若出而少涕水所從生涕所從出雖無益於治工之所當知道之所生也言此雖無益於醫治而工所當知亦無往非道也夫心者五臟之專精也心為五臟六腑之大主精神之所舍也故為五臟之專精目者其竅也目即專精之外竅也華色者其榮也華色即專精之外榮也是以人有德也則氣和於目有亡憂知於色人有道德則心和心和則和氣見於目人有亡失則心憂心憂則憂氣知於色也是以悲哀則泣下泣下水所由生目為宗脈所聚而衆水歸之故悲則泣下五臟六腑之津液盡上滲於目心悲氣並則心系急心系急則肺舉肺舉則液上溢故泣出矣水宗者積水也積水者至陰也至陰者腎之精也宗精之水所以不出者是精持之也輔之裹之故水不行也水宗水之原也五液皆宗於腎故又曰宗精精能主持水道則不使之妄行矣夫水之精為志火之精為神水火相感神志俱悲是以目之水生也志藏於腎腎屬水也神藏於心心屬火也目為上液之道故神志相感則水生於目諺云心悲名曰志悲志與心精共湊於目也神悲於心則志應於腎故心悲名曰志悲而水火之精皆上湊也是以俱悲則神氣傳於心精上不傳於志而志獨悲故泣出也悲則心系急故神氣傳於心傳於心則精不下傳於志精聚於上志虛於下則志獨生悲而精無所持此所以水不藏於下而泣出於上也泣涕者腦也腦者陰也泣涕者因泣而涕也涕出於腦腦者精之類為髓之海故屬於陰髓者骨之充也髓充滿於骨空諸髓者皆屬於腦故腦滲為涕鼻竅上通於腦也志者骨之主也是以水流而涕從之者其行類也志與骨皆屬於腎故志為骨之主而涕亦從乎水也夫涕之與泣者其志以神悲是以涕泣俱出而橫行也橫行言其多也夫人涕泣俱出而相從者所屬之類也相從以類由勢有不容已者人哭泣而淚不出者若出而少涕不從之哭不悲也不泣者神不慈也神不慈則志不悲陰陽相持泣安能獨來泣不出淚不下也哭者以其心悲心悲以其神慈神慈則志悲志悲所以泣出夫神不慈志不悲者正以神為陽志為陰陰陽相持之固則難於惑動所以泣涕不能獨至夫志悲者惋惋則沖陰沖陰則志去目志去則神不守精精神去目涕泣出也惋慘郁也陰精也陰氣受沖則志去於目故精神不守而涕泣勿能禁也惋烏貫切夫厥則目無所見蓋因厥則陽氣並於上陰氣並於下陽並於上則火獨光也陰並於下則足寒足寒則脹也並偏聚也火獨光陽之亢也厥陰氣逆故陰陽各有所並並則陽氣不降陰氣不升故上為目無所見而下為足寒陰中無陽故又生脹滿之疾夫一水不勝五火故目眥盲一水目之精也五火即五臟之厥陽並於上者也眥當作視是以氣衝風泣下而不止夫風之中目也陽氣內守於精是火氣燔目故見風則泣下也天之陽氣為風人之陽氣為火風中於目則火氣內燔而水不能守故泣出也有以比之火疾風生乃能雨此之類也火疾風生陽之極也陽極則陰生承之乃能致雨人同天地之氣故風熱在目而泣自出也惑上於清冷之臺中階而顧匍匐而前則惑獨瞑獨視安心定氣久而不解獨博獨眩被髮長跪俯而視之後久之不已卒然自上何也臺之高者其氣寒故曰清冷之臺凡人登高博望目見非常之處無不神魂驚蕩而心生眩惑以五臟六腑之精氣皆上注於目而為之精為之精為精明之用也精之窠為眼窠者窩穴之謂眼者目之總稱五臟六腑之精氣皆上注於目故眼為精之窠而五色具焉骨之精為瞳子瞳子眸子也骨之精主於腎腎屬水其色玄故瞳子內明而色正黑筋之精為黑眼黑眼黑珠也筋之精主於肝肝色青故其色淺於瞳子血之精為絡絡脈絡也血脈之精王於心心色赤故眥絡之色皆赤其窠氣之精為白眼窠氣者言目窠之氣也氣之精主於肺肺屬金故為白眼肌肉之精為約束裹擷筋骨血氣之精而與脈併為系上屬於腦後出於項中約束眼胞也能開能闔為肌肉之精主於脾也脾屬土所以藏物故裹擷筋骨血氣四臟之精而併為目系以上出於腦項之間故有邪中於項因逢其身之虛其入深則隨眼系以入於腦入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪其精其精所中不相比也則精散精散則視歧視歧見兩物前邪字邪氣也後邪字與斜同邪氣中於風府天柱之間乘其虛則入腦連目目系急則目眩精斜故左右之脈互有緩急視歧失正則兩睛之所中於物者不相比類而各異其見是以視一為兩也此發邪氣之中人者如此以明下文之目見非常者亦猶外邪之屬耳目者五臟六腑之精也營衛魂魄之所常營神氣之所生也臟腑營衛魂魄所至者皆神氣也故目為神氣之所生故神勞則魂魄散志意亂是故瞳子黑眼法於陰白眼赤脈法於陽也故陰陽合傳而精明也陰陽即精神之本故陰陽合傳而成精明之用目者心使也心者神之舍也故神精亂而不轉卒然見非常處精神魂魄散不相得故曰惑也精神雖統於心而外用則在目故目為心之使心為神之舍所以目見非常於外則神魂眩惑於心也心有所喜神有所惡卒然相感則精氣亦亂視誤故惑神移乃復心所喜也忽逢奇異神則惡之夫神有所惡則志有不隨喜惡相感於卒然故精氣為亂去之則神移神移則復矣是故間者為迷甚者為惑間者言其未甚也亦足相迷況其甚者能無惑乎忘人之善忘者上氣不足下氣有餘腸胃實而心肺虛虛則營衛留於下久之不以時上故善忘也下氣有餘對上氣不足而言非謂下之真實也心肺虛於上營衛留於下則神氣不能相周故為善忘陽衰於上之兆也飢人之善飢而不嗜食者精氣並於脾熱氣留於胃胃熱則消穀谷消則善飢胃氣逆上則胃脘寒故不嗜食也胃氣逆上而不能運行即其寒也脾胃熱而胃脘寒所以雖飢而不欲食寒亦作虛字訓也臥人有逆氣不得臥而息有音者有不得臥而息無音者有起居如故而息有音者有得臥行而喘者有不得臥不能行而喘者有不得臥臥而喘者夫不得臥而息有音者是陽明之逆也足三陽者下行今逆而上行故息有音也足之三陽其氣皆下行足之三陰其氣皆上行亦天氣下降地氣上升之義故陽明上行者為逆逆則氣連於肺而息有聲此胃氣之不降也陽明者胃脈也胃者六腑之海其氣亦下行陽明逆不得從其道故不得臥也陽明為水穀之海氣逆不降則奔迫而上所以不得臥故曰胃不和則臥不安此之謂也不安反覆不寧之謂今人有過於飽食或病脹滿者臥必不安此皆胃氣不和之故不得臥而息無音者義亦同此起居如故而息有音者此肺之絡脈逆也絡脈不得隨經上下故留經而不行絡脈之病人也微故起居如故而息有音也病不在胃亦不在臟故起居如故氣逆於肺之絡脈者病淺而微故但為息有音耳有得臥行而喘者義亦類也不得臥臥則喘者是水氣之客也水者循津液而流也腎者水臟主津液主臥與喘也水病者其本在腎其末在肺故為不得臥臥則喘者標本俱病也不得臥不能行而喘者義亦類此所論喘息不得臥者有肺胃腎三臟之異在肺絡者起居如故而息有音也病之微者也在胃者不得臥而息有音也甚於肺者也在腎者不得臥臥則喘也又其甚者也夫息有音者即喘之漸喘出於腎則病在根本矣故愈深者必愈甚凡虛勞之喘義亦猶此有不可不察也人有臥而有所不安者臟有所傷凡五臟受傷皆能使臥不安如七情勞倦飲食風寒之類皆是也及精有所之寄則安故人不能懸其病也之寄氣復得所之謂五臟主藏精者也臟有所傷則精有所失精有所失則神有不安故必使精復神安則臥亦安矣否則病之既及又能何所懸置而可使無患哉人之不得偃臥者肺為臟之蓋五臟之應天者肺也故為五臟六腑之蓋肺氣盛則脈大脈大則不得偃臥也盛言邪氣實也故令脈大邪盛於肺者偃臥則氣促而急故不能也邪氣之客人也或令人目不瞑不臥出者邪氣惑人令人寐無從生故云不臥出也五穀入胃其糟粕津液宗氣分為三隧宗氣積於胸中出於喉嚨以貫心脈而行呼吸焉宗氣大氣也隧道也糟粕之道出於下焦津液之道出於中焦宗氣之道出於上焦故分為三隧喉嚨為肺之系而下貫於心故通宗氣而行呼吸營氣者泌其津液注之於脈化以為血以榮四末內注五臟六腑以應刻數焉榮氣出於中焦者中焦受水穀之氣泌其津液變化以為血脈外而四肢內而臟腑無所不至故其運行之數與刻數皆相應也衛氣者出其悍氣之慓疾先行於四末分肉皮膚之間而不休者也晝日行於陽夜行於陰常從足少陰之分間行於五臟六腑衛氣者水穀之悍氣也其氣慓疾滑利不能入於脈中故先行於四末分肉皮膚之間而不休者也晝行於陽常從足太陽始夜行於陰常從足少陰始今厥氣客於五臟六腑則衛氣獨衛其外行於陽不得入於陰行於陽則陽氣盛陽氣盛則陽蹺陷不得入於陰陰虛故目不瞑邪氣逆於臟腑則衛氣不得入於陰分故偏盛於陽陽偏盛則陽蹺陷陷者受傷之謂陽盛陰虛故目不瞑治之補其不足瀉其有餘調其虛實以通其道而去其邪飲以半夏湯一劑陰陽已通其臥立至此治之補瀉也若以針法言則補其不足即陰蹺所出足少陰之照海也瀉其有餘即陽蹺所出足太陽之申脈也若以藥法言則陰盛陽虛而多臥者自當補陽瀉陰矣凡不臥之症有邪實者多屬外因有營虛者多屬內因此半夏湯一法蓋專為去邪者設耳此所謂決瀆壅塞經絡大通陰陽和得者也其方以流水千里以外者八升揚之萬遍取其清五升煮之炊以葦薪火沸置秫米一升治半夏五合徐炊令竭為一升半去其滓飲汁一小杯日三稍益以知為度故其病新發者覆杯則臥汗出則已矣久者三飲而已也古今量數不同大約古之黍量一斗合今之鐵斛數三升二合然則云八升者即今之二升五合六勺云五升者即今之一升六合許耳火沸者先以火沸其水而後置藥於中也秫米糯小米也即黍米之類而粒小於黍可以作酒北人呼為小黃米其性味甘黏微涼能養營補陰半夏味辛性溫能和胃散邪除腹脹目不得瞑故並用之秫米一升約今之三合二勺半夏五合約今之一合六勺炊至一升半約今之四合八勺也病而不得臥者此言因病而不得臥者也衛氣不得入於陰常留於陽留於陽則陽氣滿陽氣滿則陽蹺盛不得入於陰則陰虛故目不瞑矣衛氣晝行於陽夜行於陰行陽則寤行陰則寐此其常也若病而失常則或留於陰或留於陽留則陰陽有所偏勝有偏勝則有偏虛而寤寐亦失常矣病目而不得視者衛氣留於陰不得行於陽留於陰則陰氣盛陰氣盛則陰蹺滿不得入於陽則陽氣虛故目閉也此言因病而目有不能開視及病而多寐者以衛氣留於陰分陰蹺滿而陽氣虛耳陰蹺陽蹺陰陽相交陽入陰陰出陽交於目內眥陽氣盛則瞋目陰氣盛則瞑目人之多臥者此人腸胃大而皮膚濕而分肉不解焉腸胃大則衛氣留久皮膚濕則分肉不解其行遲夫衛氣者晝日常行於陽夜行於陰故陽氣盡則臥陰氣盡則寤故腸胃大則衛氣行留久皮膚濕分肉不解則行遲留於陰也久其氣不精則欲瞑故多臥矣此下二節言有不因於病而為多臥少臥之異者也解利也人之臟腑在內內者陰也皮膚分肉在外外者陽也腸胃大則陰道迂遠肉理濕滯不利則陽道舒遲故衛氣之留於陰分者久行於陽分者少陽氣不精所以多瞑臥也今人有飽食之後即欲瞑者正以水穀之焊氣暴實於中則衛氣盛於陰分而精陽之氣有不能勝之耳世俗但呼為脾倦而不知其有由然也其腸胃小皮膚滑以緩分肉解利胃氣之留於陽也久故少瞑焉腸胃小則衛氣之留於陰者少皮膚滑以緩分肉解利則衛氣之留於陽者久故目少瞑也其非常經也卒然多臥者邪氣留於上焦上焦閉而不通已食若飲湯衛氣留久於陰而不行故卒然多臥焉非常經者言其變也蓋以明邪氣之所致然者邪氣居於上焦而加之食飲則衛氣留閉於中不能外達陽分故卒然多臥然有因病而不能瞑者蓋以邪客於臟則格拒衛氣不得內歸陰分耳治諸如何先其臟腑誅其小過後調其氣盛者瀉之虛者補之必先明知其形志之苦樂定乃取之治諸者統言也先其臟腑者欲辨陰陽之淺深也誅其小過者言此諸症雖非重大之疾亦不可不除之也然人之致此各有所由故於形志苦樂尤所當察蓋苦者憂勞多傷心肺之陽樂者縱肆多傷脾腎之陰必有定見然後可以治之夢氣有多少有逆從陽從左陰從右多少言甚衰也陽氣主升故從乎左陰氣主降故從乎右從者為順反者為逆老從上少從下老人之氣先衰於下故從上者為順少壯之氣先盛於下故從下者為順蓋天之生氣必自下而升而人氣亦然也故凡以老人而衰於上者其終可知少壯而衰於下者其始可知皆逆候也是以春夏歸陽為生歸秋冬為死春夏以陽盛之時或證或脈皆當歸陽為生若得陰候如秋冬者為逆為死反之則歸秋冬為生反之謂秋冬也秋冬以陰盛陽衰之時故歸陰為順曰生然不曰歸春夏為死者可見陰中有陽未必至害而陽為陰賊乃不免矣是以氣多少逆皆為厥氣有多少則陰陽不和不和則逆故為厥也有其少必有其多故陽厥多陽陰厥多陰也一上不下寒厥到膝少者秋冬死老者秋冬生陽逆於上而不下則寒厥到膝老人陽氣從上膝寒猶可少年陽氣從下膝寒為逆少年之陽不當衰而衰者故最畏陰勝之時老人陽衰本衰是其常也故於秋冬無慮焉氣上不下頭痛巔疾巔頂巔也上實下虛故病如此求陽不得求陰不審五部隔無徵若居曠野若伏空室綿綿乎屬不滿日厥之在人也謂其為陽則本非陽盛謂其為陰則又非陰盛故皆不可得蓋以五臟隔絶無徵可驗若居曠野無所聞若伏空室無所見乃病則綿綿不解勢甚凋敝若弗能終其日者可知非有餘也是以少陰之厥令人妄夢其極至迷手少陰心也心主陽其藏神足少陰腎也腎主陰其藏陰是以少陰厥逆則心腎不交而精神散越故為妄夢若其至極乃令人迷亂昏昧也三陽絶三陰微是為少氣三陽隔絶則陰虧於上三陰微弱則陽虧於下陰陽不相生化故少氣不足以息是以肺氣虛則使人夢見白物見人斬血籍籍此下言五臟陰虛之夢兆也肺虛者夢白物金色白也斬者金之用也虛者必怯故見人斬血籍籍多驚惕也得其時則夢見兵戰得金王之時也腎氣虛則使人夢見舟船溺人腎合水故夢應之得其時則夢伏水中若有畏恐得水王之時也肝氣虛則夢見菌香生草肝合木也得其時則夢伏樹下不敢起雖得木王之時而肝氣本虛故夢伏而不敢起心氣虛則夢救火陽物心合火也陽物即屬火之類也得其時則夢燔灼得火王之時也脾氣虛則夢飲食不足食廩空虛故欲得飲食得其時則夢築垣蓋屋得土王之時也此皆五臟氣虛陽氣有餘陰氣不足五臟氣虛即陰不足也陰氣不足則虛陽獨浮故云陽氣有餘無根之陽其虛可可知所以為厥為夢者皆陽不附陰之所致合之五診調之陰陽以在經脈合之五診則五臟可察調之陰陽則六經可和也淫邪泮衍正邪從外襲內而未有定舍反淫於臟不得定處與榮衛俱行而與魂魄飛揚使人臥不得安而喜夢淫邪泮衍言奇邪為夢變幻無窮也正邪者非正風之謂凡陰陽勞逸之感於外聲色嗜欲之動於內但有干於身心者皆謂之正邪亦無非從外襲內者也惟其變態恍惚未有定舍故內淫於臟則於營衛魂魄無所不亂因令人隨所感而為夢氣淫於腑則有餘於外不足於內氣盛於陽也氣淫於臟則有餘於內不足於外氣盛於陰也陰氣盛則夢涉大水而恐懼以陰勝陽故夢多陰象陽氣盛則夢大火而燔焫以陽勝陰故夢多陽象陰陽俱盛則夢相殺俱盛則爭故夢相殺上盛則夢飛陽勝者親乎上也下盛則夢墮陰勝者親乎下也盛飢則夢取因不足也盛飽則夢與因有餘也肝氣盛則夢怒肝在志為怒也肺氣盛則夢恐懼哭泣飛揚肺在志為憂故夢恐懼哭泣肺主氣故夢飛揚心氣盛則夢喜笑恐畏心在志為喜在變動為憂也脾氣盛則夢歌樂身體重不舉脾喜音樂在聲為歌其主肌肉也腎氣盛則夢腰脊兩解不屬腰為腎之府故若腰脊不相連屬凡是十二盛者至而瀉之立已陽盛則有餘於腑陰盛則有餘於臟但察其邪之所在或藥或針瀉之則已厥氣客於心則夢見丘山煙火心屬火也客於肺則夢飛揚見金鐵之奇物肺屬金也客於肝則夢山林樹木肝屬木也客於脾則夢見丘陵大澤壞屋風雨脾屬土其主濕也客於腎則夢臨淵沒居水中腎屬水也客於膀胱則夢遊行膀胱為足太陽之經屬三陽之表也客於胃則夢飲食胃為水穀之海也客於大腸則夢田野大腸為傳導之官其曲折納汙類田野也客於小腸則夢聚邑沖衢小腸為受盛之官物之所聚類邑衢也客於膽則夢鬥訟自刳膽主決斷其氣剛也客於陰器則夢接內欲念之所注也客於項則夢斬首恐怖之所及也客於脛則夢行走而不能前及居深池窖苑中厥逆之邪在下也窖窖同客於股肱則夢禮節拜起勞倦之所致也客於胞䐈則夢泄便胞溲脬也䐈大腸也在前則夢泄在後則夢便胞音拋䐈音直凡此十五不足者至而補之立已也當各隨其經或針或藥補之而已也短蟲多則夢聚衆繁盛之象也長蟲多則夢相擊毀傷長蟲勢力相角內有損傷故夢兆亦然周禮六夢一曰正夢謂無所感而自夢也二曰噩夢有所驚愕而夢也三曰思夢因於思憶而夢也四曰寤夢因覺時所為而夢也五曰喜夢因所喜好而夢也六曰懼夢因於恐畏而夢也又好仁者多夢松柏桃李好義者多夢金刀兵鐵好禮者多夢簠簋籩豆好智者多夢江湖川澤好信者多夢山嶽原野役於五行未有不然者是皆致夢之因也至其變幻之多五行之化本自無窮而夢造於心其原則一蓋心為君主之官神之舍也神動於心則五臟之神皆應之故心之所至即神也神之所至即心也第心帥乎神而夢者因情有所著心之障也神帥乎心而夢者能先兆於無形神之靈也夫人心之靈無所不至故夢象之奇亦無所不見誠有不可以言語形容者惟聖人能御物以心攝心以性則心同造化五形安得而役之故至人無夢也癰疽腸胃受谷上焦出氣以溫分肉養骨節通腠理上焦出氣宗氣也宗氣出於喉嚨而行呼吸其以溫分肉養骨節通腠理者是衛氣化於宗氣也中焦出氣如露上注溪谷而滲孫脈津液和調變化而赤為血血和則孫脈先滿溢注於絡脈皆盈乃注於經脈陰陽已張因息乃行中焦出氣如露營氣也其於陰陽已張因息乃行是營氣化於宗氣也行有經紀周有道理與天合同不得休止行有經紀周有道理人有營衛與天合度切而調之從虛去實瀉則不足從虛之之法以去實是瀉則不足也疾則氣減留則先後凡瀉者宜疾補者宜留是補之與瀉有疾留先後之異也從虛去虛補則有餘從治虛之法以去虛是補則有餘也此二節配合氣味所當仿之血氣已調形氣乃持是知血氣之平與不平也未知癰疽之所從生成敗之時生死之期有遠近何以度之持定也度入聲然經脈流行不止與天同度與地合紀故天宿失度日月薄蝕地經失紀水道流溢草萓不成五穀不殖徑路不通民不往來巷聚邑居則別離異處血氣猶然夫血脈營衛周流不休上應星宿下應經數寒邪客於經絡之中則血泣血泣則不通不通則衛氣歸之不得復反故癰腫衛氣歸之不得復反言其留聚不散也萓音宜萓男草鹿蔥也寒氣化為熱熱勝則腐肉肉腐則為膿膿不瀉則爛筋筋爛則傷骨骨傷則髓消不當骨空不得泄瀉血枯空虛則筋骨肌肉不相榮經脈敗漏熏於五臟臟傷故死矣癰毒由淺至深傷臟則死如下文所云試言癰疽之形與忌曰名癰發於嗌中名曰猛疽猛疽不治化為膿膿不瀉塞咽半日死其化為膿者瀉則合豕膏冷食三日已猛疽言為害之急也若膿已瀉當服豕膏可以愈之即豬脂之煉淨者也萬氏方有治肺熱暴喑者用豬脂一斤煉過入白蜜一斤再煉少頃濾淨冷定不時挑服一匙即愈若無疾服此最能潤肺潤腸即是豕膏之屬發於頸名曰天疽其癰大以赤黑不急治則熱氣下入淵腋前傷任脈內熏肝肺熏肝肺十餘日而死矣頸前頸也色赤黑者其毒必甚淵腋足少陽經穴其發在頸則連於肺系下入足少陽則及乎肝臟矣故至於死陽氣大發消腦留項名曰腦爍其色不樂項痛而如刺以針煩心者死不可治陽氣大發邪熱之甚也色有不樂傷乎神也痛如刺以針毒之鋭也煩心者邪犯其臟也故不可治此二症疑即天疽鋭毒發於肩及臑名曰疵癰其狀赤黑急治之此令人汗出至足不害五臟癰發四五日逞焫之肩膊下軟白肉處曰臑此非要害之所故不及五臟逞病也焫艾炷也謂宜速灸以除之也臑儒軟二音又奴刀奴到二切疵音慈焫如瑞切發於腋下赤堅者名曰米疽治之以砭石欲細而長疏貶之塗以豕膏六日已勿裹之砭石欲細者恐傷肉也欲長者用在深也故宜疏不宜密其癰堅而不潰者為馬刀挾癭急治之此即瘰癧也欲急治者恐遲則傷人也發於胸名曰井疽其狀如大豆三四日起不早治下入腹不治七日死矣發於腦者能熏心肺若不早治而使之入腹毒尤甚矣故死期之速如此發於膺名曰甘疽色青其狀如谷實𦸈𧁾常苦寒熱急治之去其寒熱十歲死死後出膿膺者胸旁之高肉處也谷實兼五穀而言謂癰所結聚形如谷實之纍纍也𦸈𧁾瓜蔞也軟而不潰中有所蓄如子也此症延綿難愈蓋即乳癰之屬𦸈𧁾古栝樓字發於脅名曰敗疵敗疵者女子之病也灸之其病大癰膿治之其中乃有生肉大如赤小豆銼䔖𧄍草根各一升以水一斗六升煮之竭為取三升則強飲厚衣坐於釜上令汗出至足已䔖菱也𧄍連翹也二草之根俱能解毒故各用一升大約古之一升得今之三合有零以水一斗六升煮取三升俱折數類此䔖音陵𧄍翹同發於股脛名曰股脛疽其狀不甚變而癰膿搏骨不急治三十日死矣股脛大股也狀不甚變言外形不顯也癰膿搏骨言膿著於骨即今人之所謂貼骨癰也毒甚而深能下蝕三陰陽明之大經故不為急治則死矣發於尻名曰鋭疽其狀赤堅大急治之不治三十日死矣尻尾骶骨也穴名長強為督脈之絡一名氣之陰郗故不治則死發於股陰名曰赤施不急治六十日死在兩股之內不治十日而當死股陰大股內側也當足太陰箕門血海及足厥陰五里陰包之間皆陰器所聚之處故不治則死若兩股俱病則傷陰之極其死尤速發於膝名曰疵癰其狀大癰色不變寒熱如堅石勿石石之者死須其柔乃石之者生膝癰未成而石之者傷其筋之府故致於死若柔則膿成矣砭之無害也今之泛施刀針者不特此也諸癰疽之發於節而相應者不可治也發於陽者百日死發於陰者三十日死諸節者神氣之所遊行出入也皆不宜有癰毒之患若其相應則發於上而應於下發於左而應於右其害尤甚為不可治然發於三陽之分者毒淺在腑其死稍緩發於三陰之分者毒深在臟不能出一月也發於脛名曰兔齧其狀赤至骨急治之不治害人也脛足脛也兔齧如有所齧傷也發於內踝名曰走緩其狀癰也色不變數石其輸而止其寒熱不死數石其輸砭其所腫之處也發於足上下名曰四淫其狀大癰急治之百日死陽氣受於四末而大癰淫於其間陽毒之盛極也時氣移易則真陰日敗故逾三月而死發於足旁名曰厲癰其狀不大初如小趾發急治之去其黑者不消輒益不治百日死不消輒益謂初如小趾而不治則日以益大也發於足趾名曰脫癰其狀赤黑死不治不赤黑不死不衰急斬之否則死矣六經原腧皆在於足所以癰發於足者多凶候至於足趾又皆六井所出而癰色赤黑其毒尤甚若無衰退之狀則急當斬去其趾庶得保生否則毒氣連臟必至死矣癰與疽何以別榮衛留於經脈之中則血泣而不行不行則衛氣從之而不通壅遏而不得行故熱大熱不止熱甚則肉腐腐則為膿然不能陷骨髓不為焦枯五臟不為傷故命曰癰此下辨癰疽之輕重也癰毒浮淺在表不能陷骨則髓不為枯五臟不為傷故病癰者可無慮也熱氣淳盛下陷肌膚筋髓枯內連五臟血氣竭當其癰下筋骨良肉皆無餘故命曰疽癰淺疽深毒有微甚故內連五臟外敗筋骨良肉者是為之疽乃可畏也疽者上之皮夭以堅上如牛領之皮癰者其皮上薄以澤此其候也夭以色言黑暗不澤也此即皮色之狀可以辨其淺深矣要知諸癰腫筋攣骨痛此皆安生此言諸病癰腫而有兼筋攣骨痛者也若以癰腫筋攣骨痛釋為三症殊失本意觀下文曰此寒氣之腫則其所本在腫義可知矣乃寒氣之腫八風之變也惟風寒之變在經所以兼筋骨之痛今有病大項風蝦蟆瘟之屬或為頭項咽喉之癰或為支節肌肉之腫正此類也治之如何此四時之病以其勝治之愈也四時之病即時氣也治之以勝寒者熱之熱者寒之溫者清之清者溫之散者收之抑者散之燥者潤之急者緩之堅者耎之脆者堅之衰者補之強者瀉之各安其氣必清必靜則病氣衰去此之謂也人病胃脘癰者何以診之診此者當候胃脈其脈當沉細沉細者氣逆胃脈見於右關所謂中附上右外以候胃也胃為多氣多血之腑脈當洪大而反見沉細故為胃氣之逆脘音管逆者人迎甚盛甚盛則熱胃氣逆而人迎盛逆在臟而熱在經也人迎三盛病在陽明之謂人迎者胃脈也人迎在結喉旁足陽明動脈也逆而盛則熱聚於胃口而不行故胃脘為癰也陽明氣逆而盛則熱邪聚於胃脘故留結為癰有病頸癰者或石治之或針灸治之而皆己其真安在其真安在言孰為正治之法也此同名異等者也頸癰之名雖同而症則有異故治亦各有所宜夫癰氣之息者宜以針開除去之息止也癰有氣結而留止不散者治宜用針以開除其氣氣行則癰愈矣夫氣盛血聚者宜石而瀉之此所謂同病異治也欲瀉其血宜用砭石血泄則氣衰而癰亦愈此病同而治異也病之生時有喜怒不測飲食不節陰氣不足陽氣有餘營氣不行乃發為癰疽陰陽不通兩熱相搏乃化為膿小針能取之乎喜怒不測則氣有所逆飲食不節則臟有所傷陰氣不足故營有不行陽氣有餘故熱從而聚皆足以致癰疽也聖人不能使化者為之邪不可留也故兩軍相當旗幟相望白刃陳於白野者此非一日之謀也能使其民令行禁止士卒無白刃之難者非一日之教也須臾之得也夫至使身被癰疽之病膿血之聚者不亦離道遠乎夫癰疽之生膿血之成也不從天下不從地出積微之所生也故聖人自治於未有形也愚者遭其已成也豈特治身者哉邪在天下則為亂邪在人身則為病及其已成則雖聖人不能使之化是以邪不可留也譬之用兵者必有夙教必有定謀而後可保其無危人之治身可素無調養之道乎故惟聖人乃能自治於未形愚者每遭其患矣治身之外可不戒乎其已形不豫遭膿已成不豫見為之奈何夫膿已成十死一生故聖人弗使已成而明為良方著之竹帛使能者踵而傳之後世無有終時者為其不豫遭也此言兆庶之多千古之邈安得人人遭遇以救其疾苦故惟有著之竹帛以遺教將來正為人之不豫遭也其已有膿血而後遭乎不道之以小針治乎以小治小者其功小以大治大者多害故其已成膿血者其唯砭石鈹鋒之所取也針小者功小無濟於事針大者多害恐有所傷故惟砭石及鈹針鋒針皆可以取癰疽之膿血多害者其不可全乎惟在逆順焉以為傷者其白眼青黑眼小是一逆也內藥而嘔者是二逆也腹痛渴甚是三逆也肩項中不便是四逆也音嘶色脫是五逆也除此五者為順矣夫順與逆豈特治身已哉五臟身有五部伏免一腓二背三五臟之腧四項五此五部有癰疽者死是亦五逆之屬也凡事逆者壞順者治故曰夫順與逆豈特治身已哉應前文以重申之亦可謂諄諄矣著此書者有心哉寓言也瘰癧寒熱瘰癧在於頸腋者此皆鼠瘻寒熱之毒氣也留於脈而不去者也瘰癧者其狀纍然而歷貫上下也故於頸腋之間皆能有之因其形如鼠穴塞其一復穿其一故又名為鼠瘻蓋以寒熱之毒留於經脈所以聯絡不止一曰結核連續者為瘰癧形長如蜆蛤者為馬刀又曰脅肋下者為馬刀鼠瘻之本皆在於臟其末上出於頸腋之間其浮於脈中而未內著於肌肉而外為膿血者易去也瘰癧必起於少陽而後延及陽明二經表裡相傳乃至厥陰太陰俱能為病大抵因鬱氣之積食味之厚或風熱之毒結聚而成故其所致之本皆出於臟而標則見乎頸腋之間也若其毒之未甚則但浮見脈中尚未著於肌肉以化膿血者去之猶易若其膿血既成則為力較難也從其本引其末可使衰去而絶其寒熱謂去其致之之本則外見之末自可引而衰也審按其道以豫之徐徐往來以去之豫與之針也審按其道審脈氣所由之道也徐往徐來即補瀉之法所謂徐而疾則實疾而徐則虛也其小如麥者一刺知三刺而已小如麥者其初起也故一刺即知其效三刺其病可已所以治在宜早不可因小而忽之決其生死反其目視之其中有赤脈上下貫瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲而死見赤脈不下貫瞳子可治也目者宗脈之所聚也瞳子者骨之精也赤脈下貫瞳子以邪毒之陷深賊陰分而然死之徵也然脈見二三者其氣散而緩脈聚為一者其毒鋭而專此又死期遲速之有異也又有診寒熱者亦同此法失守五臟者中之守也五臟者各有所藏藏而弗失則精神完固故為中之守也中盛臟滿氣勝傷恐者聲如從室中言是中氣之濕也中胸腹也臟臟腑也盛滿脹急也氣勝喘息也傷恐者腎受傷也聲如從室中言混濁不清也是皆水氣上逆之候故為中氣之濕症此脾肺腎三臟之失守也言而微終日乃復言者此奪氣也氣虛之盛故聲不接續肺臟失守也衣被不斂言語善惡不避親疏者此神明之亂也神明將脫故昏亂若此心臟之失守也倉廩不藏者是門戶不要也要約束也幽門闌門魄門皆倉廩之門戶門戶不能固則腸胃不能藏所以泄利不禁脾臟之失守也水泉不止者是膀胱不藏也膀胱與腎為表裡所以藏津液水泉不止而遺溲失禁腎臟之失守也得守者生失守者死五臟得守則無以上諸病故生失守則神去而死矣夫五臟者身之強也此下言形氣之不守而內應乎五臟也臟氣充則形體強故五臟為身之強頭者精明之府頭傾視深精神將奪矣五臟六腑之精氣皆上升於頭以成七竅之用故頭為精明之府頭傾者低垂不能舉也視深者目陷無光也臟氣失強故精神之奪如此背者胸中之府背曲肩隨府將壞矣背乃臟俞所繫故為胸中之府背曲肩隨亦臟氣之失強也腰者腎之府轉搖不能腎將憊矣此腎臟之失強也膝者筋之府屈伸不能行則僂俯筋將憊矣筋雖主於肝而維絡關節以立此身者惟膝膕之筋為最故膝為筋之府筋憊若是則諸經之失強也骨者髓之府不能久立行則振掉骨將憊矣髓充於骨故骨為髓之府髓空則骨弱無力此腎之失強者也得強則生失強則死臟強則氣強故生失強則氣竭故死此不專言夫病者人不至於是不止可勝悼哉五逆諸病皆有逆順腹脹身熱脈大是一逆也身熱脈大而加以腹脹表裡之邪俱盛也是為一逆腹鳴而滿四肢清泄其脈大是二逆也腹鳴而滿四肢清冷而兼後泄陰症也脈不宜大而大者脈症相反也是為二逆衄而不止脈大是三逆也鼻衄在陰脈大為陽陽實陰虛是為三逆咳且溲血脫形其脈小徑是四逆也咳而溲血脫形者正氣已衰脈小而急者邪氣仍在邪正不能相當是為四逆咳脫形身熱脈小以疾是謂五逆也脫形身熱真陰已虧而火獨不清也其脈細小疾數者邪盛正衰之候是為五逆如是者不過十五日而死矣一節之更時移氣易客強主弱則不能勝故不過十五日而死其腹大脹四末清脫形泄甚是一逆也此下言五逆之急症也腹大脹者最忌中虛若見四肢清冷而脫形泄甚者脾元敗而陽氣去也故為一逆腹脹便血其脈大時絶是二逆也腹脹便血陰病也脈大時絶孤陽將脫也故為二逆咳溲血形肉脫脈搏是三逆也咳而溲血者氣血俱病形肉脫者敗在脾脈搏者真臟也敗在胃氣故為三逆嘔血胸滿引背脈小而疾是四逆也嘔血胸滿引於背者臟氣連乎背也脈見細小疾數則真元大虧矣故為四逆咳嘔腹脹且飧泄其脈絶是五逆也上為咳嘔中為脹滿下為飧泄三焦俱病而脈至於絶者有邪無正也故五逆也如是者不及一時而死矣不及一時謂不能周一日之時也工不察此者是為逆治病不可治而強治之非惟無益適以資害是謂逆治也死期風痹淫濼病不可已者病在陽命曰風病在陰命曰痹陰陽俱病命曰風痹淫濼者浸淫日深之謂濼音漉足如履冰時如入湯中股脛淫濼煩心頭痛時嘔時悗眩已汗出久則目眩悲以喜恐短氣不樂不出三年死也足如履冰之寒又如入湯之熱下而股脛中而腹心上而頭目無所不病在表則汗出在裡則短氣不樂或為悲哀或為喜恐此陰陽俱病之候雖尚可支持然不能出三年也導引行氣喬摩灸尉刺焫飲藥諸方者衆人之方也非一人之所盡行也謂當因人所宜以施治是衆人各有其方也守一勿失萬物以畢人得其一則萬變之道可畢矣而陰陽之要虛實之理傾移之過可治之屬其病之變化淫傳絶敗而不可治者淫邪傳變未必即危正氣絶敗則不可治矣昭乎如日醒窘乎如夜瞑何為日醒明於陰陽如惑之解如醉之醒何謂夜瞑喑乎其無聲漠乎其無形折毛髮理正氣橫傾淫邪泮衍血脈傳溜大氣入臟腹痛下淫可以致死不可以致生昭乎如醒道之明也窘乎如瞑察之難也大氣大邪之氣也凡邪之中人喑乎其無聲不可得而聞也漠乎其無形不可得而見也至其絶敗則為折毛髮理正氣橫傾等症故有死無生也大氣入臟病先發於心一日而之肺三日而之肝五日而之脾三日不已死冬夜半夏日中病發於心而傳於肺火乘金也三日而金復乘術故傳之肝也五日而木復乘土故傳之脾也再三日而邪氣不退其甚則死冬月夜半水王之極也夏月日中火王之極也心火畏水故冬則死於夜半陽邪亢極故夏則死於日中蓋衰極亦死盛極亦死有所偏勝則有所偏絶也五行之氣無不皆然下文之義皆仿此病先發於肺三日而之肝一日而之脾五日而之胃十日不已死冬日入夏日出自肺而肝自肝而脾皆傳所勝也自脾而胃表裡相傳也肺邪壬於申酉故冬則死於日入金氣絶於寅卯故夏則死於日出病先發於肝三日而之脾五日而之胃三日而之腎三日不已死冬日入夏早食此肝木傳土而土邪復傳水臟也木受傷者金勝則危故冬畏日入肝發病者木強則劇故夏畏早食時也病先發於脾一日而之胃二日而之腎三日而之膂膀胱十日不已死冬人定夏晏食此土邪乘水而表裡俱相傳也人定在亥而土病於冬者畏之寒水反能侮土也晏食在巳而脾病於夏者畏之以戊巳王鄉而合邪為患也病先發於胃五日而之腎三日而之膂膀胱五日而上之心二日不已死冬夜半夏日昳此土邪傳水而水復傳火故自膀胱以及於心也冬夜半後醜也夏日昳未也皆土王之時故胃病逢之氣極則敗昳音迭病先發於腎三日而之膂膀胱三日而上之心三日而之小腸三日不已死冬大晨夏晏晡此水病乘火而表裡皆相傳也大晨辰刻也為水之庫晏晡戌時也土能伐水故病發於腎者不能出乎此也病先發於膀胱五日而之腎一日而之小腸一日而之心二日不已死冬雞鳴夏下晡此亦水火兩臟自表而里之相傳也冬之雞鳴在醜陰之極也夏之下晡在未水所畏也膀胱為水腑故其盛極衰極皆能死諸病以次相傳如是者皆有死期不可與治也間一臟及二三四臟者乃可與治也夫病傳者心病先心痛此下皆詳明病傳之見症也故病發於心者其症必先為心痛一日而咳心病傳肺也上文病傳論所謂一日而之肺者即其義也餘臟准此三日脅支痛肺復傳肝故脅支痛即所謂三日而之肝也五日閉塞不通身痛體重所謂五日而之脾也脾病則不能運化故閉塞不通三日不已死再三日不已則脾又傳腎五臟俱傷故死冬夜半夏日中此子午時也釋義雖如上文然少陰君火主子午正對之化心通其氣失守則死亦一義也肺病喘咳肺主息故病為喘咳三日而脅支滿痛三日而之肝也一日身重體痛一日而之脾也五日而脹五日而之胃自臟傳腑也十日不已死十日不已則胃復傳腎而五行生成之數已極故死冬日入夏日出此卯酉時也屬燥金之化肺主氣失守則死肝病頭目眩脅支滿肝開竅於目而經脈布於脅肋也三日體重身痛即三日而之脾也五日而脹即五日而之胃也三日腰脊少腹痛脛痠即三日而之腎也三日不已死三日不已則腎復傳心故死冬日入夏早食酉卯時也燥金主之為木所畏脾病身痛體重脾主肌肉也一日而脹即一日而之胃也二日少腹腰脊痛脛痠即二日而之腎也三日背膂筋痛小便閉即三日而之膂膀胱也十日不已死十日不已則復傳於心故死冬人定夏晏食此巳亥時也司風木之化脾病畏之也腎病少腹腰脊痛胻痠腎主下部其經脈行於少腹腰脊胻骨之間也三日背膂筋痛小便閉即三日而之膂膀胱也三日腹脹即三日而之小腸也三日兩脅支痛即三日而上之心也手心主之正別下淵液三寸入胸中故兩脅支痛三日不已死復傷肺金也冬大晨夏晏晡此辰戌時也土主四季為水所畏故腎病主之胃病脹滿胃脈布於腹裡也五日少腹腰脊痛胻痠即五日而之腎也三日背膂筋痛小便閉即三日而之膂膀胱也五日身體重五日而上之心血脈傷身體重痛重字下疑有一痛字六日不已死心復傳肺也冬夜半後夏日昳醜未司濕土之化氣通於胃失守則死理之自然膀胱病小便閉膀胱為津液之府也五日少腹脹腰脊痛胻痠即五日而至腎也一日腹脹即一日而之小腸也一日身體痛即一日而之心腑傳臟也心主血脈故為身體痛二日不已死心病不已必又傳金臟故死冬雞鳴夏下晡醜未時也土能剋水故膀胱之病畏之諸病以死是相傳如是者皆有死期不可刺上文相傳死期各有遠近蓋其臟有要害氣有虛實也倉公曰能谷者過期不能谷者不及期正此之謂既有死期不可刺矣間一臟止及至三四臟者乃可刺也間三四臟者皆非以次相傳者也治之則愈故可用針刺之此云可刺不可刺即前所云可與治不可與治同義也手太陰氣絶則皮毛焦太陰者行氣溫於皮毛者也故氣不榮則皮毛焦皮毛焦則津液去皮節津液去皮節者則爪枯毛折毛折者則毛先死丙篤丁死火勝金也手太陰者肺也肺主皮毛故其氣絶則津液去於皮節而症在爪枯毛折也肺金畏火故危於丙丁手少陰氣絶則脈不通脈不通則血不流血不流則髦色不澤故其面黑如漆柴者血先死壬篤癸死水勝火也手少陰者心也心主血脈故心脈絶則血先死其症在髦色不澤而面黑如漆也心火畏水故危於壬癸髦音毛發也足太陰氣絶者則脈不榮肌肉唇舌者肌肉之本也脈不榮則肌肉軟肌肉軟則舌萎人中滿人中滿則唇反唇反者肉先死甲篤乙死木勝土也足太陰者脾也脾主肌肉故脾氣絶則肉先死其症在人中滿而舌萎唇反也脾土畏木故死於甲乙足少陰氣絶則骨枯少陰者冬脈也伏行而濡骨髓者也故骨不濡則肉不能著也骨肉不相親則肉軟卻肉軟卻故齒長而垢發無澤發無澤者骨先死戊篤己死土勝水也足少陰者腎也腎屬水故為冬脈腎主骨故腎氣絶則骨先死其症在骨肉不相親附則齒長而垢精髓不能濡潤則發枯無澤也腎水畏土故死於戊己足厥陰氣絶則筋絶厥陰者肝木也肝者筋之合也筋者聚於陰器而脈絡於舌本也故脈弗榮則筋急筋急則引舌與卵故唇青舌卷卵縮則筋先死庚篤辛死金勝木也肝氣絶者筋先死其症則唇青舌卷而卵縮囊拳也肝木畏金故死於庚辛五陰氣俱絶則目系轉轉則目運目運者為志先死志先死則遠一日半死矣五臟之精皆上注於目故五陰氣絶則目轉而運志先死矣蓋志藏於腎陰之神也真陰已竭死在周日間耳今有病劇而忽爾目無所見者正陰氣竭絶之候六陽氣絶則陰與陽相離離則腠理發泄絶汗乃出故旦占夕死夕占旦死汗本陰精固於陽氣陽氣絶則陰陽相離而腠理不閉脫汗乃出其死在頃刻間也病有短期冬三月之病病合於陽者至春正月脈有死徵皆歸出春冬三月者陰盛時也病合於陽者陽症陽脈也出春春盡夏初也以水王之時而病合於陽者時氣不足病氣有餘也及至孟春正月陽氣發生則陽邪愈勝陰氣愈竭若脈有死徵則出春交夏而陽盛陰衰俱已至極無所逃矣冬三月之病在理已盡草與柳葉皆殺在理已盡謂察其脈症之理已無生意也以冬月之病而得此則凡草色之青柳葉之見陰陽氣易皆其死期故云皆殺也殺少戒切春陰陽皆絶期在孟春陰陽皆絶謂陰中無陽陽中無陰彼此相絶不交通也病由冬月而春猶若此是生氣之竭也短期當在孟春矣春三月之病曰陽殺春月陽氣方升而病在陽者故曰陽殺殺者衰也陰陽皆絶期在草乾以三春陽殺之病而陰陽痞絶者期在深秋草乾之時金氣勝而病發於春者死矣夏三月之病至陰不過十日脾腎皆為至陰夏三月以陽盛之時而脾腎傷極則真陰敗絶天干易氣不能堪矣故不過十日也陰陽交期在濂水陰陽交者陰脈見於陽則陽氣失守陽脈見於陰則陰氣失守若是者雖無危症而脈象已逆見於夏月則危於仲秋濂水之時也濂音斂清也秋三月之病三陽俱起不治自已秋時陽氣漸衰陰氣漸長雖三陽脈病俱起而陽不勝陰故自已也陰陽交合者立不能坐坐不能起秋氣將斂未斂故有陰陽交合為病者則或精或氣必有所傷而致動止不利蓋陽勝陰故立不能坐陰勝陽故坐不能起三陽獨至期在石水三陽獨至即二陽並至陽亢陰竭之候也陰竭在冬本無生意而孤陽遇水終為撲滅故期在水堅如石之時也三陰獨至期在盛水三陰獨至有陰無陽也盛水者正月雨水之候孤陰難以獨立故遇陽盛之時則不能保其有也經終十二經脈之終十二經脈即十二臟之氣也終者氣盡之謂太陽脈之終也戴眼反折瘛瘲其色白絶汗乃出出則死矣戴者戴於上也謂目睛仰視而不能轉也反折腰脊反張也瘛者筋之急也瘲者筋之緩也絶汗者暴出如油不能收也足太陽之脈起於目內眥上額交巔入絡腦下項挾脊抵腰中下至足之小趾手太陽之脈起於小指之端循臂上肩其支者循頸上頰至目之外眥故其為病如此然太陽為三陽之表故主色白汗出其色白絶皮乃絶汗絶汗則終矣亦主表之謂瘛音熾瘲音縱少陽終者耳聾百節皆縱目睘絶系絶系一日半死其死也色先青白乃死矣手足少陽之脈皆入於耳中亦皆至於目鋭眥故為耳聾目睘也睘者直視如驚貌因少陽之系絶不能旋轉故至此也膽者筋其應少陽氣絶故百節皆縱也木之色青金之色白金木相賊則青白先見此少陽之死候也睘音瓊陽明終者口目動作善驚妄言色黃上下經盛不仁則終矣手足陽明之脈皆挾口入目故為口目動作而牽引歪斜也聞木音則惕然而驚是陽明善驚也詈罵不避親疏是陽明妄言也黃者土色外見也上下經盛謂頭頸手足陽明之脈皆躁動而盛是胃氣之敗也不知疼痛謂之不仁是肌肉之敗也此皆陽明氣竭之候少陰終者面黑齒長而垢腹脹閉上下不通而終矣手少陰氣絶則血敗足少陰氣絶則色如炲故面黑也腎主骨腎敗則骨敗故齒根不固長而垢也手少陰之脈下膈絡小腸足少陰之脈絡膀胱貫肝膈故為腹脹閉上下不通則心腎隔絶此少陰之終也太陰終者腹脹閉不得息善噫善嘔嘔則逆逆則面赤不逆則上下不通不通則面黑皮毛焦而終矣足太陰脈入腹屬脾故為腹脹閉手太陰脈上膈屬肺而主呼吸故為不得息脹閉則升降難不得息則氣道滯故為噫為嘔嘔則氣逆於上故為面赤不逆則痞塞於中故為上下不通脾氣敗則無以制水故黑色見於面肺氣敗則治節不行故皮毛焦而終矣厥陰終者中熱嗌乾善溺心煩甚則舌卷卵上縮而終矣手厥陰心主之脈起於胸中出屬心包絡下膈歷絡三焦足厥陰肝脈循喉嚨之後上入頏顙其下者循股陰入毛中過陰器故為中熱嗌乾善溺心煩等病又舌者心之官也肝者筋之合也筋者聚於陰器而脈絡於舌木故甚則舌卷卵縮而厥陰之氣終矣此十二經之所敗也手足六經各分表裡是十二經也
